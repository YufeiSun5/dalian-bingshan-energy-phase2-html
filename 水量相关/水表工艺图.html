		// 初始化数据显示
		function initDataDisplay() {
			const container = document.getElementById('dataDisplay');
			container.innerHTML = '';

			for (let i = 0; i < 1; i++) {
				const group = document.createElement('div');
				group.className = 'data-group';
				group.id = `data-group-${i}`;

				// 设置位置
				const pos = gasMeterConfig.positions[i];
				group.style.left = pos.x + '%';
				group.style.top = pos.y + '%';
				group.style.transform = 'translate(-50%, -50%)';

				// 获取标题配置
				const titleConfig = gasMeterConfig.titles[i];

				// 创建标题行
				const titleRow = document.createElement('div');
				titleRow.className = 'title-row';

				// 创建指示灯
				const indicator = document.createElement('div');
				indicator.className = `status-indicator ${titleConfig.indicatorPosition}`;

				// 创建标题文本
				const titleText = document.createElement('div');
				titleText.className = 'title-text';
				titleText.textContent = titleConfig.title;

				// 根据指示灯位置排列
				if (titleConfig.indicatorPosition === 'left') {
					titleRow.appendChild(indicator);
					titleRow.appendChild(titleText);
				} else {
					titleRow.appendChild(titleText);
					titleRow.appendChild(indicator);
				}

				// 创建数据行
				const dataRow = document.createElement('div');

				// 当日用量显示

		// 注意：数据现在完全由SQL自动查询，不再需要手动更新
		// 如需手动触发查询，请使用: queryDailyUsage()

		// 根据变量名查找水表索引
		function findMeterIndex(meterName) {
			// 变量名映射表 - 支持多种格式调用同一组数据
			const meterMap = {
				// ============ 标准meter变量名 ============
				'meter1': 0, 'meter2': 1, 'meter3': 2, 'meter4': 3, 'meter5': 4, 
				'meter6': 5, 'meter7': 6, 'meter8': 7, 'meter9': 8, 'meter10': 9, 
				'meter11': 10, 'meter12': 11, 'meter13': 12, 'meter14': 13, 'meter15': 14,
				'meter16': 15, 'meter17': 16, 'meter18': 17, 'meter19': 18, 'meter20': 19,
				'meter21': 20, 'meter22': 21, 'meter23': 22, 'meter24': 23, 'meter25': 24,
				'meter26': 25, 'meter27': 26,

				// ============ 水表编号变量名（推荐使用）===========
				'1#': 0, '2#': 1, '3#': 2, '4#': 3, '5#': 4,
				'6#': 5, '7#': 6, '8#': 7, '9#': 8, '10#': 9,
				'11#': 10, '12#': 11, '13#': 12, '14#': 13, '15#': 14,
				'16#': 15, '17#': 16, '18#': 17, '19#': 18, '20#': 19,
				'21#': 20, '22#': 21, '23#': 22, '24#': 23, '25#': 24,
				'26#': 25, '27#': 26,

				// ============ 兼容旧的水表命名 ===========
				'水表1': 0, '水表2': 1, '水表3': 2, '水表4': 3, '水表5': 4,
				'水表6': 5, '水表7': 6, '水表8': 7, '水表9': 8, '水表10': 9,
				'水表11': 10, '水表12': 11, '水表13': 12, '水表14': 13, '水表15': 14,
				'水表16': 15, '水表17': 16, '水表18': 17, '水表19': 18, '水表20': 19,
				'水表21': 20, '水表22': 21, '水表23': 22, '水表24': 23, '水表25': 24,
				'水表26': 25, '水表27': 26
			};

			return meterMap[meterName] !== undefined ? meterMap[meterName] : -1;
		}

		// 更新单个水表数据（内部函数）
		// dailyUsage: SQL查询得到的当日用量
		function updateSingleData(meterIndex, dailyUsage) {
			if (meterIndex < 0 || meterIndex >= 27) {
				console.error('水表索引必须在0-26之间');
				return;
			}

			// 更新配置数据
			gasMeterConfig.data.dailyUsage[meterIndex] = dailyUsage;

			// 更新显示
			const totalElement = document.getElementById(`total-${meterIndex}`);

			if (totalElement) {
				if (dailyUsage !== null && dailyUsage !== undefined) {
					totalElement.textContent = parseFloat(dailyUsage).toFixed(2);
				} else {
					totalElement.textContent = '无数据';
				}
			}
		}

		// SQL查询函数
		async function sendSQL(strsql) {
			const sql = strsql;
			console.info(sql);
			const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({ sql })
			});

			const data = await res.json();
			return data;
		}

		// 查询所有水表的当日用量（使用SQL直接计算）
		async function queryDailyUsage() {
			// 使用SQL查询逻辑日内的最大值减去最小值
			// 逻辑日：早上7:00到第二天7:00算是一天
			const sql = `SELECT 
				water_ID,
				MAX(FLOW_TOTAL) - MIN(FLOW_TOTAL) AS daily_usage
			FROM 
				\`sy\`.\`data_water\`
			WHERE 
				water_ID BETWEEN 1 AND 27
				AND FLOW_TOTAL > 0
				AND FLOW_TOTAL < 999999999
				AND \`date\` >= CASE 
					WHEN DATE_FORMAT(NOW(), '%H:%i:%s') < '07:00:00' 
					THEN CONCAT(DATE_SUB(CURDATE(), INTERVAL 1 DAY), ' 07:00:00')
					ELSE CONCAT(CURDATE(), ' 07:00:00')
				END
				AND \`date\` <= NOW()
			GROUP BY 
				water_ID`;

			try {
				console.log('查询当日用量:', sql);
				
				const result = await sendSQL(sql);
				
				// 检查返回的数据格式：可能是 {success: true, data: Array} 或直接是 {data: Array}
				const dataArray = (result && result.success && result.data) ? result.data : (result && result.data ? result.data : result);
				
				if (dataArray && Array.isArray(dataArray) && dataArray.length > 0) {
					// 初始化所有水表为null
					for (let i = 0; i < 27; i++) {
						gasMeterConfig.data.dailyUsage[i] = null;
					}
					
					// 处理查询结果（water_ID从1开始，数组索引从0开始）
					dataArray.forEach(row => {
						const waterID = row.water_ID;
						const dailyUsage = row.daily_usage;
						
						if (waterID >= 1 && waterID <= 27) {
							const meterIndex = waterID - 1;
							updateSingleData(meterIndex, dailyUsage);
							console.log(`水表 ${waterID}# 当日用量: ${dailyUsage !== null && dailyUsage !== undefined ? parseFloat(dailyUsage).toFixed(2) : '无数据'}`);
						}
					});
					
					console.log('当日用量查询完成');
				} else {
					console.warn('查询结果为空或格式错误:', result);
					// 如果没有数据，将所有水表显示为"无数据"
					for (let i = 0; i < 27; i++) {
						updateSingleData(i, null);
					}
				}
			} catch (error) {
				console.error('查询当日用量失败:', error);
				// 查询失败时，将所有水表显示为"无数据"
				for (let i = 0; i < 27; i++) {
					updateSingleData(i, null);
				}
			}
		}

		// 定时器变量
		let dailyUsageTimer = null;

		// 启动定时查询当日用量（每3分钟查询一次）
		function startDailyUsageQuery() {
			// 立即执行一次
			queryDailyUsage();
			
			// 每3分钟查询一次（180000毫秒 = 3分钟）
			dailyUsageTimer = setInterval(queryDailyUsage, 3 * 60 * 1000);
			console.log('当日用量定时查询已启动（每3分钟查询一次）');
		}

		// 停止定时查询
		function stopDailyUsageQuery() {
			if (dailyUsageTimer) {
				clearInterval(dailyUsageTimer);
				dailyUsageTimer = null;
				console.log('当日用量定时查询已停止');
			}
		}

		console.log('• 页面已启动自动查询当日用量功能');
		console.log('• 查询间隔: 每3分钟一次');
		console.log('• 计算方式: SQL查询逻辑日内FLOW_TOTAL的最大值减去最小值');
		console.log('• 数据过滤: 排除FLOW_TOTAL为0或999999999的数据');
		console.log('• 逻辑日: 早上7:00到第二天7:00算是一天');
		console.log('• 控制函数: startDailyUsageQuery() - 启动自动查询');
		console.log('           stopDailyUsageQuery() - 停止自动查询');
		console.log('           queryDailyUsage() - 手动执行一次查询');
		console.log('');
		
		console.log('%c【重要提示】', 'color: #ff6666; font-size: 13px; font-weight: bold;');
		console.log('• 数据完全由SQL自动查询，无需手动更新');
		console.log('• 如需手动触发查询，请使用: queryDailyUsage()');
		console.log('• 页面显示的是当日用量（逻辑日内最大值 - 最小值）');
