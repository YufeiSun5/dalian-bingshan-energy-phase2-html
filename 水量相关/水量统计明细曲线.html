					var sql = " 		select date as datetime ,(LEAD(FLOW_TOTAL,1,max(FLOW_TOTAL)) over(order by date) - FLOW_TOTAL) as FLOW from data_water FORCE INDEX (date_no) \n"

						}

								smooth: 0.5 // 设置折线弧度
							}

					//可以return一个数组, 代表想选中的数据
					//return []
					
					let newData = [];
					for(let i=0;i<arr.length;i++ ){
						newData.push({
							name:arr[i].name,
							value:arr[i].value,
							selected:arr[i].selected
						});

					//recursive(Array.from(new Set(newData)));
					
					recursive(newData);
