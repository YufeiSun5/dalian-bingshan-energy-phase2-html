<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var table = layui.table;
		var $ = layui.$;
		let currentDay = new Date();
		currentDay.setDate(1);
		var dateValue = "day";
		var displayType = "total"; // 默认显示累计水量
		
		
		currentDay.setHours(7, 0, 0, 0);

		// 加载日期
		var datetest =  laydate.render({
			type:"date",
			elem: '#ID-laydate-start-date-1',
			value: new Date(), // 设置初始日期
		});
		
		// 监听显示类型切换
		form.on('select(displayType)', function(data){
			displayType = data.value;
			console.info("切换显示类型为:", displayType);
		});
		
		form.on('select(interest)', function(data){
			if(dateValue != data.value){
				dateValue = data.value;
				if(dateValue == "day"){//如果是单天日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").hide();
					$("#ID-laydate-end-date-1").parent().hide();
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-rangeLinked',
						range: [],
						rangeLinked: false // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-start-date-1',
						value: new Date(), // 设置初始日期
					});
				}else{//如果是自定义日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").show();
					$("#ID-laydate-end-date-1").parent().show();
					let date = new Date();
					date.setDate(date.getDate() - 7);
					laydate.render({
						type:"date",
						elem: '#ID-laydate-start-date-1',
						value: date, // 设置初始日期
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-end-date-1',
						value: new Date(), // 设置初始日期
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-rangeLinked',
						range: ['#ID-laydate-start-date-1', '#ID-laydate-end-date-1'],
						rangeLinked: true // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
					});
				}
			}
		});
		
		
		table.render({
			elem: '#test',
			cols: [[ // 表头配置项
				{field: 'date',title: '时间',minwidth: 130,align:"center"}, // 日期
				{field: 'FLOW_TOTAL', title: '累计水量',minwidth: 200, align:"center" }, // 示数（m³）
				
			]],
			data: [],
			height: $("#table_form").height()-1,
			//skin: 'line', // 表格风格
			even: true,
			//page: true, // 是否显示分页
			//limits: [5, 10, 15],
			//limit: 5 // 每页默认显示的数量
		});
		$('#search').on('click', async function() {
			debugger;
			try {
				//获取查询结果
				var startdate ;
				var enddate;
				startdate = $("#ID-laydate-start-date-1")[0].value;
				if(dateValue == "diy"){
					enddate = $("#ID-laydate-end-date-1")[0].value;
					//开始时间和结束时间比对
					if( new Date(enddate).getTime() - new Date(startdate).getTime() > 7 * 86400000){
						layer.msg("开始时间和结束时间的间隔不能超过七天");
						return;
					}
				}
				
				// 获取当前时间，用于判断是否是今天的逻辑日
				var now = new Date();
				var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 0, 0);
				var todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 7, 0, 0);
				var isTodayLogicDay = now >= todayStart && now < todayEnd;
				
				var allData = [];
				
				if(dateValue == "day"){
					// 单日查询：统一使用详细表（data_water），显示详细信息（包含时分秒）
					var sql = " select DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as date, FLOW_TOTAL from data_water ";
					sql += " where date>= DATE_FORMAT('"+startdate+"', '%Y-%m-%d 07:00:00') and date < DATE_FORMAT(DATE_ADD('"+startdate+"',INTERVAL 24 HOUR), '%Y-%m-%d 07:00:00') ";
					sql += " and water_ID = 1 ";
					sql += " order by date ";
					console.info(sql);
					const data = await sendSQL(sql);
					if(data && data.data){
						if(displayType === "usage"){
							// 用量需要用累计量计算（当前值 - 前一个值）
							// 先保存所有的累计值，避免在循环中被覆盖
							var totalValues = data.data.map(item => parseFloat(item.FLOW_TOTAL));
							for(let i = 0; i < data.data.length; i++){
								if(i === 0){
									// 第一条数据，用量设为0或者与前一天的最后一条比较（暂时设为0）
									data.data[i].FLOW_TOTAL = 0;
								} else {
									// 当前累计量 - 前一个累计量 = 用量（不显示小数点）
									var currentTotal = totalValues[i];
									var previousTotal = totalValues[i-1];
									data.data[i].FLOW_TOTAL = Math.round(currentTotal - previousTotal);
								}
							}
						}
						allData = data.data;
					}
				}else{
					// 自定义日期范围查询（只使用日期，不含时分秒）
					// 将日期字符串转换为日期对象，只取日期部分
					var startDateStr = startdate.split(' ')[0]; // 只取日期部分，去掉时分秒
					var endDateStr = enddate.split(' ')[0]; // 只取日期部分，去掉时分秒
					
					var startDate = new Date(startDateStr);
					var endDate = new Date(endDateStr);
					
					// 计算查询范围的逻辑日
					// 逻辑日：>=7:00到第二天的<7:00
					// 开始日期：从该日期的7:00开始
					var queryStartLogicDay = new Date(startDate);
					queryStartLogicDay.setHours(7, 0, 0, 0);
					
					// 结束日期：到该日期的次日7:00结束（包含该日期的整个逻辑日）
					var queryEndLogicDay = new Date(endDate);
					queryEndLogicDay.setDate(queryEndLogicDay.getDate() + 1);
					queryEndLogicDay.setHours(7, 0, 0, 0);
					
					// 判断是否包含今天的逻辑日
					var containsToday = queryStartLogicDay.getTime() <= todayStart.getTime() && queryEndLogicDay.getTime() > todayStart.getTime();
					
					if(containsToday && isTodayLogicDay){
						// 包含今天，需要分开查询
						// 1. 查询今天的数据（从data_water表），只取最后一条（今天的逻辑日：从今天7:00到明天7:00）
						// 使用todayStart来构建查询条件，确保与单日查询一致
						var todayYear = todayStart.getFullYear();
						var todayMonth = (todayStart.getMonth() + 1).toString().padStart(2, '0');
						var todayDay = todayStart.getDate().toString().padStart(2, '0');
						var todayDateStr = todayYear + "-" + todayMonth + "-" + todayDay;
						
						if(displayType === "usage"){
							// 用量：需要查询今天的第一条和最后一条，计算差值
							var sqlTodayUsage = " select DATE_FORMAT(date, '%Y-%m-%d') as date, FLOW_TOTAL from data_water ";
							sqlTodayUsage += " where date >= '"+todayDateStr+" 07:00:00' ";
							sqlTodayUsage += " and date < DATE_ADD('"+todayDateStr+" 07:00:00', INTERVAL 1 DAY) ";
							sqlTodayUsage += " and water_ID = 1 ";
							sqlTodayUsage += " order by date ASC LIMIT 1 "; // 获取第一条
							const dataFirstToday = await sendSQL(sqlTodayUsage);
							
							var sqlTodayLast = " select DATE_FORMAT(date, '%Y-%m-%d') as date, FLOW_TOTAL from data_water ";
							sqlTodayLast += " where date >= '"+todayDateStr+" 07:00:00' ";
							sqlTodayLast += " and date < DATE_ADD('"+todayDateStr+" 07:00:00', INTERVAL 1 DAY) ";
							sqlTodayLast += " and water_ID = 1 ";
							sqlTodayLast += " order by ID DESC LIMIT 1 "; // 获取最后一条
							const dataLastToday = await sendSQL(sqlTodayLast);
							
							if(dataFirstToday && dataFirstToday.data && dataFirstToday.data.length > 0 &&
							   dataLastToday && dataLastToday.data && dataLastToday.data.length > 0){
								var firstTotal = parseFloat(dataFirstToday.data[0].FLOW_TOTAL);
								var lastTotal = parseFloat(dataLastToday.data[0].FLOW_TOTAL);
								var usage = Math.round(lastTotal - firstTotal);
								allData = allData.concat([{
									date: dataLastToday.data[0].date,
									FLOW_TOTAL: usage
								}]);
							}
						} else {
							// 累计水量：查询最后一条
							var sqlToday = " select DATE_FORMAT(date, '%Y-%m-%d') as date, FLOW_TOTAL from data_water ";
							sqlToday += " where date >= '"+todayDateStr+" 07:00:00' ";
							sqlToday += " and date < DATE_ADD('"+todayDateStr+" 07:00:00', INTERVAL 1 DAY) ";
							sqlToday += " and water_ID = 1 ";
							sqlToday += " order by ID DESC LIMIT 1 ";
							console.info("查询今天数据SQL: " + sqlToday);
							const dataToday = await sendSQL(sqlToday);
							if(dataToday && dataToday.data && dataToday.data.length > 0){
								allData = allData.concat([dataToday.data[0]]);
							}
						}
						
						// 2. 查询历史数据（从sum_water_flow_total_by_day表）
						// 历史数据的逻辑日对应的date字段是逻辑日开始的日期（00:00:00）
						if(queryStartLogicDay.getTime() < todayStart.getTime()){
							// 计算历史数据的结束日期（今天的逻辑日的前一天）
							var historyEndDate = new Date(todayStart);
							historyEndDate.setDate(historyEndDate.getDate() - 1);
							// 格式化开始日期
							var startYear = queryStartLogicDay.getFullYear();
							var startMonth = (queryStartLogicDay.getMonth() + 1).toString().padStart(2, '0');
							var startDay = queryStartLogicDay.getDate().toString().padStart(2, '0');
							var startDateStr = startYear + "-" + startMonth + "-" + startDay;
							// 格式化结束日期
							var endYear = historyEndDate.getFullYear();
							var endMonth = (historyEndDate.getMonth() + 1).toString().padStart(2, '0');
							var endDay = historyEndDate.getDate().toString().padStart(2, '0');
							var endDateStr = endYear + "-" + endMonth + "-" + endDay;
							
							// 根据显示类型选择不同的字段
							var historyField = displayType === "usage" ? "sum_water_FLOW_total" : "max_water";
							var sqlHistory = " select DATE_FORMAT(date, '%Y-%m-%d') as date, "+historyField+" as FLOW_TOTAL from sum_water_flow_total_by_day ";
							sqlHistory += " where date >= DATE_FORMAT('"+startDateStr+"', '%Y-%m-%d 00:00:00') ";
							sqlHistory += " and date <= DATE_FORMAT('"+endDateStr+"', '%Y-%m-%d 00:00:00') ";
							sqlHistory += " and no = 1 ";
							sqlHistory += " order by date ";
							console.info("查询历史数据: " + sqlHistory);
							const dataHistory = await sendSQL(sqlHistory);
							if(dataHistory && dataHistory.data){
								allData = allData.concat(dataHistory.data);
							}
						}
						
						// 按日期排序
						allData.sort(function(a, b){
							return new Date(a.date) - new Date(b.date);
						});
					} else {
						// 不包含今天，全部从sum_water_flow_total_by_day表查询
						// 计算需要查询的逻辑日范围对应的日期
						// 格式化开始日期
						var startYear = queryStartLogicDay.getFullYear();
						var startMonth = (queryStartLogicDay.getMonth() + 1).toString().padStart(2, '0');
						var startDay = queryStartLogicDay.getDate().toString().padStart(2, '0');
						var startDateStr = startYear + "-" + startMonth + "-" + startDay;
						// 格式化结束日期
						var endYear = queryEndLogicDay.getFullYear();
						var endMonth = (queryEndLogicDay.getMonth() + 1).toString().padStart(2, '0');
						var endDay = queryEndLogicDay.getDate().toString().padStart(2, '0');
						var endDateStr = endYear + "-" + endMonth + "-" + endDay;
						
						// 根据显示类型选择不同的字段
						var historyField = displayType === "usage" ? "sum_water_FLOW_total" : "max_water";
