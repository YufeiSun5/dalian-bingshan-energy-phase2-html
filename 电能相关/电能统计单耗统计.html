				let now = new Date();
				let compareDate = new Date(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate());
				var sql = ""
				+" select r.*,If(y.date is null, 0,ROUND(r.sum_elec / y.count,2)) as elec_yield,If(y.date is null, 0,round(r.sum_water / y.count,2) ) as water_yield,If(y.date is null, 0, round(r.sum_gas / y.count,2) ) as gas_yield,y.count from ( "
				+" select DATE_FORMAT(r.jDay, '%Y-%m-%d') as day,sum(sum_elec) as sum_elec,sum(sum_water) as sum_water,sum(sum_gas) as sum_gas from ( " 
				+" 	select t.jDay,sum(today_elec) as sum_elec , null as sum_water,null as sum_gas from ( "

					sql += " union all "

					+" 	and kwh != 0 and kwh != 99999999		" 
					+" 	and no in (1,12,16,17,20)	"

				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0)){

						+" 		FROM data_water 	" 	
						+" 		WHERE date <= DATE_FORMAT(DATE_ADD(now(),INTERVAL 24 HOUR), '%Y-%m-%d 08:00:00')  " 
						+" 		AND date >= DATE_FORMAT(now() , '%Y-%m-%d 07:00:00')		" 
						+" 		and FLOW_TOTAL != 0 and FLOW_TOTAL != 99999999		" 
						+" 		GROUP BY DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d %H:00:00') " ;
				}
				sql += ""
				+" 	)t " 
				+" 	GROUP BY t.jDay " 
				+" 	union all  " 
				+" 	select t.jDay,null as sum_elec , null as sum_water,sum(today_gas) as sum_gas from ( " 
				+"		select DATE_FORMAT(date, '%Y-%m-%d')  as jDay,sum_flow_total as today_gas " 
				+"		from sum_gas_flow_total_by_day " 
				+"		where date >= '"+startdate+"' and date <= '"+enddate+"' " ;
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0)){
					sql += " union all "
					+" 	SELECT DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d') as jDay  " 	
					+" 	,if(LEAD(gas_id	,1,0) over(order by gas_id,DATE_FORMAT(date, '%Y-%m-%d %H:00:00')) = gas_id	 , LEAD(MIN(FLOW_TOTAL),1,0) over(order by gas_id,DATE_FORMAT(date, '%Y-%m-%d %H:00:00')),MAX(FLOW_TOTAL)) - MIN(FLOW_TOTAL)  AS today_gas	 " 		
					+" 	FROM data_gas 		" 
					+" 	WHERE date <= DATE_FORMAT(DATE_ADD(now(),INTERVAL 24 HOUR), '%Y-%m-%d 08:00:00')   " 
					+" 	AND date >= DATE_FORMAT(now() , '%Y-%m-%d 07:00:00')		" 
					+" 	and FLOW_total != 0 and FLOW_total != 99999999	 " 	
					+" 	GROUP BY gas_ID,DATE_FORMAT(date, '%Y-%m-%d %H:00:00') " ;
				}

				sql +=" )t " 
				+" 	GROUP BY t.jDay " 
				+" ) r " 
				+" where r.jDay >= '"+startdate+"' and r.jDay <= '"+enddate+"' " 
				+" GROUP BY r.jDay " 
				+" order BY r.jDay " 
				+"  ) r left join yield_config y on r.day = y.date  ; ";
				
				
				
				
				
				
				
				console.info(sql);
