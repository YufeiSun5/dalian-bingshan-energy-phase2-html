<script>
	layui.use(['form', 'laydate', 'util','excel','xmSelect'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var table = layui.table;
		var $ = layui.$;
		var xmSelect = layui.xmSelect; // 从layui获取xmSelect
		let currentDay = new Date();
		currentDay.setDate(1);
		var timeMode = "multi"; // 默认设置为多日模式
		var queryMode = "multiTable"; // 当前查询模式：single（按开关查询）或 multiTable（按时间查询）
		
		// 存储三种模式的laydate实例
		var laydateInstances = {
			multi: null,
			range: null,
			multiQuery: null
		};

		currentDay.setHours(0, 0, 0, 0);
		
	// 全局变量：存储两条基准线的配置（初始化）
	window.baselineConfig = {
		line1: {
			name: "上限值",
			value: 100,
			color: "#ff0000"  // 红色
		},
		line2: {
			name: "下限值", 
			value: 50,
			color: "#ff0000"  // 红色
		}
	};
		
		// 全局方法：更新基准线（F12控制台调用）
		window.updateBaseline = function(lineNumber, name, value) {
			if(lineNumber !== 1 && lineNumber !== 2) {
				console.error("lineNumber 必须是 1 或 2");
				return;
			}
			
			const lineKey = 'line' + lineNumber;
			window.baselineConfig[lineKey].name = name;
			window.baselineConfig[lineKey].value = value;
			
			console.log(`基准线${lineNumber}已更新：`, window.baselineConfig[lineKey]);
			
			// 自动刷新当前显示的图表
			refreshCurrentChart();
		};
		
		// 刷新当前图表（重新渲染以显示新的基准线）
		// 注意：基准线只在多表查询模式（按时间查询）下，且满足特定条件时显示
		// 线1：选中"一号变电所&二号变电所之和" + 分类能耗为"功率"
		// 线2：选中"三号变电所之和" + 分类能耗为"功率"
		function refreshCurrentChart() {
			// 只在多表查询模式下刷新基准线
			if(queryMode === "multiTable") {
				const chartDom = document.getElementById('chart-multi');
				const chartInstance = echarts.getInstanceByDom(chartDom);
				if(chartInstance) {
					const currentOption = chartInstance.getOption();
					addBaselinesToOption(currentOption);
					chartInstance.setOption(currentOption, true);
					console.log("✅ 多表图表已刷新基准线");
				} else {
					console.warn("⚠️ 图表实例不存在，请先执行查询操作");
				}
			} else {
				console.warn("⚠️ 基准线只在【按时间查询】模式下显示，当前是【按开关查询】模式");
			}
		}
		
		// 添加基准线到ECharts配置（使用markLine实现）
		function addBaselinesToOption(option) {
			if(!option.series || option.series.length === 0) return;
			
			// 在第一个series上添加markLine（这样所有曲线共享同一个markLine）
			if(!option.series[0].markLine) {
				option.series[0].markLine = {
					silent: true,
					symbol: 'none',
					data: []
				};
			}
			
		// 清空旧的基准线数据
		option.series[0].markLine.data = option.series[0].markLine.data.filter(item => 
			!item.baselineId
		);
		
		// 判断是否显示基准线的条件
		// 获取当前选中的树节点
		var checkedData = tree.getChecked('tree');
		
		// 获取当前分类能耗选择
		var classification = $('#classification').val();
		
		// 判断是否选中了"一号变电所&二号变电所之和"
		var hasSum1And2 = false;
		// 判断是否选中了"三号变电所之和"
		var hasSum3 = false;
		
		// 递归函数：遍历所有节点检查是否选中了特定的汇总项
		function checkSelectedNodes(nodes) {
			if(!nodes || nodes.length === 0) return;
			for(let i = 0; i < nodes.length; i++) {
				var node = nodes[i];
				// 检查当前节点的id
				if(node.id === 'sum_1_2') {
					hasSum1And2 = true;
				}
				if(node.id === 'sum_3') {
					hasSum3 = true;
				}

		// 切换查询模式的函数（单表/多表）
		function switchQueryMode(mode) {
			queryMode = mode;
			console.log('切换到查询模式：', mode);

			if(mode === "single"){
				// 显示单表查询控件，隐藏多表查询控件
				$("#single-query-controls").show();
				$("#multi-query-controls").hide();
				$("#single-query-layout").show();
				$("#multi-query-layout").hide();
			} else if(mode === "multiTable"){
				// 显示多表查询控件，隐藏单表查询控件
				$("#single-query-controls").hide();
				$("#multi-query-controls").show();
				$("#single-query-layout").hide();
				$("#multi-query-layout").show();
				
				// 初始化多表查询的日期范围选择器
				if(!laydateInstances.multiQuery){
					setTimeout(function() {
						// 设置默认范围：本月1日到今天
						let now = new Date();
						let firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
						
						function formatDate(date) {
							let year = date.getFullYear();
							let month = ('0' + (date.getMonth() + 1)).slice(-2);
							let day = ('0' + date.getDate()).slice(-2);
							return year + '-' + month + '-' + day;
						}
						
						let startDateStr = formatDate(firstDayOfMonth);
						let endDateStr = formatDate(now);
						let defaultRange = startDateStr + ' - ' + endDateStr;
						
						$('#multi-query-date-input').val('');
						
						laydateInstances.multiQuery = laydate.render({
							type: "date",
							elem: '#multi-query-date-input',
							range: true,
							format: 'yyyy-MM-dd',
							done: function(value, date, endDate){
								console.log('多表查询范围选择完成：', value);
								if(!value) return;
								
								let dates = value.split(' - ');
								if(dates.length === 2) {
									let startDate = new Date(dates[0]);
									let endDateObj = new Date(dates[1]);
									const millisecondsPerDay = 24 * 60 * 60 * 1000;
									const diffInMilliseconds = Math.abs(endDateObj.getTime() - startDate.getTime());
									const diffInDays = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1;
									
									// 限制最多31天
									if(diffInDays > 31){
										layer.alert("开始时间和结束时间最多相差31天");
										$('#multi-query-date-input').val('');
									}
								}
							}
						});
						
						// 设置默认值
						setTimeout(function() {
							$('#multi-query-date-input').val(defaultRange);
							console.log('多表查询设置默认范围（本月1日到今天）：', defaultRange);
						}, 100);
					}, 50);
				}
				
				// 初始化树形图（如果还没初始化）
				if(!window.treeInitialized){
					initTreeView();
					window.treeInitialized = true;
				}
			}

			// 重新渲染表单
			form.render();
		}

		// 切换时间选择模式的函数 - 使用独立的输入框和实例
		function switchTimeMode(mode) {
			timeMode = mode;
			console.log('切换到时间模式：', mode);

			// 隐藏所有容器
			$("#multi-date-container").hide();
			$("#range-date-container").hide();
			$("#selectedDate").hide();

			// 清理所有laydate实例
			$('.layui-laydate').remove();
			
			// 销毁旧的laydate实例
			Object.keys(laydateInstances).forEach(key => {
				if (laydateInstances[key]) {
					// laydate没有直接的销毁方法，通过移除事件监听器来清理
					laydateInstances[key] = null;
				}
			});

			if(mode === "multi"){
				// 多日模式：显示多日输入框 + 多选组件
				$("#multi-date-container").show();
				$("#selectedDate").show();

				// 清空输入框
				$('#multi-date-input').val('');
				
				setTimeout(function() {
					laydateInstances.multi = laydate.render({
						type: "date",
						elem: '#multi-date-input',
						value: new Date(),
						format: 'yyyy-MM-dd',  // 明确指定格式
						done: function(value, date, endDate){
							console.log('多日模式选择：', value);
							addDateToMultiSelect(value);
						}
					});
				}, 50);

				// 初始化多选组件并添加当天日期
				initMultiSelect();
				
				// 自动添加当天日期到多选组件
				setTimeout(function() {
					let today = new Date();
					let year = today.getFullYear();
					let month = ('0' + (today.getMonth() + 1)).slice(-2);
					let day = ('0' + today.getDate()).slice(-2);
					let todayStr = year + '-' + month + '-' + day;
					addDateToMultiSelect(todayStr);
				}, 100);

			} else if(mode === "range"){
				// 范围模式：显示范围输入框
				$("#range-date-container").show();

				// 设置默认范围：本月1日到今天
				let now = new Date();
				let firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1); // 本月1日

				// 使用标准的日期格式化方法，确保格式完全符合 yyyy-MM-dd
				function formatDate(date) {
					let year = date.getFullYear();
					let month = ('0' + (date.getMonth() + 1)).slice(-2); // 确保两位数
					let day = ('0' + date.getDate()).slice(-2); // 确保两位数
					return year + '-' + month + '-' + day;
				}

				let startDateStr = formatDate(firstDayOfMonth); // 本月1日
				let endDateStr = formatDate(now); // 今天
				let defaultRange = startDateStr + ' - ' + endDateStr;

				// 先清空输入框，避免格式冲突
				$('#range-date-input').val('');

				// 延迟渲染，确保DOM更新完成
				setTimeout(function() {
					// 渲染范围选择器 - 关键修复：使用 range: true 而不是字符串
					laydateInstances.range = laydate.render({
						type: "date",
						elem: '#range-date-input',
						range: true,  // 修复：使用布尔值 true，而不是字符串
						format: 'yyyy-MM-dd',  // 明确指定格式
						// 先不设置默认值，让laydate自己处理，避免格式问题
						// value: defaultRange,  
						done: function(value, date, endDate){
							console.log('范围选择完成：', value);
							if(!value) return;
							
							let dates = value.split(' - ');
							if(dates.length === 2) {
								let startDate = new Date(dates[0]);
								let endDateObj = new Date(dates[1]);
								const millisecondsPerDay = 24 * 60 * 60 * 1000;
								const diffInMilliseconds = Math.abs(endDateObj.getTime() - startDate.getTime());
								// 计算实际天数差（包含起始日期和结束日期）
								const diffInDays = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1;

								// 限制最多31天（包含起始和结束日期）
								if(diffInDays > 31){
									layer.alert("开始时间和结束时间最多相差31天");
									// 清空输入框，让用户重新选择
									$('#range-date-input').val('');
								}
							}
						}
					});
					
					// 渲染完成后，手动设置默认值
					setTimeout(function() {
						$('#range-date-input').val(defaultRange);
						console.log('设置默认范围（本月1日到今天）：', defaultRange);
					}, 100);
				}, 50); // 延迟50毫秒确保DOM更新完成
			}

			// 重新渲染表单
			form.render();
			console.log('模式', mode, '切换完成');
		}

		// 添加日期到多选组件 - 优化版本
		function addDateToMultiSelect(dateValue) {
			if(!dateValue) {
				console.warn('要添加的日期值为空');
				return;
			}

			try {
				console.log('尝试添加日期到多选组件：', dateValue);

				// 检查xmSelect是否可用
				if (!xmSelect) {
					console.error('xmSelect组件未加载，无法添加日期');
					layer.alert('多选组件未加载，请刷新页面重试');
					return;
				}

				// 检查全局实例是否存在
				if (!window.xmSelectInstance) {
					console.warn('xmSelect全局实例不存在，重新初始化');
					initMultiSelect();
					return;
				}

				// 获取当前选中的数据
				let currentValues = [];
				try {
					currentValues = window.xmSelectInstance.getValue() || [];
				} catch(e) {
					console.warn('获取当前值失败，重新初始化：', e);
					initMultiSelect();
					return;
				}

				// 检查日期是否已存在
				let exists = currentValues.some(item => item.value === dateValue);
				if(exists) {
					console.log('日期已存在，跳过添加：', dateValue);
					return;
				}

				// 添加新日期到数组
				let newValues = [...currentValues, {
					name: dateValue,
					value: dateValue,
					selected: true
				}];

				// 更新组件数据
				try {
					window.xmSelectInstance.update({
						data: newValues
					});
					console.log('成功添加日期到多选组件：', dateValue);
				} catch(e) {
					console.error('更新xmSelect数据失败：', e);
					// 备用方案：重新渲染整个组件
					renderMultiSelectWithNewData(newValues);
				}

			} catch (error) {
				console.error('添加日期到多选组件失败：', error);
				layer.alert('添加日期失败：' + error.message);
			}
		}

		// 根据日期范围生成需要查询的表名列表
		function getTableNames(startDate, endDate) {
			var tables = [];
			var start = new Date(startDate);
			var end = endDate ? new Date(endDate) : new Date(startDate);
			
			// 获取当前年月
			var now = new Date();
			var currentYear = now.getFullYear();
			var currentMonth = now.getMonth() + 1;
			var currentYearMonth = currentYear * 100 + currentMonth;
			
			// 遍历日期范围内的所有月份
			var current = new Date(start.getFullYear(), start.getMonth(), 1);
			var endMonth = new Date(end.getFullYear(), end.getMonth(), 1);
			
			while (current <= endMonth) {
				var year = current.getFullYear();
				var month = current.getMonth() + 1;
				var yearMonth = year * 100 + month;
				
				// 如果是当前月，使用 data_all，否则使用 data_all_YYYYMM
				if (yearMonth === currentYearMonth) {
					tables.push('data_all');
				} else {
					var tableName = 'data_all_' + year + (month < 10 ? '0' + month : month);
					tables.push(tableName);
				}
				
				// 移动到下一个月
				current.setMonth(current.getMonth() + 1);
			}
			
			// 去重
			return [...new Set(tables)];
		}
		
		// 使用SQL查询多表数据（适用于变压器主开关级设备，支持任意时间范围）
		async function performMultiTableQueryWithMemory(startdate, enddate, classification) {
			try {
				// 获取树形图选中的设备
				var checkedData = tree.getChecked('tree');
				var normalDevices = [];  // 普通设备列表
				var deviceNames = {};     // 设备名称映射
				var groups = [];          // 分组列表（用于汇总）
				
				// 收集所有选中的设备ID和名称
				for(let i=0; i<checkedData.length; i++){
					if(checkedData[i].title == '变压器主开关级'){
						// 处理汇总项（分组）
						if(checkedData[i].children != undefined){
							let children = checkedData[i].children;
							for(let j=0; j<children.length; j++){
								if(children[j].no != undefined){
									// 汇总项包含多个设备
									let nos = children[j].no.split(',').map(n => parseInt(n.trim()));
									groups.push({
										name: children[j].title,
										device_ids: nos
									});
								}
							}
						}
						continue;
					}
					
					// 处理普通设备项
					if(checkedData[i].children != undefined){
						let children = checkedData[i].children;
						for(let j=0; j<children.length; j++){
							if(children[j].no != undefined){
								normalDevices.push(children[j].no);
								deviceNames[children[j].no] = checkedData[i].title + "_" + children[j].title.replaceAll('&nbsp;','');
							}
						}
					}
				}
				
				if(normalDevices.length === 0 && groups.length === 0){
					layer.alert("请至少选择一个设备或分组");

					legendData.push(name);
					seriesData.push(
						{
							name: name,
							type: 'line',
							markPoint: {
								data: [
									{ type: 'max', name: '最大值' },
									{ type: 'min', name: '最小值' }
								],
								symbolSize:90,
								label:{
									color:"#fff"
								}
							},
							data: datas,
							smooth: 0.5
						}
					);
				}
				
				console.info(legendData);
				
				// 渲染图表到多表查询的chart容器
				var myChart = echarts.init(document.getElementById('chart-multi'));
				var option = {
					tooltip: {
						trigger: 'axis'
					},
					legend: {
						data: legendData,
						right: '10%',
						top: '5%',
						orient:'vertical',
						textStyle: {
							color: "#fff",
						},
					},
					grid: {
						left: '3%',
						right: '4%',
						top: '15%',
						bottom: '3%',
						containLabel: true
					},
					xAxis: {
						type: 'category',
						boundaryGap: false,
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							lineStyle:{
								color:"#fff"
							}
						},
						data: xAxisData
					},
					yAxis: {
						type: 'value',
						scale: true,
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							show:false,
							lineStyle:{
								color:"#fff"
							}
						},
						splitLine: {
							show: true,
							lineStyle: {
								color: '#ffff',
							},
						},
					},
					series: seriesData
				};
				
				// 添加基准线
				addBaselinesToOption(option);
				
				if (option && typeof option === "object") {
					myChart.setOption(option, true);
				}
			} catch (err) {
				console.error('多表查询出错：', err);
				layer.alert('多表查询出错：' + err.message);
			}
		}
