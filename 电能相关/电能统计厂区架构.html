							const links = this.root.links();

							let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
							nodes.forEach(n => { 
								minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
								minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
							});
							this.chartBounds = {
								minX: minX - this.nodeWidth / 2, maxX: maxX + this.nodeWidth / 2,
								minY: minY - this.nodeHeight / 2, maxY: maxY + this.nodeHeight / 2
							};
							
							// 3. 数据绑定和DOM操作 (Enter, Update, Exit)
							// 节点
							const node = this.g.selectAll('g.node').data(nodes, d => this._getNodePath(d));
							const nodeEnter = node.enter().append('g').attr('class', 'node').attr("transform", d => `translate(${source.x0 || d.x}, ${source.y0 || d.y})`).style('opacity', 0).on('click', (event, d) => this._click(event, d));
							nodeEnter.append('rect').attr('width', this.nodeWidth).attr('height', this.nodeHeight).attr('x', -this.nodeWidth / 2).attr('y', -this.nodeHeight / 2);
							nodeEnter.append('text').attr('class', d => d.data.is_main ? 'title-text' : 'sub-title-text').attr('dy', -this.nodeHeight / 2 + 20).attr('text-anchor', 'middle').text(d => d.data.name);
							nodeEnter.append('text').attr('class', d => d.data.is_main ? 'data-text' : 'sub-data-text').attr('dy', -this.nodeHeight / 2 + 38).attr('text-anchor', 'middle').text(d => d.data.value);
							const nodeUpdate = nodeEnter.merge(node);
							nodeUpdate.transition().duration(this.duration).ease(d3.easeCubicOut).delay(this.duration / 2).attr("transform", d => `translate(${d.x}, ${d.y})`).style('opacity', 1);
							nodeUpdate.select('rect').attr('class', d => d.data.is_main ? 'main-box' : 'sub-box');
							nodeUpdate.select('text:nth-of-type(1)').text(d => d.data.name);
							nodeUpdate.select('text:nth-of-type(2)').text(d => d.data.value);
							node.exit().transition().duration(this.duration / 2).ease(d3.easeCubicOut).attr("transform", d => `translate(${source.x}, ${source.y})`).style('opacity', 0).remove();
							
							// 链接
							const link = this.g.selectAll('path.link').data(links, d => this._getNodePath(d.target));
							const linkEnter = link.enter().insert('path', "g").attr("class", 'link').style('opacity', 0).attr('d', (d) => { const o = { x: source.x0 || d.source.x, y: source.y0 || d.source.y, data: d.source.data }; return o.data.childrenLayout === 'vertical' ? this._elbowVertical(o, o) : this._elbowHorizontal(o, o); });
							const linkUpdate = linkEnter.merge(link);
							linkUpdate.attr("marker-end", d => d.source.data.childrenLayout === 'vertical' ? null : "url(#arrowhead)");
							linkUpdate.transition().duration(this.duration).ease(d3.easeCubicOut).style('opacity', 1).attr('d', d => d.source.data.childrenLayout === 'vertical' ? this._elbowVertical(d.source, d.target) : this._elbowHorizontal(d.source, d.target));
							link.exit().transition().duration(this.duration / 2).ease(d3.easeCubicOut).delay(this.duration / 2).style('opacity', 0).attr('d', d => { const o = { x: source.x, y: source.y, data: d.source.data }; return o.data.childrenLayout === 'vertical' ? this._elbowVertical(o, o) : this._elbowHorizontal(o, o); }).remove();
							
							// 4. 存储节点位置，用于下次动画的起点
							nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
							
							// 5. 将视图调整到最佳位置
							this._fitToView(this.duration);
						},
			
						/**
						* 自动缩放和平移视图以适应当前图表内容
						* @param {number} duration - 动画时长
						*/
						_fitToView: function(duration) {
							if (!this.chartBounds) return;
							const { minX, maxX, minY, maxY } = this.chartBounds;
							const w = maxX - minX;
							const h = maxY - minY;
							const svgWidth = this.svg.attr('width');
							if (w === 0 || h === 0) return;
			
							// 仅根据宽度计算缩放比例，以实现垂直方向可滚动
							const scale = (svgWidth / w) * 0.9;
							const finalScale = Math.min(scale, 1.2); 
							
							// 计算平移量，确保水平居中，垂直顶部对齐
							const tx = (svgWidth / 2) - ((minX + maxX) / 2) * finalScale;
							const ty = -minY * finalScale + 40; // 40是顶部内边距
			
							const transform = d3.zoomIdentity.translate(tx, ty).scale(finalScale);
							
							// 应用变换
							this.svg.transition().duration(duration || 0).ease(d3.easeCubicOut)
								.call(this.zoom.transform, transform);
						},
						
						/** 处理窗口或容器尺寸变化 */
						_handleResize: function() {
							if (!this.container) return;
							const { width, height } = this.container.getBoundingClientRect();
							this.svg.attr('width', width).attr('height', height);
							if (this.root) {
								this._fitToView(0); // 无动画地调整视图
							}
						},
			
						_getVBlockHeight: function(d) {
							if (!d.children) { return this.nodeHeight; }
							let totalHeight = d.children.reduce((sum, child) => sum + this._getVBlockHeight(child), 0);
							totalHeight += (d.children.length - 1) * this.verticalLayoutPadding;
							return Math.max(this.nodeHeight, totalHeight);
						},
						
						/** 辅助函数：递归折叠一个节点及其所有后代 */
						_collapseRecursively: function(d) {
							if (d.children) {
								d._children = d.children;
								d._children.forEach(OrgChart._collapseRecursively); 
								d.children = null;
							}
						},
						
						/** 节点点击事件处理 */
						_click: function(event, d) { 
							if (d.parent && d.parent.data.childrenLayout === 'vertical') { return; }
							if (!d.children && !d._children) return; 
			
							// 如果节点已展开，则折叠它
							if (d.children) { 
								d._children = d.children;
								d.children = null;
							} else { // 如果节点已折叠，则展开它
								d.children = d._children;
								d._children = null;
								// 【逐级展开逻辑】确保所有直接子节点在展开时是折叠的
								if (d.children) {
									d.children.forEach(child => {
										OrgChart._collapseRecursively(child);
									});
								}
							}
							
							this._update(d); // 触发图表更新
						},
			
						_getNodePath: function(d) { return d.ancestors().reverse().map(node => node.data.name).join('/'); },
						_elbowHorizontal: function(source, target) {
							const sourceY = source.y + this.nodeHeight / 2;
							const targetY = target.y - this.nodeHeight / 2 - 5;
							return `M ${source.x},${sourceY} V ${(sourceY + targetY) / 2} H ${target.x} V ${targetY}`;
						},
						_elbowVertical: function(source, target) {
							const sourceX = source.x; 
							const sourceY = source.y + this.nodeHeight / 2;
							const targetX = target.x - this.nodeWidth / 2;
							const targetY = target.y;
							return `M ${sourceX},${sourceY} V ${targetY} H ${targetX}`;
						}
					};
			
					// 初始化图表
					OrgChart.init('#chart-container');
					// 将渲染函数暴露到全局，以便外部调用
