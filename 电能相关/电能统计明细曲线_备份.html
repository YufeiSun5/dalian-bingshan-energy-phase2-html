			type:"date",

			value: new Date(), // 设置初始日期
		});
		
		form.on('select(interest)', function(data){
			debugger;
			if(dateValue != data.value){
				dateValue = data.value;
				if(dateValue == "day"){//如果是单天日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").hide();
					$("#ID-laydate-end-date-1").parent().hide();
					//$('#layui-laydate4').remove();

						type:"date",
						elem: '#ID-laydate-rangeLinked',
						range:false
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-start-date-1',

					});
					/*laydate.render({

						rangeLinked: false, // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增

				}else{//如果是自定义日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").show();
					$("#ID-laydate-end-date-1").parent().show();
					let now = new Date();
					let currentDay = new Date(now);
					currentDay.setDate(now.getDate() - 6);
					var year = currentDay.getFullYear();
		
					var lastStartDate =  currentDay.getFullYear() + "-"+( (currentDay.getMonth() + 1) >= 10 ? (currentDay.getMonth() + 1):"0"+(currentDay.getMonth() + 1)) + "-" + (currentDay.getDate()>=10 ? currentDay.getDate() :"0"+currentDay.getDate());
		
					var lastEndDate = now.getFullYear() + "-"+( (now.getMonth() + 1) >= 10 ? (now.getMonth() + 1):"0"+(now.getMonth() + 1)) + "-" + (now.getDate()>=10 ? now.getDate() :"0"+now.getDate());
		
					laydate.render({
						type:"date",
						elem: '#ID-laydate-start-date-1',
						value: currentDay, // 设置初始日期
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-end-date-1',
						value: new Date(), // 设置初始日期
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-rangeLinked',
						range: ['#ID-laydate-start-date-1', '#ID-laydate-end-date-1'],
						rangeLinked: true, // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
						done: function(value, date){
							debugger;
							let dates = value.split(' - ');
				
				
							// 对两个时间日期进行比对
							let startDate = new Date(dates[0]);
							let endDate = new Date(dates[1]);
				
							// 将日期转换为毫秒
							const millisecondsPerDay = 24 * 60 * 60 * 1000; // 一天的毫秒数
							const diffInMilliseconds = Math.abs(endDate.getTime() - startDate.getTime());
							const diffInDays = diffInMilliseconds / millisecondsPerDay;
							if(diffInDays > 29){
								layer.alert("开始时间和结束时间最多相差三十天");
								// 初始化日期日期
								laydate.render({
									type:"date",
									elem: '#ID-laydate-start-date-1',
									value: lastStartDate, // 设置初始日期
								});
								laydate.render({
									type:"date",
									elem: '#ID-laydate-end-date-1',
									value: lastEndDate, // 设置初始日期
								});
							}else{
								lastStartDate = startDate;
								lastEndDate = endDate;
							}
				
				
							//layer.alert('你选择的日期是：' + value + '<br>获得的对象是' + JSON.stringify(date));
						}
					});
				}
			}
		});
