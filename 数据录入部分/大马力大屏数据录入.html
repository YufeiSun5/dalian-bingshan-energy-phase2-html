<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大马力能源数据录入</title>
    <link href="../js/css/layui.css" rel="stylesheet">
    <script type="text/javascript" src="../js/layui.js"></script>
    <script type="text/javascript">
        layui.config({
            base: '../js/layui_exts/'
        });
    </script>

    <style>
        /* ========== 全局样式 (深蓝科技风，与气量比页面一致) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            font-family: 'PingFang SC', "Microsoft YaHei", sans-serif;
            background: #0f266c;
            color: #fff;
            font-size: 13px;
            overflow: hidden;
        }

        .page-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
        }

        /* 顶部工具栏 */
        .toolbar {
            background: #1d386f;
            border: 1px solid #2a6dc8;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            height: 60px;
        }

        .toolbar-left { display: flex; align-items: center; gap: 20px; }
        .toolbar-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .toolbar-title { font-size: 18px; font-weight: bold; color: #fff7ca; }
        .toolbar-right { display: flex; align-items: center; gap: 10px; }

        /* 日期组 */
        .date-group { display: flex; align-items: center; gap: 8px; }
        .date-group label { color: #b9d3f4; font-weight: bold; }
        .date-group input {
            background: rgba(40, 80, 167, 1);
            border: 1px solid rgba(40, 80, 167, 0);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            width: 140px;
            text-align: center;
            cursor: pointer;
        }
        .date-group input:focus { border-color: #409eff; outline: none; }

        .layui-btn { height: 32px; line-height: 32px; font-size: 13px; }
        .layui-btn-normal { background-color: #1e88e5 !important; }
        .layui-btn-warm { background-color: #ffb800 !important; }

        /* 内容区域 */
        .content-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            overflow: hidden;
        }

        /* 上部单价区域 */
        .price-section {
            background: #1d386f;
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            padding: 15px;
            flex-shrink: 0;
        }

        .price-section-title {
            font-size: 15px;
            font-weight: bold;
            color: #fff7ca;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a6dc8;
        }

        .price-grid {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .price-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-item-label {
            color: #b9d3f4;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
        }

        .price-item-input {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .price-item input[type="number"] {
            background: rgba(40, 80, 167, 0.6);
            border: 1px solid #2a6dc8;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            width: 100px;
            text-align: center;
            font-size: 13px;
        }

        .price-item input[type="number"]:focus {
            border-color: #409eff;
            outline: none;
            background: rgba(40, 80, 167, 0.8);
        }

        .price-item input[type="number"]:disabled {
            background: rgba(60, 60, 60, 0.5);
            cursor: not-allowed;
            color: #999;
        }

        .price-item-unit {
            color: #b9d3f4;
            font-size: 12px;
        }

        .price-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        /* 表格容器 */
        .table-container {
            background: #1d386f;
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .info-tip {
            background: rgba(30, 136, 229, 0.2);
            border-left: 3px solid #1e88e5;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            color: #b9d3f4;
            font-size: 12px;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #3c8ce7;
            padding: 10px 8px;
            text-align: center;
            color: #fff;
        }

        .data-table thead th {
            background: #0c6ed3;
            color: #fff;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table tbody td {
            background: #1e4e89;
        }

        /* 已录入行的背景色 - 深绿色调 */
        .data-table tbody tr.row-filled td {
            background: #196e57;
        }

        .data-table tbody tr.row-filled:hover td {
            background: #196e57;
        }

        /* 未录入行的背景色 - 保持原深蓝色 */
        .data-table tbody tr.row-empty td {
            background: #1e4e89;
        }

        .data-table tbody tr.row-empty:hover td {
            background: rgba(48, 127, 190, 0.9);
        }

        /* 输入框样式 */
        .data-table input[type="number"] {
            background: rgba(40, 80, 167, 0.6);
            border: 1px solid #2a6dc8;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            width: 100%;
            text-align: center;
            font-size: 13px;
        }

        .data-table input[type="number"]:focus {
            border-color: #409eff;
            outline: none;
            background: rgba(40, 80, 167, 0.8);
        }

        .data-table input[type="number"]::placeholder {
            color: rgba(185, 211, 244, 0.5);
        }

        /* 状态标识 */
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
        }

        .status-empty {
            background: rgba(255, 152, 0, 0.3);
            color: #ffa726;
        }

        .status-filled {
            background: rgba(76, 175, 80, 0.3);
            color: #66bb6a;
        }

        .status-modified {
            background: rgba(255, 193, 7, 0.3);
            color: #ffd54f;
        }

        /* 底部按钮区 */
        .footer-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #2a6dc8;
            margin-top: 15px;
        }

        .footer-actions .layui-btn {
            min-width: 150px;
            height: 38px;
            line-height: 38px;
        }

        /* 修复 layui 弹窗样式 - 确保文字可见 */
        .layui-layer-content {
            color: #333 !important;
        }
        
        .layui-layer-prompt input {
            color: #333 !important;
        }
        
        .layui-layer-msg {
            color: #333 !important;
        }
        
        .layui-layer-dialog .layui-layer-content {
            color: #333 !important;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3c8ce7 0%, #2a6dc8 50%, #1e5aa8 100%);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #4a9aff 0%, #3c8ce7 50%, #2a6dc8 100%);
        }

        ::-webkit-scrollbar-track {
            background: #1d386f;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="date-group">
                    <label>数据月份</label>
                    <input type="text" id="date-input" readonly>
                </div>
            </div>
            <div class="toolbar-center">
                <span class="toolbar-title">大马力能源数据录入</span>
            </div>
        </div>

        <div class="content-area">
            <!-- 上部：单价/系数录入区 -->
            <div class="price-section">
                <div class="price-section-title">
                    <i class="layui-icon layui-icon-set"></i> 单价与换算系数设置
                </div>
                <div class="price-grid">
                    <div class="price-item">
                        <span class="price-item-label">FG天然气单价</span>
                        <div class="price-item-input">
                            <input type="number" id="input-gas-price" step="0.01" placeholder="请输入">
                            <span class="price-item-unit">元</span>
                        </div>
                    </div>
                    <div class="price-item">
                        <span class="price-item-label">FG电换算系数</span>
                        <div class="price-item-input">
                            <input type="number" id="input-elec-coef" step="0.01" placeholder="请输入">
                        </div>
                    </div>
                    <div class="price-item">
                        <span class="price-item-label">FG天然气换算系数</span>
                        <div class="price-item-input">
                            <input type="number" id="input-gas-coef" step="0.01" placeholder="请输入">
                        </div>
                    </div>
                    <div class="price-item">
                        <span class="price-item-label">FG水换算系数</span>
                        <div class="price-item-input">
                            <input type="number" id="input-water-coef" step="0.01" placeholder="请输入">
                        </div>
                    </div>
                    <div class="price-item">
                        <span class="price-item-label">水单价（自动）</span>
                        <div class="price-item-input">
                            <input type="number" id="input-water-price" step="0.01" placeholder="自动" disabled>
                            <span class="price-item-unit">元</span>
                        </div>
                    </div>
                    <div class="price-actions">
                        <button type="button" id="btn-refresh-prices" class="layui-btn layui-btn-sm layui-btn-normal">
                            <i class="layui-icon layui-icon-refresh"></i> 刷新
                        </button>
                        <button type="button" id="btn-submit-prices" class="layui-btn layui-btn-sm layui-btn-warm">
                            <i class="layui-icon layui-icon-ok"></i> 保存
                        </button>
                    </div>
                </div>
            </div>

            <!-- 下部：每日数据录入区 -->
            <div class="table-container">
                <div class="info-tip">
                    <i class="layui-icon layui-icon-tips"></i> 
                    请填写每日的天然气表示数和水表示数。空数据可直接提交，修改已有数据需要输入修改人姓名。每行可单独提交，也可一键提交全部。
                </div>

                <div class="table-wrapper">
                    <table class="data-table" id="data-table">
                        <thead>
                            <tr>
                                <th width="12%">日期</th>
                                <th width="10%">状态</th>
                                <th width="28%">天然气表示数</th>
                                <th width="28%">水表示数</th>
                                <th width="12%">操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>

                <div class="footer-actions">
                    <button type="button" id="btn-refresh-table" class="layui-btn layui-btn-normal">
                        <i class="layui-icon layui-icon-refresh"></i> 刷新数据
                    </button>
                    <button type="button" id="btn-submit-all" class="layui-btn layui-btn-warm">
                        <i class="layui-icon layui-icon-ok"></i> 一键提交全部
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
    layui.use(['laydate', 'layer', 'jquery'], function() {
        var laydate = layui.laydate;
        var layer = layui.layer;
        var $ = layui.$;
        
        // API配置
        var API_BASE_URL = 'http://192.168.7.229:8004';
        
        // 当前选择的月份
        var currentMonth = getCurrentMonth();
        
        // 存储当月数据
        var monthData = {}; // key: date, value: {gasId, waterId, gasUsage, waterUsage, isModified}
        
        // 存储单价数据
        var priceData = {
            gasPrice: null,      // no: 1110001 - FG天然气单价
            elecCoef: null,      // no: 1110002 - FG电换算系数
            gasCoef: null,       // no: 1110003 - FG天然气换算系数
            waterCoef: null,     // no: 1110004 - FG水换算系数
            waterPrice: null     // no: 70004 - 水单价
        };
        
        // 初始化日期选择器
        laydate.render({ 
            elem: '#date-input', 
            type: 'month',
            value: currentMonth,
            theme: '#1e88e5',
            done: function(value, date){
                currentMonth = value;
                loadMonthData(value);
            }
        });
        
        // 获取当前月份
        function getCurrentMonth() {
            var now = new Date();
            var year = now.getFullYear();
            var month = (now.getMonth() + 1).toString().padStart(2, '0');
            return year + '-' + month;
        }
        
        // HTTP请求封装
        async function request(url, options = {}) {
            try {
                const res = await fetch(url, { 
                    ...options, 
                    headers: { 'Content-Type': 'application/json' } 
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return await res.json();
            } catch (e) {
                console.error('[请求错误]', e);
                throw e;
            }
        }
        
        // 执行SQL
        async function sendSQL(sql) {
            return await request(API_BASE_URL + '/api/sql/run-sql', {
                method: 'POST',
                body: JSON.stringify({ sql: sql })
            });
        }
        
        // 加载单价数据
        function loadPriceData() {
            console.log('[单价加载] 开始加载');
            
            // 查询每个no的最新一条数据（从data_elec_temp_input表）
            // no: 1110001-FG天然气单价(production), 1110002-FG电换算系数(production), 
            //     1110003-FG天然气换算系数(production), 1110004-FG水换算系数(production), 
            //     70004-水单价(production)
            var sql = `
                SELECT t1.no, t1.production, t1.sum_elec, t1.date 
                FROM data_elec_temp_input t1
                INNER JOIN (
                    SELECT no, MAX(date) as max_date, MAX(id) as max_id
                    FROM data_elec_temp_input
                    WHERE no IN (1110001, 1110002, 1110003, 1110004, 70004)
                    GROUP BY no
                ) t2 ON t1.no = t2.no AND t1.date = t2.max_date AND t1.id = t2.max_id
                WHERE t1.no IN (1110001, 1110002, 1110003, 1110004, 70004)
            `;
            
            console.log('[单价加载] 执行SQL:', sql);
            
            sendSQL(sql).then(function(result) {
                console.log('[单价加载] 结果:', result);
                console.log('[单价加载] 数据明细:', result.data);
                
                if (result && result.data && result.data.length > 0) {
                    // 用于存储每个no的最新记录
                    var latestRecords = {};
                    result.data.forEach(function(row) {
                        console.log('[单价加载] 处理行 no=' + row.no + ':', row);
                        if (!latestRecords[row.no]) {
                            latestRecords[row.no] = row;
                        }
                    });
                    
                    console.log('[单价加载] 最新记录:', latestRecords);
                    
                    // 填充到界面（使用字符串键以兼容不同返回类型）
                    Object.keys(latestRecords).forEach(function(key) {
                        var no = parseInt(key);
                        var record = latestRecords[key];
                        
                        console.log('[单价加载] 填充 no=' + no + ', production=' + record.production);
                        
                        if (no == 1110001) {
                            priceData.gasPrice = record.production;
                            $('#input-gas-price').val(record.production);
                        } else if (no == 1110002) {
                            priceData.elecCoef = record.production;
                            $('#input-elec-coef').val(record.production);
                        } else if (no == 1110003) {
                            priceData.gasCoef = record.production;
                            $('#input-gas-coef').val(record.production);
                        } else if (no == 1110004) {
                            priceData.waterCoef = record.production;
                            $('#input-water-coef').val(record.production);
                        } else if (no == 70004) {
                            console.log('[单价加载] 水单价 record:', record);
                            console.log('[单价加载] 水单价 production:', record.production);
                            // 水单价存在 production 字段
                            priceData.waterPrice = record.production;
                            $('#input-water-price').val(record.production);
                        }
                    });
                }
                
                console.log('[单价加载] 完成:', priceData);
            }).catch(function(error) {
                console.error('[单价加载] 失败:', error);
            });
        }
        
        // 加载月份数据
        function loadMonthData(month) {
            console.log('[数据加载] 查询月份:', month);
            
            var idx = layer.load(2, { shade: 0.1 });
            
            // 先加载单价数据
            loadPriceData();
            
            // 构建查询SQL - 查询指定月份的天然气和水表示数数据（从data_elec_temp_input表）
            // no: 1110005-天然气表示数, 1110006-水表示数
            var sql = `
                SELECT id, date, no, sum_elec 
                FROM data_elec_temp_input 
                WHERE DATE_FORMAT(date, '%Y-%m') = '${month}'
                  AND no IN (1110005, 1110006)
                ORDER BY date, no
            `;
            
            console.log('[数据加载] 执行SQL:', sql);
            
            sendSQL(sql).then(function(result) {
                layer.close(idx);
                
                console.log('[数据加载] SQL执行结果:', result);
                console.log('[数据加载] 结果详情:', JSON.stringify(result));
                
                // 清空并重新填充数据
                monthData = {};
                if (result && result.data && result.data.length > 0) {
                    console.log('[数据加载] 找到 ' + result.data.length + ' 条记录');
                    result.data.forEach(function(row) {
                        console.log('[数据加载] 处理行:', row);
                        // 提取日期部分
                        var dateKey = '';
                        if (typeof row.date === 'string') {
                            dateKey = row.date.split('T')[0].split(' ')[0];
                        } else if (row.date instanceof Date) {
                            var d = row.date;
                            dateKey = d.getFullYear() + '-' + 
                                     (d.getMonth() + 1).toString().padStart(2, '0') + '-' + 
                                     d.getDate().toString().padStart(2, '0');
                        }
                        
                        if (!monthData[dateKey]) {
                            monthData[dateKey] = {
                                gasId: null,
                                waterId: null,
                                gasUsage: '',
                                waterUsage: '',
                                isModified: false
                            };
                        }
                        
                        // 使用 == 而不是 === 以兼容数字和字符串
                        if (row.no == 1110005) {
                            monthData[dateKey].gasId = row.id;
                            monthData[dateKey].gasUsage = row.sum_elec || 0;
                        } else if (row.no == 1110006) {
                            monthData[dateKey].waterId = row.id;
                            monthData[dateKey].waterUsage = row.sum_elec || 0;
                        }
                    });
                    console.log('[数据加载] monthData:', monthData);
                } else {
                    console.log('[数据加载] 没有找到数据');
                }
                
                // 渲染表格
                renderTable(month);
                layer.msg('已加载 ' + month + ' 的数据', { icon: 1 });
            }).catch(function(error) {
                layer.close(idx);
                monthData = {};
                renderTable(month);
                console.error('[数据加载] 失败:', error);
                layer.msg('数据加载失败，请检查网络连接', { icon: 2 });
            });
        }
        
        // 渲染表格
        function renderTable(month) {
            console.log('[渲染表格] 开始渲染月份:', month);
            console.log('[渲染表格] monthData:', monthData);
            
            var tbody = $('#table-body');
            tbody.empty();
            
            // 获取该月的天数
            var parts = month.split('-');
            var year = parseInt(parts[0]);
            var monthNum = parseInt(parts[1]);
            var daysInMonth = new Date(year, monthNum, 0).getDate();
            
            console.log('[渲染表格] 年:', year, '月:', monthNum, '天数:', daysInMonth);
            
            // 生成每一天的行
            for (var day = 1; day <= daysInMonth; day++) {
                var dateStr = year + '-' + monthNum.toString().padStart(2, '0') + '-' + day.toString().padStart(2, '0');
                var data = monthData[dateStr] || { gasUsage: '', waterUsage: '', isModified: false };
                var hasData = monthData[dateStr] && (monthData[dateStr].gasId || monthData[dateStr].waterId);
                
                var statusHtml = hasData 
                    ? '<span class="status-badge status-filled">已录入</span>'
                    : '<span class="status-badge status-empty">待录入</span>';
                
                // 添加行的class以区分已录入和未录入
                var rowClass = hasData ? 'row-filled' : 'row-empty';
                
                // 按钮文字：已录入显示"修改"，未录入显示"提交"
                var buttonText = hasData ? '修改' : '提交';
                var buttonIcon = hasData ? 'layui-icon-edit' : 'layui-icon-ok';
                
                // 确保value不显示空字符串，如果没有数据就留空
                var gasVal = data.gasUsage !== '' && data.gasUsage !== null && data.gasUsage !== undefined ? data.gasUsage : '';
                var waterVal = data.waterUsage !== '' && data.waterUsage !== null && data.waterUsage !== undefined ? data.waterUsage : '';
                
                var row = `
                    <tr data-date="${dateStr}" class="${rowClass}">
                        <td>${monthNum}月${day}日</td>
                        <td>${statusHtml}</td>
                        <td><input type="number" step="0.01" class="input-gas" value="${gasVal}" placeholder="请输入天然气表示数" data-original="${gasVal}"></td>
                        <td><input type="number" step="0.01" class="input-water" value="${waterVal}" placeholder="请输入水表示数" data-original="${waterVal}"></td>
                        <td>
                            <button class="layui-btn layui-btn-xs layui-btn-normal btn-submit-row">
                                <i class="layui-icon ${buttonIcon}"></i> ${buttonText}
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            }
            
            // 绑定输入框change事件，标记修改状态
            tbody.find('input[type="number"]').on('change', function() {
                var $row = $(this).closest('tr');
                var dateStr = $row.data('date');
                // 只有当该日期已经有数据库记录时，才标记为修改
                if (monthData[dateStr] && (monthData[dateStr].gasId || monthData[dateStr].waterId)) {
                    monthData[dateStr].isModified = true;
                    $row.find('.status-badge').removeClass('status-filled status-empty').addClass('status-modified').text('已修改');
                }
            });
            
            // 绑定单行提交按钮
            tbody.find('.btn-submit-row').on('click', function() {
                var $row = $(this).closest('tr');
                submitRow($row);
            });
        }
        
        // 获取行数据
        function getRowData($row) {
            var gasVal = $row.find('.input-gas').val();
            var waterVal = $row.find('.input-water').val();
            return {
                date: $row.data('date'),
                gasUsage: gasVal !== '' && gasVal !== null ? parseFloat(gasVal) : null,
                waterUsage: waterVal !== '' && waterVal !== null ? parseFloat(waterVal) : null
            };
        }
        
        // 检查行是否被修改
        function isRowModified($row) {
            var dateStr = $row.data('date');
            var originalData = monthData[dateStr];
            if (!originalData || (!originalData.gasId && !originalData.waterId)) return false;
            
            var currentData = getRowData($row);
            return currentData.gasUsage != originalData.gasUsage ||
                   currentData.waterUsage != originalData.waterUsage;
        }
        
        // 检查行是否有数据
        function hasRowData($row) {
            var rowData = getRowData($row);
            return rowData.gasUsage !== null || rowData.waterUsage !== null;
        }
        
        // 提交单行数据
        function submitRow($row, operatorName) {
            var dateStr = $row.data('date');
            var rowData = getRowData($row);
            var existingData = monthData[dateStr];
            var isModified = isRowModified($row);
            
            // 检查是否有数据
            if (!hasRowData($row) && !existingData) {
                layer.msg('请至少填写一项数据', { icon: 0 });
                return;
            }
            
            // 如果是修改已有数据，需要输入操作人
            if (isModified && !operatorName) {
                layer.confirm('该日期已有数据，修改将覆盖原数据，是否继续？', { 
                    icon: 3, 
                    title: '数据修改警告',
                    btn: ['继续', '取消']
                }, function(confirmIndex) {
                    layer.close(confirmIndex);
                    layer.prompt({
                        title: '修改数据需要提供操作人姓名，请输入操作人姓名',
                        formType: 0,
                        btn: ['确认提交', '取消']
                    }, function(value, promptIndex, elem) {
                        if (!value || value.trim().length < 2) {
                            layer.msg('操作人姓名至少需要2个字', { icon: 0 });
                            return false;
                        }
                        layer.close(promptIndex);
                        submitRow($row, value.trim());
                    });
                });
                return;
            }
            
            var idx = layer.load(2, { shade: 0.1 });
            
            var sqlStatements = [];
            var dateTimeStr = dateStr + ' 00:00:00';
            
            // 处理天然气数据 - 只有在有值时才处理
            if (rowData.gasUsage !== null) {
                if (existingData && existingData.gasId) {
                    // 更新现有天然气数据
                    sqlStatements.push(`
                        UPDATE data_elec_temp_input SET
                            sum_elec = ${rowData.gasUsage}
                        WHERE id = ${existingData.gasId}
                    `);
                } else {
                    // 插入新天然气数据 (no: 1110005)
                    sqlStatements.push(`
                        INSERT INTO data_elec_temp_input 
                        (date, no, sum_elec)
                        VALUES 
                        ('${dateTimeStr}', 1110005, ${rowData.gasUsage})
                    `);
                }
            }
            
            // 处理水数据 - 只有在有值时才处理
            if (rowData.waterUsage !== null) {
                if (existingData && existingData.waterId) {
                    // 更新现有水数据
                    sqlStatements.push(`
                        UPDATE data_elec_temp_input SET
                            sum_elec = ${rowData.waterUsage}
                        WHERE id = ${existingData.waterId}
                    `);
                } else {
                    // 插入新水数据 (no: 1110006)
                    sqlStatements.push(`
                        INSERT INTO data_elec_temp_input 
                        (date, no, sum_elec)
                        VALUES 
                        ('${dateTimeStr}', 1110006, ${rowData.waterUsage})
                    `);
                }
            }
            
            if (sqlStatements.length === 0) {
                layer.msg('没有需要提交的数据', { icon: 0 });
                return;
            }
            
            var sql = sqlStatements.join('; ');
            
            console.log('[提交SQL]', sql);
            console.log('[提交数据]', rowData);
            
            sendSQL(sql).then(function(result) {
                layer.close(idx);
                console.log('[提交成功] 完整结果:', result);
                console.log('[提交成功] 数据详情:', JSON.stringify(result));
                var msg = operatorName ? '操作人：' + operatorName : '系统录入';
                layer.msg('数据提交成功！' + msg, { icon: 1, time: 1500 });
                // 重新加载数据
                loadMonthData(currentMonth);
            }).catch(function(error) {
                layer.close(idx);
                console.error('[提交失败] 错误:', error);
                console.error('[提交失败] SQL:', sql);
                layer.msg('数据提交失败：' + (error.message || '请检查网络连接'), { icon: 2 });
            });
        }
        
        // 一键提交全部
        $('#btn-submit-all').click(function() {
            var $rows = $('#table-body tr');
            var modifiedRows = [];
            var newRows = [];
            
            $rows.each(function() {
                var $row = $(this);
                var dateStr = $row.data('date');
                // 只统计有数据的行
                if (hasRowData($row)) {
                    if (isRowModified($row)) {
                        modifiedRows.push($row);
                    } else if (!monthData[dateStr] || (!monthData[dateStr].gasId && !monthData[dateStr].waterId)) {
                        newRows.push($row);
                    }
                }
            });
            
            console.log('[一键提交] 修改行数:', modifiedRows.length, '新增行数:', newRows.length);
            
            // 如果有修改的数据，需要输入操作人姓名
            if (modifiedRows.length > 0) {
                layer.confirm('检测到 ' + modifiedRows.length + ' 条数据被修改' + 
                             (newRows.length > 0 ? ('，' + newRows.length + ' 条新数据') : '') + 
                             '，是否继续提交？', { 
                    icon: 3, 
                    title: '数据修改警告',
                    btn: ['继续', '取消']
                }, function(confirmIndex) {
                    layer.close(confirmIndex);
                    layer.prompt({
                        title: '修改数据需要提供操作人姓名，请输入操作人姓名',
                        formType: 0,
                        btn: ['确认提交', '取消']
                    }, function(value, promptIndex, elem) {
                        if (!value || value.trim().length < 2) {
                            layer.msg('操作人姓名至少需要2个字', { icon: 0 });
                            return false;
                        }
                        layer.close(promptIndex);
                        submitAllRows($rows, value.trim());
                    });
                });
            } else if (newRows.length > 0) {
                // 只有新增数据，不需要输入操作人，直接提交
                layer.confirm('确认提交 ' + currentMonth + ' 的 ' + newRows.length + ' 条新数据吗？', { 
                    icon: 3, 
                    title: '确认提交',
                    btn: ['确认', '取消']
                }, function(index) {
                    layer.close(index);
                    submitAllRows($rows, '系统录入');
                });
            } else {
                // 没有任何数据需要提交
                layer.msg('没有需要提交的数据', { icon: 0 });
            }
        });
        
        // 提交所有行
        function submitAllRows($rows, operatorName) {
            var idx = layer.load(2, { shade: 0.3 });
            var sqlStatements = [];
            
            $rows.each(function() {
                var $row = $(this);
                // 只处理有数据的行
                if (!hasRowData($row)) return;
                
                var dateStr = $row.data('date');
                var rowData = getRowData($row);
                var existingData = monthData[dateStr];
                var dateTimeStr = dateStr + ' 00:00:00';
                
                // 处理天然气数据 - 只有在有值时才处理
                if (rowData.gasUsage !== null) {
                    if (existingData && existingData.gasId) {
                        sqlStatements.push(`
                            UPDATE data_elec_temp_input SET
                                sum_elec = ${rowData.gasUsage}
                            WHERE id = ${existingData.gasId}
                        `);
                    } else {
                        sqlStatements.push(`
                            INSERT INTO data_elec_temp_input 
                            (date, no, sum_elec)
                            VALUES 
                            ('${dateTimeStr}', 1110005, ${rowData.gasUsage})
                        `);
                    }
                }
                
                // 处理水数据 - 只有在有值时才处理
                if (rowData.waterUsage !== null) {
                    if (existingData && existingData.waterId) {
                        sqlStatements.push(`
                            UPDATE data_elec_temp_input SET
                                sum_elec = ${rowData.waterUsage}
                            WHERE id = ${existingData.waterId}
                        `);
                    } else {
                        sqlStatements.push(`
                            INSERT INTO data_elec_temp_input 
                            (date, no, sum_elec)
                            VALUES 
                            ('${dateTimeStr}', 1110006, ${rowData.waterUsage})
                        `);
                    }
                }
            });
            
            if (sqlStatements.length === 0) {
                layer.close(idx);
                layer.msg('没有需要提交的数据', { icon: 0 });
                return;
            }
            
            // 合并SQL并执行
            var combinedSQL = sqlStatements.join('; ');
            
            sendSQL(combinedSQL).then(function(result) {
                layer.close(idx);
                console.log('[批量提交成功]', result);
                layer.msg('全部数据提交成功！操作人：' + operatorName, { icon: 1, time: 2000 });
                // 重新加载数据
                loadMonthData(currentMonth);
            }).catch(function(error) {
                layer.close(idx);
                console.error('[批量提交失败]', error);
                layer.msg('批量提交失败，请检查网络连接或数据格式', { icon: 2 });
            });
        }
        
        // 刷新单价数据按钮
        $('#btn-refresh-prices').click(function() {
            loadPriceData();
            layer.msg('单价数据已刷新', { icon: 1 });
        });
        
        // 提交单价数据按钮
        $('#btn-submit-prices').click(function() {
            var gasPrice = parseFloat($('#input-gas-price').val());
            var elecCoef = parseFloat($('#input-elec-coef').val());
            var gasCoef = parseFloat($('#input-gas-coef').val());
            var waterCoef = parseFloat($('#input-water-coef').val());
            
            // 验证输入
            if (isNaN(gasPrice) || isNaN(elecCoef) || isNaN(gasCoef) || isNaN(waterCoef)) {
                layer.msg('请填写完整的单价和系数数据', { icon: 0 });
                return;
            }
            
            layer.confirm('确认保存单价设置吗？', { 
                icon: 3, 
                title: '确认保存',
                btn: ['确认', '取消']
            }, function(index) {
                layer.close(index);
                
                var idx = layer.load(2, { shade: 0.1 });
                var now = new Date();
                var dateTimeStr = now.getFullYear() + '-' + 
                                 (now.getMonth() + 1).toString().padStart(2, '0') + '-' + 
                                 now.getDate().toString().padStart(2, '0') + ' 00:00:00';
                
                var sqlStatements = [];
                
                // 插入FG天然气单价 (no: 1110001)
                sqlStatements.push(`
                    INSERT INTO data_elec_temp_input 
                    (date, no, production)
                    VALUES 
                    ('${dateTimeStr}', 1110001, ${gasPrice})
                `);
                
                // 插入FG电换算系数 (no: 1110002)
                sqlStatements.push(`
                    INSERT INTO data_elec_temp_input 
                    (date, no, production)
                    VALUES 
                    ('${dateTimeStr}', 1110002, ${elecCoef})
                `);
                
                // 插入FG天然气换算系数 (no: 1110003)
                sqlStatements.push(`
                    INSERT INTO data_elec_temp_input 
                    (date, no, production)
                    VALUES 
                    ('${dateTimeStr}', 1110003, ${gasCoef})
                `);
                
                // 插入FG水换算系数 (no: 1110004)
                sqlStatements.push(`
                    INSERT INTO data_elec_temp_input 
                    (date, no, production)
                    VALUES 
                    ('${dateTimeStr}', 1110004, ${waterCoef})
                `);
                
                var sql = sqlStatements.join('; ');
                
                sendSQL(sql).then(function(result) {
                    layer.close(idx);
                    console.log('[单价提交成功]', result);
                    layer.msg('单价设置保存成功！', { icon: 1, time: 1500 });
                    // 重新加载单价数据
                    loadPriceData();
                }).catch(function(error) {
                    layer.close(idx);
                    console.error('[单价提交失败]', error);
                    layer.msg('单价设置保存失败，请检查网络连接', { icon: 2 });
                });
            });
        });
        
        // 刷新表格数据按钮
        $('#btn-refresh-table').click(function() {
            loadMonthData(currentMonth);
        });
        
        // 页面加载时自动加载当前月份数据
        loadMonthData(currentMonth);
    });
    </script>
</body>
</html>
