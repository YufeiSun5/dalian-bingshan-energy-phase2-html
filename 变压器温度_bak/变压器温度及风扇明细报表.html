<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var table = layui.table;
		var $ = layui.$;
		let currentDay = new Date();
		currentDay.setDate(1);
		var dateValue = "day";
		
		
		currentDay.setHours(7, 0, 0, 0);

		// 加载日期
		var datetest =  laydate.render({
			type:"date",
			elem: '#ID-laydate-start-date-1',
			value: new Date(), // 设置初始日期
		});
		
		// 变电所选择联动逻辑
		form.on('select(substation)', function(data){
			updateMeterOptions(data.value);
		});

		// 更新变压器选择选项的函数
		function updateMeterOptions(substationId) {
			var meterSelect = document.getElementById('sreachNo');
			meterSelect.innerHTML = ''; // 清空现有选项

			var options = '';

			if (substationId === '1') {
				// 只显示一号变电所的变压器
				options = `
					<option value="1_1" selected>1#变压器</option>
					<option value="1_2">2#变压器</option>
				`;
			} else if (substationId === '2') {
				// 只显示二号变电所的变压器
				options = `
				<option value="2_1" selected>1#变压器</option>
				<option value="2_2">2#变压器</option>
				<option value="2_3">3#变压器</option>
				<option value="2_4">4#变压器</option>
				`;
			} else if (substationId === '3') {
				// 只显示三号变电所的变压器
				options = `
					<option value="3_1" selected>1#变压器</option>
					<option value="3_2">2#变压器</option>
				`;
			}

			meterSelect.innerHTML = options;
			form.render('select'); // 重新渲染下拉框
		}
		
		
		form.on('select(interest)', function(data){
			debugger;
			if(dateValue != data.value){
				dateValue = data.value;
				if(dateValue == "day"){//如果是单天日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").hide();
					$("#ID-laydate-end-date-1").parent().hide();
					//$('#layui-laydate4').remove();
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-rangeLinked',
						range:false
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-start-date-1',
						value: new Date(), // 设置初始日期
					});
					/*laydate.render({
						type:"date",
						elem: '#ID-laydate-rangeLinked',
						range: [],
						rangeLinked: false, // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
					});*/
				}else{//如果是自定义日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").show();
					$("#ID-laydate-end-date-1").parent().show();
					let date = new Date();
					date.setDate(date.getDate() - 7);
					date.setHours(7, 0, 0, 0);
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-start-date-1',
						value: date, // 设置初始日期
					});
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-end-date-1',
						value: new Date(), // 设置初始日期
					});
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-rangeLinked',
						range: ['#ID-laydate-start-date-1', '#ID-laydate-end-date-1'],
						rangeLinked: true // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
					});
				}
			}
		});
		
		
		table.render({
			elem: '#test',
			cols: [[ // 表头配置项
				{field: 'date',title: '时间',width: 170,align:"center"}, // 日期
				{field: 'temperature1', title: '温度1', align:"center" }, // 温度
				{field: 'temperature2', title: '温度2', align:"center" }, // 温度
				{field: 'temperature3', title: '温度3', align:"center" }, // 温度
				{field: 'fan', title: '风扇', align:"center" }, // 风扇

			]],
			data: [],
			height: $("#table_form").height()-1,
			//skin: 'line', // 表格风格
			even: true,
			//page: true, // 是否显示分页
			//limits: [5, 10, 15],
			//limit: 5 // 每页默认显示的数量
		});
		$('#search').on('click', async function() {
			debugger;
			try {
				//获取查询结果
				var startdate ;
				var enddate;
				startdate = $("#ID-laydate-start-date-1")[0].value;
				if(dateValue == "diy"){
					enddate = $("#ID-laydate-end-date-1")[0].value;
					//开始时间和结束时间比对
					if( new Date(enddate).getTime() - new Date(startdate).getTime() > 7 * 86400000){
						layer.msg("开始时间和结束时间的间隔不能超过七天");
						return;
					}
				}
				
				
				var sql = " select DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as date,V_A,V_B,V_C,A_A,A_B,A_C,V_AB,V_BC,V_AC,Q_ABC,P_ABC,S_ABC,COS,Hz from data_all FORCE INDEX (date_no_KWH) ";
				
				if(dateValue == "day"){
					sql+=" where date>= DATE_FORMAT('"+startdate+"', '%Y-%m-%d 07:00:00') and date < DATE_FORMAT(DATE_ADD('"+startdate+"',INTERVAL 24 HOUR), '%Y-%m-%d 07:00:00')  "
				}else{
					sql+=" where date>='"+startdate+"' and date<'"+enddate+"' ";
				}
				sql += " and no = "+$("#sreachNo").val()+" " 
				+" order by id desc ";
				console.info(sql);
				const data = await sendSQL(sql);
				console.info(data);
				
				table.render({
					elem: '#test',
					cols: [[ // 表头配置项
						{field: 'date',title: '时间',width: 170,align:"center"}, // 日期
						{field: 'temperature1', title: '温度1', align:"center" }, // 温度
						{field: 'temperature2', title: '温度2', align:"center" }, // 温度
						{field: 'temperature3', title: '温度3', align:"center" }, // 温度
						{field: 'fan', title: '风扇', align:"center" }, // 风扇
					]],
					data: data.data,
					//skin: 'line', // 表格风格
					even: true,
					height: $("#table_form").height()-1,
					//page: true, // 是否显示分页
					//limits: [5, 10, 15],
					//limit: 5 // 每页默认显示的数量
				});
				// 在这里继续处理查询结果，比如渲染表格
				// renderTable(data);
			} catch (err) {
				console.error('查询出错：', err);
			}
		});
		
		$('#export').on('click', async function() {
			debugger;
			try {
				
				var cols = table.getOptions('test').cols;
				console.info(cols);
				var dataArr = [];
				//先动态添加表头
				var colsData = {
					date:"时间"
					,temperature1:"温度1"
					,temperature2:"温度2"
					,temperature3:"温度3"
					,fan:"风扇"
				};
				dataArr.push(colsData);
				
				var data = table.getData('test'); console.log(data);
				
				let date = new Date();
				let write = date.getFullYear()+(date.getMonth() + 1).toString().padStart(2, '0')+date.getDate().toString().padStart(2, '0')+date.getHours().toString().padStart(2, '0')
					+date.getMinutes().toString().padStart(2, '0')+date.getSeconds().toString().padStart(2, '0');
				
				for(let i=0;i<data.length;i++){
					dataArr.push(data[i]);
				}
				console.info(dataArr);
				/*excel.exportExcel({
					sheet1: dataArr
				}, '测试导出.xlsx', 'xlsx');*/
				
				// 生成配置的辅助函数，返回结果作为扩展功能的配置参数传入即可
				// 1. 复杂表头合并[B1,C1,D1][E1,F1]
				/*var mergeConf = excel.makeMergeConfig([
					['A1', 'A2'],
				])*/
				// 2. B列宽 150，F列宽200，默认80
				var colConf = excel.makeColConfig({
					'A': 130,
					'O': 70,
					//'D': 130,
					//'E':130,
					
				}, 70);
				// 3. 第1行行高40，第二行行高30，默认20
				/*var rowConf = excel.makeRowConfig({
					1: 40,
					3: 30
				}, 20);*/
				// 4. 公式的用法
				excel.setExportCellStyle(dataArr, '', {
					s: {
						
						alignment: {
							horizontal: 'center',
							vertical: 'center'
						}
					}
				}, function (cell, newCell, row, config, currentRow, currentCol, fieldKey) {
					
					return newCell;
				})
			excel.exportExcel({
				sheet1: dataArr
			}, '变压器温度及风扇明细报表_'+write+'.xlsx', 'xlsx', {
					extend: {
						// extend 中可以指定某个 sheet 的属性，如果不指定 sheet 则所有 sheet 套用同一套属性
						sheet1: {
							//'!merges': mergeConf
							'!cols': colConf
							//, '!rows': rowConf
						}
					}
				});
				
				/*var dataArr = [];
				for(let i=0;i<data.length;i++){
					let arr = [];
					for (let key in data[i]) {
						arr.push(data[i][key]);
					}
					dataArr.push(arr);
				}
				console.info(dataArr);
				
				table.exportFile(colsArr,dataArr, {
					type: 'xls', // 导出的文件格式，支持: csv,xls
					title: '导出的文件标题'
				});*/
			} catch (err) {
				console.error('导出出错：', err);
			}
		});
		async function sendSQL(strsql) {
			const sql = strsql;
			console.info(sql);
			const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({ sql })
			});

			const data = await res.json();
			return data;
			
			//document.getElementById('responseBox').textContent = JSON.stringify(data, null, 2);
		}
	
	});
	
	</script>
