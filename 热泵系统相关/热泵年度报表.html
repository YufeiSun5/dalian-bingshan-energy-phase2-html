<script src="../js/layui.js"></script>
<script>
    // 1. 配置本地扩展目录并加载 excel 模块
    layui.config({
        base: '../js/layui_exts/' // 指向存放 excel.js 的目录
    }).extend({
        excel: 'excel' // 模块名，对应 excel.js
    });

    layui.use(['table', 'laydate', 'excel', 'layer', 'form'], function(){
        const table = layui.table;
        const laydate = layui.laydate;
        const excel = layui.excel;
        const layer = layui.layer;
        const form = layui.form;
        const $ = layui.jquery;

        // ===================================================================
        // 从 energy-config-v2.js 获取配置 (保持原有逻辑以获取数据库映射)
        // ===================================================================
        const Config = window.EnergyConfig;
        if (!Config) {
            console.error('❌ EnergyConfig 未加载');
            layer.msg('配置文件加载失败', { icon: 2 });
            return;
        }
        const pageConfig = Config.pages.regionalElecStats || Config.pages.regionalStats;
        if (!pageConfig) {
            layer.msg('页面配置加载失败', { icon: 2 });
            return;
        }

        let barChartInstance, pieChartInstance;
        let globalData = {};
        let currentActiveIdentifier = '';

        function parseNullableNumber(value) {
            if (value == null || value === '' || value === '-') {
                return null;
            }
            const numericValue = parseFloat(value);
            return isNaN(numericValue) ? null : numericValue;
        }

        function formatNumericDisplay(value, decimals, clampNonNegative) {
            const numericValue = parseNullableNumber(value);
            if (numericValue == null) {
                return '-';
            }
            const finalValue = clampNonNegative ? Math.max(0, numericValue) : numericValue;
            return finalValue.toFixed(decimals);
        }

        function normalizePowerForCop(value) {
            const numericValue = parseNullableNumber(value);
            if (numericValue == null) {
                return null;
            }
            return Math.max(0, numericValue);
        }

        function calcCopDisplay(heatValue, powerValue, decimals) {
            const heat = parseNullableNumber(heatValue);
            const power = normalizePowerForCop(powerValue);

            if (heat == null && power == null) {
                return '-';
            }
            if ((heat == null || heat === 0) && (power == null || power === 0)) {
                return '0.000'.slice(0, decimals + 2);
            }
            if (power == null || power === 0) {
                return '-';
            }

            return ((heat || 0) * 1000 / (power * 3.6)).toFixed(decimals);
        }

        // 初始化年份选择器
        laydate.render({
            elem: '#year-selector',
            type: 'year',
            value: new Date()
        });

        // --- 1. 核心修改：静态化表头结构 (完全匹配图片) ---
        function getAdaptiveCols() {
            const container = $('#table-parent-container');
            const containerWidth = container.width();
            
            // 基础列宽
            const fixedWidth = 80;  // 月份
            const tempWidth = 100;  // 温度
            const remarkWidth = 100; // 备注
            
            // 计算数据列宽：(总宽 - 固定宽) / 12列 (4个区域 * 3个指标)
            let dataColWidth = 80; 
            if (containerWidth) {
                const availableWidth = containerWidth - fixedWidth - tempWidth - remarkWidth - 20; // 20是滚动条预留
                dataColWidth = Math.floor(availableWidth / 12); 
                if (dataColWidth < 60) dataColWidth = 60; // 最小保底宽度
            }

            // 样式定义：电量列高亮显示，因为只有电量有数据
            const elecStyle = 'color: #00eaff; font-weight: bold;'; 

            return [
                [
                    // 第一行表头
                    { field: 'month', title: '月份', rowspan: 2, fixed: 'left', width: fixedWidth, align: 'center' },
                    { field: 'avg_temp', title: '月平均水温(℃)', rowspan: 2, fixed: 'left', width: tempWidth, align: 'center' },
                    
                    // 四大板块
                    { title: '工厂', colspan: 3, align: 'center' }, 
                    { title: '大办', colspan: 3, align: 'center' }, 
                    { title: '研发', colspan: 3, align: 'center' }, 
                    { title: '电机', colspan: 3, align: 'center' }, 
                    
                    { field: 'remark', title: '备注', rowspan: 2, width: remarkWidth, align: 'center' }
                ],
                [
                    // 第二行表头 - 工厂
                    { field: 'factory_heat', title: '热量MJ', align: 'center', width: dataColWidth },
                    { field: 'factory_elec', title: '电量KWh', align: 'center', width: dataColWidth, style: elecStyle },
                    { field: 'factory_eff', title: '能效', align: 'center', width: dataColWidth },

                    // 第二行表头 - 大办
                    { field: 'office_heat', title: '热量MJ', align: 'center', width: dataColWidth },
                    { field: 'office_elec', title: '电量KWh', align: 'center', width: dataColWidth, style: elecStyle },
                    { field: 'office_eff', title: '能效', align: 'center', width: dataColWidth },

                    // 第二行表头 - 研发
                    { field: 'rd_heat', title: '热量MJ', align: 'center', width: dataColWidth },
                    { field: 'rd_elec', title: '电量KWh', align: 'center', width: dataColWidth, style: elecStyle },
                    { field: 'rd_eff', title: '能效', align: 'center', width: dataColWidth },

                    // 第二行表头 - 电机
                    { field: 'motor_heat', title: '热量MJ', align: 'center', width: dataColWidth },
                    { field: 'motor_elec', title: '电量KWh', align: 'center', width: dataColWidth, style: elecStyle },
                    { field: 'motor_eff', title: '能效', align: 'center', width: dataColWidth }
                ]
            ];
        }

        // --- 2. 数据获取 (保持原有SQL逻辑，确保能查到电量) ---
        async function sendSQL(strsql) {
            try {
                const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ sql: strsql })
                });
                if (!res.ok) return { data: [] };
                return await res.json();
            } catch (err) {
                console.error('sendSQL Error:', err);
                return { data: [] };
            }
        }

        async function fetchAndProcessData(year) {
            // 判断是否是今年
            const currentYear = new Date().getFullYear();
            const isCurrentYear = (year == currentYear);
            
            // 保持原有的动态SQL生成逻辑，防止后端查询报错
            const caseClauses = [];
            pageConfig.categories.forEach(cat => {
                const includeNos = cat.includeNos || [];
                const includeList = includeNos.length > 0 ? includeNos.join(',') : '-1';
                const includeClause = `SUM(CASE WHEN sub.no IN (${includeList}) THEN sub.total_elec ELSE 0 END)`;
                
                const excludeNos = cat.excludeNos || [];
                let fullClause;
                if (excludeNos.length > 0) {
                    const excludeList = excludeNos.join(',');
                    const excludeClause = `SUM(CASE WHEN sub.no IN (${excludeList}) THEN sub.total_elec ELSE 0 END)`;
                    fullClause = `(${includeClause} - ${excludeClause}) AS ${cat.key}_elec`;
                } else {
                    fullClause = `${includeClause} AS ${cat.key}_elec`;
                }
                caseClauses.push(fullClause);
            });
            
            /*const sql = `
                SELECT sub.month,
                       ${caseClauses.join(',\n                      ')}
                FROM (
                    SELECT no, MONTH(\`date\`) AS month, SUM(sum_elec) AS total_elec
                    FROM sum_elec_group_by_day
                    WHERE YEAR(\`date\`) = ${year}
                    GROUP BY no, MONTH(\`date\`)
                ) AS sub
                GROUP BY sub.month
                ORDER BY sub.month
            `.trim();*/
			const sql = `
                SELECT
                DATE_FORMAT( DATE_ADD(DATE_FORMAT('${year}-01-01','%Y-01-01'),INTERVAL t.i month) , '%m月') AS month,
								avg_temp,
								round((sum_heat1 + sum_heat2 + sum_heat3)* 1000,1) as factory_heat,
								(elec.sum_elec1 +elec.sum_elec2+elec.sum_elec3) as factory_elec,
                            CASE 
                                WHEN (sum_heat1 + sum_heat2 + sum_heat3) IS NULL AND (elec.sum_elec1 + elec.sum_elec2 + elec.sum_elec3) IS NULL THEN NULL
                                WHEN ((sum_heat1 + sum_heat2 + sum_heat3) = 0 OR (sum_heat1 + sum_heat2 + sum_heat3) IS NULL) AND ((elec.sum_elec1 + elec.sum_elec2 + elec.sum_elec3) <= 0 OR (elec.sum_elec1 + elec.sum_elec2 + elec.sum_elec3) IS NULL) THEN 0
                                WHEN (elec.sum_elec1 + elec.sum_elec2 + elec.sum_elec3) <= 0 OR (elec.sum_elec1 + elec.sum_elec2 + elec.sum_elec3) IS NULL THEN NULL
                                ELSE ROUND(((sum_heat1 + sum_heat2 + sum_heat3) * 1000)/((elec.sum_elec1 +elec.sum_elec2+elec.sum_elec3)*3.6),3)
                            END as factory_eff,
								
								Round(sum_heat1 * 1000,1) as office_heat,
								elec.sum_elec1 as office_elec,
                            CASE 
                                WHEN sum_heat1 IS NULL AND elec.sum_elec1 IS NULL THEN NULL
                                WHEN (sum_heat1 = 0 OR sum_heat1 IS NULL) AND (elec.sum_elec1 <= 0 OR elec.sum_elec1 IS NULL) THEN 0
                                WHEN elec.sum_elec1 <= 0 OR elec.sum_elec1 IS NULL THEN NULL
                                ELSE ROUND((sum_heat1 * 1000)/(elec.sum_elec1*3.6),3)
                            END as office_eff,
								
								
								Round(sum_heat3 * 1000,1) as rd_heat,
								elec.sum_elec3 as rd_elec,
                            CASE 
                                WHEN sum_heat3 IS NULL AND elec.sum_elec3 IS NULL THEN NULL
                                WHEN (sum_heat3 = 0 OR sum_heat3 IS NULL) AND (elec.sum_elec3 <= 0 OR elec.sum_elec3 IS NULL) THEN 0
                                WHEN elec.sum_elec3 <= 0 OR elec.sum_elec3 IS NULL THEN NULL
                                ELSE ROUND((sum_heat3 * 1000)/(elec.sum_elec3*3.6),3)
                            END as rd_eff,
								
								Round(sum_heat2 * 1000,1) as motor_heat,
								elec.sum_elec2 as motor_elec,
                            CASE 
                                WHEN sum_heat2 IS NULL AND elec.sum_elec2 IS NULL THEN NULL
                                WHEN (sum_heat2 = 0 OR sum_heat2 IS NULL) AND (elec.sum_elec2 <= 0 OR elec.sum_elec2 IS NULL) THEN 0
                                WHEN elec.sum_elec2 <= 0 OR elec.sum_elec2 IS NULL THEN NULL
                                ELSE ROUND((sum_heat2 * 1000)/(elec.sum_elec2*3.6),3)
                            END as motor_eff
            FROM sys_ints t

            -- 【电能数据】
            LEFT JOIN (
                /*
                 * 【重要】电量必须先按天计算、再按月SUM，不能直接按月GROUP BY后做GREATEST。
                 * 原因：320022是大办总表，420010(冷机)=320022-420001-420002-420009差值计算。
                 * 若某天总表采集缺失导致差值为负，不能在汇总前截断为0；
                 * 否则月度/年度总和会偏大。负数只在页面展示和COP计算时按规则处理。
                 * 大办机组：420001(天加2)+420002(天加1)+420009(冰山2)+420010(冷机,差值)+420011(欧亚)+420012(冰山1)
                 * 电机机组：420003(冷机)+420004(欧亚)+420013(扬子1)+420014(扬子2)+420015(冰山)
                 * 研发机组：420005(冷机2)+420006(欧亚2)+420007(冷机1)+420008(欧亚1)
                 */
                SELECT DATE_FORMAT(daily.jDay, '%Y-%m') AS date,
                    SUM(daily.elec_office) AS sum_elec1,
                    SUM(daily.elec_motor)  AS sum_elec2,
                    SUM(daily.elec_rd)     AS sum_elec3,
                    SUM(daily.elec_office + daily.elec_motor + daily.elec_rd) AS sum_elec
                FROM (
                    SELECT
                        r.jDay,
                        SUM(CASE WHEN no=420001 THEN sum_elec ELSE 0 END)
                        + SUM(CASE WHEN no=420002 THEN sum_elec ELSE 0 END)
                        + SUM(CASE WHEN no=420009 THEN sum_elec ELSE 0 END)
                                                + (
                                                        SUM(CASE WHEN no=320022 THEN sum_elec ELSE 0 END)
                                                        - SUM(CASE WHEN no=420001 THEN sum_elec ELSE 0 END)
                                                        - SUM(CASE WHEN no=420002 THEN sum_elec ELSE 0 END)
                                                        - SUM(CASE WHEN no=420009 THEN sum_elec ELSE 0 END)
                                                    )
                        + SUM(CASE WHEN no=420011 THEN sum_elec ELSE 0 END)
                        + SUM(CASE WHEN no=420012 THEN sum_elec ELSE 0 END) AS elec_office,
                        SUM(CASE WHEN no IN (420003,420004,420013,420014,420015) THEN sum_elec ELSE 0 END) AS elec_motor,
                        SUM(CASE WHEN no IN (420005,420006,420007,420008) THEN sum_elec ELSE 0 END) AS elec_rd
                    FROM (
                        SELECT DATE_FORMAT(date, '%Y-%m-%d') AS jDay, no, sum_elec
                        FROM sum_elec_group_by_day
                        WHERE no IN (420001,420002,420003,420004,420005,420006,420007,420008,420009,420011,420012,420013,420014,420015,320022)
                          AND date >= '${year}-01-01'
                          AND date <= '${year}-12-31'
                        UNION ALL
                        SELECT DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR), '%Y-%m-%d') AS jDay, no,
                            IF(LEAD(no,1,0) OVER(ORDER BY no,DATE_FORMAT(date,'%Y-%m-%d %H:00:00'))=no,
                               LEAD(MIN(KWH),1,0) OVER(ORDER BY no,DATE_FORMAT(date,'%Y-%m-%d %H:00:00')),
                               MAX(KWH))-MIN(KWH) AS sum_elec
                        FROM data_all FORCE INDEX (date_no_KWH)
                        WHERE date <= DATE_FORMAT(DATE_ADD(now(),INTERVAL 24 HOUR),'%Y-%m-%d 08:00:00')
                          AND date >= DATE_FORMAT(now(),'%Y-%m-%d 07:00:00')
                          AND kwh != 0 AND kwh != 99999999
                          AND no IN (420001,420002,420003,420004,420005,420006,420007,420008,420009,420011,420012,420013,420014,420015,320022)
                        GROUP BY no, DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR),'%Y-%m-%d')
                    ) r
                    GROUP BY r.jDay
                ) daily
                GROUP BY DATE_FORMAT(daily.jDay, '%Y-%m')

            ) elec ON DATE_FORMAT( DATE_ADD(DATE_FORMAT('${year}-01-01','%Y-01-01'),INTERVAL t.i month) , '%Y-%m') = elec.date

            -- 【热能数据】
            LEFT JOIN (
                 select 	DATE_FORMAT(r.jDay, '%Y-%m') as date,  
								sum(case when heat_name in ('heat_420001','heat_420002','heat_420003','heat_420004','heat_420005','heat_420006','heat_420007','heat_420008','heat_420009','heat_420010','heat_420011','heat_420012','heat_420013','heat_420014','heat_420014','heat_420015') then sum_heat else 0 end) as sum_heat, 
								sum(case when heat_name in ('heat_420001','heat_420002','heat_420009','heat_420010','heat_420011','heat_420012') then sum_heat else 0 end) AS sum_heat1,
								sum(case when heat_name in ('heat_420003','heat_420004','heat_420013','heat_420014','heat_420015') then sum_heat else 0 end) as sum_heat2,   
								sum(case when heat_name in ('heat_420005','heat_420006','heat_420007','heat_420008') then sum_heat else 0 end ) as sum_heat3    
								from (  
										${isCurrentYear ? `
										-- 今年：分两部分查询
										-- 汇总表：历史数据（到今天7点之前）
										select DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d') as jDay 
										,CONCAT('heat', '_', NO) as heat_name	
										,SUM(sum_heat) AS sum_heat
										FROM sum_heat_group_by_hour
										WHERE date < DATE_FORMAT(now(), '%Y-%m-%d 07:00:00')
										AND date >= DATE_FORMAT('${year}-01-01' , '%Y-%m-%d 07:00:00')
										and no in (420001,420002,420003,420004,420005,420006,420007,420008,420009,420010,420011,420012,420013,420014,420015)	
										GROUP BY no, DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d')
										
										UNION ALL
										
										-- 原始表：今天7点到现在的数据
										select DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d') as jDay 
										,CONCAT('heat', '_', NO) as heat_name	
										,if(LEAD(no,1,0) over(order by no,DATE_FORMAT(date, '%Y-%m-%d %H:00:00')) = no , LEAD(MIN(heat_quantity),1,0) over(order by no,DATE_FORMAT(date, '%Y-%m-%d %H:00:00')),   MAX(heat_quantity))- MIN(heat_quantity) AS sum_heat	
										FROM data_heat_quantity
										WHERE date >= DATE_FORMAT(now(), '%Y-%m-%d 07:00:00')
										AND date <= DATE_FORMAT(DATE_ADD(now(),INTERVAL 24 HOUR), '%Y-%m-%d 08:00:00')
										and heat_quantity != 0 and heat_quantity != 99999999		
										and no in (420001,420002,420003,420004,420005,420006,420007,420008,420009,420010,420011,420012,420013,420014,420015)	
										GROUP BY no,DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d')
										` : `
										-- 历史年份：全部从汇总表查询
										select DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d') as jDay 
										,CONCAT('heat', '_', NO) as heat_name	
										,SUM(sum_heat) AS sum_heat
										FROM sum_heat_group_by_hour
										WHERE date >= DATE_FORMAT('${year}-01-01' , '%Y-%m-%d 07:00:00')
										AND date <= DATE_FORMAT(DATE_ADD('${year}-12-31',INTERVAL 24 HOUR), '%Y-%m-%d 08:00:00')
										and no in (420001,420002,420003,420004,420005,420006,420007,420008,420009,420010,420011,420012,420013,420014,420015)	
										GROUP BY no, DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d')
										`}
								) r 
								group by DATE_FORMAT(r.jDay, '%Y-%m')
            ) heat ON DATE_FORMAT( DATE_ADD(DATE_FORMAT('${year}-01-01','%Y-01-01'),INTERVAL t.i month) , '%Y-%m') = heat.date
						Left join (
								select DATE_FORMAT(date, '%Y-%m') as date,
								round(AVG(B_temp),1) as avg_temp
								from data_temp
								where no in (420001,420002,420003,420004,420005,420006,420007,420008,420009,420010,420011,420012,420013,420014,420015)
								group by DATE_FORMAT(date, '%Y-%m')
						)temp on DATE_FORMAT( DATE_ADD(DATE_FORMAT('${year}-01-01','%Y-01-01'),INTERVAL t.i month) , '%Y-%m') = temp.date
            WHERE t.i <= 11
            ORDER BY t.i
            `.trim();
			debugger;

        function updateCharts(identifier, values, allCategories) {
			debugger;
            const isTotal = identifier === '合计';
            const titlePrefix = isTotal ? '全年总' : identifier;
            
            document.getElementById('bar-chart-header').innerHTML =

			// 取值辅助函数 (复用映射逻辑)
            const getElecVal = (src, catName) => {
				debugger;
                if (!src) return 0;
                if (catName === '工厂') return Math.max(0, parseNullableNumber(src['factory_elec']) || 0);
                if (catName === '大办') return Math.max(0, parseNullableNumber(src['office_elec']) || 0);
                if (catName === '研发') return Math.max(0, parseNullableNumber(src['rd_elec']) || 0);
                if (catName === '电机') return Math.max(0, parseNullableNumber(src['motor_elec']) || 0);
                return 0;
            };
            // 取值辅助函数 (复用映射逻辑)
            const getVal = (src, catName) => {
				debugger;
                if (!src) return 0;
                if (catName === '工厂') return parseFloat(calcCopDisplay(src['factory_heat'], src['factory_elec'], 3)) || 0;
                if (catName === '大办') return parseFloat(calcCopDisplay(src['office_heat'], src['office_elec'], 3)) || 0;
                if (catName === '研发') return parseFloat(calcCopDisplay(src['rd_heat'], src['rd_elec'], 3)) || 0;
                if (catName === '电机') return parseFloat(calcCopDisplay(src['motor_heat'], src['motor_elec'], 3)) || 0;
                return 0;
            };

            // 1. 曲线图
            // 生成带前导0的月份格式，与SQL返回的格式一致（'01月', '02月', ...）
            const months = Array.from({length: 12}, (_, i) => `${String(i+1).padStart(2, '0')}月`);

                lineStyle: { width: 3 },
                data: months.map(m => {
                    const mData = globalData.find(d => d.month === m);
                    return mData ? Math.round(getVal(mData, cat)*100)/100 : null;
                })
            }));

            // 2. 饼图 - 显示工厂、大办、研发、电机
            const pieData = chartCats1.map((cat, i) => ({
                name: cat,
                value: Math.round(getElecVal(values, cat)),
                itemStyle: { color: colors[i] }
            }));

            const commonTextStyle = { color: '#ccc' };
            
            barChartInstance.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                legend: { data: chartCats, textStyle: commonTextStyle, top: 5 },
                grid: { top: 40, bottom: 20, left: 50, right: 20, containLabel: true },
                xAxis: { type: 'category', data: months, axisLabel: commonTextStyle, axisLine: { lineStyle: { color: '#2a6dc8' } } },
                yAxis: { type: 'value', splitLine: { lineStyle: { type: 'dashed', color: 'rgba(255,255,255,0.1)' } }, axisLabel: commonTextStyle },
                series: lineSeries
            }, true);

            pieChartInstance.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', formatter: '{b}: {c}KWH ({d}%)' },
                legend: { bottom: 0, data: chartCats1, textStyle: commonTextStyle },
                series: [{
                    type: 'pie',
                    radius: ['40%', '65%'],

                    data: pieData,

                // 渲染表格
                window.renderLayuiTable(globalData);
                
                // 默认选中当前月份
                let defaultMonth = '合计';
                const currentMonth = String(new Date().getMonth() + 1).padStart(2, '0') + '月';
                // 查找当前月份的数据
                const currentMonthData = globalData.find(d => d.month === currentMonth);
                if(currentMonthData) {
                    defaultMonth = currentMonth;
                } else if(globalData.length > 0) {
                    // 如果当前月份没有数据，选择最后一条有数据的月份
                    defaultMonth = globalData[globalData.length - 1].month;
                }
                updateDashboard(defaultMonth);
            } catch(e) {
                console.error(e);
            } finally {
                btn.removeClass('layui-btn-disabled');
            }
        }

        function init() {
            barChartInstance = echarts.init(document.getElementById('barChart'), 'dark');
            pieChartInstance = echarts.init(document.getElementById('pieChart'), 'dark');

            $('#search-btn').on('click', reloadData);
            
            // 初始加载
            reloadData();

            // 窗口调整
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    barChartInstance.resize();
                    pieChartInstance.resize();
                    if(globalData) window.renderLayuiTable(globalData);
                }, 200);
            });
        }

        init();
    });
</script>

</body>
</html>
