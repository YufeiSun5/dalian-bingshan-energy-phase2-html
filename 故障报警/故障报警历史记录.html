		// 东八区：将用户选择的本地日期范围转为 UTC 日期时间，供查询数据库（库存世界时间）
		function localDateRangeToUTC(startDateStr, endDateStr) {
			var parseLocal = function(str) {
				var parts = str.split('-');
				return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
			};
			var localStart = parseLocal(startDateStr);
			var localEnd = parseLocal(endDateStr);
			localEnd.setDate(localEnd.getDate() + 1); // 结束日期的次日 00:00（左闭右开）
			return {
				startUTC: localStart.toISOString().slice(0, 19).replace('T', ' '),
				endUTC: localEnd.toISOString().slice(0, 19).replace('T', ' ')
			};
		}

				var enddate = $("#ID-laydate-end-date-1")[0].value;
				var range = localDateRangeToUTC(startdate, enddate);

				// 数据库存世界时间(UTC)，查询用 UTC 范围；显示用 CONVERT_TZ 转为东八区，时间格式为月日 时分秒
				var sql = " select DATE_FORMAT(CONVERT_TZ(AlarmTime,'+00:00','+08:00'),'%m-%d %H:%i:%s') as AlarmTime \n"
				+" ,DATE_FORMAT(CONVERT_TZ(EventTime,'+00:00','+08:00'),'%m-%d %H:%i:%s') as EventTime \n"
				+" ,ExtendField1 \n"
				+" ,ROUND(AlarmValue,2) as AlarmValue \n"
				+" ,ROUND(LimitValue,2) as LimitValue \n"
				+" ,EventType \n"
				+" ,AlarmText \n"
				+" ,ROUND(ResumeValue,2) as ResumeValue \n"
				+" ,case when EventType = '报警恢复' then timediff(alarm.EventTime,alarm.AlarmTime) else null end as time_DT \n"
				+" from alarm \n";

				sql += " where AlarmTime>='"+range.startUTC+"' and AlarmTime <'"+range.endUTC+"'\n";
