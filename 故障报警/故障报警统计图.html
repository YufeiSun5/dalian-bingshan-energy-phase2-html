		$('#search').on('click', async function() {
			debugger;
			try {
				//获取查询结果
				var startdate ;
				var enddate;
				startdate = $("#ID-laydate-start-date-1")[0].value;
				enddate = $("#ID-laydate-end-date-1")[0].value;
				
				let datediff = ((new Date(enddate) - new Date(startdate))/1000)+86400 ;
				
				var sql = ""
				+ " select t.*, info_config.no, \n" 
				+ " CASE \n" 
				+ "   WHEN LEFT(t.Tagname, 1) = 'T' THEN CONCAT(SUBSTRING_INDEX(info_config.place, '#', 1),'#',info_config.name, '', SUBSTRING_INDEX(t.Tagname, '_', -1)) \n" 
				+ "   WHEN LEFT(t.Tagname, 1) = 'E' THEN CONCAT(SUBSTRING_INDEX(info_config.place, '#', 1),'#', info_config.name, '', SUBSTRING_INDEX(t.Tagname, '_', -1)) \n"   
				+ "   ELSE 'Unknown' \n"   
				+ " END as custom_name \n" 
				+ " from ( \n" 
				+ "   select Tagname, sum(time_DT) as time_DT from alarm_sec \n" 
				+ "   where alarmTime >= '" + startdate + "' \n" 
				+ "   and alarmTime <= DATE_ADD('" + enddate + "', INTERVAL 24 hour) \n" 
				+ "   group by Tagname \n" 
				+ " ) t \n" 
				+ " left join info_config \n" 
				+ " on LEFT(t.Tagname, 4) = info_config.symbol \n" ;
				
				if($("#sreachNo").val() == "all"){
				}else if($("#sreachNo").val() == "all_1"){
					sql += " where info_config.no in (27,28) ";
				}else if($("#sreachNo").val() == "all_2"){
					sql += " where info_config.no in (12,16,17,20) ";
				}else if($("#sreachNo").val() == "all_3"){
					sql += " where info_config.no in (1,26) ";
				}else{
					sql += " where info_config.no = "+$("#sreachNo").val()+" ";
				}
				
				console.info(sql);
				const data = await sendSQL(sql);
				console.info(data);
				
				var myChart = echarts.init(document.getElementById('chart'));
				var sumdata = [];
				let xAxisData = [];
				let data_fault = [];
				let data_normal = [];
				for(let i=0;i<data.data.length;i++){
					sumdata.push(datediff);
					data_fault.push(data.data[i].time_DT);
					data_normal.push(datediff - data.data[i].time_DT);
					xAxisData.push(data.data[i].custom_name);
				}
				
				

				function secondsToYMDHMS(seconds) {
    
					var day = Math.floor((seconds % (365 * 24 * 60 * 60)) / (24 * 60 * 60));
					var temp = (seconds % (365 * 24 * 60 * 60)) % (24 * 60 * 60);
					var hour = Math.floor(temp / (60 * 60));
					var temp2 = temp % (60 * 60);
					var minute = Math.floor(temp2 / 60);
					var second = temp2 % 60;
					if(day > 0){
						return day + "天" + hour + "时" + minute + "分" + second + "秒";
					}else if (day <= 0 &&hour > 0){
						return hour + "时" + minute + "分" + second + "秒";
					}else if (day <=0 && hour <=0 && minute > 0 ){
						return  minute + "分" + second + "秒";
					}else{
						return  second + "秒";
					}
    
				}
				option = {
					title: {
						text: '报警统计',
						textStyle:{
							color:"#fff"
						},
					},
					tooltip: {
						trigger: 'axis',
						formatter: function (params) {
							debugger;
							let str = '';
							str += params[0].axisValue + '<br/>';
							for (let i = 0 ; i < params.length; i++) {
								str = str + params[i].marker + params[i].seriesName +"    "+ secondsToYMDHMS(params[i].data) + '<br/>';
							}
							return str;
						}
					},
					grid: [
					{
						bottom: 120
					}
					],
					color: ['#ee6666', '#91cc75'],
					xAxis: {
						type: 'category',
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							lineStyle:{
								color:"#fff"
							}
						},
						/*axisLabel: {
							rotate:45,  //字体倾斜度数
						},*/
						data: xAxisData
					},
					yAxis: {
						type: 'value',
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							lineStyle:{
								color:"#fff"
							}
						},
					},
					series: [{
						name: '故障', 
						type: 'bar', 
						stack: 'Ad', 
						label:{ 
							show:true, 
							formatter: function (params) { 
								if(params.value != '' &&params.value != 0&&sumdata[params.dataIndex] !=0){ 
									return (params.value * 100 /sumdata[params.dataIndex]).toFixed(2)+'%'; 
								} 
							} 
						}, 
						data: data_fault
					}, 
					{ 
						name: '正常', 
						type: 'bar', 
						stack: 'Ad', 
						label:{ 
							show:true, 
							formatter: function (params) { 
								if(params.value != '' &&params.value != 0&&sumdata[params.dataIndex] !=0){ 
									return (params.value * 100 /sumdata[params.dataIndex]).toFixed(2)+'%'; 
								} 
							} 
						}, 
						data: data_normal
					},		 
					] 
				};
				
				
				if (option && typeof option === "object") {
					myChart.setOption(option, true);
				}
				
				
				
				// 在这里继续处理查询结果，比如渲染表格
				// renderTable(data);
			} catch (err) {
				console.error('查询出错：', err);
			}
		});
		
		
		async function sendSQL(strsql) {
			const sql = strsql;
			console.info(sql);
			const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({ sql })
			});

			const data = await res.json();
			return data;
			
			//document.getElementById('responseBox').textContent = JSON.stringify(data, null, 2);
		}
	
	});
