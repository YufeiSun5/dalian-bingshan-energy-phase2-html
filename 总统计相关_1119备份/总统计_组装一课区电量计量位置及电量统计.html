    }

     * @returns {Promise<Object>} - 返回一个Promise，解析后为API的JSON响应。
     */
    async function sendSQL(strsql) {
        try {
            const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },

            });

                layer.msg(`数据加载失败: ${res.statusText}`);

            }

        } catch (err) {

     */
    async function fetchAndProcessData(year) {
        // 1. 动态构建部门数据的 SQL 查询
        const caseStatements = itemConfig.map(item => {
            if (Array.isArray(item.no) && item.no.length > 0) {
                const noList = item.no.join(',');
                return `SUM(CASE WHEN sub.no IN (${noList}) THEN sub.total_elec ELSE 0 END) AS ${item.key}_elec`;
            }
            return `0 AS ${item.key}_elec`; 
        }).join(',\n                      ');

        const departmentSql = `
            SELECT
                sub.month,
                ${caseStatements}
            FROM (
                SELECT no, MONTH(\`date\`) AS month, SUM(sum_elec) AS total_elec
                FROM sum_elec_group_by_day
                WHERE YEAR(\`date\`) = ${year}
                GROUP BY no, MONTH(\`date\`)
            ) AS sub
            GROUP BY sub.month
            ORDER BY sub.month;
        `.trim();
        
        // 2. 获取公司总电量的 SQL
        const companyTotalSql = `
            SELECT
                MONTH(\`date\`) AS month,
                SUM(sum_elec) AS company_total_elec
            FROM sum_elec_group_by_day
            WHERE YEAR(\`date\`) = ${year}
            GROUP BY MONTH(\`date\`);
        `.trim();

        const [departmentApiResult, companyTotalApiResult] = await Promise.all([
            sendSQL(departmentSql),
            sendSQL(companyTotalSql)
        ]);

        const rawData = departmentApiResult.data || [];
        const processedData = {};
        itemConfig.forEach(item => {
            processedData[item.key] = {};
        });

        rawData.forEach(row => {
            const month = row.month;
            itemConfig.forEach(item => {
                const elecValue = row[`${item.key}_elec`];
                if (elecValue !== undefined) {
                    processedData[item.key][month] = elecValue;
                }
            });
        });
        
        const companyTotals = {};
        (companyTotalApiResult.data || []).forEach(row => {
            companyTotals[row.month] = row.company_total_elec;
        });
        
        return { departmentData: processedData, companyTotals: companyTotals };
    }

    /**
     * @function reloadData
     * @description 重新加载数据的入口函数，会显示加载动画。
     */
    async function reloadData() {
        const loading = layer.load(1, { shade: [0.1, '#fff'] });
        const year = $('#year-selector').val();
        try {
            globalData = await fetchAndProcessData(year);
            updateDashboard(globalData);
        } catch (e) {
            console.error("Failed to load or process data", e);
            layer.msg("数据处理失败");
        } finally {
            layer.close(loading); 
        }
    }
    
    /**
     * @function updateHeaderSummaryForMonth
     * @description 根据指定的月份更新头部的汇总信息。
     * @param {number} month - 要显示数据的月份 (1-12)。
     */
    function updateHeaderSummaryForMonth(month) {
        if (!globalData || !globalData.departmentData || !globalData.companyTotals) {
            $('#header-summary-text').html('无数据'); // 数据未加载时显示
            return;
        }

        const departmentData = globalData.departmentData;
        const companyTotals = globalData.companyTotals;

        let monthElec = 0;
        // 累加当月所有项目的电量
        Object.values(departmentData).forEach(itemData => {
            monthElec += itemData[month] || 0;
        });

        if (monthElec === 0) {
            const summaryHtml = `组装一课<span style="color: red;">${month}</span>月份无用电数据`;
            $('#header-summary-text').html(summaryHtml);
            return;
        }

        const companyTotalForMonth = companyTotals[month] || 0;
        const percentageOfCompanyTotal = companyTotalForMonth > 0
            ? (monthElec / companyTotalForMonth * 100).toFixed(2)
            : '0.00';

        const summaryHtml = `组装一课<span style="color: red;">${month}</span>月份用电电量<span style="color: red;">${monthElec.toLocaleString()}</span>千瓦时，占公司总电量比<span style="color: red;">${percentageOfCompanyTotal}%</span>`;
        $('#header-summary-text').html(summaryHtml);
    }

    /**
     * @function updateDashboard
     * @description 使用获取到的数据更新整个仪表盘（主要是表格内容）。
     * @param {Object} data - 包含处理后数据的对象。
     */
    function updateDashboard(data) {
        $('#header-summary-text').text(''); // 清空头部汇总信息
        
        const departmentData = data.departmentData;
        
        // 用于查找有数据的最新月份
        let monthsWithData = new Set(); 

        const layuiTableData = itemConfig.map(item => {
            const row = {
                supplier: item.supplier,
                area: item.area,
                position: item.position,
                bgColor: item.bgColor 
            };
            for (let m = 1; m <= 12; m++) {
                const elec_val = departmentData[item.key]?.[m];
                if (elec_val !== undefined && elec_val > 0) {
                    row[`month${m}`] = elec_val;
                    monthsWithData.add(m); 
                } else {
                    row[`month${m}`] = ''; 
                }
            }
            return row;
        });

        currentTableData = layuiTableData; 

        table.render({
            elem: '#data-table',
            cols: tableCols,
            data: layuiTableData,
            cellMinWidth: 80, 
            height: 'full-200', 
            limit: layuiTableData.length, 
            even: false, 
            rowEvent: function(obj){
                // 为自定义背景色的行添加类
                if(obj.data.bgColor === 'yellow'){
                    obj.tr.addClass('layui-bg-yellow');
                } else if (obj.data.bgColor === 'orange'){
                    obj.tr.addClass('layui-bg-orange');
                }
            },
            done: function(res, curr, count){
                // --- 需求1: 进入页面时显示最后一个有数据月的数据 ---
                let currentMaxMonth = 0;
                if (monthsWithData.size > 0) {
                    currentMaxMonth = Math.max(...Array.from(monthsWithData)); // 将Set转换为Array以便使用Math.max
                }

                if (currentMaxMonth > 0) {
                    // 直接更新顶部汇总信息为最新有数据的月份
                    updateHeaderSummaryForMonth(currentMaxMonth);
                } else {
                    $('#header-summary-text').html('暂无月度数据');
                }
            }
        });
    }

    // --- 高亮逻辑辅助函数 ---

    /**
     * @function clearHoverHighlights
     * @description 清除所有鼠标悬浮的高亮效果。
     */
    function clearHoverHighlights() {
        $('.layui-table-box .layui-table td').removeClass('layui-table-hover');
        $('.layui-table-box .layui-table th').removeClass('layui-table-hover');
    }

    /**
     * @function applyHighlight
     * @description 应用高亮到指定的行和/或列。高亮始终跟随鼠标，不持久化。
     * @param {number|null} rowIndex - 需要高亮的行的 Layui data-index，如果不需要高亮行则为 null。
     * @param {number|null} colIndex - 需要高亮的列的 0-based 索引，如果不需要高亮列则为 null。
     */
    function applyHighlight(rowIndex, colIndex) {
        // 始终清除当前所有高亮效果，确保只显示当前鼠标位置的高亮
        clearHoverHighlights();

        // 应用行高亮
        if (rowIndex !== null) {
            // 通过 data-index 选择主表格和所有固定表格中的对应行，并添加 hover 类
            $(`.layui-table-box tbody tr[data-index="${rowIndex}"] > td`).addClass('layui-table-hover');
        }

        // 应用列高亮
        if (colIndex !== null) {
            // 选择所有表格视图（主表格、固定左侧、固定右侧）中的对应列，并添加 hover 类
            // nth-child 是 1-based，所以需要 colIndex + 1
            $(`.layui-table-box .layui-table-body tr td:nth-child(${colIndex + 1}), 
               .layui-table-box .layui-table-header th:nth-child(${colIndex + 1})`).addClass('layui-table-hover');
            
            // 明确地为固定列的单元格添加高亮，以防特定 Layui 版本或 CSS 优先级问题
            $(`.layui-table-fixed-l .layui-table-body tr td:nth-child(${colIndex + 1})`).addClass('layui-table-hover');
            $(`.layui-table-fixed-r .layui-table-body tr td:nth-child(${colIndex + 1})`).addClass('layui-table-hover');
        }

        // 注意：此函数现在只负责视觉高亮，不处理顶部汇总信息的更新。
        // 顶部汇总信息的更新将由点击事件独立触发。
    }


    // --- 事件绑定 ---

    // 初始化年份选择器
    laydate.render({
        elem: '#year-selector',
        type: 'year',
        value: new Date() // 默认值为当前年份
    });

    // 查询按钮点击事件
    $('#search-btn').on('click', reloadData);

    // 导出按钮点击事件
    $('#export-btn').on('click', function() {
        try {
            const year = $('#year-selector').val() || new Date().getFullYear();
            const filename = `组装一课区电量计量位置及电量统计_${year}.xlsx`;
            
            const exportData = [
                ['供应位置', '区域', '用电位置', '1月份', '2月份', '3月份', '4月份', '5月份', '6月份', '7月份', '8月份', '9月份', '10月份', '11月份', '12月份']
            ];
            currentTableData.forEach(row => {
                const rowArray = [
                    row.supplier,
                    row.area,
                    row.position
                ];
                for (let m = 1; m <= 12; m++) {
                    rowArray.push(row[`month${m}`]);
                }
                exportData.push(rowArray);
            });

            const ws = XLSX.utils.aoa_to_sheet(exportData); 

            // ---【核心修改】---
            // 手动设置每一列的宽度，单位是“字符数”
            // 数组的顺序与您的列顺序一致
            ws['!cols'] = [
                { wch: 30 }, // 供应位置
                { wch: 40 }, // 区域
                { wch: 35 }, // 用电位置
                { wch: 10 }, // 1月份
                { wch: 10 }, // 2月份
                { wch: 10 }, // 3月份
                { wch: 10 }, // 4月份
                { wch: 10 }, // 5月份
                { wch: 10 }, // 6月份
                { wch: 10 }, // 7月份
                { wch: 10 }, // 8月份
                { wch: 10 }, // 9月份
                { wch: 10 }, // 10月份
                { wch: 10 }, // 11月份
                { wch: 10 }  // 12月份
            ];
            // ---【修改结束】---

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            
            XLSX.writeFile(wb, filename);

        } catch (e) {
            console.error(e);
            layer.msg('导出失败，请检查控制台错误。');
        }
    });

    // --- 鼠标悬浮事件 (仅高亮，不更新汇总) ---
    // 监听表格 body 内的任何 td 单元格的鼠标悬浮事件
    $('.table-container').on('mouseover', '.layui-table-body td', function() {
        const $hoveredCell = $(this);
        const $hoveredRow = $hoveredCell.closest('tr');
        const rowIndex = $hoveredRow.data('index'); // 获取 Layui 的行索引
        const colIndex = $hoveredCell.index(); // 获取 0-based 列索引

        // 调用高亮函数，只负责视觉高亮。不传递月份信息，因为悬浮不更新汇总。
        applyHighlight(rowIndex, colIndex);
    });

    // 监听表格 header 内的任何 th 表头单元格的鼠标悬浮事件
    $('.table-container').on('mouseover', '.layui-table-header th', function() {
        const $hoveredHeader = $(this);
        const colIndex = $hoveredHeader.index(); // 获取 0-based 列索引
        
        // 表头悬浮只高亮列，不涉及特定行，所以 rowIndex 传 null。不传递月份信息。
        applyHighlight(null, colIndex);
    });

    // 【修复】监听鼠标移出整个表格容器的事件，以清除所有高亮
    $('.table-container').on('mouseleave', '.layui-table-box', function() {
        clearHoverHighlights(); // 清除所有高亮
    });


    // --- 鼠标点击事件 (更新汇总，高亮继续跟随鼠标) ---
    // 需求2: 点击任何一个单元格，都变更为它所在列的数据 (如果该列是月份列)
    // 监听表格 body 内的任何 td 单元格的点击事件
    $('.table-container').on('click', '.layui-table-body td', function() {
        const $clickedCell = $(this);
        const fieldName = $clickedCell.attr('data-field');

        // 仅当点击的是月份数据列时，才更新汇总信息
        if (fieldName && fieldName.startsWith('month')) {
            const month = parseInt(fieldName.replace('month', ''));
            updateHeaderSummaryForMonth(month); // 更新头部汇总信息
        } else {
            // 如果点击的是非月份列（如固定列），则清除头部汇总信息
            $('#header-summary-text').text('');
        }
        // 注意：点击后，高亮效果将继续由鼠标悬浮事件（mouseover）控制。
    });

    // 监听表格 header 内的任何 th 表头单元格的点击事件
    $('.table-container').on('click', '.layui-table-header th', function() {
        const monthField = $(this).attr('data-field');

        // 仅当点击的是月份表头时，才更新汇总信息
        if (monthField && monthField.startsWith('month')) {
            const month = parseInt(monthField.replace('month', ''));
            updateHeaderSummaryForMonth(month); // 更新头部汇总信息
        } else {
            // 如果点击的是非月份表头（如固定列的表头），则清除头部汇总信息
            $('#header-summary-text').text('');
        }
        // 注意：点击后，高亮效果将继续由鼠标悬浮事件（mouseover）控制。
    });

    // --- 页面初始化 ---
    reloadData(); 
});
</script>
