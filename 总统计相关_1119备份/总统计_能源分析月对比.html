		//查询按钮点击事件
		$('#search').on('click', async function() {
			debugger;
			try {
				
				//获取查询结果
				
				//var startdate = $("#ID-laydate-start-date-1")[0].value;
				//var enddate = $("#ID-laydate-end-date-1")[0].value;
				
				var startdate = $("#ID-laydate-start-date-1")[0].value ;
				var enddate = $("#ID-laydate-end-date-1")[0].value ;
				
				$("#title").text(new Date(startdate).getFullYear()+"年"+(new Date(startdate).getMonth()+1)+"月、"+new Date(enddate).getFullYear()+"年"+(new Date(enddate).getMonth()+1)+"月份用电对比");
				$("#title_Sum").text(new Date(startdate).getFullYear()+"年"+(new Date(startdate).getMonth()+1)+"月、"+new Date(enddate).getFullYear()+"年"+(new Date(enddate).getMonth()+1)+"月份电量总值及涨幅");
				
				let now = new Date();
				let compareDate = new Date(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate());
				
				
				
				var sql = ""
				+"	select r.month 		\n"
				+"	,p.unit_price1_2 	\n"
				+"	,r.sum_elec1_2 		\n"
				+"	,ROUND(r.sum_elec1_2 * p.unit_price1_2,2) as price1_2 	\n"
				+"	,p.unit_price3 		\n"
				+"	,r.sum_elec3 		\n"
				+"	,ROUND(r.sum_elec3 * p.unit_price3,2) as price3 	\n"
				+"	,ROUND((ROUND(r.sum_elec1_2 * p.unit_price1_2,2) + ROUND(r.sum_elec3 * p.unit_price3,2))/(r.sum_elec1_2 + r.sum_elec3) , 4) as sum_unit_price 	\n"
				+"	,r.sum_elec1_2 + r.sum_elec3 as sum_elec 	\n"
				+"	,ROUND(r.sum_elec1_2 * p.unit_price1_2,2) + ROUND(r.sum_elec3 * p.unit_price3,2) as sum_price 	\n"
				+"	from ( 	\n"
				+"		select DATE_FORMAT(r.jDay, '%Y-%m') as month,sum(sum_elec1_2) as sum_elec1_2,sum(sum_elec3) as sum_elec3 from ( \n"
				+"			select t.jDay 	\n"
				+"			,sum(case when elec_name in ('elec_51','elec_52','elec_12','elec_16','elec_17','elec_20') then sum_elec else 0 end) as sum_elec1_2 	\n"
				+"			,sum(case when elec_name in ('elec_1','elec_26') then sum_elec else 0 end) as sum_elec3 	\n"
				+"			from (  \n"
				+"				select DATE_FORMAT(date, '%Y-%m-%d')  as jDay,CONCAT('elec', '_', NO) as elec_name,sum_elec  \n"
				+"				from sum_elec_group_by_day 	\n"
				+"				where (date >= '"+enddate+"-01' and date <= DATE_SUB(DATE_ADD('"+enddate+"-01',INTERVAL 1 month),INTERVAL 1 day)) 	\n"
				+"				or (date >= '"+startdate+"-01' and date <= DATE_SUB(DATE_ADD('"+startdate+"-01',INTERVAL 1 month),INTERVAL 1 day))	\n"
				+"				and no in (51,52,12,16,17,20,1,26)	\n";
				
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					sql += " union all \n"
					+" 	SELECT DATE_FORMAT(DATE_SUB(date,INTERVAL 7 HOUR ), '%Y-%m-%d') as jDay \n" 	
					+"	,CONCAT('elec', '_', NO) as elec_name	\n"
					+" 	,if(LEAD(no,1,0) over(order by no,DATE_FORMAT(date, '%Y-%m-%d %H:00:00')) = no , LEAD(MIN(KWH),1,0) over(order by no,DATE_FORMAT(date, '%Y-%m-%d %H:00:00')),   MAX(KWH))- MIN(KWH) AS sum_elec \n" 			
					+" 	FROM data_all 	\n" 	
					+" 	WHERE date <= DATE_FORMAT(DATE_ADD(now(),INTERVAL 24 HOUR), '%Y-%m-%d 08:00:00')  \n" 
					+" 	AND date >= DATE_FORMAT(now() , '%Y-%m-%d 07:00:00')		\n" 
					+" 	and kwh != 0 and kwh != 99999999		\n" 
					+" 	and no in (51,52,12,16,17,20,1,26)	\n" 
					+" 	GROUP BY no,DATE_FORMAT(date, '%Y-%m-%d %H:00:00') \n" ;
				}
				
				sql += ""
				+"			)t 	\n"
				+"			GROUP BY t.jDay 	\n"
				+"		) r 	\n"
				+"		where DATE_FORMAT(r.jDay, '%Y-%m') >= '"+startdate+"' and DATE_FORMAT(r.jDay, '%Y-%m') <= '"+enddate+"' \n"
				+"		GROUP BY DATE_FORMAT(r.jDay, '%Y-%m') \n"
				+"		order BY DATE_FORMAT(r.jDay, '%Y-%m') \n"
				+"	) r left join elec_unit_price p on r.month = p.use_date ; \n";
				
				
				
				
				
				
				
				console.info(sql);
				var data = await sendSQL(sql);
				console.info(data);
				
				if(data.data.length <= 1){
					return;
				}
				
				//拼接新表格表头
				var cols = [];
				
				//计算各项同比增长率
				var tableData = data.data;
				tableData[0].sum_elec_QOQ = Math.round(((tableData[1].sum_elec - tableData[0].sum_elec ) *  10000) /tableData[0].sum_elec,2)/100  + "%";
				tableData[0].sum_price_QOQ = Math.round(((tableData[1].sum_price - tableData[0].sum_price ) *  10000) /tableData[0].sum_price,2)/100  + "%";
				tableData[0].sum_elec1_2_QOQ = Math.round(((tableData[1].sum_elec1_2 - tableData[0].sum_elec1_2 ) *  10000) /tableData[0].sum_elec1_2,2)/100  + "%";
				tableData[0].price1_2_QOQ = Math.round(((tableData[1].price1_2 - tableData[0].price1_2 ) *  10000) /tableData[0].price1_2,2)/100  + "%";
				tableData[0].sum_elec3_QOQ = Math.round(((tableData[1].sum_elec3 - tableData[0].sum_elec3 ) *  10000) /tableData[0].sum_elec3,2)/100  + "%";

		function convertNumberToLetter(num) {
			if (num <= 25) {
				return String.fromCharCode(65 + num); // 将数字转换为大写字母
			} else {
				var quotient = Math.floor(num / 26) - 1;
				var remainder = num % 26;
				return convertNumberToLetter(quotient) + String.fromCharCode(65 + remainder); // 递归计算每一位的字母
			}
		}
