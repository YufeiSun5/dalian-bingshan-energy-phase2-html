		// 生成原生HTML表格
		function renderNativeTable1(data) {
			const thead = document.getElementById('test-thead');
			const tbody = document.getElementById('test-tbody');
			
			// 清空
			thead.innerHTML = '';
			tbody.innerHTML = '';
			
			// 生成表头（单行，只显示月份）
			const tr1 = document.createElement('tr');
			const thProject = document.createElement('th');
			thProject.textContent = '项目';
			thProject.colSpan = 2;
			tr1.appendChild(thProject);
			
			for (let m = 1; m <= 12; m++) {
				const th = document.createElement('th');
				th.textContent = m + '月份';
				th.colSpan = 2;
				th.dataset.month = m;
				tr1.appendChild(th);
			}
			
			const thSum = document.createElement('th');
			thSum.textContent = '合计';
			tr1.appendChild(thSum);
			
			const thRatio = document.createElement('th');
			thRatio.textContent = '占比';
			tr1.appendChild(thRatio);
			
			thead.appendChild(tr1);
			
			// 生成数据行
			data.forEach((row, index) => {
				const tr = document.createElement('tr');
				
				// 判断是否是合计行（第一行）或总和行（最后一行）
				const isSumRow = (index === 0 && row.elec_name === '合计电量');
				const isTotalRow = (index === data.length - 1 && row.elec_name === '总和');
				
				if (isSumRow || isTotalRow) {
					tr.className = 'total-elec-row';
				} else {
					// 交错背景色 (需要减1因为第一行是合计行)
					tr.className = (index - 1) % 2 === 0 ? 'unit-bg-1' : 'unit-bg-2';
				}
				
				const tdName = document.createElement('td');
				tdName.textContent = row.elec_name || '';
				tdName.className = 'left-header';
				tdName.colSpan = 2;
				tr.appendChild(tdName);
				
				// 判断是否需要标红（人工录入）
				const itemName = row.elec_name;
				const itemKey = getItemKeyByName(itemName);
				const isManualInput = itemKey && dataSourceConfig[itemKey];
				const manualInputClass = isManualInput ? 'manual-input' : '';
				
			for (let m = 1; m <= 12; m++) {
				// 合计行：每个月份占2列，只显示电量
				if (isSumRow) {
					const tdElec = document.createElement('td');
					tdElec.textContent = row['month' + m + '_elec'] != null ? row['month' + m + '_elec'] : '';
					tdElec.dataset.month = m;
					tdElec.colSpan = 2;
					tr.appendChild(tdElec);
				} else {
					// 普通行：显示电量和占比
					const tdElec = document.createElement('td');
					tdElec.textContent = row['month' + m + '_elec'] != null ? row['month' + m + '_elec'] : '';
					tdElec.dataset.month = m;
					if (manualInputClass && !isTotalRow) {
						tdElec.className = manualInputClass;
					}
					tr.appendChild(tdElec);
					
					const tdRatio = document.createElement('td');
					tdRatio.textContent = row['month' + m + '_ratio'] || '';
					tdRatio.dataset.month = m;
					tr.appendChild(tdRatio);
				}
			}
			
			const tdSum = document.createElement('td');
			// 合计已经在数据处理时计算，直接显示
			tdSum.textContent = row.sum_elec != null ? row.sum_elec : '';
			tr.appendChild(tdSum);
				
				const tdSumRatio = document.createElement('td');
				tdSumRatio.textContent = row.sum_ratio || '';
				tr.appendChild(tdSumRatio);
				
				tbody.appendChild(tr);
			});
			
			// 辅助函数：根据名称获取key
			function getItemKeyByName(name) {
				const item = itemConfig.find(it => it.name === name);
				return item ? item.key : null;
			}
		}

		// 列高亮功能
		function setupColumnHover() {
			['test', 'test1'].forEach(tableId => {
				const table = document.getElementById(tableId);
				
				table.addEventListener('mouseover', e => {
					const cell = e.target;
					const month = cell.dataset.month;
					if (!month) return;
					table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
					table.querySelectorAll(`[data-month="${month}"]`).forEach(td => td.classList.add('col-hover'));
				});
				
				table.addEventListener('mouseleave', () => {
					table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
				});
				
				table.addEventListener('click', e => {
					const month = e.target.dataset.month;
					if (!month && !$(e.target).closest('td[data-month]').length) return;
					const actualMonth = month || $(e.target).closest('td[data-month]').data('month');
					if (actualMonth && table1Config.data.length > 0) {
						const data = table1Config.data;
						const all_sum_elec = window.currentYearTotal || 0;
						// 电量已经四舍五入，直接使用
						$('#h2_west').html('经营企划本部'+actualMonth+'月用电电量<span style="color: red;">'+data[data.length-1]["month"+actualMonth+"_elec"]+'</span>千瓦时，占公司总电量比<span style="color: red;">'+(Math.round(data[data.length-1]["month"+actualMonth+"_elec"] * 10000/all_sum_elec) / 100)+"%"+'</span>。');
						
						// 更新图表交互
						updatePieChartForMonth(actualMonth);
						showLineChartTooltipForMonth(actualMonth);
					}
				});
			});
		}

		// ========= 图表更新函数 =========
		function updateChart() {
			if (!myChart || !pieChart || !table1Config.data || table1Config.data.length === 0) return;
			
			const colors = ['#5470c6', '#ee6666', '#91cc75', '#fac858', '#73c0de', '#3ba272', '#fc8452'];
			const lineSeries = [];
			const pieData = [];
			
			// 排除合计行和总和行，只处理中间的项目数据
			const projectData = table1Config.data.slice(1, -1); // 去掉第一行合计和最后一行总和
			
		projectData.forEach((item, index) => {
			// 曲线图数据：12个月的电量（已经四舍五入）
			const lineData = [];
			for (let m = 1; m <= 12; m++) {
				const val = item[`month${m}_elec`];
				lineData.push(val ? val : null);
			}
			
			lineSeries.push({
				name: item.elec_name,
				type: 'line',
				data: lineData,
				smooth: true,
				color: colors[index % colors.length],
				lineStyle: { width: 2 },
				itemStyle: { borderWidth: 3, borderColor: '#1d386f' },
				connectNulls: false,
				symbol: 'circle',
				symbolSize: 4
			});
			
			// 饼图数据：电量已经四舍五入，直接使用
			if (item.sum_elec && item.sum_elec > 0) {
				pieData.push({
					name: item.elec_name,
					value: item.sum_elec
				});
			}
		});
			
			// 更新曲线图
			myChart.setOption({
				legend: { data: projectData.map(item => item.elec_name) },
				series: lineSeries
			});
			
			// 更新饼图 - 手动计算百分比，确保与表格一致
			pieChart.setOption({
				tooltip: {
					formatter: function(params) {
						// 手动计算百分比
						const total = pieData.reduce((sum, item) => sum + item.value, 0);
						const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
						return `${params.seriesName}<br/>${params.name}: ${params.value.toLocaleString()} (${percentage}%)`;
					}
				},
				series: [{
					name: '用电占比',
					type: 'pie',
					radius: '65%',
					center: ['50%', '45%'],
					data: pieData,
					itemStyle: { 
						borderWidth: 0,  // 移除分割线
						borderColor: 'transparent'
					},
					emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } },
					label: { 
						formatter: function(params) {
							// 手动计算百分比，确保与表格一致
							const total = pieData.reduce((sum, item) => sum + item.value, 0);
							const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
							return `${percentage}%`;
						}, 
						color: 'rgba(255, 255, 255, 0.9)', 
						position: 'outside' 
					},
					labelLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.5)' } }
				}]
			});
		}

			const monthIndex = parseInt(month) - 1;

				myChart.dispatchAction({
					type: 'showTip',
					seriesIndex: 0,
					dataIndex: monthIndex
				});
			}

		function convertNumberToLetter(num) {
			if (num <= 25) {
				return String.fromCharCode(65 + num); // 将数字转换为大写字母
			} else {
				var quotient = Math.floor(num / 26) - 1;
				var remainder = num % 26;
				return convertNumberToLetter(quotient) + String.fromCharCode(65 + remainder); // 递归计算每一位的字母
			}
		}
