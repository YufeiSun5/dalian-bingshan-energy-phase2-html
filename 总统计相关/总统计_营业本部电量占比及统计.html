<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var excel = layui.excel; //导出逻辑
		var $ = layui.$;
		
		// 全局变量存储数据
		var currentData = null;
		var all_sum_elec = 0;
		
		// 图表实例
		let myChart = null;
		let pieChart = null;
		
		var date = new Date().setDate(1);
		console.info(date);
		let currentDay = new Date();
		currentDay.setDate(1);

		// 日期
		laydate.render({
			type:"year",
			elem: '#ID-laydate-start-date-1',
			value: currentDay, // 设置初始日期
		});

		// ========= 生成空表结构 =========
		function generateEmptyBody() {
			const tbody = document.querySelector('#data-table tbody');
			tbody.innerHTML = '';
			
			// 先生成合计行
			const trTotal = document.createElement('tr');
			trTotal.className = 'total-elec-row';  // <-- 【新增】添加合计行class
			
			// 项目列（占2列）
			const tdTotalLabel = document.createElement('td');
			tdTotalLabel.className = 'left-header';
			tdTotalLabel.textContent = '合计电量';
			tdTotalLabel.colSpan = 2;
			trTotal.appendChild(tdTotalLabel);
			
			// 12个月份，每个月份占2列（只显示电量，不显示占比）
			for (let m = 1; m <= 12; m++) {
				const tdVal = document.createElement('td');
				tdVal.id = `total_m${m}_val`;
				tdVal.dataset.month = String(m);
				tdVal.colSpan = 2;
				trTotal.appendChild(tdVal);
			}
			
			// 合计列
			const tdSum = document.createElement('td');
			tdSum.id = 'total_sum';
			trTotal.appendChild(tdSum);
			
			const tdRatio = document.createElement('td');
			tdRatio.id = 'total_ratio';
			tdRatio.textContent = '100%';
			trTotal.appendChild(tdRatio);
			
			tbody.appendChild(trTotal);
			
			// 生成业务行（空的）
			const items = [
				{ key: 'elec_12', name: '原办公室精修（ISP）', isManualInput: false },
				{ key: 'elec_16', name: '电机二楼库区（ISP）', isManualInput: true },
				{ key: 'elec_17', name: '大棚照明（ISP）', isManualInput: true },
				{ key: 'elec_1', name: '委托焓差实验室营业本部', isManualInput: true }
			];
			
			items.forEach((item, index) => {
				const tr = document.createElement('tr');
				
				// 添加交错背景色class
				const bgClass = index % 2 === 0 ? 'unit-bg-1' : 'unit-bg-2';
				tr.className = bgClass;
				
				// 项目名称（占2列）
				const tdName = document.createElement('td');
				tdName.textContent = item.name;
				tdName.className = 'left-header';
				tdName.colSpan = 2;
				tr.appendChild(tdName);
				
				// 判断是否是人工录入（标红）
				const manualInputClass = item.isManualInput ? 'manual-input' : '';
				
				// 12个月份 * 2列（值 + 占比）
				for (let m = 1; m <= 12; m++) {
					const tdVal = document.createElement('td');
					const tdPct = document.createElement('td');
					tdVal.id = `${item.key}_m${m}_val`;
					tdPct.id = `${item.key}_m${m}_pct`;
					tdVal.dataset.month = String(m);
					tdPct.dataset.month = String(m);
					if (manualInputClass) {
						tdVal.className = manualInputClass;
					}
					tr.appendChild(tdVal);
					tr.appendChild(tdPct);
				}
				
				// 合计 / 占比（不标红）
				const tdTotal = document.createElement('td');
				tdTotal.id = `${item.key}_total`;
				tr.appendChild(tdTotal);
				
				const tdTotalPct = document.createElement('td');
				tdTotalPct.id = `${item.key}_total_pct`;
				tr.appendChild(tdTotalPct);
				
				tbody.appendChild(tr);
			});
		}
		
		// ========= 设置列交互效果 =========
		function setupColumnHover() {
			const table = document.getElementById('data-table');
			
			table.addEventListener('mouseover', e => {
				const cell = e.target;
				const month = cell.dataset.month;
				if (!month) return;
				table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
				table.querySelectorAll(`[data-month="${month}"]`).forEach(td => td.classList.add('col-hover'));
			});
			
			table.addEventListener('mouseleave', () => {
				table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
			});
			
			table.addEventListener('click', e => {
				const month = e.target.dataset.month;
				if (!month || !currentData) return;
				updateHeaderSummary(Number(month));
				updatePieChartForMonth(Number(month));
				showLineChartTooltipForMonth(Number(month));
			});
		}
		
		// ========= 更新汇总信息 =========
		function updateHeaderSummary(month) {
			if (!currentData || !currentData.data) return;
			
			const totalRow = currentData.data[currentData.data.length - 1];
			const monthVal = totalRow[`month${month}_elec`] || 0;
			
			const dom = document.getElementById('h2_west');
			if (monthVal === 0) {
				dom.innerHTML = `营业本部${month}月无用电数据`;
			} else {

		// ========= 填充数据 =========
		function fillData(data) {
			currentData = data;
			
			// 找到合计行
			const totalRow = data.data.find(row => row.elec_name === '合计');
			if (!totalRow) return;
			
			let totalSum = 0;
			let latestMonth = 0;
			
			// 填充合计行
			for (let m = 1; m <= 12; m++) {
				const val = totalRow[`month${m}_elec`] || 0;
				const ratio = totalRow[`month${m}_ratio`] || '';
				
				if (val > 0) {
					const tdVal = document.getElementById(`total_m${m}_val`);
					const tdPct = document.getElementById(`total_m${m}_pct`);
					if (tdVal) tdVal.textContent = Math.round(val).toLocaleString();
					if (tdPct) tdPct.textContent = ratio;
					totalSum += val;
					latestMonth = m;
				}
			}
			
			const totalSumCell = document.getElementById('total_sum');
			if (totalSumCell) {
				totalSumCell.textContent = Math.round(totalSum).toLocaleString();
			}
			
			// 填充业务行
			data.data.forEach(row => {
				const itemKey = getItemKey(row.elec_name);
				if (!itemKey) return;
				
				let itemSum = 0;
				for (let m = 1; m <= 12; m++) {
					const monthVal = row[`month${m}_elec`] || 0;
					const monthRatio = row[`month${m}_ratio`] || '';
					
					if (monthVal > 0) {
						itemSum += monthVal;
						const tdVal = document.getElementById(`${itemKey}_m${m}_val`);
						const tdPct = document.getElementById(`${itemKey}_m${m}_pct`);
						if (tdVal) tdVal.textContent = Math.round(monthVal).toLocaleString();
						if (tdPct) tdPct.textContent = monthRatio;
					}
				}
				
				const tdTotal = document.getElementById(`${itemKey}_total`);
				const tdTotalPct = document.getElementById(`${itemKey}_total_pct`);
				if (tdTotal && itemSum > 0) {
					tdTotal.textContent = Math.round(itemSum).toLocaleString();
				}
				if (tdTotalPct) {
					tdTotalPct.textContent = row.sum_ratio || '';
				}
			});
			
			if (latestMonth > 0) {
				updateHeaderSummary(latestMonth);
			} else {
				document.getElementById('h2_west').textContent = '营业本部电量占比及统计';
			}
			
			// 初始化和更新图表
			if (!myChart) {
				setTimeout(() => {
					if (initChart()) {
						updateChart();
					}
				}, 200);
			} else {
				updateChart();
			}
		}

	// 更新图表
	function updateChart() {
		if (!myChart || !pieChart) return;
		
		const lineSeries = [];
		const pieData = [];
		const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452'];
		
		itemConfig.forEach((item, index) => {
			// 读取12个月电量数据
			const data = [];
			for (let m = 1; m <= 12; m++) {
				const val = $(`#${item.key}_m${m}_val`).text().replace(/,/g, '');
				data.push(val ? Number(val) : null);
			}
			
			// 添加曲线图系列
			lineSeries.push({
				name: item.name,
				type: 'line',
				data: data,
				smooth: true,
				connectNulls: false,
				symbol: 'circle',
				symbolSize: 4,
				color: colors[index % colors.length]
			});
			
			// 计算饼图数据（总电量）- 使用四舍五入后的值
			const totalElec = $(`#${item.key}_total`).text().replace(/,/g, '');
			if (totalElec && Number(totalElec) > 0) {
				pieData.push({
					name: item.name,
					value: Math.round(Number(totalElec)),  // 四舍五入，与表格一致
					itemStyle: { color: colors[index % colors.length] }
				});
			}
		});
		
		// 更新曲线图
		myChart.setOption({
			series: lineSeries
		});
		
		// 更新饼图 - 手动计算百分比，确保与表格一致
		pieChart.setOption({
			tooltip: {
				formatter: function(params) {
					const total = pieData.reduce((sum, item) => sum + item.value, 0);
					const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
					return `${params.seriesName}<br/>${params.name}: ${params.value.toLocaleString()} (${percentage}%)`;
				}
			},
			series: [{
				data: pieData,
				label: { 
					formatter: function(params) {
						const total = pieData.reduce((sum, item) => sum + item.value, 0);
						const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
						return `${percentage}%`;
					}, 
					color: '#fff', 
					position: 'outside' 
				}
			}]
		});
	}

		$('#search').on('click', async function() {
			try {
				// ========================================================================
				// 【营业本部数据结构配置说明】
				// ========================================================================
				// 合计电量 = 系统采集数据 + 人工录入数据
				// ├── 原办公室精修（ISP） (110004) - 系统采集
				// ├── 电机二楼库区（ISP） (90001) - 人工录入（标红）
				// ├── 大棚照明（ISP） (90002) - 人工录入（标红）
				// └── 委托焓差实验室营业本部 (90003) - 人工录入（标红）
				//
				// 数据来源：
				// - 系统采集数据：sum_elec_group_by_day + data_all (今日实时)
				// - 人工录入数据：data_elec_temp_input (90001=电机二楼库区, 90002=大棚照明, 90003=委托焓差实验室)
				// - 公司总用电：(1,12,16,17,20,26,51,52) - 230003
				//
				// 计算逻辑：
				// 1. 查询系统采集的1个单元数据（原办公室精修）（历史+今日实时）
				// 2. 查询人工录入的3个单元数据（电机二楼库区、大棚照明、委托焓差实验室）
				// 3. 合计电量 = 系统采集数据 + 人工录入数据总和
				// 4. 占比 = 各单元电量 / 合计电量 * 100%
				// ========================================================================
				
				// ========= 重新查询前清空表格 =========
				generateEmptyBody();

				let compareDate = new Date(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate());
				
				// ========= 构建系统采集数据查询SQL（原办公室精修） =========
				var sql = ""
				+" with basedata as ( \n"
				// 原办公室精修（ISP）(110004)
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, '原办公室精修（ISP）' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (110004) \n";
				
				// 如果当前日期在查询范围内，添加今日实时数据
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					const todaySql = ""
					// 今日数据 - 原办公室精修
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       '原办公室精修（ISP）' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (110004) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (110004) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_110004 \n";
					
					sql += todaySql;
				}
				
				sql += ""
				+" ) \n"
				+" SELECT elec_name \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 1 THEN t.sum_elec ELSE null END) AS month1_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 2 THEN t.sum_elec ELSE null END) AS month2_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 3 THEN t.sum_elec ELSE null END) AS month3_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 4 THEN t.sum_elec ELSE null END) AS month4_elec \n"

				+" ,SUM(CASE WHEN MONTH(t.jDay) = 10 THEN t.sum_elec ELSE null END) AS month10_elec \n"

			+" ,SUM(CASE WHEN MONTH(t.jDay) = 12 THEN t.sum_elec ELSE null END) AS month12_elec \n"
			+" FROM basedata t \n"
			+" GROUP BY elec_name \n";
				
				console.info('系统采集数据SQL:', sql);
				
				// ========= 查询人工录入数据 =========
				const manualSql = ""
				// 电机二楼库区（ISP）(90001)
				+" SELECT '电机二楼库区（ISP）' as elec_name \n"
				+" ,SUM(CASE WHEN MONTH(date) = 1 THEN sum_elec ELSE null END) AS month1_elec \n"

				// 大棚照明（ISP）(90002)
				+" SELECT '大棚照明（ISP）' as elec_name \n"

				// 委托焓差实验室营业本部(90003)

			const [systemData, manualData] = await Promise.all([
				sendSQL(sql),
				sendSQL(manualSql)
			]);
			
			console.info('系统采集数据结果:', systemData);

			// 【修正】为每行数据计算 sum_elec（先四舍五入再累加）
			if (systemData.data) {
				systemData.data.forEach(row => {
					row.sum_elec = 0;
					for (let m = 1; m <= 12; m++) {
						const monthVal = row[`month${m}_elec`] || 0;
						if (monthVal > 0) {
							row.sum_elec += Math.round(monthVal);
						}
					}
				});
			}
			
			if (manualData.data) {
				manualData.data.forEach(row => {
					row.sum_elec = 0;
					for (let m = 1; m <= 12; m++) {
						const monthVal = row[`month${m}_elec`] || 0;
						if (monthVal > 0) {
							row.sum_elec += Math.round(monthVal);
						}
					}
				});
			}
			
			// ========= 合并数据 =========
			let mergedData = systemData.data || [];
			
			// 添加人工录入数据
			if (manualData.data && manualData.data.length > 0) {
				mergedData = mergedData.concat(manualData.data);
			}
				
			// ========= 计算合计行 - 使用四舍五入后的值相加 =========
			const totalRow = {
				elec_name: '合计',
				sum_elec: 0
			};
			
			for (let m = 1; m <= 12; m++) {
				let monthTotal = 0;
				mergedData.forEach(row => {
					if (row[`month${m}_elec`]) {
						// 先四舍五入再相加，确保合计与表格显示一致
						monthTotal += Math.round(row[`month${m}_elec`]);
					}
				});
				totalRow[`month${m}_elec`] = monthTotal > 0 ? monthTotal : null;
				if (monthTotal > 0) {
					totalRow.sum_elec += monthTotal;
				}
			}
				
				mergedData.push(totalRow);
				
				// ========= 计算占比 =========
				const finalData = { data: mergedData };
				
				// 循环拼接添加各项占比
				for(let i=1; i<=12; i++){
					if(totalRow[`month${i}_elec`] == null || totalRow[`month${i}_elec`] == undefined){
						continue;
					}
					// 先获取这块的合计
					let sum_elec = totalRow[`month${i}_elec`];
					for(let j=0; j<finalData.data.length; j++){
						if(finalData.data[j][`month${i}_elec`] != null && finalData.data[j][`month${i}_elec`] != undefined){
							finalData.data[j][`month${i}_ratio`] = (Math.round(finalData.data[j][`month${i}_elec`] * 10000/sum_elec) / 100)+"%";
						}
					}
				}
				
				// 获取最后的总和的合计
				let sum_elec = totalRow.sum_elec;
				for(let j=0; j<finalData.data.length-1; j++){
					if(finalData.data[j].sum_elec != null && finalData.data[j].sum_elec != undefined){
						finalData.data[j]["sum_ratio"] = (Math.round(finalData.data[j]["sum_elec"] * 10000/sum_elec) / 100)+"%";
					}
				}
				totalRow["sum_ratio"] = "100%";
				
				// ========= 获取公司总用电量（与动力实施课页面一致） =========
				let companySql = "with company_data as ( \n"
					+ "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, \n"
					+ "            CASE WHEN no IN (1,12,16,17,20,26,51,52) THEN sum_elec ELSE 0 END as main_elec, \n"
					+ "            CASE WHEN no = 230003 THEN sum_elec ELSE 0 END as bingshan_elec \n"
					+ "     from sum_elec_group_by_day \n"
					+ "     where date <= '"+enddate+"' \n"
					+ "     AND date >= '"+startdate+"' \n"
					+ "     and no in (1,12,16,17,20,26,51,52,230003) \n";
				
				// 如果当前日期在查询范围内，添加今日实时数据
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					companySql += "     union all \n"
					+ "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+ "            SUM(CASE WHEN `NO` IN (1,12,16,17,20,26,51,52) THEN `d_elec` ELSE 0 END) AS main_elec, \n"
					+ "            SUM(CASE WHEN `NO` = 230003 THEN `d_elec` ELSE 0 END) AS bingshan_elec \n"
					+ "     FROM ( \n"
					+ "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+ "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+ "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
					+ "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
					+ "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+ "             AND `NO` IN (1,12,16,17,20,26,51,52,230003) \n"
					+ "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+ "         GROUP BY `NO` \n"
					+ "     ) AS company_today \n";
				}
				
				companySql += " ) \n"
					+ " select (SUM(main_elec) - SUM(bingshan_elec)) as sum_elec \n"
					+ " from company_data \n";
				
				console.info('公司总用电量SQL:', companySql);
				var sum_elec_data = await sendSQL(companySql);
				all_sum_elec = sum_elec_data.data && sum_elec_data.data.length > 0 ? sum_elec_data.data[0].sum_elec : 0;
				
				console.info('公司总用电量:', all_sum_elec);
				
				// 填充数据到新表格
				fillData(finalData);
				
			} catch (err) {
				console.error('查询出错：', err);
			}
		});
