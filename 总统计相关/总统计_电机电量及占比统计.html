<!DOCTYPE html>
<!-- 文档类型声明，指定为HTML5标准。 -->
<html lang="zh-CN"> <!-- 根元素，lang属性指定页面主要语言为简体中文，有助于浏览器和搜索引擎优化。 -->
<head>
    <!-- head部分包含文档的元数据，是浏览器和搜索引擎读取的信息，不直接在页面显示。 -->

    <!-- === 外部资源依赖 === -->
    <link rel="stylesheet" href="../js/css/layui.css">
    <script src="../js/echarts.js"></script>

<style>
    /* CSS样式定义区域，用于控制页面的视觉表现。 */
    
    /* --- 全局与基础样式 --- */
    html, body {
        height: 100%; /* 确保html和body元素占满整个视口高度。 */
        margin: 0; /* 移除浏览器默认的外边距。 */
        padding: 0; /* 移除浏览器默认的内边距。 */
        font-family: 'PingFang SC', "Helvetica Neue", Helvetica, "microsoft yahei", arial, sans-serif; /* 定义字体栈，浏览器会依次尝试使用这些字体。 */
        background-color: #0f266c; /* 设置全局背景色，适用于深色主题的数据看板。 */
        color: #d0d2e0; /* 设置全局默认文字颜色。 */
        overflow: hidden; /* 隐藏根元素的滚动条，防止页面整体滚动，由内部容器管理滚动。 */
    }

    /* --- 主要布局容器 --- */
    .dashboard-container {
        display: flex; /* 启用Flexbox布局模型。 */
        flex-direction: column; /* 设置主轴为垂直方向，使子元素从上到下排列。 */
        height: 100%; /* 高度继承父元素（body）的100%。 */
        padding: 15px; /* 容器内边距，提供呼吸空间。 */
        box-sizing: border-box; /* 内边距和边框将包含在元素的总宽度和高度内，简化布局计算。 */
        gap: 15px; /* 设置flex子项之间的间距。 */
    }

    /* --- 卡片通用样式 --- */
    .card-block {
        background-color: #1d386f; /* 卡片背景色，与全局背景形成对比。 */
        border: 1px solid #2a6dc8; /* 卡片边框。 */
        border-radius: 5px; /* 圆角边框，使界面更柔和。 */
        display: flex; /* 卡片自身也作为flex容器。 */
        flex-direction: column; /* 卡片内部元素垂直排列。 */
    }
    
    /* --- 筛选栏 --- */
    .filter-bar {
        flex-shrink: 0; /* 防止该容器在空间不足时被压缩，保持其原始高度。 */
        flex-direction: row; /* 覆盖.card-block的设置，使其内部元素水平排列。 */
        justify-content: space-between; /* 沿主轴（水平）对齐：首个元素在起点，末尾元素在终点，其余元素平均分布。 */
        align-items: center; /* 沿交叉轴（垂直）对齐：所有子项居中。 */
    }

    /* --- 顶部居中大标题样式 --- */
    .top-bar-title {
        font-size: 24px; /* 标题字体大小。 */
        font-weight: bold; /* 字体加粗。 */
        color: #ffffff; /* 标题颜色。 */
        letter-spacing: 2px; /* 字符间距，增加可读性。 */
    }
    
    /* --- 筛选栏内Layui组件的样式覆盖 --- */
    .filter-bar .layui-form-item {
        display: flex; /* 确保表单项内部也使用flex布局。 */
        justify-content: center; /* 水平居中对齐 */

        margin-bottom: 0; /* 移除Layui表单项的默认下边距，以适应单行筛选栏。 */
        margin-top:5px;
    }

    .filter-bar .layui-form-label {
        color: #d0d2e0;

        width: auto; /* 标签宽度自适应内容。 */

    .filter-bar .layui-input {

    /* --- 主要内容区域 --- */
    .main-content {
        flex-grow: 1; /* 占据所有剩余的垂直空间。 */
        display: flex;
        flex-direction: column;
        min-height: 0; /* 关键属性：与flex-grow:1配合，确保在内容溢出时，容器可以正确计算高度并允许其子元素滚动。 */
        overflow-y: auto; /* 允许主容器滚动 */

    /* --- 卡片头部样式 --- */
    .card-header {

        padding: 10px 15px;
        border-bottom: 1px solid #2a6dc8;

        flex-shrink: 0; /* 高度固定，不被压缩。 */
        display: flex;
        align-items: center;
        justify-content: space-between; /* 左右两端对齐。 */
        gap: 20px;
    }

    .header-summary {
        font-size: 17px;
        font-weight: normal;
        color: #fff7ca; /* 高亮摘要文本颜色。 */
    }
    .header-unit {
        font-size: 14px;
        font-weight: normal;
        color: #b9d3f4;
        flex-shrink: 0; /* 防止单位文本换行。 */
    }

    /* --- 表格区域特定样式 --- */
    .table-container {
        overflow: visible; /* 移除滚动条，让内容自然显示 */
        padding: 10px;
        position: relative; /* 为可能的绝对定位子元素提供定位上下文。 */
        /* 自定义滚动条样式（Firefox）。 */
        scrollbar-width: thin;
        scrollbar-color: #2a6dc8 #18589b;
    }
    
    /* --- 表格及弹窗的详细样式，通过!important提升优先级以覆盖Layui默认样式 --- */
    .table-container .layui-table { border: 1px solid #3c8ce7 !important; background-color: transparent; }
    .table-container .layui-table th, .table-container .layui-table td { border: 1px solid #3c8ce7 !important; background-color: #1e4e89 !important; color: #ffffff; font-weight: bold; text-align: center; vertical-align: middle; padding: 2px 3px; font-size: 11px; min-width: 42px; line-height: 1.4; transition: background-color 0.2s ease-in-out; }
    .table-container .layui-table th[data-month], .table-container .layui-table td[data-month] { cursor: pointer; } /* 为带月份的列添加鼠标指针，提示可点击。 */
    .table-container .layui-table th { font-size: 12px; background-color: #0c6ed3 !important; font-weight: bold; }
    .table-container .layui-table .left-header { background-color: #0c6ed3 !important; min-width: 58px; font-weight: bold; }
    /* 顶部三行的背景色 - 交错显示 */
    .table-container .layui-table tr.total-elec-row td:not(.left-header) { background-color: #143a6b !important; color: #ffffff !important; }
    .table-container .layui-table .layui-bg-yellow td:not(.left-header) { background-color: #ffff00 !important; color: #000000 !important; }
    .table-container .layui-table .layui-bg-green td:not(.left-header) { background-color: #0f4470 !important; color: #ffffff !important; }
    /* 数据行交错背景色 - 与机加工一致 */
    .table-container .layui-table tr.unit-bg-1 td:not(.left-header) { background-color: #1e4e89 !important; color: #ffffff !important; }
    .table-container .layui-table tr.unit-bg-2 td:not(.left-header) { background-color: #143a6b !important; color: #ffffff !important; }
    /* 所有左侧表头统一背景色 */
    .table-container .layui-table .layui-bg-yellow td.left-header, .table-container .layui-table .layui-bg-green td.left-header, .table-container .layui-table tr.unit-bg-1 td.left-header, .table-container .layui-table tr.unit-bg-2 td.left-header, .table-container .layui-table tr.total-elec-row td.left-header { background-color: #0c6ed3 !important; color: #ffffff !important; font-weight: bold; }
    .table-container .layui-table th.col-hover, .table-container .layui-table td.col-hover, .table-container .layui-table .layui-bg-yellow td.col-hover, .table-container .layui-table .layui-bg-green td.col-hover, .table-container .layui-table tr.unit-bg-1 td.col-hover, .table-container .layui-table tr.unit-bg-2 td.col-hover, .table-container .layui-table .total-elec-row td.col-hover { background-color: rgb(112, 167, 255) !important; } /* 列悬浮高亮样式。 */
    .layui-table tbody tr:hover { background-color: transparent !important; } /* 禁用行的悬浮效果，以列高亮为主。 */
    /* 自定义滚动条样式（WebKit/Blink内核浏览器，如Chrome, Safari）。 */
    .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #2a6dc8; border-radius: 4px; }
        .table-container::-webkit-scrollbar-track { background-color: #18589b; }

    /* ========== 图表区域样式 ========== */
    .charts-container {
        display: flex;
        gap: 15px;
        min-height: 500px;
        margin-top: 10px;
    }
    
    .chart-card {
        min-height: 500px;
    }
    
    .line-chart-wrapper {
        flex: 3;
    }
    
    .pie-chart-wrapper {
        flex: 2;
    }
    
    .chart-container {
        flex-grow: 1;
        padding: 10px;
        min-height: 450px;
    }
    
    
    /* 防止卡片被压缩 */
    .main-content .card-block {
        flex-shrink: 0;
    }
    
    /* 主容器可滚动 */
    .main-content {
        overflow-y: auto;
        gap: 15px;
    }
    
    /* ========== 滚动条美化 - 统一样式 ========== */
    .table-container::-webkit-scrollbar,
    .main-content::-webkit-scrollbar,
    .chart-container::-webkit-scrollbar,
    body::-webkit-scrollbar,
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    
    .table-container::-webkit-scrollbar-thumb,
    .main-content::-webkit-scrollbar-thumb,
    .chart-container::-webkit-scrollbar-thumb,
    body::-webkit-scrollbar-thumb,
    ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #3c8ce7 0%, #2a6dc8 50%, #1e5aa8 100%);
        border-radius: 6px;
        border: 1px solid #1d386f;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    
    .table-container::-webkit-scrollbar-thumb:hover,
    .main-content::-webkit-scrollbar-thumb:hover,
    .chart-container::-webkit-scrollbar-thumb:hover,
    body::-webkit-scrollbar-thumb:hover,
    ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #4a9aff 0%, #3c8ce7 50%, #2a6dc8 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
    }
    
    .table-container::-webkit-scrollbar-track,
    .main-content::-webkit-scrollbar-track,
    .chart-container::-webkit-scrollbar-track,
    body::-webkit-scrollbar-track,
    ::-webkit-scrollbar-track {
        background: linear-gradient(90deg, #0f266c 0%, #18589b 50%, #1d386f 100%);
        border-radius: 6px;
        border: 1px solid #0a1d4a;
    }
    
    .table-container::-webkit-scrollbar-corner,
    .main-content::-webkit-scrollbar-corner,
    .chart-container::-webkit-scrollbar-corner,
    body::-webkit-scrollbar-corner,
    ::-webkit-scrollbar-corner {
        background-color: #1d386f;
    }

    /* --- 人工录入数据标红样式 --- */
    .table-container .layui-table td.manual-input-cell,
    .table-container .layui-table .layui-bg-green td.manual-input-cell,
    .table-container .layui-table tr.unit-bg-1 td.manual-input-cell,
    .table-container .layui-table tr.unit-bg-2 td.manual-input-cell,
    .table-container .layui-table .layui-bg-yellow td.manual-input-cell,
    .table-container .layui-table .total-elec-row td.manual-input-cell {
        color: #ff4d4f !important; /* 红色 */
    }

    /* --- 单台数据加粗样式 --- */
    .table-container .layui-table td.bold-cell,
    .table-container .layui-table .layui-bg-green td.bold-cell,
    .table-container .layui-table tr.unit-bg-1 td.bold-cell,
    .table-container .layui-table tr.unit-bg-2 td.bold-cell,
    .table-container .layui-table .layui-bg-yellow td.bold-cell,
    .table-container .layui-table .total-elec-row td.bold-cell {
        font-weight: bold !important;
    }
</style>
</head>
<body>

<!-- 页面主体内容容器 -->
<div class="dashboard-container">
    <!-- 顶部筛选/操作栏 -->
    <div class="card-block filter-bar">
        <!-- 左侧筛选区 -->
        <div class="layui-form" lay-filter="filter-form-left">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">年份</label>
                    <div class="layui-input-inline">
                        <!-- 年份选择输入框，将由Layui的laydate模块渲染成日期选择器。 -->
                        <input type="text" id="year-selector" class="layui-input" placeholder="请选择年份">
                    </div>
                </div>
            </div>
        </div>

        <!-- 中部标题 -->
        <div class="top-bar-title">电机电量及占比统计</div>

        <!-- 右侧操作按钮区 -->
        <div class="layui-form" lay-filter="filter-form-right">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <!-- 查询按钮 -->
                    <button id="search-btn" class="layui-btn">
                        <i class="layui-icon layui-icon-search"></i>
                        <span>查询</span>
                    </button>
                    <!-- 导出按钮 -->
                    <button id="export-btn" class="layui-btn layui-bg-orange">
                        <span>导出</span>
                        <i class="layui-icon layui-icon-print"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主要数据展示区 -->
    <div class="main-content">
        <div class="card-block table-card">
            <!-- 卡片头部，包含动态摘要和单位信息 -->
            <div class="card-header">
                <div class="header-summary">
                    <!-- 此span将由JavaScript动态填充月度汇总信息。 -->
                    <span id="header-summary-text"></span>
                </div>
                <div class="header-unit">
                    <span>电能单位（千瓦时）</span>
                </div>
            </div>
            <!-- 表格容器 -->
            <div class="table-container">
                <!-- 数据表格，其内容将由JavaScript动态生成。 -->
                <table class="layui-table" id="data-table">
                    <thead>
                        <tr>
                            <th colspan="2">项目</th>
                            <!-- 表头月份，colspan="2"表示每个月占两列（值和占比）。data-month属性用于JS事件处理。 -->
                            <th colspan="2" data-month="1">1月份</th>
                            <th colspan="2" data-month="2">2月份</th>
                            <th colspan="2" data-month="3">3月份</th>
                            <th colspan="2" data-month="4">4月份</th>
                            <th colspan="2" data-month="5">5月份</th>
                            <th colspan="2" data-month="6">6月份</th>
                            <th colspan="2" data-month="7">7月份</th>
                            <th colspan="2" data-month="8">8月份</th>
                            <th colspan="2" data-month="9">9月份</th>
                            <th colspan="2" data-month="10">10月份</th>
                            <th colspan="2" data-month="11">11月份</th>
                            <th colspan="2" data-month="12">12月份</th>
                            <th>合计</th>
                            <th>占比</th>
                        </tr>
                    </thead>
                    <!-- 表格主体，初始为空，由JS填充。 -->
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 图表区域 - 左右布局 -->
        <div class="charts-container">
            <!-- 左侧曲线图 -->
            <div class="card-block chart-card line-chart-wrapper">
                <div class="card-header">
                    <div class="header-summary">
                        <span>各单元月度单台用电趋势</span>
                    </div>
                    <div class="header-unit">
                        <span>单台电能单位（千瓦时/台）</span>
                    </div>
                </div>
                <div class="chart-container" id="trend-chart"></div>
            </div>
            
            <!-- 右侧饼图 -->
            <div class="card-block chart-card pie-chart-wrapper">
                <div class="card-header">
                    <div class="header-summary">
                        <span id="pie-chart-title">各单元用电占比</span>
                    </div>
                    <div class="header-unit">
                        <span>电量占比统计</span>

                <div class="chart-container" id="pie-chart"></div>

</div>

<!-- 引入Layui的JavaScript文件，必须在body闭合标签前，以确保DOM加载完毕。 -->
<script src="../js/layui.js"></script>
<script>
    // 使用layui.use来加载所需模块，并执行回调函数。
    layui.use(['laydate', 'form', 'layer'], function(){
        // --- 1. 模块与变量初始化 ---
        const laydate = layui.laydate; // 日期时间选择模块
        const form = layui.form;       // 表单模块，用于表单渲染和事件监听
        const layer = layui.layer;     // 弹层模块
        const $ = layui.jquery;        // jQuery库，Layui内置
        let globalData; // 全局变量，用于缓存从API获取并处理后的数据，避免重复请求。
        
        // 图表实例
        let myChart = null;
        let pieChart = null;

        // --- 2. 核心配置 ---
        
        // ===== 【数据来源配置】 =====
        // 配置每个单元的数据来源：true = 人工录入（标红），false = MES采集（正常显示）
        // 细化到每个单元的电量和产量
        const dataSourceConfig = {
            dingzhuanzi: { electricity: true, production: true },  // 定转子单元：电量和产量都是人工录入
            jinqi: { electricity: true, production: true },        // 浸漆单元：电量和产量都是人工录入
            raoxianA: { electricity: true, production: true },     // 绕线A单元：电量和产量都是人工录入
            raoxianB: { electricity: true, production: true }      // 绕线B单元：电量和产量都是人工录入
        };
        // 注：根据实际情况，可以将某个单元改为 false（MES采集）
        // 例如：dingzhuanzi: { electricity: false, production: false } 表示定转子单元的电量和产量都是MES采集
        // ===== 【配置结束】 =====
        
        // 【关键配置】定义了所有需要统计的业务单元。
        // 这是数据驱动UI的核心，增删改此处的对象，将自动反映在UI和数据处理逻辑中。
        // 如何修改: 若需添加新单元，只需在此数组中增加一个对象，例如 { key: 'zongzhuang', name: '总装单元' }
        // 注意：新增单元后，需要同时在 dataSourceConfig 和 noToKeyMap 中添加对应配置
        const itemConfig = [
            { key: 'dingzhuanzi', name: '定转子单元' },
            { key: 'jinqi',       name: '浸漆单元' },
            { key: 'raoxianA',    name: '绕线A单元' },
            { key: 'raoxianB',    name: '绕线B单元' }
        ];
        
        // 从配置中提取所有key，方便后续遍历和数据索引。
        const groupKeys = itemConfig.map(item => item.key);
        
        // --- 3. 函数定义 ---

        /**
         * @function generateDynamicContent
         * @description 根据 itemConfig 动态生成表格主体 (tbody) 的DOM结构。
         * 实现了配置与视图的解耦，提高了代码的可维护性。
         */
        function generateDynamicContent() {
            const tableBody = $('#data-table tbody'); // 缓存表格主体jQuery对象
            
            // 清空旧内容，为重绘做准备
            tableBody.empty();

            // 使用模板字符串生成固定的合计行
            tableBody.html(`
                <tr class="total-elec-row">
                    <td colspan="2" class="left-header">合计电量及占比</td>
                    <!-- Array.from + map/join: 高效生成12个月份的单元格HTML字符串 -->
                    ${Array.from({length: 12}, (_, i) => `<td colspan="2" id="total_elec_m${i+1}" class="data-cell" data-month="${i+1}"></td>`).join('')}
                    <td id="total_elec_total" class="data-cell"></td>
                    <td id="total_elec_total_pct" class="data-cell"></td>
                </tr>
                <tr class="layui-bg-yellow">
                    <td colspan="2" class="left-header">辅助<br>电量及占比</td>
                    ${Array.from({length: 12}, (_, i) => `<td id="aux_total_m${i+1}_val" class="data-cell" data-month="${i+1}"></td><td id="aux_total_m${i+1}_pct" class="data-cell" data-month="${i+1}"></td>`).join('')}
                    <td id="aux_total_total" class="data-cell"></td>

                    ${Array.from({length: 12}, (_, i) => `<td id="prod_total_m${i+1}_val" class="data-cell" data-month="${i+1}"></td><td id="prod_total_m${i+1}_pct" class="data-cell" data-month="${i+1}"></td>`).join('')}

            // 遍历配置项，为每个业务单元生成表格行和表单项

                let tableRows = `

                        <td class="left-header">电量</td>
                        ${Array.from({length: 12}, (_, i) => `<td id="${item.key}_dianliang_m${i+1}_val" class="data-cell" data-month="${i+1}"></td><td id="${item.key}_dianliang_m${i+1}_pct" class="data-cell" data-month="${i+1}"></td>`).join('')}
                        <td id="${item.key}_dianliang_total" class="data-cell"></td>
                        <td id="${item.key}_dianliang_total_pct" class="data-cell"></td>
                    </tr>
                    <tr class="${bgClass} dynamic-row">
                        <td class="left-header">产量</td>
                        ${Array.from({length: 12}, (_, i) => `<td colspan="2" id="${item.key}_chanliang_m${i+1}" class="data-cell" data-month="${i+1}"></td>`).join('')}
                        <td colspan="2" id="${item.key}_chanliang_total" class="data-cell"></td>
                    </tr>
                    <tr class="${bgClass} dynamic-row">
                        <td class="left-header">单台</td>
                        ${Array.from({length: 12}, (_, i) => `<td colspan="2" id="${item.key}_dantai_m${i+1}_val" class="data-cell" data-month="${i+1}"></td>`).join('')}
                        <td colspan="2" id="${item.key}_dantai_total_val" class="data-cell"></td>

                tableBody.append(tableRows); // 追加到tbody
            });
        }

        /**
         * @async
         * @function sendSQL
         * @param {string} strsql - 要执行的SQL查询语句。
         * @returns {Promise<object>} - 返回一个Promise，resolve时为API的响应数据，通常是 { data: [...] } 格式。
         * @description 封装了fetch API，用于向后端发送SQL查询请求。包含错误处理和加载状态。
         * 如何修改: 后端API端点 'http://192.168.10.103:8004/api/sql/run-sql' 是硬编码的，
         * 在生产环境中应配置为可变参数。
         */
        async function sendSQL(strsql) {
            try {
                const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ sql: strsql })
                });
                if (!res.ok) { // 检查HTTP状态码是否在200-299范围
                    layer.msg(`数据加载失败: ${res.statusText}`);
                    return { data: [] }; // 返回空数据结构以防后续代码崩溃
                }
                return await res.json(); // 解析响应体为JSON
            } catch (err) { // 捕获网络错误或JSON解析错误
                console.error('sendSQL Error:', err); // 在控制台记录详细错误信息，便于调试
                layer.msg('数据加载失败，请检查网络或联系管理员。');
                return { data: [] };
            }
        }

        /**
         * @async
         * @function fetchAndProcessData
         * @param {string} year - 需要查询的年份。
         * @returns {Promise<object>} - 返回包含处理后部门数据和公司总计数据的对象。
         * @description 负责构建SQL查询，并行获取数据，并将返回的扁平数据结构转换为更适合前端渲染的嵌套对象结构。
         */
        async function fetchAndProcessData(year) {
            const startdate = year + "-01-01";
            const enddate = year + "-12-31";
            
            let now = new Date();
            let compareDate = new Date(now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate());
            
            // ========================================================================
            // 【电机数据结构配置说明】
            // ========================================================================
            // 合计电量 (110007+18+19+220004+220005+220006+240007+240008+240005+240006+120017+480004+480005+480006)
            // ├── 辅助合计 (差值计算 = 合计电量 - 生产合计)
            // └── 生产合计 (人工录入数据，从 data_elec_temp_input 查询)
            //     ├── 定转子单元 (20001) - 电量 + 产量
            //     ├── 浸漆单元 (20002) - 电量 + 产量
            //     ├── 绕线A单元 (20003) - 电量 + 产量
            //     └── 绕线B单元 (20004) - 电量 + 产量
            //
            // 数据来源：
            // - 合计电量：sum_elec_group_by_day + data_all (今日实时)
            // - 生产合计：data_elec_temp_input (人工录入表)
            // - 公司总用电：(1,12,16,17,20,26,51,52) - 230003
            // ========================================================================
            
            // ========= 1. 查询合计电量（从sum_elec_group_by_day和data_all） =========
            // 合计电量包含的NO: 110007,18,19,220004,220005,220006,240007,240008,240005,240006,120017,480004,480005,480006
            let totalElecSql = "with total_data as ( \n"
                + "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, sum_elec \n"
                + "     from sum_elec_group_by_day \n"
                + "     where date <= '" + enddate + "' \n"
                + "     AND date >= '" + startdate + "' \n"
                + "     and no in (110007,18,19,220004,220005,220006,240007,240008,240005,240006,120017,480004,480005,480006) \n";
            
            // 如果当前日期在查询范围内，添加今日实时数据
            if (new Date(startdate).setHours(7, 0, 0, 0) <= compareDate && compareDate <= new Date(enddate).setHours(7, 0, 0, 0)) {
                totalElecSql += "     union all \n"
                    + "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
                    + "            SUM(`d_elec`) AS sum_elec \n"
                    + "     FROM ( \n"
                    + "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
                    + "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
                    + "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
                    + "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
                    + "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
                    + "             AND `NO` IN (110007,18,19,220004,220005,220006,240007,240008,240005,240006,120017,480004,480005,480006) \n"
                    + "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
                    + "         GROUP BY `NO` \n"
                    + "     ) AS total_today \n";
            }
            
            totalElecSql += " ) \n"
                + " SELECT \n"
                + " SUM(CASE WHEN MONTH(jDay) = 1 THEN sum_elec ELSE null END) AS month1_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 2 THEN sum_elec ELSE null END) AS month2_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 3 THEN sum_elec ELSE null END) AS month3_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 4 THEN sum_elec ELSE null END) AS month4_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 5 THEN sum_elec ELSE null END) AS month5_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 6 THEN sum_elec ELSE null END) AS month6_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 7 THEN sum_elec ELSE null END) AS month7_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 8 THEN sum_elec ELSE null END) AS month8_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 9 THEN sum_elec ELSE null END) AS month9_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 10 THEN sum_elec ELSE null END) AS month10_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 11 THEN sum_elec ELSE null END) AS month11_elec, \n"
                + " SUM(CASE WHEN MONTH(jDay) = 12 THEN sum_elec ELSE null END) AS month12_elec \n"
                + " from total_data \n";
            
            // ========= 2. 查询各单元人工录入数据（从data_elec_temp_input） =========
            // 定转子单元: 20001, 浸漆单元: 20002, 绕线A单元: 20003, 绕线B单元: 20004
            const manualInputSql = `
                SELECT 
                    no,
                    SUM(CASE WHEN MONTH(date) = 1 THEN sum_elec ELSE null END) AS month1_elec,
                    SUM(CASE WHEN MONTH(date) = 2 THEN sum_elec ELSE null END) AS month2_elec,
                    SUM(CASE WHEN MONTH(date) = 3 THEN sum_elec ELSE null END) AS month3_elec,
                    SUM(CASE WHEN MONTH(date) = 4 THEN sum_elec ELSE null END) AS month4_elec,
                    SUM(CASE WHEN MONTH(date) = 5 THEN sum_elec ELSE null END) AS month5_elec,
                    SUM(CASE WHEN MONTH(date) = 6 THEN sum_elec ELSE null END) AS month6_elec,
                    SUM(CASE WHEN MONTH(date) = 7 THEN sum_elec ELSE null END) AS month7_elec,
                    SUM(CASE WHEN MONTH(date) = 8 THEN sum_elec ELSE null END) AS month8_elec,
                    SUM(CASE WHEN MONTH(date) = 9 THEN sum_elec ELSE null END) AS month9_elec,
                    SUM(CASE WHEN MONTH(date) = 10 THEN sum_elec ELSE null END) AS month10_elec,
                    SUM(CASE WHEN MONTH(date) = 11 THEN sum_elec ELSE null END) AS month11_elec,
                    SUM(CASE WHEN MONTH(date) = 12 THEN sum_elec ELSE null END) AS month12_elec,
                    SUM(CASE WHEN MONTH(date) = 1 THEN production ELSE null END) AS month1_prod,
                    SUM(CASE WHEN MONTH(date) = 2 THEN production ELSE null END) AS month2_prod,
                    SUM(CASE WHEN MONTH(date) = 3 THEN production ELSE null END) AS month3_prod,
                    SUM(CASE WHEN MONTH(date) = 4 THEN production ELSE null END) AS month4_prod,
                    SUM(CASE WHEN MONTH(date) = 5 THEN production ELSE null END) AS month5_prod,
                    SUM(CASE WHEN MONTH(date) = 6 THEN production ELSE null END) AS month6_prod,
                    SUM(CASE WHEN MONTH(date) = 7 THEN production ELSE null END) AS month7_prod,
                    SUM(CASE WHEN MONTH(date) = 8 THEN production ELSE null END) AS month8_prod,
                    SUM(CASE WHEN MONTH(date) = 9 THEN production ELSE null END) AS month9_prod,
                    SUM(CASE WHEN MONTH(date) = 10 THEN production ELSE null END) AS month10_prod,
                    SUM(CASE WHEN MONTH(date) = 11 THEN production ELSE null END) AS month11_prod,
                    SUM(CASE WHEN MONTH(date) = 12 THEN production ELSE null END) AS month12_prod,
                    SUM(production) as sum_prod
                FROM data_elec_temp_input
                WHERE no IN (20001, 20002, 20003, 20004)
                    AND date >= '${startdate}'
                    AND date <= '${enddate}'
                GROUP BY no
            `.trim();
            
            // ========= 3. 查询公司总用电量（参考组装二课页面逻辑） =========
            let companySql = "with company_data as ( \n"
                + "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, \n"
                + "            CASE WHEN no IN (1,12,16,17,20,26,51,52) THEN sum_elec ELSE 0 END as main_elec, \n"
                + "            CASE WHEN no = 230003 THEN sum_elec ELSE 0 END as bingshan_elec \n"
                + "     from sum_elec_group_by_day \n"
                + "     where date <= '" + enddate + "' \n"
                + "     AND date >= '" + startdate + "' \n"
                + "     and no in (1,12,16,17,20,26,51,52,230003) \n";
            
            // 如果当前日期在查询范围内，添加今日实时数据
            if (new Date(startdate).setHours(7, 0, 0, 0) <= compareDate && compareDate <= new Date(enddate).setHours(7, 0, 0, 0)) {
                companySql += "     union all \n"
                    + "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
                    + "            SUM(CASE WHEN `NO` IN (1,12,16,17,20,26,51,52) THEN `d_elec` ELSE 0 END) AS main_elec, \n"
                    + "            SUM(CASE WHEN `NO` = 230003 THEN `d_elec` ELSE 0 END) AS bingshan_elec \n"
                    + "     FROM ( \n"
                    + "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
                    + "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
                    + "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
                    + "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
                    + "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
                    + "             AND `NO` IN (1,12,16,17,20,26,51,52,230003) \n"
                    + "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
                    + "         GROUP BY `NO` \n"
                    + "     ) AS company_today \n";
            }
            
            companySql += " ) \n"
                + " select \n"
                + "     MONTH(jDay) as month, \n"
                + "     SUM(main_elec) - SUM(bingshan_elec) as company_total_elec \n"
                + " from company_data \n"
                + " GROUP BY MONTH(jDay) \n";
            
            // ========= 4. 并行执行所有查询 =========
            const [totalElecResult, manualInputResult, companyTotalResult] = await Promise.all([
                sendSQL(totalElecSql),
                sendSQL(manualInputSql),
                sendSQL(companySql)
            ]);
            
            console.info('合计电量查询结果:', totalElecResult);
            console.info('人工录入数据查询结果:', manualInputResult);
            console.info('公司总用电量查询结果:', companyTotalResult);
            
            // ========= 5. 数据转换和处理 =========
            const transformedData = { aux_total: {}, groups: {} };
            
            // 初始化各单元数据结构
            groupKeys.forEach(key => {
                transformedData.groups[key] = { electricity: {}, production: {} };
            });
            
            // 处理合计电量数据
            const totalElecRow = totalElecResult.data && totalElecResult.data.length > 0 ? totalElecResult.data[0] : {};
            const totalElecByMonth = {};
            for (let m = 1; m <= 12; m++) {
                totalElecByMonth[m] = totalElecRow[`month${m}_elec`] || 0;
            }
            
            // 处理各单元人工录入数据
            const manualData = manualInputResult.data || [];
            const noToKeyMap = {
                20001: 'dingzhuanzi',
                20002: 'jinqi',
                20003: 'raoxianA',
                20004: 'raoxianB'
            };
            
            manualData.forEach(row => {
                const unitKey = noToKeyMap[row.no];
                if (unitKey) {
                    for (let m = 1; m <= 12; m++) {
                        transformedData.groups[unitKey].electricity[m] = row[`month${m}_elec`] || 0;
                        transformedData.groups[unitKey].production[m] = row[`month${m}_prod`] || 0;
                    }
                }
            });
            
            // 计算生产合计和辅助合计
            for (let m = 1; m <= 12; m++) {
                let prodTotal = 0;
                groupKeys.forEach(key => {
                    prodTotal += transformedData.groups[key].electricity[m] || 0;
                });
                
                const auxTotal = totalElecByMonth[m] - prodTotal;
                transformedData.aux_total[m] = auxTotal > 0 ? auxTotal : 0;
            }
            
            // 处理公司总用电量
            const companyTotals = {};
            const companyRawData = companyTotalResult.data || [];
            companyRawData.forEach(row => {
                companyTotals[row.month] = row.company_total_elec || 0;
            });
            
            return { departmentData: transformedData, companyTotals: companyTotals };
        }

        /**
         * @async
         * @function reloadData
         * @description 用户触发数据刷新的入口函数。负责协调UI加载状态、数据获取、数据渲染的整个流程。
         */
        async function reloadData() {
            const loading = layer.load(1, { shade: [0.1, '#fff'] }); // 显示加载动画
            const year = $('#year-selector').val();
            try {
                globalData = await fetchAndProcessData(year); // 获取并处理数据
                updateDashboard(globalData); // 使用新数据更新UI
            } catch (e) {
                console.error("Failed to load or process data", e);
                layer.msg("数据处理失败");
            } finally {
                layer.close(loading); // 确保加载动画总是被关闭
            }
        }

        /**
         * @function updateHeaderSummaryForMonth
         * @param {number|string} month - 要显示摘要的月份。
         * @description 根据全局数据，计算并更新卡片头部的单月汇总信息。
         */
        function updateHeaderSummaryForMonth(month) {
            if (!globalData || !globalData.departmentData || !globalData.companyTotals) {
                return;
            }

            const mockData = globalData.departmentData;
            const companyTotals = globalData.companyTotals;

            // 计算指定月份的电机总用电量
            let monthElec = mockData.aux_total[month] || 0;
            groupKeys.forEach(key => {
                // 可选链操作符(?.)，安全地访问可能不存在的嵌套属性
                monthElec += mockData.groups[key]?.electricity[month] || 0;
            });

            if (monthElec === 0) {
                $('#header-summary-text').html(`电机<span style="color: red;">${month}</span>月份无用电数据`);
                return;
            }

            // 计算占公司总电量的百分比
            const companyTotalForMonth = companyTotals[month] || 0;
            const percentageOfCompanyTotal = companyTotalForMonth > 0
                ? (monthElec / companyTotalForMonth * 100).toFixed(2) // toFixed进行四舍五入并格式化为字符串
                : '0.00';

            // 使用模板字符串和toLocaleString()格式化输出（电量保留0位小数）
            const summaryHtml = `电机<span style="color: red;">${month}</span>月份用电电量<span style="color: red;">${Math.round(monthElec).toLocaleString()}</span>千瓦时，占公司总电量比<span style="color: red;">${percentageOfCompanyTotal}%</span>`;
            $('#header-summary-text').html(summaryHtml);
        }

        /**
         * @function updateDashboard
         * @param {object} data - 包含departmentData和companyTotals的已处理数据对象。
         * @description 核心渲染函数。遍历数据，执行计算，并使用jQuery将结果填充到表格的各个单元格中。
         */
        function updateDashboard(data) {
            // 清空数据和样式类
            $('.data-cell').html('').removeClass('manual-input-cell bold-cell');
            $('#header-summary-text').text('');

            const mockData = data.departmentData;
            const companyTotals = data.companyTotals;

            // 初始化年度总计对象
            const totals = {
                grand_total: 0,
                aux_total: 0,
                prod_total: 0
            };
            groupKeys.forEach(key => {
                totals[`${key}_elec_total`] = 0;
                totals[`${key}_prod_total`] = 0;
            });

            // 遍历12个月，进行月度计算和渲染
            for (let m = 1; m <= 12; m++) {
                let month_prod_total = 0;
                groupKeys.forEach(key => {
                    month_prod_total += mockData.groups[key]?.electricity[m] || 0;
                });

                const month_aux_total = mockData.aux_total[m] || 0;
                const month_grand_total = month_prod_total + month_aux_total;

                if (month_grand_total > 0) {
                    // 四舍五入后的值，用于显示和百分比计算
                    const rounded_grand_total = Math.round(month_grand_total);
                    const rounded_aux_total = Math.round(month_aux_total);
                    const rounded_prod_total = Math.round(month_prod_total);
                    
                    // 【修正】先四舍五入，再累加到年度总计
                    totals.prod_total += rounded_prod_total;
                    totals.aux_total += rounded_aux_total;
                    totals.grand_total += rounded_grand_total;
                    
                    // 填充月度合计行（电量保留0位小数）
                    $('#total_elec_m' + m).text(rounded_grand_total.toLocaleString());
                    $('#aux_total_m' + m + '_val').text(rounded_aux_total.toLocaleString());
                    $('#aux_total_m' + m + '_pct').text((rounded_aux_total / rounded_grand_total * 100).toFixed(2) + '%');
                    $('#prod_total_m' + m + '_val').text(rounded_prod_total.toLocaleString());
                    $('#prod_total_m' + m + '_pct').text((rounded_prod_total / rounded_grand_total * 100).toFixed(2) + '%');

                    // 填充各业务单元的月度数据
                    groupKeys.forEach(key => {
                        const elec_val = mockData.groups[key]?.electricity[m] || 0;
                        const prod_val = mockData.groups[key]?.production[m] || 0;
                        const per_unit_val = prod_val > 0 ? (elec_val / prod_val) : 0;
                        
                        // 四舍五入后的值，用于显示和百分比计算
                        const rounded_elec_val = Math.round(elec_val);
                        const rounded_prod_val = Math.round(prod_val);
                        const elec_pct = rounded_prod_total > 0 ? (rounded_elec_val / rounded_prod_total * 100) : 0;

                        // 电量单元格（电量保留0位小数）
                        const elecValCell = $(`#${key}_dianliang_m${m}_val`);
                        const elecPctCell = $(`#${key}_dianliang_m${m}_pct`);
                        elecValCell.text(rounded_elec_val.toLocaleString());
                        elecPctCell.text(elec_pct.toFixed(2) + '%');
                        
                        // 根据配置标红电量值（人工录入），百分比不标红（计算得出）
                        if (dataSourceConfig[key]?.electricity) {
                            elecValCell.addClass('manual-input-cell');
                        }
                        
                        // 产量单元格（产量保留0位小数）
                        const prodCell = $(`#${key}_chanliang_m${m}`);
                        prodCell.text(rounded_prod_val.toLocaleString());
                        
                        // 根据配置标红产量（人工录入）
                        if (dataSourceConfig[key]?.production) {
                            prodCell.addClass('manual-input-cell');
                        }
                        
                        // 单台单元格（加粗，保留2位小数）
                        const unitValCell = $(`#${key}_dantai_m${m}_val`);
                        unitValCell.text(per_unit_val.toFixed(2));
                        unitValCell.addClass('bold-cell');
                        
                        // 【修正】先四舍五入，再累加
                        totals[`${key}_elec_total`] += rounded_elec_val;
                        totals[`${key}_prod_total`] += rounded_prod_val;
                    });
                }
            }

            // 渲染年度总计列（电量保留0位小数）
            if (totals.grand_total > 0) {
                // 【修正】totals中已经是四舍五入后累加的值，直接使用
                $('#total_elec_total').text(totals.grand_total.toLocaleString());
                $('#total_elec_total_pct').text('100.00%');
                $('#aux_total_total').text(totals.aux_total.toLocaleString());
                $('#aux_total_total_pct').text((totals.aux_total / totals.grand_total * 100).toFixed(2) + '%');
                $('#prod_total_total').text(totals.prod_total.toLocaleString());
                $('#prod_total_total_pct').text((totals.prod_total / totals.grand_total * 100).toFixed(2) + '%');

                groupKeys.forEach(key => {
                    const total_elec = totals[`${key}_elec_total`];
                    const total_prod = totals[`${key}_prod_total`];
                    const total_per_unit = total_prod > 0 ? (total_elec / total_prod) : 0;
                    
                    // 【修正】totals中已经是四舍五入后累加的值，直接使用
                    const total_elec_pct = totals.prod_total > 0 ? (total_elec / totals.prod_total * 100) : 0;

                    // 合计列的电量单元格（电量保留0位小数，合计列不标红，因为是汇总计算得出）
                    const totalElecCell = $(`#${key}_dianliang_total`);
                    const totalElecPctCell = $(`#${key}_dianliang_total_pct`);
                    totalElecCell.text(total_elec.toLocaleString());
                    totalElecPctCell.text(total_elec_pct.toFixed(2) + '%');
                    
                    // 合计列的产量单元格（产量保留0位小数，合计列不标红，因为是汇总计算得出）
                    const totalProdCell = $(`#${key}_chanliang_total`);
                    totalProdCell.text(total_prod.toLocaleString());
                    
                    // 合计列的单台单元格（加粗，保留2位小数）
                    const totalUnitValCell = $(`#${key}_dantai_total_val`);
                    totalUnitValCell.text(total_per_unit.toFixed(2));
                    totalUnitValCell.addClass('bold-cell');
                });
                
                // 自动更新头部摘要为当前月份
                const currentMonth = new Date().getMonth() + 1; // 获取当前月份（1-12）
                
                // 检查当前月份是否有数据
                let hasCurrentMonthData = false;
                groupKeys.forEach(key => {
                    if (mockData.groups[key]?.electricity[currentMonth]) {
                        hasCurrentMonthData = true;
                    }
                });
                
                if (hasCurrentMonthData || mockData.aux_total[currentMonth]) {
                    // 如果当前月份有数据，显示当前月份
                    updateHeaderSummaryForMonth(currentMonth);
                } else {
                    // 如果当前月份没有数据，显示最新有数据的月份
                    const allMonthsWithData = Object.keys(mockData.groups[groupKeys[0]]?.electricity || {});
                    const latestMonth = allMonthsWithData.length > 0 ? Math.max(...allMonthsWithData.map(Number)) : 0;
                    
                    if (latestMonth > 0) {
                        updateHeaderSummaryForMonth(latestMonth);
                    } else {
                        $('#header-summary-text').html('暂无月度数据');
                    }
                }
            }
            
            // 初始化和更新图表
            if (!myChart) {
                setTimeout(() => {
                    if (initChart()) {
                        updateChart();
                    }
                }, 200);
            } else {
                updateChart();
            }
        }

        // 初始化图表
        function initChart() {
            const lineDom = document.getElementById('trend-chart');
            const pieDom = document.getElementById('pie-chart');
            if (!lineDom || !pieDom) return false;
            
            // 初始化曲线图
            myChart = echarts.init(lineDom);
            myChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: '#1d386f',
                    borderColor: '#2a6dc8',
                    textStyle: { color: '#fff' },
                    formatter: (params) => {
                        if (!Array.isArray(params)) params = [params];
                        let result = params[0].axisValue + '<br/>';
                        params.forEach(param => {
                            const displayValue = param.value === null || param.value === undefined ? 0 : param.value;
                            result += `${param.seriesName}: ${displayValue}<br/>`;
                        });
                        return result;
                    }
                },
                legend: {
                    textStyle: { color: '#d0d2e0' },
                    top: 10
                },
                grid: { left: 60, right: 40, bottom: 40, top: 60 },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    axisLine: { lineStyle: { color: '#2a6dc8' } },
                    axisLabel: { color: '#d0d2e0' }
                },
                yAxis: {
                    type: 'value',
                    name: '单台电量(kWh/台)',
                    nameTextStyle: { color: '#d0d2e0' },
                    axisLine: { lineStyle: { color: '#2a6dc8' } },
                    axisLabel: { color: '#d0d2e0' },
                    splitLine: { lineStyle: { color: '#2a6dc8', opacity: 0.3 } }
                },
                series: []
            });
            
            // 初始化饼图
            pieChart = echarts.init(pieDom);
            
            // 用于存储当前饼图数据的变量（闭包）
            let currentPieData = [];
            
            pieChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#1d386f',
                    borderColor: '#2a6dc8',
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        // 手动计算百分比，确保与表格一致
                        const total = currentPieData.reduce((sum, item) => sum + item.value, 0);
                        const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
                        return `${params.seriesName}<br/>${params.name}: ${params.value.toLocaleString()} (${percentage}%)`;
                    }
                },
                legend: {
                    orient: 'horizontal',
                    bottom: '5%',
                    left: 'center',
                    textStyle: { color: '#d0d2e0', fontSize: 11 },
                    type: 'scroll'
                },
                series: [{
                    name: '用电占比',
                    type: 'pie',
                    radius: '65%',
                    center: ['50%', '45%'],
                    data: [],
                    itemStyle: { 
                        borderWidth: 0,  // 移除分割线
                        borderColor: 'transparent' 
                    },
                    emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } },
                    label: { 
                        formatter: function(params) {
                            // 手动计算百分比，确保与表格一致
                            const total = currentPieData.reduce((sum, item) => sum + item.value, 0);
                            const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
                            return `${percentage}%`;
                        }, 
                        color: '#fff', 
                        position: 'outside' 
                    },
                    labelLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.5)' } }
                }]
            });
            
            // 将 currentPieData 暴露给外部函数使用
            pieChart._currentPieData = currentPieData;
            
            window.addEventListener('resize', () => {
                myChart && myChart.resize();
                pieChart && pieChart.resize();
            });
            return true;
        }
        
        // 更新图表
        function updateChart() {
            if (!myChart || !pieChart) return;
            
            const lineSeries = [];
            const pieData = [];
            const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666'];
            
            itemConfig.forEach((item, index) => {
                // 读取12个月单台用电数据
                const data = [];
                for (let m = 1; m <= 12; m++) {
                    const val = $(`#${item.key}_dantai_m${m}_val`).text().replace(/,/g, '');
                    data.push(val ? Number(val) : null);
                }
                
                // 添加曲线图系列
                lineSeries.push({
                    name: item.name,
                    type: 'line',
                    data: data,
                    smooth: true,
                    connectNulls: false,
                    symbol: 'circle',
                    symbolSize: 4,
                    color: colors[index % colors.length],
                    markPoint: {
                        data: [{ type: 'max', name: '最高' }, { type: 'min', name: '最低' }],
						symbolSize:90,
						label:{
							color:"#fff"
						}
                    }
                });
                
                // 计算饼图数据（总电量 - 使用四舍五入后的值）
                const totalElec = $(`#${item.key}_dianliang_total`).text().replace(/,/g, '');
                if (totalElec && Number(totalElec) > 0) {
                    pieData.push({
                        name: item.name,
                        value: Number(totalElec),  // 这里读取的已经是四舍五入后的值
                        itemStyle: { color: colors[index % colors.length] }
                    });
                }
            });
            
            // 更新饼图实例的数据引用
            if (pieChart._currentPieData !== undefined) {
                pieChart._currentPieData.length = 0;
                pieChart._currentPieData.push(...pieData);
            }
            
            // 更新曲线图
            myChart.setOption({
                series: lineSeries
            });
            
            // 更新饼图
            pieChart.setOption({
                series: [{
                    data: pieData
                }]
            });
        }
        
        // 显示曲线图指定月份的tooltip
        function showLineChartTooltipForMonth(month) {
            if (!myChart) return;
            
            const monthIndex = parseInt(month) - 1;
            if (monthIndex >= 0 && monthIndex < 12) {
                myChart.dispatchAction({
                    type: 'showTip',
                    seriesIndex: 0,
                    dataIndex: monthIndex
                });
            }
        }
        
        // 更新饼图显示指定月份数据
        function updatePieChartForMonth(month) {
            if (!pieChart) return;
            
            const pieData = [];
            const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666'];
            
            itemConfig.forEach((item, index) => {
                const monthElec = $(`#${item.key}_dianliang_m${month}_val`).text().replace(/,/g, '');
                if (monthElec && Number(monthElec) > 0) {
                    pieData.push({
                        name: item.name,
                        value: Number(monthElec),  // 这里读取的已经是四舍五入后的值
                        itemStyle: { color: colors[index % colors.length] }
                    });
                }
            });
            
            // 更新饼图实例的数据引用
            if (pieChart._currentPieData !== undefined) {
                pieChart._currentPieData.length = 0;
                pieChart._currentPieData.push(...pieData);
            }
            
            // 更新饼图标题和数据
            $('#pie-chart-title').text(`${month}月份各单元用电占比`);
            pieChart.setOption({
                series: [{
                    data: pieData
                }]
            });
        }

        // --- 4. 事件监听与程序初始化 ---

        // 初始化Layui组件
        laydate.render({ elem: '#year-selector', type: 'year', value: new Date() });

        // 绑定"查询"按钮点击事件
        $('#search-btn').on('click', reloadData);

        $('#export-btn').on('click', function() {
            try {
                const year = $('#year-selector').val() || new Date().getFullYear();
                const filename = `电机电量及占比统计_${year}.xlsx`;
                
                const table = document.getElementById('data-table');
                const ws = XLSX.utils.table_to_sheet(table, {raw: true});

                // ---【核心修改】---
                // 手动为28列设置宽度，wch代表字符宽度
                ws['!cols'] = [
                    { wch: 12 }, { wch: 12 }, // 项目 (2列)
                    { wch: 10 }, { wch: 10 }, // 1月
                    { wch: 10 }, { wch: 10 }, // 2月
                    { wch: 10 }, { wch: 10 }, // 3月
                    { wch: 10 }, { wch: 10 }, // 4月
                    { wch: 10 }, { wch: 10 }, // 5月
                    { wch: 10 }, { wch: 10 }, // 6月
                    { wch: 10 }, { wch: 10 }, // 7月
                    { wch: 10 }, { wch: 10 }, // 8月
                    { wch: 10 }, { wch: 10 }, // 9月
                    { wch: 10 }, { wch: 10 }, // 10月
                    { wch: 10 }, { wch: 10 }, // 11月
                    { wch: 10 }, { wch: 10 }, // 12月
                    { wch: 15 },             // 合计
                    { wch: 12 }              // 占比
                ];
                // ---【修改结束】---

                // 您原有的百分比格式化代码保持不变
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_address = XLSX.utils.encode_cell({c: C, r: R});
                        const cell = ws[cell_address];
                        if (!cell || typeof cell.v !== 'string' || !cell.v.endsWith('%')) {
                            continue;
                        }
                        const numericValue = parseFloat(cell.v.replace(/[,%]/g, '')) / 100.0;
                        if (isNaN(numericValue)) {
                            continue;
                        }
                        cell.t = 'n';
                        cell.v = numericValue;
                        cell.z = '0.00%';
                    }
                }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
                
                XLSX.writeFile(wb, filename);

            } catch (e) {
                console.error(e);
                layer.msg('导出失败，请检查控制台错误。');
            }
        });        

        
        // 使用事件委托为表格绑定交互事件，提高性能
        const table = $('#data-table');
        
        // 点击月份列，更新头部摘要
        table.on('click', 'td, th', function() {
            const month = $(this).data('month');
            if (month) {
                updateHeaderSummaryForMonth(month);
                updatePieChartForMonth(month);
                showLineChartTooltipForMonth(month);
            }
        });

        // 鼠标悬浮于月份列，高亮整列
        table.on('mouseover', 'td, th', function() {
            const month = $(this).data('month');
            if (month) {
                table.find('.col-hover').removeClass('col-hover');
                table.find(`[data-month="${month}"]`).addClass('col-hover');
            }
        });

        // 鼠标移出表格，取消所有高亮
        table.on('mouseleave', function() {
            table.find('.col-hover').removeClass('col-hover');
        });

        // --- 5. 初始化执行 ---
        generateDynamicContent(); // 首次加载时，构建UI骨架
        reloadData();             // 紧接着获取并填充初始数据
    });
</script>
</body>
</html>
