<style>

    /* ... 以下的表格和弹窗样式与之前相同，无需改动 ... */
    .table-container .layui-table { border: 1px solid #3c8ce7 !important; background-color: transparent; }
    .table-container .layui-table th, .table-container .layui-table td { border: 1px solid #3c8ce7 !important; background-color: #1e4e89 !important; color: #ffffff; font-weight: bold; text-align: center; vertical-align: middle; padding: 2px 3px; font-size: 11px; min-width: 42px; line-height: 1.4; transition: background-color 0.2s ease-in-out; }
    .table-container .layui-table th[data-month], .table-container .layui-table td[data-month] { cursor: pointer; }
    .table-container .layui-table th { font-size: 12px; background-color: #0c6ed3 !important; }
    .table-container .layui-table td:first-child, .table-container .layui-table th:first-child { min-width: 42px; cursor: default; }
    
    /* 顶部三行的背景色 - 交错显示 */

        background-color: #143a6b !important;

    .table-container .layui-table .layui-bg-yellow td:not(.left-header):not(.col-hover) { 
        background-color: #ffff00 !important;

    }
    .table-container .layui-table .layui-bg-green td:not(.left-header):not(.col-hover) {

        color: #ffffff !important;

    /* 数据行交错背景色 - 排除人工录入单元格 */

    }
    .table-container .layui-table tr.unit-bg-2 td:not(.left-header):not(.col-hover):not(.manual-input) {

    /* 人工录入单元格的背景色 - 保持红色文字 */

    /* ========== 图表区域样式 ========== */

    }

    }

    /* ========== 滚动条美化 - 统一样式 ========== */

<body>

<script src="../js/layui.js"></script>
<script>
    // 您原来的 JavaScript 代码放在这里，无需任何改动
    layui.use(['laydate', 'form', 'layer'], function(){
        const laydate = layui.laydate;
        const form = layui.form;
        const layer = layui.layer;
        const $ = layui.jquery;
        let globalData;
        
        // 图表实例
        let myChart = null;
        let pieChart = null;

        const itemConfig = [
            { key: 'c_zuzhuang', name: 'C组装', no: 30001 }, 
            { key: 'cs', name: 'CS', no: 30002 },
            { key: 'tig', name: 'TIG', no: 30003 },
            { key: 'chengpin', name: '成品', no: 30004 },
            { key: 'qingxi', name: '清洗', no: 30005 },
            { key: 'linhua', name: '磷化', no: 30006 },
        ];
        const groupKeys = itemConfig.map(item => item.key);

        function generateDynamicContent() {
            const tableBody = $('#data-table tbody');
            
            tableBody.empty();

            tableBody.html(`
                <tr class="total-elec-row">
                    <td colspan="2" class="left-header">合计电量</td>
                    ${Array.from({length: 12}, (_, i) => `<td colspan="2" id="total_elec_m${i+1}" class="data-cell" data-month="${i+1}"></td>`).join('')}
                    <td id="total_elec_total" class="data-cell"></td>
                    <td id="total_elec_total_pct" class="data-cell"></td>
                </tr>
                <tr class="layui-bg-yellow">
                    <td colspan="2" class="left-header">辅助合计<br>电量及占比</td>
                    ${Array.from({length: 12}, (_, i) => `<td id="aux_total_m${i+1}_val" class="data-cell" data-month="${i+1}"></td><td id="aux_total_m${i+1}_pct" class="data-cell" data-month="${i+1}"></td>`).join('')}
                    <td id="aux_total_total" class="data-cell"></td>
                    <td id="aux_total_total_pct" class="data-cell"></td>
                </tr>
                <tr class="layui-bg-green">
                    <td colspan="2" class="left-header">生产合计<br>电量及占比</td>
                    ${Array.from({length: 12}, (_, i) => `<td id="prod_total_m${i+1}_val" class="data-cell" data-month="${i+1}"></td><td id="prod_total_m${i+1}_pct" class="data-cell" data-month="${i+1}"></td>`).join('')}
                    <td id="prod_total_total" class="data-cell"></td>
                    <td id="prod_total_total_pct" class="data-cell"></td>
                </tr>
            `);

            itemConfig.forEach((item, index) => {
                const bgClass = index % 2 === 0 ? 'unit-bg-1' : 'unit-bg-2';
                
                let tableRows = `
                    <tr class="${bgClass} dynamic-row electricity-row">
                        <td rowspan="3" class="left-header">${item.name}</td>
                        <td class="left-header">电量</td>
                        ${Array.from({length: 12}, (_, i) => `<td id="${item.key}_dianliang_m${i+1}_val" class="data-cell manual-input" data-month="${i+1}"></td><td id="${item.key}_dianliang_m${i+1}_pct" class="data-cell" data-month="${i+1}"></td>`).join('')}
                        <td id="${item.key}_dianliang_total" class="data-cell"></td>
                        <td id="${item.key}_dianliang_total_pct" class="data-cell"></td>
                    </tr>
                    <tr class="${bgClass} dynamic-row">
                        <td class="left-header">产量</td>
                        ${Array.from({length: 12}, (_, i) => `<td colspan="2" id="${item.key}_chanliang_m${i+1}" class="data-cell manual-input" data-month="${i+1}"></td>`).join('')}
                        <td colspan="2" id="${item.key}_chanliang_total" class="data-cell"></td>
                    </tr>
                    <tr class="${bgClass} dynamic-row dantai-row">
                        <td class="left-header">单台</td>
                        ${Array.from({length: 12}, (_, i) => `<td colspan="2" id="${item.key}_dantai_m${i+1}_val" class="data-cell calculated-bold" data-month="${i+1}"></td>`).join('')}
                        <td colspan="2" id="${item.key}_dantai_total_val" class="data-cell calculated-bold"></td>
                    </tr>
                `;
                tableBody.append(tableRows);
            });
        }

        async function sendSQL(strsql) {
            try {
                const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ sql: strsql })
                });
                if (!res.ok) {
                    layer.msg(`数据加载失败: ${res.statusText}`);
                    return { data: [] };
                }
                return await res.json();
            } catch (err) {
                console.error('sendSQL Error:', err);
                layer.msg('数据加载失败，请检查网络或联系管理员。');
                return { data: [] };
            }
        }

        async function fetchAndProcessData(year) {
            const startdate = `${year}-01-01`;
            const enddate = `${year}-12-31`;
            
            let now = new Date();
            let compareDate = new Date(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate());
            
            // ========================================================================
            // 【组装一课数据结构配置说明】
            // ========================================================================
            // 合计电量 = 正数项 - 负数项
            // ├── 正数项：(110009,110008,110012,110013,120006,230009,230010,110006,120013,220007,520004,520006,520005,520002,520003,120018)
            // └── 负数项：(510002,510001)
            //
            // 辅助合计 = 合计电量 - 生产合计
            //
            // 生产合计 (人工录入数据，从 data_elec_temp_input 查询)
            // ├── C组装 (30001) - 电量 + 产量
            // ├── CS (30002) - 电量 + 产量
            // ├── TIG (30003) - 电量 + 产量
            // ├── 成品 (30004) - 电量 + 产量
            // ├── 清洗 (30005) - 电量 + 产量
            // └── 磷化 (30006) - 电量 + 产量
            //
            // 数据来源：
            // - 合计电量：sum_elec_group_by_day + data_all (今日实时)
            // - 生产合计：data_elec_temp_input (人工录入表)
            // - 公司总用电：(1,12,16,17,20,26,51,52) - 230003
            //
            // 计算逻辑：
            // 1. 查询合计电量（正数项 - 负数项）
            // 2. 查询生产项目数据（6个项目的电量 + 产量）
            // 3. 辅助合计 = 合计电量 - 生产合计
            // 4. 单台 = 电量 / 产量
            // 5. 占比 = 各单元电量 / 生产合计 * 100%
            // ========================================================================
            
            // ========= 查询合计电量（从sum_elec_group_by_day和data_all） =========
            // 正数项：110009,110008,110012,110013,120006,230009,230010,110006,120013,220007,520004,520006,520005,520002,520003,120018
            // 负数项：510002,510001
            let totalElecSql = "with positive_data as ( \n"
                + "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, sum_elec \n"
                + "     from sum_elec_group_by_day \n"
                + "     where date <= '"+enddate+"' \n"
                + "     AND date >= '"+startdate+"' \n"
                + "     and no in (110009,110008,110012,110013,120006,230009,230010,110006,120013,220007,520004,520006,520005,520002,520003,120018) \n";
            
            // 如果当前日期在查询范围内，添加今日实时数据（正数项）
            if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
                totalElecSql += "     union all \n"
                + "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
                + "            SUM(`d_elec`) AS sum_elec \n"
                + "     FROM ( \n"
                + "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
                + "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
                + "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
                + "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
                + "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
                + "             AND `NO` IN (110009,110008,110012,110013,120006,230009,230010,110006,120013,220007,520004,520006,520005,520002,520003,120018) \n"
                + "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
                + "         GROUP BY `NO` \n"
                + "     ) AS positive_today \n";
            }
            
            totalElecSql += " ) \n"
                + " , negative_data as ( \n"
                + "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, sum_elec \n"
                + "     from sum_elec_group_by_day \n"
                + "     where date <= '"+enddate+"' \n"
                + "     AND date >= '"+startdate+"' \n"
                + "     and no in (510002, 510001) \n";
            
            // 如果当前日期在查询范围内，添加今日实时数据（负数项）
            if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
                totalElecSql += "     union all \n"
                + "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
                + "            SUM(`d_elec`) AS sum_elec \n"
                + "     FROM ( \n"
                + "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
                + "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
                + "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
                + "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
                + "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
                + "             AND `NO` IN (510002, 510001) \n"
                + "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
                + "         GROUP BY `NO` \n"
                + "     ) AS negative_today \n";
            }
            
            totalElecSql += " ) \n"
                + " SELECT \n"
                + " p.month, \n"
                + " (COALESCE(p.positive_elec, 0) - COALESCE(n.negative_elec, 0)) AS total_elec \n"
                + " FROM ( \n"
                + "     SELECT MONTH(jDay) as month, SUM(sum_elec) AS positive_elec \n"
                + "     FROM positive_data \n"
                + "     GROUP BY MONTH(jDay) \n"
                + " ) p \n"
                + " LEFT JOIN ( \n"
                + "     SELECT MONTH(jDay) as month, SUM(sum_elec) AS negative_elec \n"
                + "     FROM negative_data \n"
                + "     GROUP BY MONTH(jDay) \n"
                + " ) n ON p.month = n.month \n"
                + " ORDER BY p.month \n";
            
            // ========= 查询生产项目数据（从data_elec_temp_input） =========
            const selectClauses = itemConfig.map(item => {
                return `
                    SUM(CASE WHEN no = ${item.no} THEN sum_elec ELSE 0 END) AS ${item.key}_elec,
                    SUM(CASE WHEN no = ${item.no} THEN production ELSE 0 END) AS ${item.key}_prod
                `;
            }).join(',\n');
            
            const productionSql = `
                SELECT
                    MONTH(\`date\`) AS month,
                    ${selectClauses}
                FROM data_elec_temp_input
                WHERE YEAR(\`date\`) = ${year}
                AND no IN (${itemConfig.map(item => item.no).join(',')})
                GROUP BY MONTH(\`date\`)
                ORDER BY MONTH(\`date\`);
            `.trim();
            
            // ========= 查询公司总用电量（与动力实施课页面一致） =========
            let companySql = "with company_data as ( \n"
                + "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, \n"
                + "            CASE WHEN no IN (1,12,16,17,20,26,51,52) THEN sum_elec ELSE 0 END as main_elec, \n"
                + "            CASE WHEN no = 230003 THEN sum_elec ELSE 0 END as bingshan_elec \n"
                + "     from sum_elec_group_by_day \n"
                + "     where date <= '"+enddate+"' \n"
                + "     AND date >= '"+startdate+"' \n"
                + "     and no in (1,12,16,17,20,26,51,52,230003) \n";
            
            // 如果当前日期在查询范围内，添加今日实时数据
            if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
                companySql += "     union all \n"
                + "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
                + "            SUM(CASE WHEN `NO` IN (1,12,16,17,20,26,51,52) THEN `d_elec` ELSE 0 END) AS main_elec, \n"
                + "            SUM(CASE WHEN `NO` = 230003 THEN `d_elec` ELSE 0 END) AS bingshan_elec \n"
                + "     FROM ( \n"
                + "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
                + "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
                + "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
                + "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
                + "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
                + "             AND `NO` IN (1,12,16,17,20,26,51,52,230003) \n"
                + "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
                + "         GROUP BY `NO` \n"
                + "     ) AS company_today \n";
            }
            
            companySql += " ) \n"
                + " select MONTH(jDay) as month, (SUM(main_elec) - SUM(bingshan_elec)) as sum_elec \n"
                + " from company_data \n"
                + " GROUP BY MONTH(jDay) \n";

            const [totalElecResult, productionResult, companyTotalResult] = await Promise.all([
                sendSQL(totalElecSql),
                sendSQL(productionSql),
                sendSQL(companySql)
            ]);

            console.info('合计电量SQL:', totalElecSql);
            console.info('合计电量结果:', totalElecResult);
            console.info('生产数据SQL:', productionSql);
            console.info('生产数据结果:', productionResult);
            console.info('公司总用电量SQL:', companySql);
            console.info('公司总用电量结果:', companyTotalResult);

            // 处理数据
            const transformedData = { aux_total: {}, groups: {} };
            groupKeys.forEach(key => {
                transformedData.groups[key] = { electricity: {}, production: {} };
            });

            // 填充合计电量数据
            const totalElecData = totalElecResult.data || [];
            const totalElecByMonth = {};
            totalElecData.forEach(row => {
                totalElecByMonth[row.month] = row.total_elec || 0;
            });
            console.info('合计电量按月:', totalElecByMonth);

            // 填充生产项目数据
            const productionData = productionResult.data || [];
            productionData.forEach(row => {
                const month = row.month;
                groupKeys.forEach(key => {
                    transformedData.groups[key].electricity[month] = row[`${key}_elec`] || 0;
                    transformedData.groups[key].production[month] = row[`${key}_prod`] || 0;
                });
            });
            console.info('生产项目数据:', transformedData.groups);

            // 计算辅助合计（合计电量 - 生产合计）
            for (let month = 1; month <= 12; month++) {
                let prodTotal = 0;
                groupKeys.forEach(key => {
                    prodTotal += transformedData.groups[key].electricity[month] || 0;
                });
                const totalElec = totalElecByMonth[month] || 0;
                transformedData.aux_total[month] = totalElec - prodTotal;
            }
            console.info('辅助合计:', transformedData.aux_total);

            // 处理公司总用电量
            const companyTotals = {};
            const companyRawData = companyTotalResult.data || [];
            companyRawData.forEach(row => {
                companyTotals[row.month] = row.sum_elec || 0;
            });
            console.info('公司总用电量按月:', companyTotals);
            
            console.info('最终返回的数据结构:', { departmentData: transformedData, companyTotals: companyTotals });
            
            return { departmentData: transformedData, companyTotals: companyTotals };
        }

        function updateHeaderSummaryForMonth(month) {
            if (!globalData || !globalData.departmentData || !globalData.companyTotals) {
                return;
            }

            const mockData = globalData.departmentData;
            const companyTotals = globalData.companyTotals;

            let monthElec = mockData.aux_total[month] || 0;
            groupKeys.forEach(key => {
                monthElec += mockData.groups[key]?.electricity[month] || 0;
            });

            if (monthElec === 0) {
                const summaryHtml = `组装一课<span style="color: red;">${month}</span>月份无用电数据`;
                $('#header-summary-text').html(summaryHtml);
                return;
            }

            const companyTotalForMonth = companyTotals[month] || 0;
            const percentageOfCompanyTotal = companyTotalForMonth > 0
                ? (monthElec / companyTotalForMonth * 100).toFixed(2)
                : '0.00';

            const summaryHtml = `组装一课<span style="color: red;">${month}</span>月份用电电量<span style="color: red;">${Math.round(monthElec).toLocaleString()}</span>千瓦时，占公司总电量比<span style="color: red;">${percentageOfCompanyTotal}%</span>`;  /* <-- 【调整】去掉小数点 */
            $('#header-summary-text').html(summaryHtml);
        }

        function updateDashboard(data) {
            console.info('updateDashboard 接收到的数据:', data);
            
            $('.data-cell').html('');
            $('#header-summary-text').text('');
            
            const mockData = data.departmentData;
            const companyTotals = data.companyTotals;

            console.info('mockData:', mockData);
            console.info('companyTotals:', companyTotals);

            const totals = {
                grand_total: 0,
                aux_total: 0,
                prod_total: 0
            };
            groupKeys.forEach(key => {
                totals[`${key}_elec_total`] = 0;
                totals[`${key}_prod_total`] = 0;
            });

            for (let m = 1; m <= 12; m++) {
                let month_prod_total = 0;
                groupKeys.forEach(key => {
                    month_prod_total += mockData.groups[key]?.electricity[m] || 0;
                });

                const month_aux_total = mockData.aux_total[m] || 0;
                const month_grand_total = month_prod_total + month_aux_total;

                console.info(`月份${m}: 生产合计=${month_prod_total}, 辅助合计=${month_aux_total}, 总计=${month_grand_total}`);

                // 【修正】先四舍五入，再累加到合计
                const roundedGrandTotal = Math.round(month_grand_total);
                const roundedAuxTotal = Math.round(month_aux_total);
                const roundedProdTotal = Math.round(month_prod_total);
                
                totals.prod_total += roundedProdTotal;
                totals.aux_total += roundedAuxTotal;
                totals.grand_total += roundedGrandTotal;

                if (month_grand_total !== 0) {  // 修改：允许负数显示，只要不是0就显示
                    $('#total_elec_m' + m).text(roundedGrandTotal.toLocaleString());
                    $('#aux_total_m' + m + '_val').text(roundedAuxTotal.toLocaleString());
                    $('#aux_total_m' + m + '_pct').text((Math.round(roundedAuxTotal * 10000 / roundedGrandTotal) / 100).toFixed(2) + '%');
                    $('#prod_total_m' + m + '_val').text(roundedProdTotal.toLocaleString());
                    $('#prod_total_m' + m + '_pct').text((Math.round(roundedProdTotal * 10000 / roundedGrandTotal) / 100).toFixed(2) + '%');

                    groupKeys.forEach(key => {
                        const elec_val = mockData.groups[key]?.electricity[m] || 0;
                        const prod_val = mockData.groups[key]?.production[m] || 0;
                        const roundedElecVal = Math.round(elec_val);
                        const per_unit_val = prod_val > 0 ? (elec_val / prod_val) : 0;
                        const elec_pct = roundedProdTotal > 0 ? (Math.round(roundedElecVal * 10000 / roundedProdTotal) / 100) : 0;

                        $(`#${key}_dianliang_m${m}_val`).text(roundedElecVal.toLocaleString());
                        $(`#${key}_dianliang_m${m}_pct`).text(elec_pct.toFixed(2) + '%');
                        $(`#${key}_chanliang_m${m}`).text(Math.round(prod_val).toLocaleString());
                        $(`#${key}_dantai_m${m}_val`).text(per_unit_val.toFixed(2));
                        
                        // 【修正】先四舍五入，再累加
                        totals[`${key}_elec_total`] += roundedElecVal;
                        totals[`${key}_prod_total`] += Math.round(prod_val);
                    });
                }
            }

            if (totals.grand_total !== 0) {  // 修改：允许负数显示，只要不是0就显示
                // 【修正】totals中已经是四舍五入后累加的值，直接使用
                $('#total_elec_total').text(totals.grand_total.toLocaleString());
                $('#total_elec_total_pct').text('100.00%');
                $('#aux_total_total').text(totals.aux_total.toLocaleString());
                $('#aux_total_total_pct').text((Math.round(totals.aux_total * 10000 / totals.grand_total) / 100).toFixed(2) + '%');
                $('#prod_total_total').text(totals.prod_total.toLocaleString());
                $('#prod_total_total_pct').text((Math.round(totals.prod_total * 10000 / totals.grand_total) / 100).toFixed(2) + '%');

                groupKeys.forEach(key => {
                    const total_elec = totals[`${key}_elec_total`];
                    const total_prod = totals[`${key}_prod_total`];
                    // 【修正】totals中已经是四舍五入后累加的值，直接使用
                    const total_per_unit = total_prod > 0 ? (total_elec / total_prod) : 0;
                    const total_elec_pct = totals.prod_total > 0 ? (Math.round(total_elec * 10000 / totals.prod_total) / 100) : 0;

                    $(`#${key}_dianliang_total`).text(total_elec.toLocaleString());
                    $(`#${key}_dianliang_total_pct`).text(total_elec_pct.toFixed(2) + '%');
                    $(`#${key}_chanliang_total`).text(total_prod.toLocaleString());
                    $(`#${key}_dantai_total_val`).text(total_per_unit.toFixed(2));
                });
                
                const allMonthsWithData = Object.keys(mockData.groups[groupKeys[0]]?.electricity || {});
                const latestMonth = allMonthsWithData.length > 0 ? Math.max(...allMonthsWithData.map(Number)) : 0;
                
                if (latestMonth > 0) {
                    updateHeaderSummaryForMonth(latestMonth);
                } else {
                    $('#header-summary-text').html('暂无月度数据');
                }
            }
            
            // 初始化和更新图表
            if (!myChart) {
                setTimeout(() => {
                    if (initChart()) {
                        updateChart();
                    }
                }, 200);
            } else {
                updateChart();
            }
        }

        // 更新图表
        function updateChart() {
            if (!myChart || !pieChart) return;
            
            const lineSeries = [];
            const pieData = [];
            const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272'];
            
            itemConfig.forEach((item, index) => {
                // 读取12个月单台用电数据
                const data = [];
                for (let m = 1; m <= 12; m++) {
                    const val = $(`#${item.key}_dantai_m${m}_val`).text().replace(/,/g, '');
                    data.push(val ? Number(val) : null);
                }
                
                // 添加曲线图系列
                lineSeries.push({
                    name: item.name,
                    type: 'line',
                    data: data,
                    smooth: true,
                    connectNulls: false,
                    symbol: 'circle',
                    symbolSize: 4,
                    color: colors[index % colors.length],
                    markPoint: {
                        data: [{ type: 'max', name: '最高' }, { type: 'min', name: '最低' }],
						symbolSize:90,
						label:{
							color:"#fff"
						}
                    }
                });
                
                // 计算饼图数据（总电量）- 四舍五入
                const totalElec = $(`#${item.key}_dianliang_total`).text().replace(/,/g, '');
                const roundedValue = Math.round(Number(totalElec) || 0);
                if (roundedValue > 0) {
                    pieData.push({
                        name: item.name,
                        value: roundedValue,
                        itemStyle: { color: colors[index % colors.length] }
                    });
                }
            });
            
            // 更新曲线图
            myChart.setOption({
                series: lineSeries
            });
            
            // 更新饼图 - 手动计算百分比，确保与表格一致
            pieChart.setOption({
                tooltip: {
                    formatter: function(params) {
                        const total = pieData.reduce((sum, item) => sum + item.value, 0);
                        const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
                        return `${params.seriesName}<br/>${params.name}: ${params.value.toLocaleString()} (${percentage}%)`;
                    }
                },
                series: [{
                    data: pieData,
                    label: { 
                        formatter: function(params) {
                            const total = pieData.reduce((sum, item) => sum + item.value, 0);
                            const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
                            return `${percentage}%`;
                        }, 
                        color: '#fff', 
                        position: 'outside' 
                    }
                }]
            });
        }

                const filename = `组装一课电量及占比统计_${year}.xlsx`;
                
                const table = document.getElementById('data-table');
                const ws = XLSX.utils.table_to_sheet(table, {raw: true});

                // ---【核心修改】---
                // 手动为28列设置宽度，wch代表字符宽度
                // 【1720x1080适配】列宽调整，节省空间
                ws['!cols'] = [
                    { wch: 9 },  { wch: 11 }, // 项目 (2列) 原:(10,12)
                    { wch: 9 },  { wch: 9 },  // 1月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 2月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 3月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 4月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 5月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 6月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 7月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 8月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 9月  原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 10月 原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 11月 原:(10,10)
                    { wch: 9 },  { wch: 9 },  // 12月 原:(10,10)
                    { wch: 13 },             // 合计 原:(15)
                    { wch: 11 }              // 占比 原:(12)
                ];
                // ---【修改结束】---

                // 您原有的百分比格式化代码保持不变
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cell_address = XLSX.utils.encode_cell({c: C, r: R});
                        const cell = ws[cell_address];
                        if (!cell || typeof cell.v !== 'string' || !cell.v.endsWith('%')) {
                            continue;
                        }
                        const numericValue = parseFloat(cell.v.replace(/[,%]/g, '')) / 100.0;
                        if (isNaN(numericValue)) {
                            continue;
                        }
                        cell.t = 'n';
                        cell.v = numericValue;
                        cell.z = '0.00%';
                    }
                }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
                
                XLSX.writeFile(wb, filename);

            } catch (e) {
                console.error(e);
                layer.msg('导出失败，请检查控制台错误。');
            }
        });

        const table = $('#data-table');
        
        table.on('click', 'td, th', function() {
            const month = $(this).data('month');
            if (month) {
                updateHeaderSummaryForMonth(month);
                updatePieChartForMonth(month);
                showLineChartTooltipForMonth(month);
            }
        });

        table.on('mouseover', 'td, th', function() {
            const month = $(this).data('month');
            if (month) {
                table.find('.col-hover').removeClass('col-hover');
                table.find(`[data-month="${month}"]`).addClass('col-hover');
            }
        });

        table.on('mouseleave', function() {
            table.find('.col-hover').removeClass('col-hover');
        });

        generateDynamicContent();
        reloadData();
    });
</script>

</body>
</html>
