<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var excel = layui.excel;
		var $ = layui.$;
		
		// 全局变量存储数据
		var currentData = null;
		var all_sum_elec = 0;
		
		// 图表实例
		let myChart = null;
		let pieChart = null;
		
		var date = new Date().setDate(1);
		console.info(date);
		let currentDay = new Date();
		currentDay.setDate(1);

		// 日期
		laydate.render({
			type:"year",
			elem: '#ID-laydate-start-date-1',
			value: currentDay, // 设置初始日期
		});

		// ========= 生成空表结构 =========
		function generateEmptyBody() {
			const tbody = document.querySelector('#data-table tbody');
			tbody.innerHTML = '';
			
		// 先生成合计行
		const trTotal = document.createElement('tr');
		trTotal.className = 'total-elec-row';
		
		// 两个项目列
		const tdTotalLabel1 = document.createElement('td');
		tdTotalLabel1.className = 'left-header';
		tdTotalLabel1.setAttribute('colspan', '2');
		tdTotalLabel1.textContent = '合计电量';
		tdTotalLabel1.style.width = '200px';  // 50 + 150
		tdTotalLabel1.style.minWidth = '200px';
		trTotal.appendChild(tdTotalLabel1);
		
		// 12个月份，每个月份占2列（只显示电量，不显示占比）
		for (let m = 1; m <= 12; m++) {
			const tdVal = document.createElement('td');
			tdVal.id = `total_m${m}_val`;
			tdVal.dataset.month = String(m);
			tdVal.className = 'data-cell';
			tdVal.setAttribute('colspan', '2');
			tdVal.style.width = '130px';  // 65px * 2
			tdVal.style.minWidth = '130px';
			trTotal.appendChild(tdVal);
		}
		
		// 合计列
		const tdSum = document.createElement('td');
		tdSum.id = 'total_sum';
		tdSum.className = 'data-cell';
		tdSum.style.width = '65px';
		tdSum.style.minWidth = '65px';
		trTotal.appendChild(tdSum);
		
		const tdRatio = document.createElement('td');
		tdRatio.id = 'total_ratio';
		tdRatio.textContent = '100%';
		tdRatio.className = 'data-cell';
		tdRatio.style.width = '65px';
		tdRatio.style.minWidth = '65px';
			trTotal.appendChild(tdRatio);
			
			tbody.appendChild(trTotal);
			
			// 辅助合计行（荧光黄）
			const trAuxiliary = createDataRow('', '辅助合计', 'elec_51', 'layui-bg-yellow');
			tbody.appendChild(trAuxiliary);
			
			// 生产合计行（深蓝绿色，标题橙色）
			const trProduction = createDataRow('', '生产合计', 'elec_26', 'layui-bg-green', 0, false);
			tbody.appendChild(trProduction);
			
			// 组装部分
			const assemblyItems = [
				{ key: 'elec_asm_total', name: '组装合计' },
				{ key: 'elec_17', name: '1#柜' },
				{ key: 'elec_20', name: '2#柜' },
				{ key: 'elec_16', name: '凸焊机' },
				{ key: 'elec_hydrogen', name: '氢检' }
			];
			
			assemblyItems.forEach((item, index) => {
				const bgClass = index % 2 === 0 ? 'unit-bg-1' : 'unit-bg-2';
				const tr = createDataRow(
					index === 0 ? '组装' : '',
					item.name,
					item.key,
					bgClass,
					index === 0 ? assemblyItems.length : 0
				);
				tbody.appendChild(tr);
			});
			
			// 成品部分
			const productItems = [

					item.name,

		// 创建数据行的辅助函数
		// category: 大分类（如"组装"、"成品"）
		// name: 项目名称
		// key: 数据key
		// extraClass: 额外的CSS类
		// rowspan: 大分类的行数（用于竖排文字）
		// hasManualInput: 是否有人工录入数据（生产合计行需要标红）
		function createDataRow(category, name, key, extraClass = '', rowspan = 0, hasManualInput = false) {
			const tr = document.createElement('tr');
			
			// 添加CSS类
			if (extraClass) {
				tr.className = extraClass;
			}
			
		// 第一列：大分类（竖排文字，如"组装"、"成品"）
		if (category) {
			const tdCategory = document.createElement('td');
			tdCategory.className = 'left-header category-cell';
			tdCategory.textContent = category;
			tdCategory.style.width = '50px';  // 内联样式强制宽度
			tdCategory.style.minWidth = '50px';
			if (rowspan > 0) {
				tdCategory.setAttribute('rowspan', rowspan);
			}
			tr.appendChild(tdCategory);
		}
		
	// 第二列：项目名称
	const tdName = document.createElement('td');
	tdName.textContent = name;
	tdName.style.whiteSpace = 'nowrap';  // 强制不换行
	
	// 顶级行（辅助合计、生产合计）跨2列，宽度为两列之和
	if (name === '辅助合计' || name === '生产合计') {
		tdName.setAttribute('colspan', '2');
		tdName.style.width = '200px';  // 50px + 150px
		tdName.style.minWidth = '200px';
	} else {
		tdName.style.width = '150px';  // 内联样式强制宽度
		tdName.style.minWidth = '150px';
	}
	
	// 生产合计的标题也是红色
	if (name === '生产合计') {
		tdName.className = 'left-header production-total project-name-cell';
	} else {
		tdName.className = 'left-header project-name-cell';
	}
		
		tr.appendChild(tdName);
			
	// 12个月份 * 2列（值 + 占比）
	for (let m = 1; m <= 12; m++) {
		const tdVal = document.createElement('td');
		const tdPct = document.createElement('td');
		tdVal.id = `${key}_m${m}_val`;
		tdPct.id = `${key}_m${m}_pct`;
		tdVal.dataset.month = String(m);
		tdPct.dataset.month = String(m);
		tdVal.className = 'data-cell';  // 添加数据列类名
		tdPct.className = 'data-cell';  // 添加数据列类名
		tdVal.style.width = '65px';  // 内联样式强制宽度
		tdVal.style.minWidth = '65px';
		tdPct.style.width = '65px';  // 内联样式强制宽度
		tdPct.style.minWidth = '65px';
		
		// 生产合计行的电量值是人工录入，需要标红（仅月度数据，不包括合计）
		if (hasManualInput) {
			tdVal.classList.add('manual-input');
		}
		
		tr.appendChild(tdVal);
		tr.appendChild(tdPct);
	}
	
	// 合计 / 占比（不是人工录入，不标红）
	const tdTotal = document.createElement('td');
	tdTotal.id = `${key}_total`;
	tdTotal.className = 'data-cell';  // 添加数据列类名
	tdTotal.style.width = '65px';  // 内联样式强制宽度
	tdTotal.style.minWidth = '65px';
	tr.appendChild(tdTotal);
	
	const tdTotalPct = document.createElement('td');
	tdTotalPct.id = `${key}_total_pct`;
	tdTotalPct.className = 'data-cell';  // 添加数据列类名
	tdTotalPct.style.width = '65px';  // 内联样式强制宽度
	tdTotalPct.style.minWidth = '65px';
	tr.appendChild(tdTotalPct);
			
			return tr;
		}
		
		// ========= 设置列交互效果 =========
		function setupColumnHover() {
			const table = document.getElementById('data-table');
			
			table.addEventListener('mouseover', e => {
				const cell = e.target;
				const month = cell.dataset.month;
				if (!month) return;
				table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
				table.querySelectorAll(`[data-month="${month}"]`).forEach(td => td.classList.add('col-hover'));
			});
			
			table.addEventListener('mouseleave', () => {
				table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
			});
			
			table.addEventListener('click', e => {
				const month = e.target.dataset.month;
				if (!month || !currentData) return;
				updateHeaderSummary(Number(month));
				updatePieChartForMonth(Number(month));
				showLineChartTooltipForMonth(Number(month));
			});
		}
		
		// ========= 更新汇总信息 =========
		function updateHeaderSummary(month) {
			if (!currentData || !currentData.data) return;
			
			const totalRow = currentData.data[currentData.data.length - 1];
			const monthVal = totalRow[`month${month}_elec`] || 0;
			
			const dom = document.getElementById('h2_west');
			if (monthVal === 0) {
				dom.innerHTML = `组装二课${month}月无用电数据`;
			} else {
				const ratio = all_sum_elec > 0 ? (monthVal / all_sum_elec * 100).toFixed(2) : '0.00';
				dom.innerHTML = 
					`组装二课<span style="color: red;">${month}</span>月用电电量` +
					`<span style="color: red;">${Math.round(monthVal).toLocaleString()}</span>千瓦时，` +  /* <-- 【调整】去掉小数点 */
					`占公司总电量比<span style="color: red;">${ratio}%</span>。`;
			}
		}
		
		// ========= 填充数据 =========
		function fillData(data) {
			currentData = data;
			
			// 找到合计行
			const totalRow = data.data.find(row => row.elec_name === '合计');
			if (!totalRow) return;
			
			let totalSum = 0;
			let latestMonth = 0;
			
		// 填充合计行（不显示月度占比）
		for (let m = 1; m <= 12; m++) {
			const val = totalRow[`month${m}_elec`] || 0;
			
			if (val > 0) {
				const tdVal = document.getElementById(`total_m${m}_val`);
				if (tdVal) tdVal.textContent = Math.round(val).toLocaleString();
				// 合计行不显示月度占比，tdPct留空
				totalSum += val;
				latestMonth = m;
			}
		}
			
			const totalSumCell = document.getElementById('total_sum');
			if (totalSumCell) {
				totalSumCell.textContent = Math.round(totalSum).toLocaleString();
			}
			
			// 填充业务行
			data.data.forEach(row => {
				const itemKey = getItemKey(row.elec_name);
				if (!itemKey) return;
				
				let itemSum = 0;
				for (let m = 1; m <= 12; m++) {
					const monthVal = row[`month${m}_elec`] || 0;
					const monthRatio = row[`month${m}_ratio`] || '';
					
					if (monthVal > 0) {
						itemSum += monthVal;
						const tdVal = document.getElementById(`${itemKey}_m${m}_val`);
						const tdPct = document.getElementById(`${itemKey}_m${m}_pct`);
						if (tdVal) tdVal.textContent = Math.round(monthVal).toLocaleString();
						if (tdPct) tdPct.textContent = monthRatio;
					}
				}
				
				const tdTotal = document.getElementById(`${itemKey}_total`);
				const tdTotalPct = document.getElementById(`${itemKey}_total_pct`);
				if (tdTotal && itemSum > 0) {
					tdTotal.textContent = Math.round(itemSum).toLocaleString();
				}
				if (tdTotalPct) {
					tdTotalPct.textContent = row.sum_ratio || '';
				}
			});
			
			// 计算组装合计和成品合计
			calculateSubtotals();
			
			if (latestMonth > 0) {
				updateHeaderSummary(latestMonth);
			} else {
				document.getElementById('h2_west').textContent = '组装二课电量占比及统计';
			}
			
			// 初始化和更新图表
			if (!myChart) {
				setTimeout(() => {
					if (initChart()) {
						updateChart();
					}
				}, 200);
			} else {
				updateChart();
			}
		}
		
		// 计算组装合计和成品合计
		function calculateSubtotals() {
			// 计算组装合计（1#柜 + 2#柜 + 凸焊机 + 氢检）
			const asmKeys = ['elec_17', 'elec_20', 'elec_16', 'elec_hydrogen'];
			calculateAndFillSubtotal('elec_asm_total', asmKeys);
			
			// 计算成品合计（GCS柜 + 热水炉）
			const prodKeys = ['elec_1', 'elec_12'];
			calculateAndFillSubtotal('elec_prod_total', prodKeys);
		}
		
		// 计算并填充小计（组装合计、成品合计）
		function calculateAndFillSubtotal(subtotalKey, itemKeys) {
			let yearTotal = 0;
			
			for (let m = 1; m <= 12; m++) {
				let monthTotal = 0;
				
				itemKeys.forEach(key => {
					const cell = document.getElementById(`${key}_m${m}_val`);
					if (cell && cell.textContent) {
						const val = parseFloat(cell.textContent.replace(/,/g, '')) || 0;
						monthTotal += val;
					}
				});
				
				if (monthTotal > 0) {
					const roundedMonthTotal = Math.round(monthTotal);
					const tdVal = document.getElementById(`${subtotalKey}_m${m}_val`);
					if (tdVal) tdVal.textContent = roundedMonthTotal.toLocaleString();
					yearTotal += monthTotal;
					
					// 计算该月占比（相对于生产合计，使用四舍五入后的值）
					const prodTotalCell = document.getElementById(`elec_26_m${m}_val`);
					if (prodTotalCell && prodTotalCell.textContent) {
						const prodTotal = parseFloat(prodTotalCell.textContent.replace(/,/g, '')) || 0;
						const roundedProdTotal = Math.round(prodTotal);
						if (roundedProdTotal > 0) {
							const ratio = (Math.round(roundedMonthTotal * 10000 / roundedProdTotal) / 100) + '%';
							const tdPct = document.getElementById(`${subtotalKey}_m${m}_pct`);
							if (tdPct) tdPct.textContent = ratio;
						}
					}
				}
			}
			
			// 填充年度合计
			const roundedYearTotal = Math.round(yearTotal);
			const tdTotal = document.getElementById(`${subtotalKey}_total`);
			if (tdTotal && roundedYearTotal > 0) {
				tdTotal.textContent = roundedYearTotal.toLocaleString();
				
				// 计算年度占比（相对于生产合计，使用四舍五入后的值）
				const prodTotalCell = document.getElementById('elec_26_total');
				if (prodTotalCell && prodTotalCell.textContent) {
					const prodYearTotal = parseFloat(prodTotalCell.textContent.replace(/,/g, '')) || 0;
					const roundedProdYearTotal = Math.round(prodYearTotal);
					if (roundedProdYearTotal > 0) {
						const ratio = (Math.round(roundedYearTotal * 10000 / roundedProdYearTotal) / 100) + '%';
						const tdPct = document.getElementById(`${subtotalKey}_total_pct`);
						if (tdPct) tdPct.textContent = ratio;
					}
				}
			}
		}

		// 更新图表
		function updateChart() {
			if (!myChart || !pieChart) return;
			
			const lineSeries = [];
			const pieData = [];
			const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452'];
			
			// 曲线图使用所有项（包括组装合计和成品合计）
			itemConfig.forEach((item, index) => {
				// 读取12个月电量数据
				const data = [];
				for (let m = 1; m <= 12; m++) {
					const val = $(`#${item.key}_m${m}_val`).text().replace(/,/g, '');
					data.push(val ? Number(val) : null);
				}
				
				// 添加曲线图系列
				lineSeries.push({
					name: item.name,
					type: 'line',
					data: data,
					smooth: true,
					connectNulls: false,
					symbol: 'circle',
					symbolSize: 4,
					color: colors[index % colors.length]
				});
			});
			
			// 饼图只使用子项（排除组装合计和成品合计）
			pieItemConfig.forEach((item, index) => {
				// 计算饼图数据（总电量）- 四舍五入
				const totalElec = $(`#${item.key}_total`).text().replace(/,/g, '');
				const roundedValue = Math.round(Number(totalElec) || 0);
				if (roundedValue > 0) {
					pieData.push({
						name: item.name,
						value: roundedValue,
						itemStyle: { color: colors[index % colors.length] }
					});
				}
			});
			
			// 更新曲线图
			myChart.setOption({
				series: lineSeries
			});
			
			// 更新饼图 - 手动计算百分比，确保与表格一致
			pieChart.setOption({
				tooltip: {
					formatter: function(params) {
						const total = pieData.reduce((sum, item) => sum + item.value, 0);
						const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
						return `${params.seriesName}<br/>${params.name}: ${params.value.toLocaleString()} (${percentage}%)`;
					}
				},
				series: [{
					data: pieData,
					label: { 
						formatter: function(params) {
							const total = pieData.reduce((sum, item) => sum + item.value, 0);
							const percentage = total > 0 ? ((params.value / total * 100).toFixed(2)) : '0.00';
							return `${percentage}%`;
						}, 
						color: '#fff', 
						position: 'outside' 
					}
				}]
			});
		}

				// │   │   ├── 1#柜 (320014) - 系统采集

				// │   │   ├── 凸焊机 (320013) - 系统采集
				// │   │   └── 氢检 (490005) - 系统采集
				// │   └── 成品部分
				// │       ├── GCS柜 (490008,490009,490003,490004,490007) + 电泳整流柜(40001人工录入) - 系统采集+人工录入
				// │       └── 热水炉 (320008) - 系统采集
				// └── 辅助合计 (差值计算 = 合计电量 - 生产合计)
				//
				// 数据来源：
				// - 系统采集数据：sum_elec_group_by_day + data_all (今日实时)
				// - 人工录入数据：data_elec_temp_input (40001=电泳整流柜，合并到GCS柜)
				// - 合计电量：(320005, 320008, 320013, 320014, 320015)
				// - 公司总用电：(1,12,16,17,20,26,51,52) - 230003
				//
				// 计算逻辑：
				// 1. 查询系统采集的6个单元数据（历史+今日实时）
				// 2. 查询人工录入的电泳整流柜数据，合并到GCS柜
				// 3. 生产合计 = 1#柜 + 2#柜 + 凸焊机 + 氢检 + GCS柜（含电泳整流柜） + 热水炉
				// 4. 辅助合计 = 合计电量 - 生产合计
				// 5. 占比 = 各单元电量 / 合计电量 * 100%
				// ========================================================================
				
				// ========= 重新查询前清空表格 =========
				generateEmptyBody();
				
				var startdate = $("#ID-laydate-start-date-1")[0].value + "-01-01";
				var enddate = $("#ID-laydate-start-date-1")[0].value + "-12-31";
				
				let now = new Date();
				let compareDate = new Date(now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate());
				
				// ========= 构建系统采集数据查询SQL =========
				var sql = ""
				+" with basedata as ( \n"
				// 1#柜（320014）
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, '1#柜' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (320014) \n"
				+" 		UNION ALL \n"
				// 2#柜（320015）
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, '2#柜' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (320015) \n"
				+" 		UNION ALL \n"
				// 凸焊机（320013）
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, '凸焊机' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (320013) \n"
				+" 		UNION ALL \n"
				// 氢检（490005）
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, '氢检' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (490005) \n"
				+" 		UNION ALL \n"
				// GCS柜（490008,490009,490003,490004,490007）
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, 'GCS柜' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (490008, 490009, 490003, 490004, 490007) \n"
				+" 		UNION ALL \n"
				// 热水炉（320008）
				+" 		SELECT DATE_FORMAT(date, '%Y-%m-%d') as jDay, '热水炉' as elec_name, sum_elec \n"
				+" 		FROM sum_elec_group_by_day \n"
				+" 		WHERE date <= '"+enddate+"' AND date >= '"+startdate+"' \n"
				+" 		AND no IN (320008) \n";
				
				// 如果当前日期在查询范围内，添加今日实时数据
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					const todaySql = ""
					// 今日数据 - 1#柜
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       '1#柜' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (320014) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (320014) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_320014 \n"
					// 今日数据 - 2#柜
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       '2#柜' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (320015) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (320015) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_320015 \n"
					// 今日数据 - 凸焊机
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       '凸焊机' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (320013) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (320013) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_320013 \n"
					// 今日数据 - 氢检
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       '氢检' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (490005) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (490005) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_490005 \n"
					// 今日数据 - GCS柜
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       'GCS柜' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (490008, 490009, 490003, 490004, 490007) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (490008, 490009, 490003, 490004, 490007) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_gcs \n"
					// 今日数据 - 热水炉
					+" 		UNION ALL \n"
					+" 		SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+" 		       '热水炉' as elec_name, \n"
					+" 		       SUM(CASE WHEN `NO` IN (320008) THEN `d_elec` ELSE 0 END) AS sum_elec \n"
					+" 		FROM ( \n"
					+" 		    SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+" 		    FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+" 		    WHERE `date` >= IF(HOUR(NOW()) >= 7, DATE_ADD(CURDATE(), INTERVAL 7 HOUR), DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+" 		        AND `NO` IN (320008) AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+" 		    GROUP BY `NO` \n"
					+" 		) AS data_320008 \n";
					
					sql += todaySql;
				}
				
				sql += ""
				+" ) \n"
				+" SELECT elec_name \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 1 THEN t.sum_elec ELSE null END) AS month1_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 2 THEN t.sum_elec ELSE null END) AS month2_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 3 THEN t.sum_elec ELSE null END) AS month3_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 4 THEN t.sum_elec ELSE null END) AS month4_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 5 THEN t.sum_elec ELSE null END) AS month5_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 6 THEN t.sum_elec ELSE null END) AS month6_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 7 THEN t.sum_elec ELSE null END) AS month7_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 8 THEN t.sum_elec ELSE null END) AS month8_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 9 THEN t.sum_elec ELSE null END) AS month9_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 10 THEN t.sum_elec ELSE null END) AS month10_elec \n"
				+" ,SUM(CASE WHEN MONTH(t.jDay) = 11 THEN t.sum_elec ELSE null END) AS month11_elec \n"
			+" ,SUM(CASE WHEN MONTH(t.jDay) = 12 THEN t.sum_elec ELSE null END) AS month12_elec \n"
			+" FROM basedata t \n"
			+" GROUP BY elec_name \n";
				
				console.info('系统采集数据SQL:', sql);
				
				// ========= 查询人工录入数据（电泳整流柜） =========
				const manualSql = ""
				+" SELECT 'GCS柜_电泳' as elec_name \n"
				+" ,SUM(CASE WHEN MONTH(date) = 1 THEN sum_elec ELSE null END) AS month1_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 2 THEN sum_elec ELSE null END) AS month2_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 3 THEN sum_elec ELSE null END) AS month3_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 4 THEN sum_elec ELSE null END) AS month4_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 5 THEN sum_elec ELSE null END) AS month5_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 6 THEN sum_elec ELSE null END) AS month6_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 7 THEN sum_elec ELSE null END) AS month7_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 8 THEN sum_elec ELSE null END) AS month8_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 9 THEN sum_elec ELSE null END) AS month9_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 10 THEN sum_elec ELSE null END) AS month10_elec \n"
				+" ,SUM(CASE WHEN MONTH(date) = 11 THEN sum_elec ELSE null END) AS month11_elec \n"
			+" ,SUM(CASE WHEN MONTH(date) = 12 THEN sum_elec ELSE null END) AS month12_elec \n"
			+" FROM data_elec_temp_input \n"
			+" WHERE no = 40001 \n"
			+" AND date >= '"+startdate+"' \n"
			+" AND date <= '"+enddate+"' \n";
				
				console.info('人工录入数据SQL:', manualSql);
				
			// ========= 并行执行查询 =========
			const [systemData, manualData] = await Promise.all([
				sendSQL(sql),
				sendSQL(manualSql)
			]);
			
			console.info('系统采集数据结果:', systemData);
			console.info('人工录入数据结果:', manualData);
			
			// 【修正】为每行数据计算 sum_elec（先四舍五入再累加）
			if (systemData.data) {
				systemData.data.forEach(row => {
					row.sum_elec = 0;
					for (let m = 1; m <= 12; m++) {
						const monthVal = row[`month${m}_elec`] || 0;
						if (monthVal > 0) {
							row.sum_elec += Math.round(monthVal);
						}
					}
				});
			}
			
			if (manualData.data && manualData.data.length > 0) {
				manualData.data[0].sum_elec = 0;
				for (let m = 1; m <= 12; m++) {
					const monthVal = manualData.data[0][`month${m}_elec`] || 0;
					if (monthVal > 0) {
						manualData.data[0].sum_elec += Math.round(monthVal);
					}
				}
			}
			
			// ========= 合并数据 =========
			let mergedData = systemData.data || [];
			
			// 找到GCS柜数据，合并电泳整流柜数据
			const gcsRow = mergedData.find(row => row.elec_name === 'GCS柜');
			if (gcsRow && manualData.data && manualData.data.length > 0) {
				const dianrongRow = manualData.data[0];
				
				// 【修正】先计算GCS柜原有的sum_elec，再加上电泳数据
				// 重新计算GCS柜的sum_elec（因为要包含电泳数据）
				gcsRow.sum_elec = 0;
				for (let m = 1; m <= 12; m++) {
					if (dianrongRow[`month${m}_elec`]) {
						gcsRow[`month${m}_elec`] = (gcsRow[`month${m}_elec`] || 0) + dianrongRow[`month${m}_elec`];
					}
					// 【修正】月度合并后，先四舍五入再累加
					const monthVal = gcsRow[`month${m}_elec`] || 0;
					if (monthVal > 0) {
						gcsRow.sum_elec += Math.round(monthVal);
					}
				}
			}
				
				// ========= 计算合计电量（320005 + 320008 + 320013 + 320014 + 320015） =========
				// 查询合计电量的NO
				let totalSql = "with total_data as ( \n"
					+ "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, sum_elec \n"
					+ "     from sum_elec_group_by_day \n"
					+ "     where date <= '"+enddate+"' \n"
					+ "     AND date >= '"+startdate+"' \n"
					+ "     and no in (320005, 320008, 320013, 320014, 320015) \n";
				
				// 如果当前日期在查询范围内，添加今日实时数据
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					totalSql += "     union all \n"
					+ "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+ "            SUM(`d_elec`) AS sum_elec \n"
					+ "     FROM ( \n"
					+ "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+ "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+ "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
					+ "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
					+ "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+ "             AND `NO` IN (320005, 320008, 320013, 320014, 320015) \n"
					+ "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+ "         GROUP BY `NO` \n"
					+ "     ) AS total_today \n";
				}
				
			totalSql += " ) \n"
				+ " SELECT \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 1 THEN sum_elec ELSE null END) AS month1_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 2 THEN sum_elec ELSE null END) AS month2_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 3 THEN sum_elec ELSE null END) AS month3_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 4 THEN sum_elec ELSE null END) AS month4_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 5 THEN sum_elec ELSE null END) AS month5_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 6 THEN sum_elec ELSE null END) AS month6_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 7 THEN sum_elec ELSE null END) AS month7_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 8 THEN sum_elec ELSE null END) AS month8_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 9 THEN sum_elec ELSE null END) AS month9_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 10 THEN sum_elec ELSE null END) AS month10_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 11 THEN sum_elec ELSE null END) AS month11_elec, \n"
				+ " SUM(CASE WHEN MONTH(jDay) = 12 THEN sum_elec ELSE null END) AS month12_elec \n"
				+ " from total_data \n";
				
				console.info('合计电量SQL:', totalSql);
				const totalElecData = await sendSQL(totalSql);
				console.info('合计电量结果:', totalElecData);
				
			// ========= 计算生产合计、辅助合计、合计行 =========
			const totalElecRow = totalElecData.data && totalElecData.data.length > 0 ? totalElecData.data[0] : {};
			
			// 【修正】先计算totalElecRow的年度合计（先四舍五入再累加）
			totalElecRow.sum_elec = 0;
			for (let m = 1; m <= 12; m++) {
				const monthVal = totalElecRow[`month${m}_elec`] || 0;
				if (monthVal > 0) {
					totalElecRow.sum_elec += Math.round(monthVal);
				}
			}
			
			// 生产合计 = 组装部分（含氢检）+ 成品部分
			const productionRow = {
				elec_name: '生产合计',
				sum_elec: 0
			};
			
			// 计算组装部分（1#柜 + 2#柜 + 凸焊机 + 氢检）
			const asmKeys = ['1#柜', '2#柜', '凸焊机', '氢检'];
			// 计算成品部分（GCS柜 + 热水炉）
			const prodKeys = ['GCS柜', '热水炉'];
			
			for (let m = 1; m <= 12; m++) {
				let monthTotal = 0;
				[...asmKeys, ...prodKeys].forEach(key => {
					const row = mergedData.find(r => r.elec_name === key);
					if (row && row[`month${m}_elec`]) {
						monthTotal += row[`month${m}_elec`];
					}
				});
				productionRow[`month${m}_elec`] = monthTotal > 0 ? monthTotal : null;
				// 【修正】先四舍五入再累加
				if (monthTotal > 0) {
					productionRow.sum_elec += Math.round(monthTotal);
				}
			}
			
			mergedData.push(productionRow);
			
			// 辅助合计 = 总和 - 生产合计
			const auxiliaryRow = {
				elec_name: '辅助合计',
				sum_elec: 0
			};
			
			for (let m = 1; m <= 12; m++) {
				const totalMonth = totalElecRow[`month${m}_elec`] || 0;
				const prodMonth = productionRow[`month${m}_elec`] || 0;
				const auxMonth = totalMonth - prodMonth;
				auxiliaryRow[`month${m}_elec`] = auxMonth > 0 ? auxMonth : null;
				// 【修正】先四舍五入再累加
				if (auxMonth > 0) {
					auxiliaryRow.sum_elec += Math.round(auxMonth);
				}
			}
			
			mergedData.push(auxiliaryRow);
				
				// 合计行
				const totalRow = {
					elec_name: '合计',
					...totalElecRow
				};
				
				mergedData.push(totalRow);
				
				// ========= 计算占比（先四舍五入，再计算百分比） =========
				const finalData = { data: mergedData };
				
				// 循环拼接添加各项月度占比
				for(let i=1; i<=12; i++){
					if(totalRow[`month${i}_elec`] == null || totalRow[`month${i}_elec`] == undefined){
						continue;
					}
					
					// 获取合计电量和生产合计（先四舍五入）
					const roundedTotalElec = Math.round(totalRow[`month${i}_elec`]);
					const roundedProductionElec = Math.round(productionRow[`month${i}_elec`] || 0);
					
					for(let j=0; j<finalData.data.length; j++){
						const itemName = finalData.data[j].elec_name;
						const itemElec = finalData.data[j][`month${i}_elec`];
						
						if(itemElec == null || itemElec == undefined) continue;
						
						const roundedItemElec = Math.round(itemElec);
						
						// 判断该项应该占谁的百分比
						if(itemName === '合计') {
							// 合计行显示100%
							finalData.data[j][`month${i}_ratio`] = "100%";
						} else if(itemName === '生产合计' || itemName === '辅助合计') {
							// 生产合计和辅助合计占"合计电量"的百分比
							if(roundedTotalElec > 0) {
								finalData.data[j][`month${i}_ratio`] = (Math.round(roundedItemElec * 10000 / roundedTotalElec) / 100) + "%";
							}
						} else {
							// 组装部分和成品部分的子项占"生产合计"的百分比
							if(roundedProductionElec > 0) {
								finalData.data[j][`month${i}_ratio`] = (Math.round(roundedItemElec * 10000 / roundedProductionElec) / 100) + "%";
							}
						}
					}
				}
				
				// 计算年度合计占比（先四舍五入）
				const roundedTotalSum = Math.round(totalRow.sum_elec);
				const roundedProductionSum = Math.round(productionRow.sum_elec || 0);
				
				for(let j=0; j<finalData.data.length-1; j++){
					const itemName = finalData.data[j].elec_name;
					const itemSum = finalData.data[j].sum_elec;
					
					if(itemSum == null || itemSum == undefined) continue;
					
					const roundedItemSum = Math.round(itemSum);
					
					// 判断该项应该占谁的百分比
					if(itemName === '生产合计' || itemName === '辅助合计') {
						// 生产合计和辅助合计占"合计电量"的百分比
						if(roundedTotalSum > 0) {
							finalData.data[j]["sum_ratio"] = (Math.round(roundedItemSum * 10000 / roundedTotalSum) / 100) + "%";
						}
					} else {
						// 组装部分和成品部分的子项占"生产合计"的百分比
						if(roundedProductionSum > 0) {
							finalData.data[j]["sum_ratio"] = (Math.round(roundedItemSum * 10000 / roundedProductionSum) / 100) + "%";
						}
					}
				}
				
				totalRow["sum_ratio"] = "100%";
				
				// ========= 获取公司总用电量（与动力实施课页面一致） =========
				let companySql = "with company_data as ( \n"
					+ "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, \n"
					+ "            CASE WHEN no IN (1,12,16,17,20,26,51,52) THEN sum_elec ELSE 0 END as main_elec, \n"
					+ "            CASE WHEN no = 230003 THEN sum_elec ELSE 0 END as bingshan_elec \n"
					+ "     from sum_elec_group_by_day \n"
					+ "     where date <= '"+enddate+"' \n"
					+ "     AND date >= '"+startdate+"' \n"
					+ "     and no in (1,12,16,17,20,26,51,52,230003) \n";
				
				// 如果当前日期在查询范围内，添加今日实时数据
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					companySql += "     union all \n"
					+ "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+ "            SUM(CASE WHEN `NO` IN (1,12,16,17,20,26,51,52) THEN `d_elec` ELSE 0 END) AS main_elec, \n"
					+ "            SUM(CASE WHEN `NO` = 230003 THEN `d_elec` ELSE 0 END) AS bingshan_elec \n"
					+ "     FROM ( \n"
					+ "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+ "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+ "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
					+ "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
					+ "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+ "             AND `NO` IN (1,12,16,17,20,26,51,52,230003) \n"
					+ "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+ "         GROUP BY `NO` \n"
					+ "     ) AS company_today \n";
				}
				
				companySql += " ) \n"
					+ " select (SUM(main_elec) - SUM(bingshan_elec)) as sum_elec \n"
					+ " from company_data \n";
				
				console.info('公司总用电量SQL:', companySql);
				var sum_elec_data = await sendSQL(companySql);
				all_sum_elec = sum_elec_data.data && sum_elec_data.data.length > 0 ? sum_elec_data.data[0].sum_elec : 0;
				
				console.info('公司总用电量:', all_sum_elec);
				
				// 填充数据到新表格
				fillData(finalData);
				
			} catch (err) {
				console.error('查询出错：', err);
			}
		});

				function parseNumberFromCell(text) {

					// 移除千分号，然后转换为数字
					const numStr = text.replace(/,/g, '').trim();
					const num = parseFloat(numStr);

					if(Object.prototype.toString.call(cell).slice(8,-1) === "Number"){
