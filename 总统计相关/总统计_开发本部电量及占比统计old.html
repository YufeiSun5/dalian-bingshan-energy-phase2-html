<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var $ = layui.$;
		
		// 全局变量存储数据
		var currentData = null;
		var all_sum_elec = 0;
		let myChart = null;   // 曲线图实例
		let pieChart = null;  // 饼图实例
		
		var date = new Date().setDate(1);
		console.info(date);
		let currentDay = new Date();
		currentDay.setDate(1);

		// 日期
		laydate.render({
			type:"year",
			elem: '#ID-laydate-start-date-1',
			value: currentDay, // 设置初始日期
		});

		// ========= 图表相关函数 =========
		
		/**
		 * @function initChart
		 * @description 初始化ECharts图表实例
		 * @returns {boolean} 初始化是否成功
		 */
		function initChart() {
			const lineDom = document.getElementById('line-chart');
			const pieDom = document.getElementById('pie-chart');
			if (!lineDom || !pieDom) return false;
			
			// 初始化曲线图
			myChart = echarts.init(lineDom);
			myChart.setOption({
				backgroundColor: 'transparent',
				tooltip: {
					trigger: 'axis',
					backgroundColor: '#1d386f',
					borderColor: '#2a6dc8',
					textStyle: { color: '#fff' },
					formatter: (params) => {
						if (!Array.isArray(params)) params = [params];
						let result = params[0].axisValue + '<br/>';
						params.forEach(param => {
							const displayValue = param.value === null || param.value === undefined ? 0 : param.value;
							result += `${param.seriesName}: ${displayValue}<br/>`;
						});
						return result;
					}
				},
				legend: {
					textStyle: { color: '#d0d2e0' },
					top: 10
				},
				grid: { left: 60, right: 40, bottom: 40, top: 60 },
				xAxis: {
					type: 'category',
					data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
					axisLine: { lineStyle: { color: '#2a6dc8' } },
					axisLabel: { color: '#d0d2e0' }
				},
				yAxis: {
					type: 'value',
					name: '用电量(kWh)',
					nameTextStyle: { color: '#d0d2e0' },
					axisLine: { lineStyle: { color: '#2a6dc8' } },
					axisLabel: { color: '#d0d2e0' },
					splitLine: { lineStyle: { color: '#2a6dc8', opacity: 0.3 } }
				},
				series: []
			});
			
			// 初始化饼图
			pieChart = echarts.init(pieDom);
			pieChart.setOption({
				backgroundColor: 'transparent',
				tooltip: {
					trigger: 'item',
					backgroundColor: '#1d386f',
					borderColor: '#2a6dc8',
					textStyle: { color: '#fff' }
					// ✅ 移除 formatter，在数据更新时再设置
				},
				legend: {
					orient: 'horizontal',
					bottom: '5%',
					left: 'center',
					textStyle: { color: '#d0d2e0', fontSize: 11 },
					type: 'scroll'
				},
				series: [{
					name: '用电占比',
					type: 'pie',
					radius: '65%',
					center: ['50%', '45%'],
					data: [],
					itemStyle: { borderWidth: 2, borderColor: '#1d386f' },
					emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } },
					// ✅ 移除 label.formatter，在数据更新时再设置
					labelLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.5)' } }
				}]
			});
			
			// 窗口大小变化时重新调整图表
			window.addEventListener('resize', () => {
				myChart && myChart.resize();
				pieChart && pieChart.resize();
			});
			
			return true;
		}

		/**
		 * @function updateChart
		 * @description 更新图表数据（排除扣除项）
		 */
		function updateChart() {
			if (!myChart || !pieChart) return;
			
			const lineSeries = [];
			const pieData = [];
			const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4', '#ea7ccc'];
			
			itemConfig.forEach((item, index) => {
				// 【关键修改】排除扣除项
				if (item.key === 'elec_kouchu') {
					return; // 跳过扣除项
				}
				
				// 读取12个月用电数据
				const data = [];
				for (let m = 1; m <= 12; m++) {
					const val = $(`#${item.key}_m${m}_val`).text().replace(/,/g, '');
					data.push(val ? Number(val) : null);
				}
				
				// 添加曲线图系列
				lineSeries.push({
					name: item.name,
					type: 'line',
					data: data,
					smooth: true,
					connectNulls: false,
					symbol: 'circle',
					symbolSize: 4,
					itemStyle: {
						color: colors[index % colors.length]
					},

		// ========= 生成空表结构 =========
		function generateEmptyBody() {
			const tbody = document.querySelector('#data-table tbody');
			tbody.innerHTML = '';
			
			// 先生成合计行
			const trTotal = document.createElement('tr');
			trTotal.className = 'total-elec-row';
			
			// 项目列（占2列）
			const tdTotalLabel = document.createElement('td');
			tdTotalLabel.className = 'left-header';
			tdTotalLabel.textContent = '合计电量';
			tdTotalLabel.colSpan = 2;
			trTotal.appendChild(tdTotalLabel);
			
			// 12个月份，每个月份占2列（合计行不显示占比）
			for (let m = 1; m <= 12; m++) {
				const tdVal = document.createElement('td');
				tdVal.id = `total_m${m}_val`;
				tdVal.dataset.month = String(m);
				tdVal.colSpan = 2;
				trTotal.appendChild(tdVal);
			}
			
			// 合计列
			const tdSum = document.createElement('td');
			tdSum.id = 'total_sum';
			trTotal.appendChild(tdSum);
			
			const tdRatio = document.createElement('td');
			tdRatio.id = 'total_ratio';
			tdRatio.textContent = '100%';
			trTotal.appendChild(tdRatio);
			
			tbody.appendChild(trTotal);
			
			// 生成业务行（交错背景）
			itemConfig.forEach((item, index) => {
				const tr = document.createElement('tr');
				const bgClass = index % 2 === 0 ? 'unit-bg-1' : 'unit-bg-2';
				tr.className = bgClass;
				
				// 项目名称（占2列）
				const tdName = document.createElement('td');
				tdName.textContent = item.name;
				tdName.className = 'left-header';
				tdName.colSpan = 2;
				tr.appendChild(tdName);
				
				// 判断是否是人工录入数据
				const isManualInput = dataSourceConfig[item.key] || false;
				const manualInputClass = isManualInput ? ' manual-input' : '';
				
				// 12个月份 * 2列（值 + 占比）
				for (let m = 1; m <= 12; m++) {
					const tdVal = document.createElement('td');
					const tdPct = document.createElement('td');
					tdVal.id = `${item.key}_m${m}_val`;
					tdPct.id = `${item.key}_m${m}_pct`;
					tdVal.dataset.month = String(m);
					tdPct.dataset.month = String(m);
					tdVal.className = 'data-cell' + manualInputClass;
					tdPct.className = 'data-cell';
					tr.appendChild(tdVal);
					tr.appendChild(tdPct);
				}
				
				// 合计 / 占比（不标红）
				const tdTotal = document.createElement('td');
				tdTotal.id = `${item.key}_total`;
				tdTotal.className = 'data-cell';
				tr.appendChild(tdTotal);
				
				const tdTotalPct = document.createElement('td');
				tdTotalPct.id = `${item.key}_total_pct`;
				tdTotalPct.className = 'data-cell';
				tr.appendChild(tdTotalPct);
				
				tbody.appendChild(tr);
			});
		}
		
		// ========= 设置列交互效果 =========
		function setupColumnHover() {
			const table = document.getElementById('data-table');
			
			table.addEventListener('mouseover', e => {
				const cell = e.target;
				const month = cell.dataset.month;
				if (!month) return;
				table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
				table.querySelectorAll(`[data-month="${month}"]`).forEach(td => td.classList.add('col-hover'));
			});
			
			table.addEventListener('mouseleave', () => {
				table.querySelectorAll('.col-hover').forEach(td => td.classList.remove('col-hover'));
			});
			
			table.addEventListener('click', e => {
				const month = e.target.dataset.month;
				if (!month || !currentData) return;
				updateHeaderSummary(Number(month));
				updatePieChartForMonth(Number(month));
				showLineChartTooltipForMonth(Number(month));
			});
		}
		
		// ========= 更新汇总信息 =========
		function updateHeaderSummary(month) {
			if (!currentData || !currentData.data) return;
			
			const totalRow = currentData.data[currentData.data.length - 1];
			const monthVal = totalRow[`month${month}_elec`] || 0;
			
			const dom = document.getElementById('h2_west');
			if (monthVal === 0) {
				dom.innerHTML = `开发本部${month}月无用电数据`;
			} else {
				const ratio = all_sum_elec > 0 ? (monthVal / all_sum_elec * 100).toFixed(2) : '0.00';
				dom.innerHTML = 
					`开发本部<span style="color: red;">${month}</span>月用电电量` +
					`<span style="color: red;">${Math.round(monthVal).toLocaleString()}</span>千瓦时，` +  /* <-- 【调整】去掉小数点 */
					`占公司总电量比<span style="color: red;">${ratio}%</span>。`;
			}
		}
		
	// ========= 填充数据 =========
	function fillData(data) {
		currentData = data;
		
		// 找到合计行
		const totalRow = data.data.find(row => row.elec_name === '合计电量');
		if (!totalRow) return;
		
		let totalSum = 0;
		let latestMonth = 0;
		
		// 填充合计行（不显示占比）
		for (let m = 1; m <= 12; m++) {
			const val = totalRow[`month${m}_elec`] || 0;
			
			if (val > 0) {
				const tdVal = document.getElementById(`total_m${m}_val`);
				if (tdVal) tdVal.textContent = Math.round(val).toLocaleString();
				totalSum += val;
				latestMonth = m;
			}
		}
		
		const totalSumCell = document.getElementById('total_sum');
		if (totalSumCell) {
			totalSumCell.textContent = Math.round(totalSum).toLocaleString();
		}
		
		// 扣除项相关的项目名称（这些项目显示电量但不显示占比）
		const kouchuRelatedItems = [
			'委托焓差实验室营业本部',
			'委托实验室（大马力性能）',
			'委托实验室（耐久）',
			'二楼研发报告厅、喷泉',
			'A座研发4楼照明'
		];
		
		// 填充各单元数据
		itemConfig.forEach(item => {
			const row = data.data.find(r => r.elec_name === item.name);
			if (!row) return;
			
			let itemSum = 0;
			
			// 判断是否是扣除项相关的项目（不显示占比）
			const isKouchuRelated = kouchuRelatedItems.includes(item.name);
			// 判断是否是扣除项合计（显示负数）
			const isKouchuTotal = (item.key === 'elec_kouchu');
			
			for (let m = 1; m <= 12; m++) {
				const monthVal = row[`month${m}_elec`] || 0;
				const monthTotal = totalRow[`month${m}_elec`] || 0;
				
				if (monthVal > 0) {
					itemSum += monthVal;
					
					// 【修复】先四舍五入，再用四舍五入后的值计算百分比
					const roundedMonthVal = Math.round(monthVal);
					const roundedMonthTotal = Math.round(monthTotal);
					
					const tdVal = document.getElementById(`${item.key}_m${m}_val`);
					const tdPct = document.getElementById(`${item.key}_m${m}_pct`);
					
					// 扣除项合计显示负数
					if (tdVal) {
						if (isKouchuTotal) {
							tdVal.textContent = '-' + roundedMonthVal.toLocaleString();
						} else {
							tdVal.textContent = roundedMonthVal.toLocaleString();
						}
					}
					
					// 扣除项及其相关项目不显示占比
					if (tdPct) {
						if (isKouchuRelated) {
							tdPct.textContent = ''; // 不显示占比
						} else if (isKouchuTotal) {
							// 扣除项显示负占比
							const actualVal = -roundedMonthVal;
							const monthRatio = roundedMonthTotal > 0 ? (actualVal / roundedMonthTotal * 100).toFixed(2) + '%' : '';
							tdPct.textContent = monthRatio;
						} else {
							// 其他项目正常显示占比
							const monthRatio = roundedMonthTotal > 0 ? (roundedMonthVal / roundedMonthTotal * 100).toFixed(2) + '%' : '';
							tdPct.textContent = monthRatio;
						}
					}
				}
			}
			
			const tdTotal = document.getElementById(`${item.key}_total`);
			const tdTotalPct = document.getElementById(`${item.key}_total_pct`);
			if (tdTotal && itemSum > 0) {
				// 【修复】先四舍五入，再用四舍五入后的值计算百分比
				const roundedItemSum = Math.round(itemSum);
				const roundedTotalSum = Math.round(totalSum);
				
				// 扣除项合计显示负数
				if (isKouchuTotal) {
					tdTotal.textContent = '-' + roundedItemSum.toLocaleString();
				} else {
					tdTotal.textContent = roundedItemSum.toLocaleString();
				}
				
				// 扣除项及其相关项目不显示占比
				if (tdTotalPct) {
					if (isKouchuRelated) {
						tdTotalPct.textContent = ''; // 不显示占比
					} else if (isKouchuTotal) {
						// 扣除项显示负占比
						const actualSum = -roundedItemSum;
						const totalPct = roundedTotalSum > 0 ? (actualSum / roundedTotalSum * 100).toFixed(2) + '%' : '';
						tdTotalPct.textContent = totalPct;
					} else {
						// 其他项目正常显示占比
						const totalPct = roundedTotalSum > 0 ? (roundedItemSum / roundedTotalSum * 100).toFixed(2) + '%' : '';
						tdTotalPct.textContent = totalPct;
					}
				}
			}
		});
		
		if (latestMonth > 0) {
			updateHeaderSummary(latestMonth);
		} else {
			document.getElementById('h2_west').textContent = '开发本部电量及占比统计';
		}
		
		// 初始化和更新图表
		if (!myChart) {
			setTimeout(() => {
				if (initChart()) {
					updateChart();
				}
			}, 200);
		} else {
			updateChart();
		}
	}

		$('#search').on('click', async function() {

			// ========================================================================
			// 【开发本部数据结构配置说明】
			// ========================================================================
			// 合计电量 = 系统采集数据 + 开发本部委托品质本部实验 - 扣除项合计（不要重复减）
			// ├── 研发中心（GCS柜） (4) - 扣除项合计 - 系统采集 减 扣除项合计

			// ├── 耐久实验室 (5) - 系统采集
			// ├── 焓差实验室 (320010) - 系统采集
			// ├── 冷热机组*2/3 (420005, 420006, 420007, 420008) * 2/3 - 系统采集
			// ├── 开发本部委托品质本部实验 (60001) - 人工录入（标红）（正数，显示比例）
			// └── 扣除项合计(计算值无no) =委托焓差实验室营业本部 (90003) + 委托实验室（大马力性能） (80001) + 委托实验室（耐久） (80002) + 二楼研发报告厅、喷泉（NO: 24）+ A座研发4楼照明（NO: 25） - 人工录入 加 人工录入 加 人工录入 加 系统采集 加 系统采集

			// - 扣除项合计：由上述5项计算得出，不是直接查询
			// - 公司总用电：(1,12,16,17,20,26,51,52) - 230003
			//
			// 计算逻辑：
			// 1. 查询系统采集的10个单元数据（包括NO.4, 24, 25等）
			// 2. 查询人工录入的4个单元数据（60001, 90003, 80001, 80002）
			// 3. 计算扣除项合计 = 90003 + 80001 + 80002 + 24 + 25
			// 4. 计算研发中心（GCS柜）= NO.4 - 扣除项合计
			// 5. 合计电量 = 所有系统采集总和 + 委托品质本部实验 - 扣除项合计
			// 6. 占比 = 各单元电量 / 合计电量 * 100%
			// ========================================================================
				
				// ========= 重新查询前清空表格 =========
				generateEmptyBody();

				// ========= 构建系统采集数据查询SQL =========
				var sql = ""
				+" with basedata as ( \n"
				// 研发中心GCS柜（5）

				+" 		FROM sum_elec_group_by_day \n"

		// 扣除项合计 = 委托焓差实验室营业本部(90003) + 委托实验室（大马力性能）(80001) + 委托实验室（耐久）(80002) + 二楼研发报告厅、喷泉(24) + A座研发4楼照明(25)

			'委托焓差实验室营业本部',
			'委托实验室（大马力性能）',
			'委托实验室（耐久）',
			'二楼研发报告厅、喷泉',
			'A座研发4楼照明'
		];
		
		for (let m = 1; m <= 12; m++) {
			let monthKouchuTotal = 0;
			
			kouchuItems.forEach(itemName => {
				const itemRow = mergedData.find(row => row.elec_name === itemName);
				if (itemRow && itemRow[`month${m}_elec`]) {
					monthKouchuTotal += itemRow[`month${m}_elec`];
				}
			});
			
			kouchuRow[`month${m}_elec`] = monthKouchuTotal > 0 ? monthKouchuTotal : null;
			// 【修正】先四舍五入再累加
			if (monthKouchuTotal > 0) {
				kouchuRow.sum_elec += Math.round(monthKouchuTotal);
			}
		}
		
		// 添加扣除项合计到数据中
		mergedData.push(kouchuRow);
		
		// ========= 重新计算研发中心（GCS柜）= NO.4 - 扣除项合计 =========
		const yanfaGcsOriginal = mergedData.find(row => row.elec_name === '研发中心（GCS柜）');
		if (yanfaGcsOriginal) {
			for (let m = 1; m <= 12; m++) {
				const originalVal = yanfaGcsOriginal[`month${m}_elec`] || 0;
				const kouchuVal = kouchuRow[`month${m}_elec`] || 0;
				const newVal = originalVal - kouchuVal;
				yanfaGcsOriginal[`month${m}_elec`] = newVal > 0 ? newVal : null;
			}
			
			// 重新计算研发中心的年度合计
			yanfaGcsOriginal.sum_elec = 0;
			for (let m = 1; m <= 12; m++) {
				const monthVal = yanfaGcsOriginal[`month${m}_elec`] || 0;
				if (monthVal > 0) {
					yanfaGcsOriginal.sum_elec += Math.round(monthVal);
				}
			}

		const totalRow = {
			elec_name: '合计电量',
			sum_elec: 0
		};
		
		// 找到委托品质本部实验的数据
		const weituoRow = mergedData.find(row => row.elec_name === '开发本部委托品质本部实验');
		
		// 需要排除的项目（不参与合计行计算，但扣除项要减）

			'委托焓差实验室营业本部',
			'委托实验室（大马力性能）',
			'委托实验室（耐久）',
			'二楼研发报告厅、喷泉',
			'A座研发4楼照明',
			'开发本部委托品质本部实验',
			'扣除项合计'
		];
		
		for (let m = 1; m <= 12; m++) {
			let monthTotal = 0;
			
			// 累加所有系统采集的数据（排除扣除项相关）
			mergedData.forEach(row => {
				if (!excludeItems.includes(row.elec_name)) {
					if (row[`month${m}_elec`]) {
						monthTotal += row[`month${m}_elec`];
					}
				}
			});
			
			// 加上委托品质本部实验
			if (weituoRow && weituoRow[`month${m}_elec`]) {
				monthTotal += weituoRow[`month${m}_elec`];
			}
			
			// 注意：研发中心（GCS柜）已经减去了扣除项，所以这里不需要再减
			
			totalRow[`month${m}_elec`] = monthTotal > 0 ? monthTotal : null;
			// 【修正】先四舍五入再累加
			if (monthTotal > 0) {
				totalRow.sum_elec += Math.round(monthTotal);
			}
		}
			
		mergedData.push(totalRow);
				
			// ========= 计算占比 =========

			const kouchuRelatedItems = [
				'委托焓差实验室营业本部',

				'委托实验室（耐久）',

				'A座研发4楼照明'
			];

						// 扣除项合计显示负占比
						finalData.data[j]["sum_ratio"] = (Math.round(-finalData.data[j]["sum_elec"] * 10000/sum_elec) / 100)+"%";
					} else {
						// 其他项目正常显示占比
						finalData.data[j]["sum_ratio"] = (Math.round(finalData.data[j]["sum_elec"] * 10000/sum_elec) / 100)+"%";
					}
				}
			}
			totalRow["sum_ratio"] = "100%";
				
				// ========= 获取公司总用电量（与动力实施课页面一致） =========
				let companySql = "with company_data as ( \n"
					+ "     select DATE_FORMAT(date, '%Y-%m-%d') as jDay, \n"
					+ "            CASE WHEN no IN (1,12,16,17,20,26,51,52) THEN sum_elec ELSE 0 END as main_elec, \n"
					+ "            CASE WHEN no = 230003 THEN sum_elec ELSE 0 END as bingshan_elec \n"
					+ "     from sum_elec_group_by_day \n"
					+ "     where date <= '"+enddate+"' \n"
					+ "     AND date >= '"+startdate+"' \n"
					+ "     and no in (1,12,16,17,20,26,51,52,230003) \n";
				
				// 如果当前日期在查询范围内，添加今日实时数据
				if(new Date(startdate).setHours(7, 0, 0, 0) <= compareDate &&  compareDate <= new Date(enddate).setHours(7, 0, 0, 0) ){
					companySql += "     union all \n"
					+ "     SELECT IF(HOUR(NOW()) >= 7, CURDATE(), DATE_SUB(CURDATE(), INTERVAL 1 DAY)) AS jDay, \n"
					+ "            SUM(CASE WHEN `NO` IN (1,12,16,17,20,26,51,52) THEN `d_elec` ELSE 0 END) AS main_elec, \n"
					+ "            SUM(CASE WHEN `NO` = 230003 THEN `d_elec` ELSE 0 END) AS bingshan_elec \n"
					+ "     FROM ( \n"
					+ "         SELECT `NO`, (MAX(`KWH`) - MIN(`KWH`)) AS `d_elec` \n"
					+ "         FROM `data_all` FORCE INDEX (date_no_KWH) \n"
					+ "         WHERE `date` >= IF(HOUR(NOW()) >= 7, \n"
					+ "                            DATE_ADD(CURDATE(), INTERVAL 7 HOUR), \n"
					+ "                            DATE_ADD(DATE_SUB(CURDATE(), INTERVAL 1 DAY), INTERVAL 7 HOUR)) \n"
					+ "             AND `NO` IN (1,12,16,17,20,26,51,52,230003) \n"
					+ "             AND `KWH` > 0 AND `KWH` < 9999999999 \n"
					+ "         GROUP BY `NO` \n"
					+ "     ) AS company_today \n";
				}
				
				companySql += " ) \n"
					+ " select (SUM(main_elec) - SUM(bingshan_elec)) as sum_elec \n"
					+ " from company_data \n";
				
				console.info('公司总用电量SQL:', companySql);
				var sum_elec_data = await sendSQL(companySql);

		function convertNumberToLetter(num) {
			if (num <= 25) {
				return String.fromCharCode(65 + num); // 将数字转换为大写字母
			} else {
				var quotient = Math.floor(num / 26) - 1;
				var remainder = num % 26;
				return convertNumberToLetter(quotient) + String.fromCharCode(65 + remainder); // 递归计算每一位的字母
			}
		}
