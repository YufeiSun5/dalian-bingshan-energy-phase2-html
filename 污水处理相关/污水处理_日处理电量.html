<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>污水处理_日处理电量</title>
    <script src="../js/echarts.js"></script>
    <script src="./污水处理_日处理电量-api.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #eee; 
        }
        #main-chart { width: 100%; height: 100%; }
        
        /* 简单的浮动提示 */
        .msg {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 4px;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="main-chart"></div>

    <script>
        // =========================================
        // 1. 图表状态管理器 (闭包环境，不污染全局)
        // =========================================
        const ChartManager = (function() {
            const dom = document.getElementById('main-chart');
            const chart = echarts.init(dom);

            // 内部状态
            const state = {
                currentDataIndex: 0,     // 当前 tooltip 显示的数据点索引
                autoPlayTimer: null,     // 自动播放定时器
                isAutoPlaying: false,    // 是否正在自动播放
                autoPlayInterval: 2000,  // 自动播放间隔（毫秒）
                totalDataPoints: 0       // 总数据点数
            };

            // 图例位置预设（固定在顶部，只控制左中右）
            const legendPresets = {
                left: { top: 10, left: 10, orient: 'horizontal', textStyle: { color: '#fff' } },
                center: { top: 10, left: 'center', orient: 'horizontal', textStyle: { color: '#fff' } },
                right: { top: 10, right: 10, orient: 'horizontal', textStyle: { color: '#fff' } }
            };

            // 初始化基础配置 (只执行一次)
            chart.setOption({
                tooltip: { 
                    trigger: 'axis',
                    confine: true,  // 限制 tooltip 在图表区域内
                    formatter: function(params) {
                        // 自定义 tooltip 格式，支持单位显示
                        let result = params[0].axisValue + '<br/>';
                        const option = chart.getOption();
                        const series = option.series || [];
                        
                        params.forEach(item => {
                            if (item.value != null && item.value !== '') {
                                // 从系列配置中获取单位
                                const seriesData = series[item.seriesIndex];
                                const seriesUnit = (seriesData && seriesData.unit) ? seriesData.unit : '';
                                result += item.marker + ' ' + item.seriesName + ': ' + item.value + seriesUnit + '<br/>';
                            }
                        });
                        return result;
                    },
                    axisPointer: { 
                        type: 'line',  // 改为 line 类型，只显示竖线
                        lineStyle: {
                            type: 'dashed',
                            color: '#999'
                        }
                    }
                },
                legend: { top: 10, left: 'center', orient: 'horizontal' },
                grid: { top: 50, bottom: 30, left: 50, right: 50 },  // 减小 bottom 值
                xAxis: { type: 'category', boundaryGap: false, data: [] },
                yAxis: { type: 'value', splitLine: { lineStyle: { type: 'dashed' } } },
                series: [],
                animation: false  // 禁用所有动画
            });

            // 监听鼠标移动，记录当前 tooltip 位置
            chart.on('mousemove', function(params) {
                if (params.dataIndex !== undefined) {
                    state.currentDataIndex = params.dataIndex;
                }
            });

            // 监听窗口缩放
            window.addEventListener('resize', () => chart.resize());

            // 检查数据点是否有效（不为 null/undefined）
            function isValidDataPoint(dataIndex) {
                const option = chart.getOption();
                const series = option.series || [];
                
                // 检查所有系列在该索引位置是否都有有效数据
                for (let i = 0; i < series.length; i++) {
                    const data = series[i].data;
                    if (data && data[dataIndex] != null && data[dataIndex] !== '') {
                        return true; // 只要有一个系列有数据就算有效
                    }
                }
                return false;
            }

            // 查找下一个有效的数据点索引
            function findNextValidDataIndex(startIndex) {
                if (state.totalDataPoints === 0) return -1;
                
                let nextIndex = startIndex;
                let attempts = 0;
                
                // 最多尝试遍历所有数据点
                while (attempts < state.totalDataPoints) {
                    nextIndex = (nextIndex + 1) % state.totalDataPoints;
                    
                    if (isValidDataPoint(nextIndex)) {
                        return nextIndex;
                    }
                    
                    attempts++;
                }
                
                return -1; // 没有找到有效数据点
            }

            // 自动播放函数
            function startAutoPlay() {
                if (state.isAutoPlaying) return;
                
                state.isAutoPlaying = true;
                state.autoPlayTimer = setInterval(() => {
                    if (state.totalDataPoints === 0) return;
                    
                    // 查找下一个有效的数据点
                    const nextValidIndex = findNextValidDataIndex(state.currentDataIndex);
                    
                    if (nextValidIndex === -1) {
                        console.warn('[AutoPlay] 没有找到有效数据点');
                        return;
                    }
                    
                    state.currentDataIndex = nextValidIndex;
                    
                    // 触发 tooltip 显示
                    chart.dispatchAction({
                        type: 'showTip',
                        seriesIndex: 0,
                        dataIndex: state.currentDataIndex
                    });
                }, state.autoPlayInterval);
                
                console.log('%c[AutoPlay] 已启动', "color: #00b894; background: #eee; padding: 2px 5px;");
            }

            function stopAutoPlay() {
                if (!state.isAutoPlaying) return;
                
                state.isAutoPlaying = false;
                if (state.autoPlayTimer) {
                    clearInterval(state.autoPlayTimer);
                    state.autoPlayTimer = null;
                }
                
                console.log('%c[AutoPlay] 已停止', "color: #e17055; background: #eee; padding: 2px 5px;");
            }

            function restoreTooltip() {
                if (state.totalDataPoints > 0 && state.currentDataIndex < state.totalDataPoints) {
                    chart.dispatchAction({
                        type: 'showTip',
                        seriesIndex: 0,
                        dataIndex: state.currentDataIndex
                    });
                }
            }

            // =========================================
            // 2. 核心：万能更新函数
            // =========================================
            function update(config = {}) {
                const finalOption = {};

                // --- A. 处理背景渐变 (backgroundGradient) ---
                if (config.backgroundGradient) {
                    const { colors, direction = 'vertical' } = config.backgroundGradient;
                    let gradientStyle = '';
                    
                    if (direction === 'vertical') {
                        gradientStyle = `linear-gradient(to bottom, ${colors.join(', ')})`;
                    } else if (direction === 'horizontal') {
                        gradientStyle = `linear-gradient(to right, ${colors.join(', ')})`;
                    } else if (direction === 'diagonal') {
                        gradientStyle = `linear-gradient(135deg, ${colors.join(', ')})`;
                    }
                    
                    document.body.style.background = gradientStyle;
                    // 同时设置 ECharts 的背景为透明，让 body 的渐变显示出来
                    finalOption.backgroundColor = 'transparent';
                }

                // --- B. 处理图例位置 (legendPosition) ---
                if (config.legendPosition && legendPresets[config.legendPosition]) {
                    finalOption.legend = legendPresets[config.legendPosition];
                }

                // --- B2. 处理图例文字颜色 (legendTextColor) ---
                if (config.legendTextColor) {
                    if (!finalOption.legend) {
                        finalOption.legend = {};
                    }
                    finalOption.legend.textStyle = { color: config.legendTextColor };
                }

                // --- C. 处理系列配置 (seriesConfig) ---
                if (config.seriesConfig && Array.isArray(config.seriesConfig)) {
                    finalOption.series = config.seriesConfig.map((cfg, idx) => {
                        const seriesItem = {
                            name: cfg.name || 'Line',
                            type: 'line',
                            smooth: cfg.smooth !== undefined ? cfg.smooth : true,
                            unit: cfg.unit || '',  // 保存单位信息到系列对象
                            data: []  // 初始化空数据
                        };
                        
                        // 设置线条颜色
                        if (cfg.color) {
                            seriesItem.lineStyle = { color: cfg.color };
                            seriesItem.itemStyle = { color: cfg.color };
                        }
                        
                        // 设置面积填充
                        if (cfg.areaStyle !== undefined) {
                            if (cfg.areaStyle === false || cfg.areaStyle === null) {
                                // 明确禁用面积填充
                                seriesItem.areaStyle = undefined;
                            } else if (typeof cfg.areaStyle === 'object') {
                                // 自定义面积样式
                                seriesItem.areaStyle = {
                                    color: cfg.areaStyle.color || cfg.color,  // 默认使用线条颜色
                                    opacity: cfg.areaStyle.opacity !== undefined ? cfg.areaStyle.opacity : 0.3
                                };
                            } else if (cfg.areaStyle === true) {
                                // 启用面积填充，使用线条颜色
                                seriesItem.areaStyle = {
                                    color: cfg.color,
                                    opacity: 0.3
                                };
                            }
                        }
                        // 默认不添加 areaStyle（即不显示面积填充）
                        
                        return seriesItem;
                    });
                }

                // --- D. 处理完整数据 (data) ---
                if (config.data) {
                    const { labels, series } = config.data;
                    
                    // 更新总数据点数
                    state.totalDataPoints = labels ? labels.length : 0;
                    
                    // 确保当前索引不越界
                    if (state.currentDataIndex >= state.totalDataPoints) {
                        state.currentDataIndex = Math.max(0, state.totalDataPoints - 1);
                    }
                    
                    // 设置 X 轴数据
                    finalOption.xAxis = { data: labels };
                    
                    // 设置系列数据，合并到已有的 series 配置中
                    if (finalOption.series) {
                        finalOption.series = finalOption.series.map((seriesItem, idx) => ({
                            ...seriesItem,
                            data: series[idx] || []
                        }));
                    } else {
                        finalOption.series = series.map((seriesData, idx) => ({
                            data: seriesData
                        }));
                    }
                }

                // --- E. 处理自动播放配置 (autoPlay) ---
                if (config.autoPlay !== undefined) {
                    if (config.autoPlay === true) {
                        startAutoPlay();
                    } else if (config.autoPlay === false) {
                        stopAutoPlay();
                    } else if (typeof config.autoPlay === 'object') {
                        // 支持配置自动播放间隔
                        if (config.autoPlay.interval) {
                            state.autoPlayInterval = config.autoPlay.interval;
                        }
                        if (config.autoPlay.enabled !== false) {
                            startAutoPlay();
                        }
                    }
                }

                // --- F. 处理其他任意 ECharts 属性 (透传) ---
                const { data, backgroundGradient, legendPosition, seriesConfig, autoPlay, ...others } = config;
                Object.assign(finalOption, others);

                // --- G. 执行更新 (Merge Mode，禁用动画) ---
                chart.setOption(finalOption, { notMerge: false, lazyUpdate: false, silent: false });
                
                // --- H. 恢复 tooltip 到之前的位置 ---
                setTimeout(() => {
                    restoreTooltip();
                }, 100);
                
                // 打印日志
                const logParts = [];
                if(data) logParts.push(`数据更新 [${data.labels?.length || 0}个点位]`);
                if(backgroundGradient) logParts.push(`背景渐变`);
                if(legendPosition) logParts.push(`图例位置 [${legendPosition}]`);
                if(seriesConfig) logParts.push(`系列配置 [${seriesConfig.length}条线]`);
                if(autoPlay !== undefined) logParts.push(`自动播放 [${autoPlay === true || (typeof autoPlay === 'object' && autoPlay.enabled !== false) ? 'ON' : 'OFF'}]`);
                if(Object.keys(others).length) logParts.push(`其他配置 [${Object.keys(others).join(',')}]`);
                console.log(`%c[Update] ${logParts.join(' | ')}`, "color: #00b894; background: #eee; padding: 2px 5px;");
            }

            // =========================================
            // 3. 标线管理函数
            // =========================================
            function setMarkLine(config) {
                if (!config || !Array.isArray(config)) {
                    console.error('setMarkLine 需要传入数组配置');
                    return;
                }

                const option = chart.getOption();
                const series = option.series || [];

                // 为每个系列添加标线
                const updatedSeries = series.map(seriesItem => {
                    const markLineData = config.map(mark => ({
                        yAxis: mark.value,
                        name: mark.name || '',
                        label: {
                            show: true,
                            position: 'end',
                            formatter: mark.name || `${mark.value}`,
                            color: mark.color || '#999'
                        },
                        lineStyle: {
                            type: 'dashed',
                            color: mark.color || '#999',
                            width: mark.width || 2
                        }
                    }));

                    return {
                        ...seriesItem,
                        markLine: {
                            symbol: 'none',  // 不显示箭头
                            data: markLineData
                        }
                    };
                });

                chart.setOption({
                    series: updatedSeries
                });

                console.log(`%c[MarkLine] 已设置 ${config.length} 条标线`, "color: #6c5ce7; background: #eee; padding: 2px 5px;");
            }

            function clearMarkLine() {
                const option = chart.getOption();
                const series = option.series || [];

                const updatedSeries = series.map(seriesItem => ({
                    ...seriesItem,
                    markLine: undefined
                }));

                chart.setOption({
                    series: updatedSeries
                });

                console.log(`%c[MarkLine] 已清除所有标线`, "color: #e17055; background: #eee; padding: 2px 5px;");
            }

            // =========================================
            // 4. 返回公共接口
            // =========================================
            return {
                update: update,
                startAutoPlay: startAutoPlay,
                stopAutoPlay: stopAutoPlay,
                setAutoPlayInterval: (interval) => {
                    state.autoPlayInterval = interval;
                    if (state.isAutoPlaying) {
                        stopAutoPlay();
                        startAutoPlay();
                    }
                },
                setMarkLine: setMarkLine,
                clearMarkLine: clearMarkLine
            };
        })();

        // =========================================
        // 5. 暴露给全局 Window
        // =========================================
        window.updateChart = ChartManager.update;
        window.chartControl = {
            startAutoPlay: ChartManager.startAutoPlay,
            stopAutoPlay: ChartManager.stopAutoPlay,
            setAutoPlayInterval: ChartManager.setAutoPlayInterval,
            setMarkLine: ChartManager.setMarkLine,
            clearMarkLine: ChartManager.clearMarkLine
        };

        // =========================================
        // 6. 控制台完整示例输出
        // =========================================
        console.clear();
        console.log("%c 🛠️ 万能更新函数就绪 ", "background:#333; color:#fff; padding:5px; border-radius:4px;");
        console.log("函数名：window.updateChart(config)\n");
