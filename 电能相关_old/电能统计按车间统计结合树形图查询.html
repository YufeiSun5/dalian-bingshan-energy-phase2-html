				var startdate = $("#ID-laydate-start-date-1_addData")[0].value;
				var enddate = $("#ID-laydate-end-date-1_addData")[0].value;
				if(startdate == ""||enddate == ""){
					layer.alert('没有选择添加日期！');
					return;
				}else if($("#insert_this_elec").val() == ""){
					layer.alert('没有填写具体电量！');
					return;
				}
				//验证所选天的该类型是否已经填写完具体的数据
				
				let sql = " select * from sum_elec_group_by_day where date >= '"+startdate+"' and date <= '"+enddate+"' and no = "+$("#insert_elec_class").val()+" ";
				
				var checkData = await sendSQL(sql);
				
				if(checkData.data.length != 0 ){
					layer.alert('该日期的该位置已经填写过数据！');
					return;
				}
				
				//开始存储数据
				 // 将字符串转换为Date对象
				const date1 = new Date(startdate);
				const date2 = new Date(enddate);

				// 计算两个日期之间的毫秒数差异
				const timeDiff = Math.abs(date2.getTime() - date1.getTime());

				// 将毫秒数转换为天数
				const diffDays = Math.ceil(timeDiff / (1000 * 3600 * 24))+1;
				let diffHours = Math.ceil(timeDiff / (1000 * 3600))+24;
				//return;
				//拼接添加字符串
				sql = " insert into sum_elec_group_by_day (no,date,sum_elec )values";
				
				for(let i=0;i<diffDays;i++){
					sql += " \n("+$("#insert_elec_class").val()+",DATE_ADD('"+startdate+"',INTERVAL "+i+" day) ,"+$("#insert_this_elec").val()+"/"+diffDays+"),";
				}
				sql = sql.substring(0, sql.length-1)+ ";";
				sql+= " \n insert into sum_elec_group_by_hour (no,date,sum_elec )values ";
				for(let i=0;i<diffHours;i++){
					sql += " \n("+$("#insert_elec_class").val()+",DATE_ADD(date_format('"+startdate+"','%Y-%m-%d 07:00:00') ,INTERVAL "+i+" hour) ,"+$("#insert_this_elec").val()+"/"+diffHours+"),";
				}
				sql = sql.substring(0, sql.length-1)+";";
				//sql = " insert into sum_elec_group_by_day (no,date,sum_elec )values("+$("#insert_elec_class").val()+",'"+$("#confirmDate")[0].value+"',"+$("#insert_this_elec").val()+") ";
				checkData = await sendSQL(sql);
				console.info(checkData);
				if(checkData.success == true){
					layer.msg('数据添加成功', {
						time: 1000, // 20s 后自动关闭
					},function(){
						//$('#search').click();
						layer.closeAll(); 
					});
					
				}else{
					layer.alert('数据添加失败！'+checkData.error.message);
					return;
				}
				
				
				//layer.msg('第一个回调', {icon: 1});

		function convertNumberToLetter(num) {
			if (num <= 25) {
				return String.fromCharCode(65 + num); // 将数字转换为大写字母
			} else {
				var quotient = Math.floor(num / 26) - 1;
				var remainder = num % 26;
				return convertNumberToLetter(quotient) + String.fromCharCode(65 + remainder); // 递归计算每一位的字母
			}
		}
