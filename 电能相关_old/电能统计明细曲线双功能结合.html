		// 切换查询模式的函数（单表/多表）
		function switchQueryMode(mode) {
			queryMode = mode;
			console.log('切换到查询模式：', mode);

			if(mode === "single"){
				// 显示单表查询控件，隐藏多表查询控件
				$("#single-query-controls").show();
				$("#multi-query-controls").hide();
				$("#single-query-layout").show();
				$("#multi-query-layout").hide();
			} else if(mode === "multiTable"){
				// 显示多表查询控件，隐藏单表查询控件
				$("#single-query-controls").hide();
				$("#multi-query-controls").show();
				$("#single-query-layout").hide();
				$("#multi-query-layout").show();
				
				// 初始化多表查询的日期范围选择器
				if(!laydateInstances.multiQuery){
					setTimeout(function() {
						// 设置默认范围：本月1日到今天
						let now = new Date();
						let firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
						
						function formatDate(date) {
							let year = date.getFullYear();
							let month = ('0' + (date.getMonth() + 1)).slice(-2);
							let day = ('0' + date.getDate()).slice(-2);
							return year + '-' + month + '-' + day;
						}
						
						let startDateStr = formatDate(firstDayOfMonth);
						let endDateStr = formatDate(now);
						let defaultRange = startDateStr + ' - ' + endDateStr;
						
						$('#multi-query-date-input').val('');
						
						laydateInstances.multiQuery = laydate.render({
							type: "date",
							elem: '#multi-query-date-input',
							range: true,
							format: 'yyyy-MM-dd',
							done: function(value, date, endDate){
								console.log('多表查询范围选择完成：', value);
								if(!value) return;
								
								let dates = value.split(' - ');
								if(dates.length === 2) {
									let startDate = new Date(dates[0]);
									let endDateObj = new Date(dates[1]);
									const millisecondsPerDay = 24 * 60 * 60 * 1000;
									const diffInMilliseconds = Math.abs(endDateObj.getTime() - startDate.getTime());
									const diffInDays = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1;
									
									// 限制最多31天
									if(diffInDays > 31){
										layer.alert("开始时间和结束时间最多相差31天");
										$('#multi-query-date-input').val('');
									}
								}
							}
						});
						
						// 设置默认值
						setTimeout(function() {
							$('#multi-query-date-input').val(defaultRange);
							console.log('多表查询设置默认范围（本月1日到今天）：', defaultRange);
						}, 100);
					}, 50);
				}
				
				// 初始化树形图（如果还没初始化）
				if(!window.treeInitialized){
					initTreeView();
					window.treeInitialized = true;
				}
			}

			// 重新渲染表单
			form.render();
		}

		// 切换时间选择模式的函数 - 使用独立的输入框和实例
		function switchTimeMode(mode) {
			timeMode = mode;
			console.log('切换到时间模式：', mode);

			// 隐藏所有容器
			$("#multi-date-container").hide();
			$("#range-date-container").hide();
			$("#selectedDate").hide();

			// 清理所有laydate实例
			$('.layui-laydate').remove();
			
			// 销毁旧的laydate实例
			Object.keys(laydateInstances).forEach(key => {
				if (laydateInstances[key]) {
					// laydate没有直接的销毁方法，通过移除事件监听器来清理
					laydateInstances[key] = null;
				}
			});

			if(mode === "multi"){
				// 多日模式：显示多日输入框 + 多选组件
				$("#multi-date-container").show();
				$("#selectedDate").show();

				// 清空输入框
				$('#multi-date-input').val('');
				
				setTimeout(function() {
					laydateInstances.multi = laydate.render({
						type: "date",
						elem: '#multi-date-input',
						value: new Date(),
						format: 'yyyy-MM-dd',  // 明确指定格式
						done: function(value, date, endDate){
							console.log('多日模式选择：', value);
							addDateToMultiSelect(value);
						}
					});
				}, 50);

				// 初始化多选组件并添加当天日期
				initMultiSelect();
				
				// 自动添加当天日期到多选组件
				setTimeout(function() {
					let today = new Date();
					let year = today.getFullYear();
					let month = ('0' + (today.getMonth() + 1)).slice(-2);
					let day = ('0' + today.getDate()).slice(-2);
					let todayStr = year + '-' + month + '-' + day;
					addDateToMultiSelect(todayStr);
				}, 100);

			} else if(mode === "range"){
				// 范围模式：显示范围输入框
				$("#range-date-container").show();

				// 设置默认范围：本月1日到今天
				let now = new Date();
				let firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1); // 本月1日

				// 使用标准的日期格式化方法，确保格式完全符合 yyyy-MM-dd
				function formatDate(date) {
					let year = date.getFullYear();
					let month = ('0' + (date.getMonth() + 1)).slice(-2); // 确保两位数
					let day = ('0' + date.getDate()).slice(-2); // 确保两位数
					return year + '-' + month + '-' + day;
				}

				let startDateStr = formatDate(firstDayOfMonth); // 本月1日
				let endDateStr = formatDate(now); // 今天
				let defaultRange = startDateStr + ' - ' + endDateStr;

				// 先清空输入框，避免格式冲突
				$('#range-date-input').val('');

				// 延迟渲染，确保DOM更新完成
				setTimeout(function() {
					// 渲染范围选择器 - 关键修复：使用 range: true 而不是字符串
					laydateInstances.range = laydate.render({
						type: "date",
						elem: '#range-date-input',
						range: true,  // 修复：使用布尔值 true，而不是字符串
						format: 'yyyy-MM-dd',  // 明确指定格式
						// 先不设置默认值，让laydate自己处理，避免格式问题
						// value: defaultRange,  
						done: function(value, date, endDate){
							console.log('范围选择完成：', value);
							if(!value) return;
							
							let dates = value.split(' - ');
							if(dates.length === 2) {
								let startDate = new Date(dates[0]);
								let endDateObj = new Date(dates[1]);
								const millisecondsPerDay = 24 * 60 * 60 * 1000;
								const diffInMilliseconds = Math.abs(endDateObj.getTime() - startDate.getTime());
								// 计算实际天数差（包含起始日期和结束日期）
								const diffInDays = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1;

								// 限制最多31天（包含起始和结束日期）
								if(diffInDays > 31){
									layer.alert("开始时间和结束时间最多相差31天");
									// 清空输入框，让用户重新选择
									$('#range-date-input').val('');
								}
							}
						}
					});
					
					// 渲染完成后，手动设置默认值
					setTimeout(function() {
						$('#range-date-input').val(defaultRange);
						console.log('设置默认范围（本月1日到今天）：', defaultRange);
					}, 100);
				}, 50); // 延迟50毫秒确保DOM更新完成
			}

			// 重新渲染表单
			form.render();
			console.log('模式', mode, '切换完成');
		}

		// 添加日期到多选组件 - 优化版本
		function addDateToMultiSelect(dateValue) {
			if(!dateValue) {
				console.warn('要添加的日期值为空');
				return;
			}

			try {
				console.log('尝试添加日期到多选组件：', dateValue);

				// 检查xmSelect是否可用
				if (!xmSelect) {
					console.error('xmSelect组件未加载，无法添加日期');
					layer.alert('多选组件未加载，请刷新页面重试');
					return;
				}

				// 检查全局实例是否存在
				if (!window.xmSelectInstance) {
					console.warn('xmSelect全局实例不存在，重新初始化');
					initMultiSelect();
					return;
				}

				// 获取当前选中的数据
				let currentValues = [];
				try {
					currentValues = window.xmSelectInstance.getValue() || [];
				} catch(e) {
					console.warn('获取当前值失败，重新初始化：', e);
					initMultiSelect();
					return;
				}

				// 检查日期是否已存在
				let exists = currentValues.some(item => item.value === dateValue);
				if(exists) {
					console.log('日期已存在，跳过添加：', dateValue);
					return;
				}

				// 添加新日期到数组
				let newValues = [...currentValues, {
					name: dateValue,
					value: dateValue,
					selected: true
				}];

				// 更新组件数据
				try {
					window.xmSelectInstance.update({
						data: newValues
					});
					console.log('成功添加日期到多选组件：', dateValue);
				} catch(e) {
					console.error('更新xmSelect数据失败：', e);
					// 备用方案：重新渲染整个组件
					renderMultiSelectWithNewData(newValues);
				}

			} catch (error) {
				console.error('添加日期到多选组件失败：', error);
				layer.alert('添加日期失败：' + error.message);
			}
		}

		// 备用方案：重新渲染整个多选组件
		function renderMultiSelectWithNewData(data) {
			try {
				// 销毁旧实例
				if(window.xmSelectInstance) {
					window.xmSelectInstance.destroy();
					window.xmSelectInstance = null;
				}

				// 清理DOM
				$('#selectedDate').empty();
				$('.xm-select-parent').remove();

				// 重新创建实例
				window.xmSelectInstance = xmSelect.render({
					el: '#selectedDate',
					data: data,
					name: 'multiDateSelect',
					filterable: false,
					toolbar: { show: true, list: ['ALL', 'CLEAR', 'REVERSE'] },
					on: function(data){
						console.log('多选组件重新渲染后的变化：', data);
					},
				});
				console.log('备用渲染方案成功，数据：', data);
			} catch(e) {
				console.error('备用渲染方案也失败了：', e);
				layer.alert('多选组件渲染失败，请刷新页面');
			}
		}

		// 单表查询逻辑
		async function performSingleTableQuery() {
			try {
				let classification = $('#classification').val();
				let xAxisData = [];
				let legendData = [];
				let seriesData = [];
				let selectDatas = [];

				if(timeMode === "multi"){
					// 多日模式：从多选组件获取数据
					try {
						if (!xmSelect) {
							layer.alert("多选组件未加载，无法查询");
							return;
						}

						let multiData;
						if (window.xmSelectInstance) {
							// 使用全局实例获取数据
							multiData = {
								options: {
									data: window.xmSelectInstance.getValue()
								}
							};
						} else {
							// 备用方案：尝试通过ID获取
							multiData = xmSelect.get('#selectedDate', true);
						}

						if (!multiData || !multiData.options || multiData.options.data.length === 0) {
							layer.alert("请选择至少一个日期");
							return;
						}
						for(let i = 0; i < multiData.options.data.length; i++){
							selectDatas.push(multiData.options.data[i].value);
						}
						console.log('多日模式，选中日期：', selectDatas);
					} catch (error) {
						console.error('多选数据获取失败：', error);
						layer.alert('获取多选日期失败：' + error.message);
						return;
					}
					
				} else if(timeMode === "range"){
					// 范围模式：从范围输入框获取数据
					let rangeDateInput = document.getElementById('range-date-input');
					if(!rangeDateInput || !rangeDateInput.value){
						layer.alert("请选择日期范围");
						return;
					}

					let rangeValue = rangeDateInput.value;
					// 解析范围字符串 "2025-11-01 - 2025-11-07"
					let dates = rangeValue.split(' - ');
					if(dates.length !== 2){
						layer.alert("日期范围格式错误");
						return;
					}

					let startdate = dates[0].trim();
					let enddate = dates[1].trim();

					// 生成日期范围内的所有日期
					let startDate = new Date(startdate);
					let endDate = new Date(enddate);
					const millisecondsPerDay = 24 * 60 * 60 * 1000;
					const diffInMilliseconds = Math.abs(endDate.getTime() - startDate.getTime());
					const days = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1; // 修复：使用Math.floor

					for(let i = 0; i < days; i++){
						let tempDate = new Date(startDate);
						tempDate.setDate(startDate.getDate() + i);
						let dateStr = tempDate.getFullYear() + "-" +
							((tempDate.getMonth() + 1) >= 10 ? (tempDate.getMonth() + 1) : "0" + (tempDate.getMonth() + 1)) + "-" +
							(tempDate.getDate() >= 10 ? tempDate.getDate() : "0" + tempDate.getDate());
						selectDatas.push(dateStr);
					}
				}

				// 按日期排序
				selectDatas.sort(function(a, b){
					return new Date(a) - new Date(b);
				});

				// 循环查询每一天的数据
				for(let i = 0; i < selectDatas.length; i++){
					var sql = " select DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as datetime,"+classification+" from data_all \n";
					sql+=" where date > DATE_ADD(DATE_SUB(DATE_FORMAT('"+selectDatas[i]+"','%Y-%m-%d 7:00:00'),INTERVAL 5 MINUTE ),INTERVAL 0 day) \n"
					+ "  and date < DATE_ADD(DATE_SUB(DATE_FORMAT('"+selectDatas[i]+"','%Y-%m-%d 7:00:00'),INTERVAL 5 MINUTE ),INTERVAL 1 day )   \n"
					+ "  and no = "+$("#sreachNo").val()+" " ;
					console.info(sql);
					const data = await sendSQL(sql);
					console.info(data);

					// 在第一次循环的时候确立时间x轴
					let datas = [];
					if(xAxisData.length == 0 && data.data.length != 0){
						for(let j = 0; j < data.data.length; j++){
							let tempdate = new Date(data.data[j].datetime);
							xAxisData.push((tempdate.getHours()>=10?tempdate.getHours():"0"+tempdate.getHours())+":"+(tempdate.getMinutes() >= 10?tempdate.getMinutes():"0"+tempdate.getMinutes())+":"+(tempdate.getSeconds()>=10?tempdate.getSeconds():"0"+tempdate.getSeconds()));
						}
					}

					// 循环确立legend名称和数据
					if(data.data.length>0){
						for(let j = 0; j < data.data.length; j++){
							datas.push(data.data[j][classification]);
						}
						let tempdate = new Date(data.data[0].datetime);
						let legendName = tempdate.getFullYear() + "-"+( (tempdate.getMonth() + 1) >= 10 ? (tempdate.getMonth() + 1):"0"+(tempdate.getMonth() + 1)) + "-" + (tempdate.getDate()>=10 ? tempdate.getDate() :"0"+tempdate.getDate())+$('#classification').find("option:selected").text();
						legendData.push(legendName);

						seriesData.push({
							name: legendName,
							type: 'line',
							markPoint: {
								data: [
									{ type: 'max', name: '最大值' },
									{ type: 'min', name: '最小值' }
								]
							},
							data: datas,
							smooth: 0.5 // 设置折线弧度
						});
					}
				}

				console.info(legendData);
				
				
				// 在这里继续处理查询结果，比如渲染表格
				// renderTable(data);
				var myChart = echarts.init(document.getElementById('chart'));
				var option = {
					//backgroundColor: 'rgb(8, 15, 51)',
					//title: {
					//  text: '历史曲线图'
					//},
					tooltip: {
						trigger: 'axis'
					},
					legend: {
						data: legendData,
						right: '10%',
						top: '5%',
						orient:'vertical',
						textStyle: {
							color: "#fff",
						},
					},
					grid: {
						left: '3%',
						right: '4%',
						top: '15%',
						bottom: '3%',
						containLabel: true
					},
					xAxis: {
						type: 'category',
						boundaryGap: false,
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							lineStyle:{
								color:"#fff"
							}
						},
						data: xAxisData
					},
					yAxis: {
						type: 'value',
						scale: true,
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							show:false,
							lineStyle:{
								color:"#fff"
							}
						},
						splitLine: {
							show: true,
							lineStyle: {
								color: '#ffff',
								//width: 2,
							},
						},
					},
					series: seriesData

				};
				
				if (option && typeof option === "object") {
					myChart.setOption(option, true);
				}
			} catch (err) {
				console.error('单表查询出错：', err);
				layer.alert('单表查询出错：' + err.message);
			}
		}

		// 多表查询逻辑（从多表查询页面复制过来）
		async function performMultiTableQuery() {
			try {
				//获取查询结果
				let classification = $('#classification').val();
				let dateRangeValue = $("#multi-query-date-input")[0].value;
				
				if(!dateRangeValue){
					layer.alert("请选择日期范围");
					return;
				}
				
				// 解析日期范围
				let dates = dateRangeValue.split(' - ');
				if(dates.length !== 2){
					layer.alert("日期范围格式错误");
					return;
				}
				
				let startdate = dates[0].trim();
				let enddate = dates[1].trim();
				
				console.log('多表查询日期范围：', startdate, '到', enddate);
				
				let xAxisData = [];
				let legendData = []; 	
				let	seriesData = [];			
				var checkedData = tree.getChecked('tree');
				var showData = [];
				var noArr = [];
				
				//先拼接name
				var namesql = "case no \n";
				for(let i=0;i<checkedData.length;i++){
					if(checkedData[i].title == '变压器主开关级'){
						continue;
					}
					showData.push(checkedData[i].id);
					if(checkedData[i].children != undefined){
						let children = checkedData[i].children;
						for(let j=0;j<children.length;j++){
							showData.push(children[j].id);
							if(children[j].no != undefined){
								noArr.push(children[j].no);
								namesql += " when "+children[j].no+" then '"+checkedData[i].title+"_" +children[j].title.replaceAll('&nbsp;','') +"' \n";
							}
						}
					}
				}
				namesql += " end as name, ";
				console.info(noArr.join(','));
				console.log("namesql",namesql);
				
				var sql = "";
				if(noArr.length > 0){
					sql += " select "+namesql+"DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as datetime,"+classification+" from data_all "
					+ " where date >= DATE_FORMAT('"+startdate+"','%Y-%m-%d 7:00:00')"
					+ "  and date <= DATE_ADD(DATE_FORMAT('"+enddate+"','%Y-%m-%d 7:00:00'),INTERVAL 1 day )   "
					+ "  and no in ("+noArr.join(',')+")  group by name,datetime   " ;
				}
				
				console.info(sql);
				//再拼接查询项
				for(let i=0;i<checkedData.length;i++){
					if(checkedData[i].title == '变压器主开关级'&&checkedData[i].children != undefined){
						let children = checkedData[i].children;
						for(let j=0;j<children.length;j++){
							if(sql != ""){
								sql += "\n union all \n";
							}
							sql+=" select " 
							+" '"+children[j].title +"' as name,  "
							+" DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as datetime, "
							+" sum(case when no in ("+children[j].no+") then  "+classification+" end ) as  "+classification+" "
							+" from data_all "
							+" where date >= DATE_FORMAT('"+startdate+"','%Y-%m-%d 7:00:00')  and date <= DATE_ADD(DATE_FORMAT('"+enddate+"','%Y-%m-%d 7:00:00'),INTERVAL 1 day ) "
							+" and no in ("+children[j].no+") "
							+" group by DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') ";
						}
					}
				}
				sql += "order by name ,datetime  ";
				const data = await sendSQL(sql);
				console.info(data);
				
				// 根据日期范围生成X轴时间数据
				const startDateTime = new Date(startdate);
				startDateTime.setHours(7, 0, 0, 0);
				
				const endDateTime = new Date(enddate);
				endDateTime.setDate(endDateTime.getDate() + 1);
				endDateTime.setHours(7, 0, 0, 0);
				
				// 循环遍历从开始日期早上7点到结束日期第二天早上7点之间的每个分钟
				const currentTime = new Date(startDateTime);
				while (currentTime <= endDateTime) {
					
					const formattedTime = currentTime.getFullYear() +"-"
					+ ((currentTime.getMonth() + 1)<10?"0"+(currentTime.getMonth() + 1):(currentTime.getMonth() + 1))+"-" 
					+ (currentTime.getDate()<10?"0"+currentTime.getDate():currentTime.getDate()) + " "
					+ (currentTime.getHours()<10?"0"+currentTime.getHours():currentTime.getHours())+":"
					+ (currentTime.getMinutes()<10?"0"+currentTime.getMinutes():currentTime.getMinutes())+":"
					+ (currentTime.getSeconds()<10?"0"+currentTime.getSeconds():currentTime.getSeconds());
					xAxisData.push(formattedTime);
					currentTime.setMinutes(currentTime.getMinutes() + 1);
				}
				
				console.info(xAxisData);
				if(data.data.length > 0){
					let name = data.data[0].name;
					let firstname = data.data[0].name;
					let datas = [];
