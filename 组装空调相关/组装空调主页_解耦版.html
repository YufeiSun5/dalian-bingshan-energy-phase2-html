<script>
	/* ===========================================
	   页面管理器（PageManager）
	   功能：管理多页面切换、模块初始化和导航状态
	   =========================================== */
	const PageManager = {
		// 当前激活的页面ID（初始为空，避免showPage方法提前返回）
		currentPage: '',
		
		/**
		 * 初始化页面管理器
		 * 绑定事件并显示默认页面
		 */
		init: function() {
			this.bindEvents();
			// 移除默认初始化页面的逻辑
			// this.showPage('gantt');
		},
		
		/**
		 * 绑定页面相关事件
		 * 主要处理导航菜单的点击事件
		 */
		bindEvents: function() {
			const self = this;
			
			// 导航链接点击事件处理
			$('.nav-link').on('click', function(e) {
				e.preventDefault(); // 阻止默认链接跳转
				const pageId = $(this).data('page'); // 获取页面ID
				self.showPage(pageId); // 显示对应页面
				self.updateNavigation(pageId); // 更新导航状态
			});
		},
		
		/**
		 * 显示指定页面
		 * @param {string} pageId - 页面ID
		 */
		showPage: function(pageId) {
			console.log(`显示页面: ${pageId}, 当前页面: ${this.currentPage}`);
			
			// 如果已经是当前页面，则不重复操作
			if (this.currentPage === pageId) {
				console.log('页面已经是当前页面，跳过切换');
				return;
			}
			
			// 隐藏所有页面容器
			$('.page-container').removeClass('active');
			
			// 显示选中的页面容器
			$('#' + pageId + '-page').addClass('active');
			console.log(`页面容器 ${pageId}-page 已激活`);
			
			// 如果是甘特图页面，先重置状态
			if (pageId === 'gantt' && window.GanttModule && window.GanttModule.reset) {
				console.log('重置甘特图模块状态');
				window.GanttModule.reset();
			}
			
			// 初始化页面对应的功能模块
			this.initPageModule(pageId);
			
			// 更新当前页面记录
			this.currentPage = pageId;
		},
		
		/**
		 * 初始化页面功能模块
		 * 根据页面ID调用对应模块的初始化方法
		 * @param {string} pageId - 页面ID
		 */
		initPageModule: function(pageId) {
			// 确保页面切换动画完成后再初始化模块
			setTimeout(() => {
				console.log('正在初始化页面模块:', pageId);
				
				switch(pageId) {
					case 'device-distribution':
						// 初始化设备分布概图模块
						if (window.DeviceDistributionModule) {
							window.DeviceDistributionModule.init();
						} else {
							console.error('DeviceDistributionModule模块未找到');
						}
						break;
					case 'power-report':
						// 初始化电量报表模块
						if (window.PowerReportModule) {
							window.PowerReportModule.init();
						} else {
							console.error('PowerReportModule模块未找到');
						}
						break;
					case 'power-curve':
						// 初始化电量曲线模块
						if (window.PowerCurveModule) {
							window.PowerCurveModule.init();
						} else {
							console.error('PowerCurveModule模块未找到');
						}
						break;
					case 'gantt':
						// 初始化运行时间甘特图模块
						if (window.OperationTimeGanttModule) {
							window.OperationTimeGanttModule.init();
						} else {
							console.error('OperationTimeGanttModule模块未找到');
						}
						break;
				}
			}, 200); // 增加延迟时间到200ms，确保页面切换动画完成
		},
		
		/**
		 * 更新导航栏状态
		 * 移除所有active类，为当前页面添加active类
		 * @param {string} pageId - 页面ID
		 */
		updateNavigation: function(pageId) {
			$('.nav-link').removeClass('active'); // 移除所有导航项的激活状态
			$('.nav-link[data-page="' + pageId + '"]').addClass('active'); // 激活当前页面导航
		}
	};

	/* ===========================================
	   应用程序入口
	   初始化LayUI组件并启动页面管理器
	   =========================================== */
	layui.use(['form', 'laydate', 'util', 'excel', 'xmSelect', 'element'], function() {
		// 将layui实例暴露到全局作用域，供各模块使用
		window.layui = layui;
		// 将jQuery实例暴露到全局作用域，供各模块使用
		window.$ = layui.$;
		
		console.log('LayUI组件加载完成，准备启动页面管理器');
		
		// 确保所有组件都已加载完成后再启动页面管理器
		setTimeout(() => {
			console.log('启动页面管理器');
			PageManager.init();
		}, 500); // 延迟500ms确保所有LayUI组件完全就绪
	});
</script>
