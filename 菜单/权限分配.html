<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户权限分配</title>
    <link href="../js/css/layui.css" rel="stylesheet">
    <script type="text/javascript" src="../js/layui.js"></script>
    <script src="menu_config.js"></script>
    <style>
        /* ========== 全局样式 (深蓝科技风，与大马力大屏一致) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            font-family: 'PingFang SC', "Microsoft YaHei", sans-serif;
            background: #0f266c;
            color: #fff;
            font-size: 13px;
            overflow: hidden;
        }

        .page-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
        }

        /* 顶部工具栏 */
        .toolbar {
            background: #1d386f;
            border: 1px solid #2a6dc8;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            height: 60px;
        }

        .toolbar-left { display: flex; align-items: center; gap: 20px; }
        .toolbar-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .toolbar-title { font-size: 18px; font-weight: bold; color: #fff7ca; }
        .toolbar-right { display: flex; align-items: center; gap: 10px; }

        /* 内容区域 */
        .content-area { 
            flex: 1; 
            display: flex; 
            gap: 8px; 
            overflow: hidden;
        }

        /* 左侧用户列表 */
        .left-panel {
            width: 350px;
            flex-shrink: 0;
            background: #1d386f;
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 15px;
            background: rgba(12, 110, 211, 0.4);
            border-bottom: 1px solid #2a6dc8;
            font-weight: bold;
            font-size: 15px;
            color: #fff7ca;
        }

        .user-controls {
            padding: 15px;
            border-bottom: 1px solid #2a6dc8;
        }

        .user-controls input {
            width: 100%;
            background: rgba(40, 80, 167, 0.6);
            border: 1px solid #2a6dc8;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .user-controls input::placeholder { color: rgba(185, 211, 244, 0.6); }
        .user-controls input:focus { border-color: #409eff; outline: none; background: rgba(40, 80, 167, 0.8); }

        .btn-group { display: flex; gap: 8px; }
        .layui-btn { height: 32px; line-height: 32px; font-size: 13px; }
        .layui-btn-normal { background-color: #1e88e5 !important; }
        .layui-btn-warm { background-color: #ffb800 !important; }
        .layui-btn-danger { background-color: #e53935 !important; }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(30, 78, 137, 0.6);
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-item:hover {
            background: rgba(48, 127, 190, 0.9);
            border-color: #409eff;
        }

        .user-item.active {
            background: rgba(30, 136, 229, 0.5);
            border-color: #1e88e5;
            box-shadow: 0 0 8px rgba(30, 136, 229, 0.5);
        }

        .user-item-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }

        .user-item-info {
            font-size: 12px;
            color: #b9d3f4;
        }

        /* 右侧权限分配 */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1d386f;
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            overflow: hidden;
        }

        .permission-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .no-selection {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #b9d3f4;
            font-size: 16px;
        }

        .info-tip {
            background: rgba(30, 136, 229, 0.2);
            border-left: 3px solid #1e88e5;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            color: #b9d3f4;
            font-size: 12px;
        }

        .drag-container { display: flex; gap: 15px; min-height: 400px; }

        .drag-section {
            flex: 1;
            background: rgba(30, 78, 137, 0.4);
            border: 2px dashed #2a6dc8;
            border-radius: 4px;
            padding: 15px;
            min-height: 350px;
        }

        .drag-section h3 {
            margin-bottom: 15px;
            color: #fff7ca;
            font-size: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a6dc8;
        }

        .page-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(40, 80, 167, 0.5);
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            cursor: move;
            transition: all 0.3s;
            font-size: 13px;
            color: #fff;
        }

        .page-item:hover {
            background: rgba(48, 127, 190, 0.8);
            border-color: #409eff;
        }

        .page-item.dragging { opacity: 0.5; }

        .page-item-title { font-weight: bold; margin-bottom: 4px; }
        .page-item-code { font-size: 12px; color: #b9d3f4; }

        .drag-section.drag-over {
            background: rgba(30, 136, 229, 0.3);
            border-color: #1e88e5;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3c8ce7 0%, #2a6dc8 50%, #1e5aa8 100%);
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #4a9aff 0%, #3c8ce7 50%, #2a6dc8 100%);
        }
        ::-webkit-scrollbar-track {
            background: #1d386f;
            border-radius: 6px;
        }

        .empty-hint {
            text-align: center;
            color: #b9d3f4;
            padding: 20px;
            font-size: 13px;
        }

        /* 修复 layui 弹窗样式 */
        .layui-layer-content { color: #333 !important; }
        .layui-layer-prompt input { color: #333 !important; }
        .layui-layer-msg { color: #333 !important; }
        .layui-layer-dialog .layui-layer-content { color: #333 !important; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="toolbar">
            <div class="toolbar-left"></div>
            <div class="toolbar-center">
                <span class="toolbar-title">用户权限分配管理</span>
            </div>
            <div class="toolbar-right"></div>
        </div>

        <div class="content-area">
            <!-- 左侧用户列表 -->
            <div class="left-panel">
                <div class="panel-header">
                    <i class="layui-icon layui-icon-user"></i> 用户列表
                </div>
                <div class="user-controls">
                    <input type="text" id="userIdInput" placeholder="用户ID/编号">
                    <input type="text" id="userNameInput" placeholder="用户名称/部门">
                    <div class="btn-group">
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="addUser()">
                            <i class="layui-icon layui-icon-add-1"></i> 新增
                        </button>
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-warm" onclick="saveUser()">
                            <i class="layui-icon layui-icon-ok"></i> 保存
                        </button>
                        <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" onclick="deleteUser()">
                            <i class="layui-icon layui-icon-delete"></i> 删除
                        </button>
                    </div>
                </div>
                <div class="user-list" id="userList"></div>
            </div>

            <!-- 右侧权限分配 -->
            <div class="right-panel">
                <div class="panel-header">
                    <i class="layui-icon layui-icon-set"></i> 权限分配（拖拽页面进行分配）
                </div>
                <div class="permission-area" id="permissionArea">
                    <div class="info-tip">
                        <i class="layui-icon layui-icon-tips"></i> 
                        请在左侧选择一个用户，然后通过拖拽方式将页面在「可用页面」与「已分配页面」之间移动，完成权限分配。
                    </div>
                    <div class="no-selection">← 请先选择一个用户</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    layui.use(['layer'], function() {
        var layer = layui.layer;

        // 配置
        const CONFIG = {
            SQL_API: 'http://192.168.7.229:8004/api/sql/run-sql'
        };

        // 当前选中的用户
        let currentUser = null;
        let allUsers = [];
        let allPages = [];

        // 发送SQL请求
        async function sendSQL(sql) {
            try {
                const response = await fetch(CONFIG.SQL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                return await response.json();
            } catch (error) {
                console.error('SQL请求失败:', error);
                throw error;
            }
        }

        // 从菜单配置中提取所有页面
        function extractPages(items, parentName = '') {
            items.forEach(item => {
                if (item.page !== undefined) {
                    const fullName = parentName ? `${parentName} > ${item.name}` : item.name;
                    allPages.push({
                        page: item.page,
                        name: item.name,
                        fullName: fullName
                    });
                }
                if (item.children && item.children.length > 0) {
                    const newParent = parentName ? `${parentName} > ${item.name}` : item.name;
                    extractPages(item.children, newParent);
                }
            });
        }

        // 加载用户列表
        async function loadUsers() {
            try {
                const sql = 'SELECT id_code, dept_name, page_list FROM sy.sys_user_permissions ORDER BY id_code';
                console.log('执行SQL:', sql);
                const result = await sendSQL(sql);
                
                if ((result.success || result.code === 0) && result.data) {
                    allUsers = result.data;
                    renderUserList();
                    console.log('加载用户成功:', allUsers.length, '个');
                } else {
                    console.error('加载用户失败:', result);
                    layer.msg('加载用户失败', { icon: 2 });
                }
            } catch (error) {
                console.error('加载用户失败:', error);
                layer.msg('加载用户失败: ' + error.message, { icon: 2 });
            }
        }

        // 渲染用户列表
        function renderUserList() {
            const userList = document.getElementById('userList');
            if (allUsers.length === 0) {
                userList.innerHTML = '<div class="empty-hint">暂无用户，请添加</div>';
                return;
            }

            userList.innerHTML = allUsers.map(user => {
                const pageCount = user.page_list ? user.page_list.split(',').length : 0;
                return `
                    <div class="user-item ${currentUser && currentUser.id_code === user.id_code ? 'active' : ''}" 
                         onclick="selectUser('${user.id_code}')">
                        <div class="user-item-name">${user.dept_name}</div>
                        <div class="user-item-info">ID: ${user.id_code} | 权限: ${pageCount}个页面</div>
                    </div>
                `;
            }).join('');
        }

        // 选择用户
        function selectUser(idCode) {
            currentUser = allUsers.find(u => u.id_code === idCode);
            if (currentUser) {
                document.getElementById('userIdInput').value = currentUser.id_code;
                document.getElementById('userNameInput').value = currentUser.dept_name;
                renderUserList();
                renderPermissionArea();
            }
        }

        // 渲染权限分配区域
        function renderPermissionArea() {
            const permissionArea = document.getElementById('permissionArea');
            
            if (!currentUser) {
                permissionArea.innerHTML = `
                    <div class="info-tip">
                        <i class="layui-icon layui-icon-tips"></i> 
                        请在左侧选择一个用户，然后通过拖拽方式将页面在「可用页面」与「已分配页面」之间移动，完成权限分配。
                    </div>
                    <div class="no-selection">← 请先选择一个用户</div>
                `;
                return;
            }

            // 获取用户已有权限
            const userPages = currentUser.page_list ? 
                currentUser.page_list.split(',').map(p => parseInt(p.trim())) : [];

            // 分类页面：已分配和未分配
            const assignedPages = allPages.filter(p => userPages.includes(p.page));
            const availablePages = allPages.filter(p => !userPages.includes(p.page));

            permissionArea.innerHTML = `
                <div class="info-tip">
                    <i class="layui-icon layui-icon-tips"></i> 
                    当前用户：<strong>${currentUser.dept_name}</strong>，拖拽页面在两侧之间移动以分配或取消权限，修改后请点击「保存」按钮。
                </div>
                <div class="drag-container">
                    <div class="drag-section" id="availableSection" ondrop="drop(event, 'available')" ondragover="allowDrop(event)">
                        <h3>可用页面 (${availablePages.length})</h3>
                        ${availablePages.map(p => createPageItem(p)).join('')}
                        ${availablePages.length === 0 ? '<div class="empty-hint">所有页面已分配</div>' : ''}
                    </div>
                    <div class="drag-section" id="assignedSection" ondrop="drop(event, 'assigned')" ondragover="allowDrop(event)">
                        <h3>已分配页面 (${assignedPages.length})</h3>
                        ${assignedPages.map(p => createPageItem(p)).join('')}
                        ${assignedPages.length === 0 ? '<div class="empty-hint">暂未分配任何页面</div>' : ''}
                    </div>
                </div>
            `;
        }

        // 创建页面项HTML
        function createPageItem(page) {
            return `
                <div class="page-item" draggable="true" ondragstart="drag(event)" data-page="${page.page}">
                    <div class="page-item-title">${page.name}</div>
                    <div class="page-item-code">${page.fullName} (${page.page})</div>
                </div>
            `;
        }

        // 拖拽开始
        function drag(event) {
            event.dataTransfer.setData('page', event.target.dataset.page);
            event.target.classList.add('dragging');
        }

        // 允许放置
        function allowDrop(event) {
            event.preventDefault();
            const section = event.currentTarget;
            section.classList.add('drag-over');
        }

        // 放置
        function drop(event, targetSection) {
            event.preventDefault();
            const pageNum = parseInt(event.dataTransfer.getData('page'));
            
            // 移除拖拽样式
            document.querySelectorAll('.drag-section').forEach(s => s.classList.remove('drag-over'));
            document.querySelectorAll('.page-item').forEach(p => p.classList.remove('dragging'));

            if (!currentUser) return;

            // 更新用户权限
            let userPages = currentUser.page_list ? 
                currentUser.page_list.split(',').map(p => parseInt(p.trim())) : [];

            if (targetSection === 'assigned') {
                // 添加权限
                if (!userPages.includes(pageNum)) {
                    userPages.push(pageNum);
                }
            } else {
                // 移除权限
                userPages = userPages.filter(p => p !== pageNum);
            }

            // 更新当前用户数据
            currentUser.page_list = userPages.join(',');
            
            // 重新渲染
            renderPermissionArea();
            
            console.log('权限已更新（未保存）:', currentUser.page_list);
        }

        // 移除拖拽样式
        document.addEventListener('dragleave', function(event) {
            if (event.target.classList.contains('drag-section')) {
                event.target.classList.remove('drag-over');
            }
        });

        // 暴露给全局，供内联事件调用
        window.selectUser = selectUser;
        window.addUser = addUser;
        window.saveUser = saveUser;
        window.deleteUser = deleteUser;
        window.drag = drag;
        window.allowDrop = allowDrop;
        window.drop = drop;

        // 新增用户
        async function addUser() {
            const idCode = document.getElementById('userIdInput').value.trim();
            const deptName = document.getElementById('userNameInput').value.trim();

            if (!idCode || !deptName) {
                layer.msg('请输入用户ID和名称', { icon: 0 });
                return;
            }

            // 检查是否已存在
            if (allUsers.some(u => u.id_code === idCode)) {
                layer.msg('该用户ID已存在', { icon: 0 });
                return;
            }

            try {
                const sql = `INSERT INTO sy.sys_user_permissions (id_code, dept_name, page_list) VALUES ('${idCode}', '${deptName}', '')`;
                console.log('执行SQL:', sql);
                const result = await sendSQL(sql);

                if (result.success || result.code === 0) {
                    layer.msg('新增成功', { icon: 1 });
                    await loadUsers();
                    // 自动选中新增的用户
                    selectUser(idCode);
                } else {
                    layer.msg('新增失败: ' + (result.message || '未知错误'), { icon: 2 });
                }
            } catch (error) {
                console.error('新增失败:', error);
                layer.msg('新增失败: ' + error.message, { icon: 2 });
            }
        }

        // 保存用户权限
        async function saveUser() {
            if (!currentUser) {
                layer.msg('请先选择一个用户', { icon: 0 });
                return;
            }

            const idCode = document.getElementById('userIdInput').value.trim();
            const deptName = document.getElementById('userNameInput').value.trim();

            if (!idCode || !deptName) {
                layer.msg('请输入用户ID和名称', { icon: 0 });
                return;
            }

            try {
                const sql = `UPDATE sy.sys_user_permissions SET dept_name = '${deptName}', page_list = '${currentUser.page_list}' WHERE id_code = '${currentUser.id_code}'`;
                console.log('执行SQL:', sql);
                const result = await sendSQL(sql);

                if (result.success || result.code === 0) {
                    layer.msg('保存成功', { icon: 1 });
                    await loadUsers();
                    selectUser(currentUser.id_code);
                } else {
                    layer.msg('保存失败: ' + (result.message || '未知错误'), { icon: 2 });
                }
            } catch (error) {
                console.error('保存失败:', error);
                layer.msg('保存失败: ' + error.message, { icon: 2 });
            }
        }

        // 删除用户
        async function deleteUser() {
            if (!currentUser) {
                layer.msg('请先选择一个用户', { icon: 0 });
                return;
            }

            layer.confirm('确定要删除用户 "' + currentUser.dept_name + '" 吗？', {
                icon: 3,
                title: '确认删除',
                btn: ['确定', '取消']
            }, function(index) {
                layer.close(index);
                doDeleteUser();
            });
        }

        async function doDeleteUser() {
            try {
                const sql = `DELETE FROM sy.sys_user_permissions WHERE id_code = '${currentUser.id_code}'`;
                console.log('执行SQL:', sql);
                const result = await sendSQL(sql);

                if (result.success || result.code === 0) {
                    layer.msg('删除成功', { icon: 1 });
                    currentUser = null;
                    document.getElementById('userIdInput').value = '';
                    document.getElementById('userNameInput').value = '';
                    await loadUsers();
                    renderPermissionArea();
                } else {
                    layer.msg('删除失败: ' + (result.message || '未知错误'), { icon: 2 });
                }
            } catch (error) {
                console.error('删除失败:', error);
                layer.msg('删除失败: ' + error.message, { icon: 2 });
            }
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', function() {
            console.log('初始化权限分配页面...');
            
            // 从菜单配置中提取所有页面
            if (typeof MENU_CONFIG !== 'undefined' && MENU_CONFIG.menu_items) {
                extractPages(MENU_CONFIG.menu_items);
                console.log('提取页面成功:', allPages.length, '个');
            } else {
                console.error('无法加载菜单配置');
                layer.msg('无法加载菜单配置，请检查 menu_config.js 文件', { icon: 2 });
            }

            // 加载用户列表
            loadUsers();
        });
    });
    </script>
</body>
</html>
