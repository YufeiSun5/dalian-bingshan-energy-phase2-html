<script>
	// RealtimeTemperatureModule 已移到 page-modules.js 中

	/* ===========================================
	   页面管理器（PageManager）
	   功能：管理多页面切换、模块初始化和导航状态
	   =========================================== */
	const PageManager = {
		// 当前激活的页面ID（初始为空，避免showPage方法提前返回）
		currentPage: '',
		
		/**
		 * 初始化页面管理器
		 * 绑定事件并显示默认页面
		 */
		init: function() {
			this.bindEvents();
			// 默认初始化实时数据页面
			this.showPage('realtime');
			// 设置默认导航菜单选中状态
			this.updateNavigation('realtime');
		},
		
		/**
		 * 绑定页面相关事件
		 * 主要处理导航菜单的点击事件
		 */
		bindEvents: function() {
			const self = this;
			
			// 导航链接点击事件处理
			$('.nav-link').on('click', function(e) {
				e.preventDefault(); // 阻止默认链接跳转
				const pageId = $(this).data('page'); // 获取页面ID
				self.showPage(pageId); // 显示对应页面
				self.updateNavigation(pageId); // 更新导航状态
			});
		},
		
		/**
		 * 显示指定页面
		 * @param {string} pageId - 页面ID
		 */
		showPage: function(pageId) {
			console.log(`显示页面: ${pageId}, 当前页面: ${this.currentPage}`);
			
			// 如果已经是当前页面，则不重复操作
			if (this.currentPage === pageId) {
				console.log('页面已经是当前页面，跳过切换');
				return;
			}
			
			// 隐藏所有页面容器
			$('.page-container').removeClass('active');
			
			// 显示选中的页面容器
			$('#' + pageId + '-page').addClass('active');
			console.log(`页面容器 ${pageId}-page 已激活`);
			
			// 如果是甘特图页面，先重置状态
			if (pageId === 'gantt' && window.GanttModule && window.GanttModule.reset) {
				console.log('重置甘特图模块状态');
				window.GanttModule.reset();
			}
			
			// 初始化页面对应的功能模块
			this.initPageModule(pageId);
			
			// 更新当前页面记录
			this.currentPage = pageId;
		},
		
		/**
		 * 初始化页面功能模块
		 * 根据页面ID调用对应模块的初始化方法
		 * @param {string} pageId - 页面ID
		 */
		initPageModule: function(pageId) {
			// 确保页面切换动画完成后再初始化模块
			setTimeout(() => {
				console.log('正在初始化页面模块:', pageId);
				
				switch(pageId) {
					case 'gantt':
						// 初始化甘特图模块
						if (window.GanttModule) {
							window.GanttModule.init();
						} else {
							console.error('GanttModule模块未找到');
						}
						break;
					case 'realtime':
					// 初始化实时温度监控模块
					if (window.RealtimeTemperatureModule) {
						window.RealtimeTemperatureModule.init();
						} else {
						console.error('RealtimeTemperatureModule模块未找到');
						}
						break;
					case 'voltage-report':
						// 初始化报表模块
						if (window.ReportModule) {
							window.ReportModule.init();
						} else {
							console.error('ReportModule模块未找到');
						}
						break;
					case 'voltage-curve':
						// 初始化曲线模块
						if (window.CurveModule) {
							window.CurveModule.init();
							// 确保图表正确显示
							setTimeout(() => {
								if (window.CurveModule.chartInstance) {
									window.CurveModule.chartInstance.resize();
								}
							}, 300);
						} else {
							console.error('CurveModule模块未找到');
						}
						break;
				}
			}, 200); // 增加延迟时间到200ms，确保页面切换动画完成
		},
		
		/**
		 * 更新导航栏状态
		 * 移除所有active类，为当前页面添加active类
		 * @param {string} pageId - 页面ID
		 */
		updateNavigation: function(pageId) {
			$('.nav-link').removeClass('active'); // 移除所有导航项的激活状态
			$('.nav-link[data-page="' + pageId + '"]').addClass('active'); // 激活当前页面导航
		}
	};

	/* ===========================================
	   应用程序入口
	   初始化LayUI组件并启动页面管理器
	   =========================================== */
	layui.use(['form', 'laydate', 'util', 'excel', 'xmSelect', 'element'], function() {
		// 将layui实例暴露到全局作用域，供各模块使用
		window.layui = layui;
		// 将jQuery实例暴露到全局作用域，供各模块使用
		window.$ = layui.$;
		
		console.log('LayUI组件加载完成，准备启动页面管理器');
		console.log('启动页面管理器');
		PageManager.init();
		
		/* ========== SQL数据更新示例（页面初始化时调用）==========
		 * 如果你想在页面打开时自动调用SQL获取数据，可以取消注释下面的代码
		 * 并根据你的需求进行修改
		 * 
		 * 使用方法：
		 * 1. 替换 sendSQL() 函数中的API地址为你自己的后端服务地址
		 * 2. 修改SQL语句和数据处理部分来获取你需要的数据
		 * 3. 根据你的页面结构修改 CompressorSystemUpdate.updateAll() 的数据参数
		 * ========================================================*/
		
		// 方式1：页面加载完成后5秒调用一次（可选）
		// setTimeout(() => {
		//     fetchAndUpdateData();
		// }, 5000);
		
		// 方式2：定期刷新数据（每60秒更新一次）
		// setInterval(() => {
		//     fetchAndUpdateData();
		// }, 60000);

	async function sendSQL(strsql) {
		const sql = strsql;
		console.info(sql);
		const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json',
				'Accept': 'application/json'
			},
			body: JSON.stringify({ sql })
		});

		const data = await res.json();
		return data;

	}

	/**

	 * 
	 * 使用方法：
	 * 1. 更新单个变压器：updateTemp('station1_trans1', {tempA: 45.2, tempB: 46.1, tempC: 44.8, fanStatus: '运行'})

	 * 3. 查看所有变压器ID：showTransformers()
	 * 4. 生成测试数据：generateTestData()
	 */
	
	// 更新单个变压器数据
	window.updateTemp = function(transformerId, data) {
		if (window.RealtimeTemperatureModule) {
			console.log('🔄 开始更新变压器:', transformerId);
			window.RealtimeTemperatureModule.updateTransformerData(transformerId, data);
		} else {
			console.error('❌ 实时温度模块未初始化');
		}
	};
	
	// 批量更新所有变压器数据
	window.updateAllTemp = function(allData) {
		if (window.RealtimeTemperatureModule) {
			console.log('🔄 开始批量更新变压器，数量:', Object.keys(allData).length);
			window.RealtimeTemperatureModule.updateAllData(allData);
		} else {
			console.error('❌ 实时温度模块未初始化');
		}
	};
	
	// 显示所有可用的变压器ID
	window.showTransformers = function() {
		if (window.RealtimeTemperatureModule) {
			return window.RealtimeTemperatureModule.getTransformerIds();
		} else {
			console.error('❌ 实时温度模块未初始化');
		}
	};
	
	// 调试：查看当前表格数据
	window.showCurrentData = function() {
		if (window.RealtimeTemperatureModule) {
			const data = window.RealtimeTemperatureModule.getAllData();
			console.table(data);
			return data;
		} else {
			console.error('❌ 实时温度模块未初始化');
		}
	};
	
	// 调试：强制刷新表格
	window.forceRefresh = function() {
		if (window.RealtimeTemperatureModule) {

			window.RealtimeTemperatureModule.refreshTable();
		} else {
			console.error('❌ 实时温度模块未初始化');
		}
	};
