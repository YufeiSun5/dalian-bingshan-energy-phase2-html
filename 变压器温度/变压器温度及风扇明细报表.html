<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var table = layui.table;
		var $ = layui.$;
		let currentDay = new Date();
		currentDay.setDate(1);
		var dateValue = "day";
		
		
		currentDay.setHours(7, 0, 0, 0);

		// 加载日期
		var datetest =  laydate.render({
			type:"date",
			elem: '#ID-laydate-start-date-1',
			value: new Date(), // 设置初始日期
		});
		
		// 变电所选择联动逻辑
		form.on('select(substation)', function(data){
			updateMeterOptions(data.value);
			// 变电所切换后，也要更新表头（因为变压器列表变了）
			var transformerId = $('#sreachNo').val();
			updateTableColumns(data.value, transformerId);
		});
		
		// 变压器选择联动逻辑 - 切换时更新表头
		form.on('select(sreachNo)', function(data){
			var substationId = $('#substation').val();
			var transformerId = data.value;
			updateTableColumns(substationId, transformerId);
		});

		// 更新变压器选择选项的函数
		function updateMeterOptions(substationId) {
			var meterSelect = document.getElementById('sreachNo');
			meterSelect.innerHTML = ''; // 清空现有选项

			var options = '';
			
			if (substationId === '1') {
				// 只显示一号变电所的变压器
				options = `
					<option value="all" selected>全部</option>
					<option value="1_1">1#变压器</option>
					<option value="1_2">2#变压器</option>
				`;
			} else if (substationId === '2') {
				// 只显示二号变电所的变压器
				options = `
					<option value="all" selected>全部</option>
					<option value="2_1">1#变压器</option>
					<option value="2_2">2#变压器</option>
					<option value="2_3">3#变压器</option>
					<option value="2_4">4#变压器</option>
				`;
			} else if (substationId === '3') {
				// 只显示三号变电所的变压器
				options = `
					<option value="all" selected>全部</option>
					<option value="3_1">1#变压器</option>
					<option value="3_2">2#变压器</option>
				`;
			}

			meterSelect.innerHTML = options;
			form.render('select'); // 重新渲染下拉框
		}
		
		// 更新表格列配置（根据选择的变压器）
		function updateTableColumns(substationId, transformerId) {
			var cols = [];
			
			if(transformerId === 'all'){
				// 选择"全部"时，动态生成所有变压器的列
				var transformers = [];
				if(substationId === '1'){
					transformers = [{id: '1_1', name: '1#变压器'}, {id: '1_2', name: '2#变压器'}];
				} else if(substationId === '2'){
					transformers = [
						{id: '2_1', name: '1#变压器'}, 
						{id: '2_2', name: '2#变压器'},
						{id: '2_3', name: '3#变压器'},
						{id: '2_4', name: '4#变压器'}
					];
				} else if(substationId === '3'){
					transformers = [{id: '3_1', name: '1#变压器'}, {id: '3_2', name: '2#变压器'}];
				}
				
				// 添加时间列
				cols.push({field: 'date',title: '时间',width: 170,align:"center"});
				
				// 为每个变压器添加温度和风扇列
				for(var i = 0; i < transformers.length; i++){
					var t = transformers[i];
					cols.push({field: 'temp1_' + t.id, title: t.name + '温度1', align:"center"});
					cols.push({field: 'temp2_' + t.id, title: t.name + '温度2', align:"center"});
					cols.push({field: 'temp3_' + t.id, title: t.name + '温度3', align:"center"});
					cols.push({field: 'fan_' + t.id, title: t.name + '风扇', align:"center"});
				}
			} else {
				// 选择单个变压器时，显示标准列
				cols = [
					{field: 'date',title: '时间',width: 170,align:"center"},
					{field: 'temperature1', title: '温度1', align:"center" },
					{field: 'temperature2', title: '温度2', align:"center" },
					{field: 'temperature3', title: '温度3', align:"center" },
					{field: 'fan', title: '风扇', align:"center" }
				];
			}
			
			// 重新渲染表格（只更新表头，数据为空）
			table.render({
				elem: '#test',
				cols: [cols],
				data: [],
				even: true,
				height: $("#table_form").height()-1,
				text: {
					none: '请点击查询按钮获取数据'
				}
			});
			
			console.log('表头已更新，当前列数：', cols.length);
		}
		
		
		form.on('select(interest)', function(data){
			debugger;
			if(dateValue != data.value){
				dateValue = data.value;
				if(dateValue == "day"){//如果是单天日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").hide();
					$("#ID-laydate-end-date-1").parent().hide();
					//$('#layui-laydate4').remove();
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-rangeLinked',
						range:false
					});
					laydate.render({
						type:"date",
						elem: '#ID-laydate-start-date-1',
						value: new Date(), // 设置初始日期
					});
					/*laydate.render({
						type:"date",
						elem: '#ID-laydate-rangeLinked',
						range: [],
						rangeLinked: false, // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
					});*/
				}else{//如果是自定义日期查询形式
					$("#ID-laydate-rangeLinked .layui-form-mid").show();
					$("#ID-laydate-end-date-1").parent().show();
					let date = new Date();
					date.setDate(date.getDate() - 7);
					date.setHours(7, 0, 0, 0);
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-start-date-1',
						value: date, // 设置初始日期
					});
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-end-date-1',
						value: new Date(), // 设置初始日期
					});
					laydate.render({
						type:"datetime",
						elem: '#ID-laydate-rangeLinked',
						range: ['#ID-laydate-start-date-1', '#ID-laydate-end-date-1'],
						rangeLinked: true // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
					});
				}
			}
		});
		
		
		// 初始化表格 - 根据默认选择的变电所和变压器设置表头
		var initialSubstationId = $('#substation').val();
		var initialTransformerId = $('#sreachNo').val();
		updateTableColumns(initialSubstationId, initialTransformerId);
		$('#search').on('click', async function() {
			debugger;
			try {
				//获取查询结果
				var startdate ;
				var enddate;
				startdate = $("#ID-laydate-start-date-1")[0].value;
				if(dateValue == "diy"){
					enddate = $("#ID-laydate-end-date-1")[0].value;
					//开始时间和结束时间比对
					if( new Date(enddate).getTime() - new Date(startdate).getTime() > 7 * 86400000){
						layer.msg("开始时间和结束时间的间隔不能超过七天");
						return;
					}
				}
				
				var substationId = $('#substation').val();
				var transformerId = $('#sreachNo').val();
				
				// 判断是否选择了"全部"
				if(transformerId === 'all'){
					// 查询该变电所下所有变压器的数据
					await queryAllTransformers(substationId, startdate, enddate);
				} else {
					// 查询单个变压器的数据
					await querySingleTransformer(transformerId, startdate, enddate);
				}
				
			} catch (err) {
				console.error('查询出错：', err);
			}
		});
		
	// 查询单个变压器数据
	async function querySingleTransformer(transformerId, startdate, enddate) {
		var sql = " select DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as date,temperature1,temperature2,temperature3,fan from data_all FORCE INDEX (date_no_KWH) ";
		
		if(dateValue == "day"){
			sql+=" where date>= DATE_FORMAT('"+startdate+"', '%Y-%m-%d 07:00:00') and date < DATE_FORMAT(DATE_ADD('"+startdate+"',INTERVAL 24 HOUR), '%Y-%m-%d 07:00:00')  "
		}else{
			sql+=" where date>='"+startdate+"' and date<'"+enddate+"' ";
		}
		sql += " and no = "+transformerId+" " 
		+" order by id desc ";
		console.info(sql);
		const data = await sendSQL(sql);
		console.info(data);
		
		table.render({
			elem: '#test',
			cols: [[ // 表头配置项
				{field: 'date',title: '时间',width: 170,align:"center"}, // 日期
				{field: 'temperature1', title: '温度1', align:"center" }, // 温度
				{field: 'temperature2', title: '温度2', align:"center" }, // 温度
				{field: 'temperature3', title: '温度3', align:"center" }, // 温度
				{field: 'fan', title: '风扇', align:"center" }, // 风扇
			]],
			data: data.data,
			even: true,
			height: $("#table_form").height()-1,
		});
	}
		
		// 查询所有变压器数据（选择"全部"时）
		async function queryAllTransformers(substationId, startdate, enddate) {
			// 根据变电所ID获取变压器列表
			var transformers = [];
			if(substationId === '1'){
				transformers = [{id: '1_1', name: '1#变压器'}, {id: '1_2', name: '2#变压器'}];
			} else if(substationId === '2'){
				transformers = [
					{id: '2_1', name: '1#变压器'}, 
					{id: '2_2', name: '2#变压器'},
					{id: '2_3', name: '3#变压器'},
					{id: '2_4', name: '4#变压器'}
				];
			} else if(substationId === '3'){
				transformers = [{id: '3_1', name: '1#变压器'}, {id: '3_2', name: '2#变压器'}];
			}
			
			// 构建动态列配置
			var cols = [{field: 'date',title: '时间',width: 170,align:"center"}];
			
			// 为每个变压器添加温度和风扇列
			for(var i = 0; i < transformers.length; i++){
				var t = transformers[i];
				cols.push({field: 'temp1_' + t.id, title: t.name + '温度1', align:"center"});
				cols.push({field: 'temp2_' + t.id, title: t.name + '温度2', align:"center"});
				cols.push({field: 'temp3_' + t.id, title: t.name + '温度3', align:"center"});
				cols.push({field: 'fan_' + t.id, title: t.name + '风扇', align:"center"});
			}
			
			// 查询所有变压器的数据
			var allData = {};
			for(var i = 0; i < transformers.length; i++){
				var t = transformers[i];
				var sql = " select DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as date,temperature1,temperature2,temperature3,fan from data_all FORCE INDEX (date_no_KWH) ";
				
				if(dateValue == "day"){
					sql+=" where date>= DATE_FORMAT('"+startdate+"', '%Y-%m-%d 07:00:00') and date < DATE_FORMAT(DATE_ADD('"+startdate+"',INTERVAL 24 HOUR), '%Y-%m-%d 07:00:00')  "
				}else{
					sql+=" where date>='"+startdate+"' and date<'"+enddate+"' ";
				}
				sql += " and no = "+t.id+" " 
				+" order by id desc ";
				console.info(sql);
				const data = await sendSQL(sql);
				
				// 将数据按时间组织
				for(var j = 0; j < data.data.length; j++){
					var row = data.data[j];
					var dateKey = row.date;
					if(!allData[dateKey]){
						allData[dateKey] = {date: dateKey};
					}
					allData[dateKey]['temp1_' + t.id] = row.temperature1;
					allData[dateKey]['temp2_' + t.id] = row.temperature2;
					allData[dateKey]['temp3_' + t.id] = row.temperature3;
					allData[dateKey]['fan_' + t.id] = row.fan;
				}
			}
			
			// 转换为数组
			var tableData = [];
			for(var key in allData){
				tableData.push(allData[key]);
			}
			
			// 按时间排序
			tableData.sort(function(a, b){
