<script>
	layui.use(['form', 'laydate', 'util','excel','xmSelect'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var table = layui.table;
		 var element = layui.element;
		var $ = layui.$;
		let currentDay = new Date();
		currentDay.setDate(1);
		var dateValue = "day";
		
		
		currentDay.setHours(7, 0, 0, 0);

		// 加载日期
		laydate.render({
			type:"datetime",
			elem: '#ID-laydate-start-date-1',
			value: currentDay, // 设置初始日期
		});
		laydate.render({
			type:"datetime",
			elem: '#ID-laydate-end-date-1',
			value: new Date(), // 设置初始日期
		});
		laydate.render({
			type:"datetime",
			elem: '#ID-laydate-rangeLinked',
			range: ['#ID-laydate-start-date-1', '#ID-laydate-end-date-1'],
			rangeLinked: true // 开启日期范围选择时的区间联动标注模式 ---  2.8+ 新增
		});
		
		//加载空压机数据
		/*var demo1 = xmSelect.render({
			el: '#selectedCompressor', 
			data: [
				{name: '空压机1', value: '空压机1',selected:false},
				{name: '空压机2', value: '空压机2',selected:false},
				{name: '空压机3', value: '空压机3',selected:false},
				//{name: '北京', value: 4,selected:false},
			],
			on: function(data){
				debugger;
				//arr:  当前多选已选中的数据
				var arr = data.arr;
				//change, 此次选择变化的数据,数组
				var change = data.change;
				//isAdd, 此次操作是新增还是删除
				var isAdd = data.isAdd;
				//alert('已有: '+arr.length+' 变化: '+change.length+', 状态: ' + isAdd)
				//可以return一个数组, 代表想选中的数据
				//return []
			},
		})*/
		
		
		

		$('#search').on('click', async function() {
			debugger;
			try {
				//获取查询结果
				var startdate ;
				var enddate;
				startdate = $("#ID-laydate-start-date-1")[0].value;
				enddate = $("#ID-laydate-end-date-1")[0].value;
				let selectDatas = [];
				
				for(let i=0;i<xmSelect.get('#selectedCompressor', true).options.data.length;i++){
					if(xmSelect.get('#selectedCompressor', true).options.data[i].selected == true){
						selectDatas.push(xmSelect.get('#selectedCompressor', true).options.data[i].value);
					}
				}
				if(selectDatas.length == 0){
					layer.alert('未选择空压机！');
					return;
				}
				//let datediff = ((new Date(enddate) - new Date(startdate))/1000)+86400 ;
				
				var sql = ""
				
				+" select MachineID,State,StateID,DATE_FORMAT(StartTime,'%Y-%m-%d %H:%i:%s') as StartTime,DATE_FORMAT(EndTime,'%Y-%m-%d %H:%i:%s') as EndTime,ROUND(LastTime/60,2) as LastTime from historyrecord_compressor_machinestate \n"
				+" where machineID in ('"+selectDatas.join("','")+"') \n"
				+" and StartTime >= '"+startdate+"' and StartTime <= '"+enddate+"' "
				+" order by stateID,machineID,startTime ";

				
				
				console.info(sql);
				const data = await sendSQL(sql);
				console.info(data);
				
				let yAxisData = [];
				let seriesData_run = [];//运行
				let seriesData_free = [];//空闲
				let seriesData_shutdown = [];//停机
				let seriesData_fault = [];//故障
				
				for(let i=0;i<data.data.length;i++){
					if(yAxisData.indexOf(data.data[i].MachineID) < 0 ){//如果还没有加过此位置的名称，添加一下
						yAxisData.push(data.data[i].MachineID);
					}
					switch(data.data[i].StateID){
						case 1://运行
							seriesData_run.push({
									name: "status"+(i+1),
									value: [
										yAxisData.indexOf(data.data[i].MachineID),
										data.data[i].StartTime,
										data.data[i].EndTime,
										data.data[i].MachineID,
										data.data[i].State,
										data.data[i].LastTime
									]
								});
								
							break;
						case 2://故障
							seriesData_fault.push({
									name: "status"+(i+1),
									value: [
										yAxisData.indexOf(data.data[i].MachineID),
										data.data[i].StartTime,
										data.data[i].EndTime,
										data.data[i].MachineID,
										data.data[i].State,
										data.data[i].LastTime
									]
								});
							break;
						case 3://停机
							seriesData_shutdown.push({
									name: "status"+(i+1),
									value: [
										yAxisData.indexOf(data.data[i].MachineID),
										data.data[i].StartTime,
										data.data[i].EndTime,
										data.data[i].MachineID,
										data.data[i].State,
										data.data[i].LastTime
									]
								});
							break;
						case 4://空闲
							seriesData_free.push({
									name: "status"+(i+1),
									value: [
										yAxisData.indexOf(data.data[i].MachineID),
										data.data[i].StartTime,
										data.data[i].EndTime,
										data.data[i].MachineID,
										data.data[i].State,
										data.data[i].LastTime
									]
								});
							break;
					}
				}
				console.log("yAxisData",yAxisData);

				var myChart = echarts.init(document.getElementById('chart'));
				option = {
					tooltip: {
						formatter: function(params) {
							return params.marker + params.value[3] + ': ' + params.value[4] + '<br/>开始时间:' + params.value[1] + '<br/>结束时间:' + params.value[2] + '<br/>状态时长:' + params.value[5] + ' min';
						}
					
					},
					title: {
						text: "设备状态时长统计",
						textStyle: {
							color: "#fff",
						},
						left: "left",
						top: 5
					},
					dataZoom: [
						{
							type: "slider",
							filterMode: "weakFilter",
							showDataShadow: false,
							height: 10,
							borderColor: "transparent",
							backgroundColor: "#00EBFF",
							handleIcon: "M10.7,11.9H9.3c-4.9,0.3-8.8,4.4-8.8,9.4c0,5,3.9,9.1,8.8,9.4h1.3c4.9-0.3,8.8-4.4,8.8-9.4C19.5,16.3,15.6,12.2,10.7,11.9z M13.3,24.4H6.7v-1.2h6.6z M13.3,22H6.7v-1.2h6.6z M13.3,19.6H6.7v-1.2h6.6z",
							handleSize: 20,
							handleStyle: {
								shadowBlur: 6,
								shadowOffsetX: 1,
								shadowOffsetY: 2,
								shadowColor: "#aaa"
							},
							labelFormatter: ""
						},
						{
							type: "inside",
							filterMode: "weakFilter"
						}
					],
					grid: {
						left: "5%",
						right: "5%",
						top: "10%",
						bottom: "10%",
						containLabel: true
					},
					xAxis: {
						min: startdate,
						max: enddate,
						scale: true,
						type: "time",
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							lineStyle:{
								color:"#fff"
							}
						},
					},
					yAxis: {
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							
							lineStyle:{
								color:"#fff"
							}
						},
						
						data: yAxisData
					},
					color: [
						"#00FF00",
						"#FFFF00",
						"#FF4040",
						"#CFCFCF"
					],
					legend: {
						top: 20,
						textStyle: {
							color: "#fff",
						},
						data: [
							"运行",
							"空闲",
							"故障",
							"停机"
						]
					},
					series: [
						{
							name: "运行",
							type: "custom",
							renderItem: renderItem,
							itemStyle: {
								normal: {
									opacity: 1
								}
							},
							encode: {
								x: [
									1,
									2
								],
								y: 0
							},
							data: seriesData_run
						},
						{
							"name": "空闲",
							"type": "custom",
							renderItem: renderItem,
							"itemStyle": {
								"normal": {
									"opacity": 1
								}
							},
							"encode": {
								"x": [
									1,
									2
								],
								"y": 0
							},
							"data": seriesData_free
						},
						{
							"name": "故障",
							"type": "custom",
							renderItem: renderItem,
							"itemStyle": {
								"normal": {
									"opacity": 1
								}
							},
							"encode": {
								"x": [
									1,
									2
								],
								"y": 0
							},
							"data": seriesData_fault
						},
						{
							"name": "停机",
							"type": "custom",
							renderItem: renderItem,
							"itemStyle": {
								"normal": {
									"opacity": 1
								}
							},
							"encode": {
								"x": [
									1,
									2
								],
								"y": 0
							},
							"data": seriesData_shutdown
						}
					]
				};
				function renderItem(params, api) {
					var categoryIndex = api.value(0);
					var start = api.coord([api.value(1), categoryIndex]);
					var end = api.coord([api.value(2), categoryIndex]);
					var height = api.size([0, 1])[1] * 0.6;
				
					var rectShape = echarts.graphic.clipRectByRect({
						x: start[0],
						y: start[1] - height / 2,
						width: end[0] - start[0],
						height: height
					}, {
						x: params.coordSys.x,
						y: params.coordSys.y,
						width: params.coordSys.width,
						height: params.coordSys.height
					});
					return rectShape && {
						type: 'rect',
						shape: rectShape,
						style: api.style()
					};
				}
				
				
				
				
				
				
				
				if (option && typeof option === "object") {
					myChart.setOption(option, true);
				}
				
				
				
				// 在这里继续处理查询结果，比如渲染表格
				// renderTable(data);
			} catch (err) {
				console.error('查询出错：', err);
			}
		});
		
		
		async function sendSQL(strsql) {
			const sql = strsql;
			console.info(sql);
			const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({ sql })
			});

			const data = await res.json();
			return data;
			
			//document.getElementById('responseBox').textContent = JSON.stringify(data, null, 2);
		}
	
	});
	
	</script>
