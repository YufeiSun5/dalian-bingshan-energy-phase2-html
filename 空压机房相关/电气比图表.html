<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="user-scalable=0, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, width=device-width"/>
    <title>通用上面图下面表</title>
    <!-- 核心依赖 -->
    <link href="../js/css/layui.css" rel="stylesheet">
    <script src="../js/echarts.js"></script>
    <script src="../js/layui.js"></script>
    <script>
        layui.config({ base: '../js/layui_exts/' }).extend({ excel: 'excel' });
    </script>
    <!-- 配置文件（数据和配置由此文件提供） -->
    <script src="./chart-table-config.js"></script>
    <style>
        /* ========== 基础样式重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            font-family: 'PingFang SC', "Helvetica Neue", Helvetica, "microsoft yahei", arial, sans-serif;
            background: #0f266c;
            color: #fff;
            font-size: 13px;
            overflow: hidden;
        }

        /* ========== 主容器布局 ========== */
        .page-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
        }

        /* ========== 顶部工具栏 ========== */
        .toolbar {
            background: #1d386f;
            border: 1px solid #2a6dc8;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .toolbar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .toolbar-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff7ca;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 日期选择器样式 */
        .date-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-group label {
            color: #b9d3f4;
            white-space: nowrap;
        }

        .date-group input {
            background: rgba(40, 80, 167, 1);
            border: 1px solid rgba(40, 80, 167, 0);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            width: 120px;
        }

        .date-group input:focus {
            border-color: #409eff;
            outline: none;
        }

        /* 日期分隔符 */
        .date-separator {
            color: #b9d3f4;
        }

        /* 时间类型切换按钮组 */
        .time-type-group {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }

        .time-type-btn {
            padding: 6px 14px;
            border: 1px solid #2a6dc8;
            background: transparent;
            color: #b9d3f4;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .time-type-btn:hover {
            background: rgba(42, 109, 200, 0.3);
            color: #fff;
        }

        .time-type-btn.active {
            background: #1e88e5;
            border-color: #1e88e5;
            color: white;
        }

        /* 按钮样式 - 使用 Layui 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            /* Layui 默认样式 */
        }

        .btn-export {
            /* Layui 橙色样式 */
        }

        /* ========== 内容区域 ========== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            min-height: 0;
        }

        /* ========== 图表区域 - 占比约 2/5 ========== */
        .charts-section {
            background: #1d386f;
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            flex: 2;
            min-height: 0;
            overflow: hidden;
        }

        /* 图表区域标题栏 - 与表格标题栏样式一致 */
        .charts-header {
            background: #29498e;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid #2a6dc8;
        }

        .charts-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff7ca;
        }

        .charts-info {
            font-size: 12px;
            color: #b9d3f4;
        }

        /* 图表内容区域 */
        .charts-body {
            flex: 1;
            display: flex;
            gap: 10px;
            padding: 10px;
            min-height: 0;
            overflow: hidden;
        }

        /* 图表容器 - 无边框 */
        .chart-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #102a5c;
            border-radius: 4px;
            border: 1px solid #3c8ce7;
            overflow: hidden;
        }

        .chart-body {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .chart-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ========== 表格区域 - 占比约 3/5 ========== */
        .tables-section {
            flex: 3;
            background: #1d386f;
            border: 1px solid #2a6dc8;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .tables-header {
            background: #29498e;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid #2a6dc8;
        }

        .tables-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff7ca;
        }

        .tables-info {
            font-size: 12px;
            color: #b9d3f4;
        }

        .tables-body {
            flex: 1;
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            min-height: 0;
        }

        /* 单个表格容器 */
        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            background: #102a5c;
            border-radius: 4px;
            border: 1px solid #3c8ce7;
        }

        .table-scroll {
            flex: 1;
            overflow: auto;
            min-height: 0;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #3c8ce7;
            padding: 8px 6px;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
        }

        /* 表头默认样式 - 浅蓝色 */
        .data-table thead th {
            background: #0c6ed3;
            color: #fff;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table tbody td {
            background: #1e4e89;
            color: #fff;
        }


        .data-table thead th:first-child {
            z-index: 15;
        }

        /* 高亮列（最后三列）- 黄色 */
        .data-table .highlight-col {
            background: #ffc107 !important;
            color: #000 !important;
        }

        /* 数值列（居中对齐） */
        .data-table .num-col {
            text-align: center;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        /* 特殊样式：比值列（绿色） */
        .data-table .ratio-col {
            color: #00e676;
            font-weight: bold;
        }

        /* 行hover效果 */
        .data-table tbody tr:hover td {
            background: rgba(48, 127, 190, 0.91);
        }

        .data-table tbody tr:hover td:first-child {
            background: #ffb300;
        }

        .data-table tbody tr:hover td.highlight-col {
            background: #ffca28 !important;
        }

        /* ========== 滚动条美化 ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3c8ce7 0%, #2a6dc8 50%, #1e5aa8 100%);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #4a9aff 0%, #3c8ce7 50%, #2a6dc8 100%);
        }

        ::-webkit-scrollbar-track {
            background: #1d386f;
            border-radius: 6px;
        }

        ::-webkit-scrollbar-corner {
            background: #1d386f;
        }

        /* ========== Layui 样式覆盖 ========== */
        .layui-btn {
            height: auto;
            line-height: normal;
            padding: 6px 16px;
            border-radius: 2px;
            border: 1px solid transparent;
            background-color: #16baaa;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        .layui-btn:hover {
            background-color: #0e9688;
            border-color: transparent;
        }

        .layui-bg-orange {
            background-color: #ffb800 !important;
            color: #fff !important;
            border-color: #ffb800 !important;
        }

        .layui-bg-orange:hover {
            background-color: #ffa500 !important;
        }

        .layui-icon {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="date-group" id="date-group">
                    <label id="date-label">日期范围</label>
                    <input type="text" id="start-date" placeholder="开始日期" autocomplete="off">
                    <span class="date-separator" id="date-separator">-</span>
                    <input type="text" id="end-date" placeholder="结束日期" autocomplete="off">
                </div>
                <!-- 月/年 切换按钮组 -->
                <div class="time-type-group">
                    <button class="time-type-btn active" data-type="month">月</button>
                    <button class="time-type-btn" data-type="year">年</button>
                </div>
            </div>
            <div class="toolbar-center">
                <span class="toolbar-title" id="page-title">数据统计报表</span>
            </div>
            <div class="toolbar-right">
                <button type="button" id="btn-search" class="btn layui-btn">
                    <i class="layui-icon layui-icon-search"></i>
                    <span style="margin-left:5px">查询</span>
                </button>
                <button type="button" id="btn-export" class="btn layui-btn layui-bg-orange">
                    <span style="margin-right:5px">导出</span>
                    <i class="layui-icon layui-icon-print"></i>
                </button>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 图表区域 -->
            <div class="charts-section">
                <div class="charts-header">
                    <span class="charts-title" id="charts-title">图表数据</span>
                    <span class="charts-info" id="charts-info"></span>
                </div>
                <div class="charts-body" id="charts-body"></div>
            </div>

            <!-- 表格区域 -->
            <div class="tables-section">
                <div class="tables-header">
                    <span class="tables-title" id="tables-title">数据明细</span>
                    <span class="tables-info" id="tables-info"></span>
                </div>
                <div class="tables-body" id="tables-body"></div>
            </div>
        </div>
    </div>

    <script>
    layui.use(['laydate', 'layer', 'excel', 'form'], function() {
        const laydate = layui.laydate;
        const layer = layui.layer;
        const excel = layui.excel;

        // =========================================
        // 1. 页面管理器
        // =========================================
        const PageManager = {
            charts: {},           // 图表实例
            config: null,         // 页面配置
            data: null,           // 当前数据
            currentTimeType: 'month',  // 当前时间类型: month | year

            // 初始化
            init(config) {
                this.config = config;
                this.currentTimeType = config.defaultTimeType || 'month';
                
                this.setupPage();
                this.setupTimeTypeButtons();
                this.setupDatePickers();
                this.setupEventListeners();
                this.renderCharts();
                this.renderTables();
                
                // 自动加载数据
                if (config.autoLoad !== false) {
                    setTimeout(() => this.loadData(), 500);
                }
            },

            // 设置页面基本信息
            setupPage() {
                document.title = this.config.title || '数据统计报表';
                document.getElementById('page-title').textContent = this.config.title || '数据统计报表';
                document.getElementById('charts-title').textContent = this.config.chartsTitle || '图表数据';
                document.getElementById('tables-title').textContent = this.config.tablesTitle || '数据明细';
            },

            // 设置时间类型切换按钮
            setupTimeTypeButtons() {
                const buttons = document.querySelectorAll('.time-type-btn');
                
                // 设置初始激活状态
                buttons.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.type === this.currentTimeType) {
                        btn.classList.add('active');
                    }
                });

                // 绑定点击事件
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const newType = btn.dataset.type;
                        if (newType === this.currentTimeType) return;

                        // 更新激活状态
                        buttons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                        // 切换时间类型
                        this.currentTimeType = newType;
                        this.setupDatePickers();
                        
                        // 自动触发查询
                        this.loadData();
                    });
                });
            },

            // 设置日期选择器（根据时间类型动态切换）
            setupDatePickers() {
                const startInput = document.getElementById('start-date');
                const endInput = document.getElementById('end-date');
                const separator = document.getElementById('date-separator');
                const dateLabel = document.getElementById('date-label');
                
                // 清空输入框
                startInput.value = '';
                endInput.value = '';

                const now = new Date();

                switch (this.currentTimeType) {
                    case 'month':
                        // 月查询：选择日期范围
                        dateLabel.textContent = '日期范围';
                        startInput.style.display = 'block';
                        startInput.style.width = '120px';
                        separator.style.display = 'inline';
                        endInput.style.display = 'block';
                        endInput.style.width = '120px';
                        
                        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                        
                        laydate.render({
                            elem: '#start-date',
                            type: 'date',
                            format: 'yyyy-MM-dd',
                            value: monthStart
                        });
                        
                        laydate.render({
                            elem: '#end-date',
                            type: 'date',
                            format: 'yyyy-MM-dd',
                            value: now
                        });
                        break;
                    
                    case 'year':
                        // 年查询：只选择一个年份
                        dateLabel.textContent = '选择年份';
                        startInput.style.display = 'block';
                        startInput.style.width = '80px';
                        separator.style.display = 'none';
                        endInput.style.display = 'none';
                        
                        laydate.render({
                            elem: '#start-date',
                            type: 'year',
                            format: 'yyyy',
                            value: now
                        });
                        // 设置隐藏的结束日期与开始日期相同
                        endInput.value = '';
                        break;
                }
            },

            // 设置事件监听
            setupEventListeners() {
                document.getElementById('btn-search').addEventListener('click', () => this.loadData());
                document.getElementById('btn-export').addEventListener('click', () => this.exportData());
                
                // 窗口resize时重绘图表
                window.addEventListener('resize', () => {
                    Object.values(this.charts).forEach(chart => chart.resize());
                });
            },

            // 渲染图表容器
            renderCharts() {
                const container = document.getElementById('charts-body');
                container.innerHTML = '';

                const chartsConfig = this.config.charts || [];
                
                chartsConfig.forEach((chartConfig, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'chart-wrapper';
                    if (chartConfig.flex) {
                        wrapper.style.flex = chartConfig.flex;
                    }

                    wrapper.innerHTML = `
                        <div class="chart-body">
                            <div class="chart-container" id="chart-${index}"></div>
                        </div>
                    `;

                    container.appendChild(wrapper);

                    // 初始化ECharts实例
                    const chartDom = wrapper.querySelector('.chart-container');
                    this.charts[index] = echarts.init(chartDom);
                    
                    // 设置初始配置（包含导出按钮）
                    this.charts[index].setOption(this.getChartOption(chartConfig));
                });
            },

            // 获取图表配置（深蓝色主题，与表格风格统一）
            getChartOption(chartConfig) {
                const chartBgColor = '#102a5c';  // 与图表容器背景一致
                
                const baseOption = {
                    backgroundColor: chartBgColor,
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: '#1d386f',
                        borderColor: '#2a6dc8',
                        textStyle: { color: '#fff' }
                    },
                    legend: {
                        textStyle: { color: '#d0d2e0' },
                        top: 5
                    },
                    // 工具栏 - 包含下载按钮
                    toolbox: {
                        show: true,
                        right: 20,
                        top: 5,
                        feature: {
                            saveAsImage: {
                                show: true,
                                title: '保存图片',
                                type: 'png',
                                backgroundColor: chartBgColor,  // 导出背景与显示一致
                                pixelRatio: 2,
                                name: this.config.title || '图表'
                            }
                        },
                        iconStyle: {
                            borderColor: '#b9d3f4'
                        },
                        emphasis: {
                            iconStyle: {
                                borderColor: '#fff'
                            }
                        }
                    },
                    grid: {
                        top: 50,
                        right: 60,
                        bottom: 30,
                        left: 50,
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: [],
                        axisLine: { lineStyle: { color: '#2a6dc8' } },
                        axisLabel: { color: '#d0d2e0', fontSize: 11 }
                    },
                    yAxis: {
                        type: 'value',
                        axisLine: { lineStyle: { color: '#2a6dc8' } },
                        axisLabel: { color: '#d0d2e0' },
                        splitLine: { lineStyle: { color: '#2a6dc8', opacity: 0.3 } }
                    },
                    series: []
                };

                // 合并自定义配置
                if (chartConfig.option) {
                    return this.deepMerge(baseOption, chartConfig.option);
                }

                return baseOption;
            },

            // 渲染表格容器
            renderTables() {
                const container = document.getElementById('tables-body');
                container.innerHTML = '';

                const tablesConfig = this.config.tables || [];

                tablesConfig.forEach((tableConfig, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'table-wrapper';
                    if (tableConfig.flex) {
                        wrapper.style.flex = tableConfig.flex;
                    }

                    wrapper.innerHTML = `
                        <div class="table-scroll">
                            <table class="data-table" id="table-${index}">
                                <thead></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    `;

                    container.appendChild(wrapper);
                });
            },

            // 获取查询参数
            getQueryParams() {
                const startDate = document.getElementById('start-date').value;
                let endDate = document.getElementById('end-date').value;
                
                // 年查询只有一个日期，结束日期设为与开始日期相同
                if (this.currentTimeType === 'year') {
                    endDate = startDate;
                }
                
                return {
                    startDate: startDate,
                    endDate: endDate,
                    timeType: this.currentTimeType  // month | year
                };
            },

            // 加载数据
            async loadData() {
                const params = this.getQueryParams();

                if (!params.startDate) {
                    layer.msg('请选择日期');
                    return;
                }

                // 月查询需要检查结束日期
                if (this.currentTimeType === 'month' && !params.endDate) {
                    layer.msg('请选择结束日期');
                    return;
                }

                layer.load(1);

                try {
                    // 调用配置中的数据获取函数，传入完整参数
                    if (this.config.fetchData) {
                        this.data = await this.config.fetchData(params);
                        this.updateCharts();
                        this.updateTables();
                        this.updateInfo();
                    }
                } catch (error) {
                    console.error('加载数据失败:', error);
                    layer.msg('加载数据失败: ' + error.message);
                } finally {
                    layer.closeAll('loading');
                }
            },

            // 更新图表
            updateCharts() {
                if (!this.data || !this.data.charts) return;

                this.data.charts.forEach((chartData, index) => {
                    if (this.charts[index]) {
                        this.charts[index].setOption(chartData, { notMerge: false });
                    }
                });
            },

            // 设置报警线（markLine）
            // config: { value: 0.25, name: '预警线', color: '#ff0000', width: 2 }
            // 或者数组形式: [{ value: 0.25, name: '预警线', color: '#ff0000', width: 2 }]
            setMarkLine(config) {
                if (!config) {
                    console.error('setMarkLine 需要传入配置对象或数组');
                    return;
                }

                // 统一转换为数组格式
                const markLineConfigs = Array.isArray(config) ? config : [config];

                // 更新所有图表
                Object.keys(this.charts).forEach(chartIndex => {
                    const chart = this.charts[chartIndex];
                    if (!chart) return;

                    const option = chart.getOption();
                    const series = option.series || [];

                    // 为每个系列添加标线
                    const updatedSeries = series.map(seriesItem => {
                        const markLineData = markLineConfigs.map(mark => ({
                            yAxis: mark.value,
                            name: mark.name || '预警线',
                            label: {
                                show: mark.label !== false,
                                position: mark.labelPosition || 'end',
                                formatter: mark.name || `${mark.value}`,
                                color: mark.labelColor || mark.color || '#ff0000'
                            },
                            lineStyle: {
                                type: mark.lineType || 'dashed',
                                color: mark.color || '#ff0000',
                                width: mark.width || 2
                            }
                        }));

                        return {
                            ...seriesItem,
                            markLine: {
                                symbol: 'none',
                                data: markLineData
                            }
                        };
                    });

                    chart.setOption({
                        series: updatedSeries
                    }, { notMerge: false });
                });

                console.log(`%c[MarkLine] 已设置 ${markLineConfigs.length} 条报警线`, "color: #6c5ce7; background: #eee; padding: 2px 5px;");
                markLineConfigs.forEach((mark, index) => {
                    console.log(`  ${index + 1}. ${mark.name || '预警线'}: ${mark.value} (颜色: ${mark.color || '#ff0000'})`);
                });
            },

            // 清除所有报警线
            clearMarkLine() {
                Object.keys(this.charts).forEach(chartIndex => {
                    const chart = this.charts[chartIndex];
                    if (!chart) return;

                    const option = chart.getOption();
                    const series = option.series || [];

                    const updatedSeries = series.map(seriesItem => ({
                        ...seriesItem,
                        markLine: undefined
                    }));

                    chart.setOption({
                        series: updatedSeries
                    }, { notMerge: false });
                });

                console.log(`%c[MarkLine] 已清除所有报警线`, "color: #e17055; background: #eee; padding: 2px 5px;");
            },

            // 更新表格
            updateTables() {
                if (!this.data || !this.data.tables) return;

                this.data.tables.forEach((tableData, index) => {
                    const table = document.getElementById(`table-${index}`);
                    if (!table) return;

                    const thead = table.querySelector('thead');
                    const tbody = table.querySelector('tbody');
                    const tableConfig = this.config.tables[index] || {};

                    // 渲染表头
                    thead.innerHTML = this.renderTableHeader(tableData.columns, tableConfig);

                    // 渲染表体
                    tbody.innerHTML = this.renderTableBody(tableData.rows, tableData.columns, tableConfig);
                });
            },

            // 渲染表头
            renderTableHeader(columns, config) {
                if (!columns || columns.length === 0) return '';

                // 检查是否是多层表头
                const hasMultiLevel = columns.some(col => col.children && col.children.length > 0);

                if (hasMultiLevel) {
                    return this.renderMultiLevelHeader(columns, config);
                }

                // 单层表头
                let html = '<tr>';
                columns.forEach(col => {
                    const cls = [];
                    if (col.highlight) cls.push('highlight-col');
                    html += `<th class="${cls.join(' ')}">${col.title}</th>`;
                });
                html += '</tr>';
                return html;
            },

            // 渲染多层表头
            renderMultiLevelHeader(columns, config) {
                let row1 = '<tr>';
                let row2 = '<tr>';
                let hasRow2 = false;

                columns.forEach(col => {
                    const cls = col.highlight ? 'highlight-col' : '';
                    
                    if (col.children && col.children.length > 0) {
                        hasRow2 = true;
                        row1 += `<th class="${cls}" colspan="${col.children.length}">${col.title}</th>`;
                        col.children.forEach(child => {
                            const childCls = child.highlight ? 'highlight-col' : '';
                            row2 += `<th class="${childCls}">${child.title}</th>`;
                        });
                    } else {
                        row1 += `<th class="${cls}" rowspan="2">${col.title}</th>`;
                    }
                });

                row1 += '</tr>';
                row2 += '</tr>';

                return hasRow2 ? row1 + row2 : row1;
            },

            // 渲染表体
            renderTableBody(rows, columns, config) {
                if (!rows || rows.length === 0) return '<tr><td colspan="100" style="text-align:center;padding:20px;">暂无数据</td></tr>';

                // 扁平化列配置
                const flatColumns = this.flattenColumns(columns);

                return rows.map(row => {
                    let html = '<tr>';
                    flatColumns.forEach((col, index) => {
                        const value = row[col.field] ?? '';
                        const cls = [];
                        
                        if (index === 0) cls.push(''); // 首列已有sticky样式
                        if (col.highlight) cls.push('highlight-col');
                        if (col.type === 'number') cls.push('num-col');
                        if (col.type === 'ratio') cls.push('ratio-col');

                        // 格式化数值
                        let displayValue = value;
                        if (col.type === 'number' && typeof value === 'number') {
                            displayValue = col.decimal !== undefined 
                                ? value.toFixed(col.decimal) 
                                : value.toLocaleString();
                        }

                        html += `<td class="${cls.join(' ')}">${displayValue}</td>`;
                    });
                    html += '</tr>';
                    return html;
                }).join('');
            },

            // 扁平化列配置
            flattenColumns(columns) {
                const result = [];
                columns.forEach(col => {
                    if (col.children && col.children.length > 0) {
                        col.children.forEach(child => {
                            result.push({ ...child, parentTitle: col.title });
                        });
                    } else {
                        result.push(col);
                    }
                });
                return result;
            },

            // 更新信息
            updateInfo() {
                const info = document.getElementById('tables-info');
                const timeTypeText = { month: '日级', year: '月级' };
                
                if (this.data && this.data.tables && this.data.tables[0]) {
                    const rowCount = this.data.tables[0].rows?.length || 0;
                    info.textContent = `共 ${rowCount} 条记录（${timeTypeText[this.currentTimeType] || ''}数据）`;
                }
            },

            // 导出数据
            exportData() {
                if (!this.data || !this.data.tables || this.data.tables.length === 0) {
                    layer.msg('没有数据可导出');
                    return;
                }

                try {
                    const timestamp = new Date().toISOString().slice(0, 19).replace(/[-:T]/g, '');
                    const timeTypeText = { month: '月报', year: '年报' };
                    const filename = `${this.config.title || '数据导出'}_${timeTypeText[this.currentTimeType] || ''}_${timestamp}.xlsx`;

                    // 准备导出数据 - 完全按照电能统计页面的方式
                    const exportData = [];
                    
                    // 获取第一个表格的数据
                    const tableData = this.data.tables[0];
                    const flatColumns = this.flattenColumns(tableData.columns);
                    
                    // 表头行 - 按电能统计页面的格式
                    const headerRow = {};
                    flatColumns.forEach(col => {
                        headerRow[col.field] = col.title;
                    });
                    exportData.push(headerRow);

                    // 数据行 - 确保数字字段保持数字类型
                    tableData.rows.forEach(row => {
                        const newRow = {};
                        flatColumns.forEach(col => {
                            let value = row[col.field];
                            // 确保数字类型字段是数字，不是字符串
                            if ((col.type === 'number' || col.type === 'ratio') && typeof value === 'number') {
                                newRow[col.field] = value; // 保持原始数字
                            } else {
                                newRow[col.field] = value; // 其他类型保持原样
                            }
                        });
                        exportData.push(newRow);
                    });

                    // 直接导出，不设置样式以保持数字格式

                    // 执行导出
                    excel.exportExcel({
                        sheet1: exportData
                    }, filename, 'xlsx');
                    
                    layer.msg('导出成功');

                } catch (error) {
                    console.error('导出失败:', error);
                    layer.msg('导出失败: ' + error.message);
                }
            },

            // 深度合并对象
            deepMerge(target, source) {
                const result = { ...target };
                for (const key in source) {
                    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                        result[key] = this.deepMerge(result[key] || {}, source[key]);
                    } else {
                        result[key] = source[key];
                    }
                }
                return result;
            }
        };

        // =========================================
        // 2. 暴露全局接口
        // =========================================
        window.PageManager = PageManager;

        // 暴露报警线更新方法（方便F12控制台调用）
        window.setMarkLine = function(config) {
            return PageManager.setMarkLine(config);
        };
		
        window.clearMarkLine = function() {
            return PageManager.clearMarkLine();
        };

        // =========================================
        // 3. 自动初始化（如果配置存在）
        // =========================================
        if (window.PAGE_CONFIG) {
            PageManager.init(window.PAGE_CONFIG);
            
            // 输出控制台帮助信息
            setTimeout(() => {

                console.log('%c 📊 报警线更新方法（F12控制台可用）', 'color: #1e88e5; font-weight: bold; font-size: 16px;');
                console.log('%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'color: #666;');
                console.log(`
%c设置单条报警线：

%c设置多条报警线：

    { value: 0.25, name: '预警线', color: '#ff0000', width: 2 },

])

%c清除所有报警线：
clearMarkLine()

%c参数说明：

• name: 报警线名称（可选，默认：'预警线'）
• color: 线条颜色（可选，默认：'#ff0000'红色）
• width: 线条宽度（可选，默认：2）
• lineType: 线条类型（可选，默认：'dashed'虚线，可选：'solid'实线）

• labelPosition: 标签位置（可选，默认：'end'，可选：'start'|'middle'|'end'）
• labelColor: 标签颜色（可选，默认使用color）

    { value: 0.25, name: '预警线', color: '#ff0000' },
    { value: 0.15, name: '安全线', color: '#00ff00' }
])
                `, 
                'color: #333;', 
                'color: #333;', 
                'color: #333;', 
                'color: #6c5ce7; font-weight: bold;',
                'color: #00b894;'
                );
                console.log('%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n', 'color: #666;');
            }, 1000);
        } else {
            console.warn('未找到 PAGE_CONFIG，请在 chart-table-config.js 中定义配置');
        }
    });
