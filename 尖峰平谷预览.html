var origin = 0;
function getx(origin, add){
    origin = origin + add;
    return origin;
}
function getTimeDifferenceInSeconds(time1, time2) {
	//debugger;
	// 将时间转换为Date对象
	var date1 = new Date('1970-01-01T' + time1 + 'Z');
	var date2 = new Date('1970-01-01T' + time2 + 'Z');
	if(time2 == "00:00:00"){
		date2 = new Date('1970-01-02T' + time2 + 'Z');
	}
	// 计算差值（以毫秒为单位）
	var diff = date2.getTime() - date1.getTime();
	
	// 将差值转换为秒
	return diff / 3600000;
}
