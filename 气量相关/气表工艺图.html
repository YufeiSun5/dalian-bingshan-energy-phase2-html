			{ title: "7#", indicatorPosition: "left" },  // 第7组：研发中心

            { title: "氮气", indicatorPosition: "left" },  // 第10组

		// 初始化数据显示
		function initDataDisplay() {
			const container = document.getElementById('dataDisplay');
			container.innerHTML = '';

		for (let i = 0; i < 12; i++) {
			const group = document.createElement('div');
			group.className = 'data-group';
			group.id = `data-group-${i}`;

			// 根据索引添加颜色类
			if (i <= 8) {
				// 索引0-8: 压缩空气表，使用铂金灰色
				group.className += ' platinum-gray';
			} else if (i === 11) {
				// 索引11: 氧气表，使用蓝色
				group.className += ' blue';
			}
			// 索引9-10: 氮气和氩气，保持橘黄色（默认样式）

			// 设置位置
			const pos = gasMeterConfig.positions[i];
			group.style.left = pos.x + '%';
			group.style.top = pos.y + '%';
			group.style.transform = 'translate(-50%, -50%)';

				// 获取标题配置
				const titleConfig = gasMeterConfig.titles[i];

				// 创建标题行
				const titleRow = document.createElement('div');
				titleRow.className = 'title-row';

				// 创建指示灯
				const indicator = document.createElement('div');
				indicator.className = `status-indicator ${titleConfig.indicatorPosition}`;

				// 创建标题文本
				const titleText = document.createElement('div');
				titleText.className = 'title-text';
				titleText.textContent = titleConfig.title;

				// 根据指示灯位置排列
				if (titleConfig.indicatorPosition === 'left') {
					titleRow.appendChild(indicator);
					titleRow.appendChild(titleText);
				} else {
					titleRow.appendChild(titleText);
					titleRow.appendChild(indicator);
				}

				// 创建数据行
				const dataRow = document.createElement('div');
				dataRow.className = 'data-row';

				// 瞬时流量显示
				const instantDiv = document.createElement('div');
				instantDiv.className = 'data-item instant';
				instantDiv.innerHTML = `
					<div class="data-label">瞬时</div>
					<div class="data-value">
						<span id="instant-${i}">无连接</span>
						<span class="data-unit">m³/h</span>
					</div>
				`;

				// 累计流量显示
				const totalDiv = document.createElement('div');
				totalDiv.className = 'data-item total';
				totalDiv.innerHTML = `
					<div class="data-label">当日累计</div>
					<div class="data-value">
						<span id="total-${i}">无连接</span>
						<span class="data-unit">m³</span>
					</div>
				`;

				dataRow.appendChild(instantDiv);
				dataRow.appendChild(totalDiv);

				group.appendChild(titleRow);
				group.appendChild(dataRow);
				container.appendChild(group);

		// 更新单个或多个数据点（仅更新瞬时流量）
		// 注意：当日累计量由数据库自动查询，不允许手动更新
		// 使用方式：
		// 单个：updateMeterData('主管路压缩空气', 12.5)
		// 批量（包含全部12个表）：updateMeterData(['主管路压缩空气','成品车间','机加工','新成品','定转子','电机绕线车间','研发中心','组装车间','CS车间','氮气','氩气','氧气'], [11.11, 12.12, 31.31, 41.41, 51.51, 61.61, 71.71, 81.81, 91.91, 101.1, 111.1, 121.1])
		
		function updateMeterData(meterNames, instantValues) {
			// 支持单个数据更新
			if (typeof meterNames === 'string') {
				meterNames = [meterNames];
				instantValues = [instantValues];
			}

			// 数据长度检查
			if (meterNames.length !== instantValues.length) {
				console.error('变量名和瞬时流量的长度必须一致');
				return;
			}

			// 更新每个数据点
			for (let i = 0; i < meterNames.length; i++) {
				const meterName = meterNames[i];
				const instantValue = instantValues[i];

				// 查找对应的气表索引
				const meterIndex = findMeterIndex(meterName);
				if (meterIndex === -1) {
					console.warn(`未找到气表: ${meterName}`);
					continue;
				}

				// 只更新瞬时流量，不更新累计流量
				updateInstantFlow(meterIndex, instantValue);
			}
		}

		// 根据变量名查找气表索引
		function findMeterIndex(meterName) {
			// 变量名映射表 - 支持多种格式调用同一组数据
			const meterMap = {
				// ============ 标准meter变量名 ============
				'meter1': 0, 'meter2': 1, 'meter3': 2, 'meter4': 3, 'meter5': 4, 'meter6': 5, 'meter7': 6, 'meter8': 7, 'meter9': 8, 'meter10': 9, 'meter11': 10, 'meter12': 11,

				// ============ 新版标题变量名（推荐使用）===========
				// 压缩空气类（第1-9组）
				'主管路压缩空气': 0,          // 第1组：主管路压缩空气
				'成品车间': 1,                // 第2组：成品车间
				'机加工': 2,                  // 第3组：机加工
				'新成品': 3,                  // 第4组：新成品
				'定转子': 4,                  // 第5组：定转子
				'电机绕线车间': 5,            // 第6组：电机绕线车间
				'研发中心': 6,                // 第7组：研发中心
				'组装车间': 7,                // 第8组：组装车间
				'CS车间': 8,                  // 第9组：CS车间

				// 工业气体类（第10-12组）
				'氮气': 9,                   // 第10组：氮气
				'氩气': 10,                  // 第11组：氩气
				'氧气': 11,                  // 第12组：氧气

				// ============ 旧版变量名（向后兼容）===========
				'空压机房主压缩空气': 0,
				'技术课维修库房压缩空气': 1,
				'清洗与机加工通道': 2,
				'新成品GCS柜压缩空气': 3,
				'葛铭玖工作站压缩空气': 4,
				'组装C与电机参观通道南侧': 5,
				'壳体变电所棚顶': 6,
				'机加工GCS柜南侧': 7,
				'2楼变电所出入门': 8,

				// ============ 简化变量名（快速调用）===========
				'空压机房': 0,    '维修室': 1,   'C上支撑附近': 2,    '大马力车间': 3,
				'三坐标附近': 4,     '氦检附近': 5,

				// 工业气体类简化版
				'氮': 9,         '氩': 10,      '氧': 11
			};

			return meterMap[meterName] !== undefined ? meterMap[meterName] : -1;
		}

		// 更新瞬时流量（内部函数 - 仅允许更新瞬时流量）
		function updateInstantFlow(meterIndex, instantFlow) {
			if (meterIndex < 0 || meterIndex >= 12) {
				console.error('气表索引必须在0-11之间');
				return;
			}

			// 更新配置数据
			gasMeterConfig.data.instantFlow[meterIndex] = instantFlow;

			// 更新显示
			const instantElement = document.getElementById(`instant-${meterIndex}`);
			if (instantElement) {
				instantElement.textContent = instantFlow !== null && instantFlow !== undefined ? parseFloat(instantFlow).toFixed(2) : '无连接';
			}
		}

		// 批量更新所有瞬时流量（兼容旧版本）
		function updateAllData(instantFlows) {
			if (instantFlows.length !== 12) {
				console.error('瞬时流量数组长度必须为12');
				return;
			}

			for (let i = 0; i < 12; i++) {
				updateInstantFlow(i, instantFlows[i]);
			}
		}

		// 修改数据组位置
		function updateDataPosition(groupIndex, x, y) {
			if (groupIndex < 0 || groupIndex >= 12) {
				console.error('组索引必须在0-11之间');
				return;
			}

			gasMeterConfig.positions[groupIndex] = { x, y };

			const group = document.getElementById(`data-group-${groupIndex}`);
			if (group) {
				group.style.left = x + '%';
				group.style.top = y + '%';
			}
		}

	const gasIdToMeterIndexMap = {
		1: 0,   // gas_id 1 -> meter 1# (主管路压缩空气)
		2: 1,   // gas_id 2 -> meter 2# (新成品)
		3: 2,   // gas_id 3 -> meter 7# (研发中心)

		10: 9,  // gas_id 10 -> meter 10# (氮气)
		11: 10, // gas_id 11 -> meter 11# (氩气)
		12: 11  // gas_id 12 -> meter 12# (氧气)
	};

	// 查询当日累计量
	async function queryDailyCumulative() {
		const sql = `SELECT 
    gas_id, 
    MAX(FLOW_total) - MIN(FLOW_total) AS total_usage
FROM 
    \`sy\`.\`data_gas\`
WHERE 
    gas_id BETWEEN 1 AND 12
    AND \`date\` >= CASE 
        WHEN DATE_FORMAT(NOW(), '%H:%i:%s') < '07:00:00' 
        THEN CONCAT(DATE_SUB(CURDATE(), INTERVAL 1 DAY), ' 07:00:00')
        ELSE CONCAT(CURDATE(), ' 07:00:00')
    END
    AND \`date\` <= NOW()
GROUP BY 
    gas_id;`;

		try {
			console.info('查询当日累计量:', sql);
			
			const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({ sql })
			});

			const response = await res.json();
			
			// 检查返回的数据格式：{success: true, data: Array}
			if (response && response.success && Array.isArray(response.data) && response.data.length > 0) {
				const data = response.data;
				
				// 处理查询结果
				data.forEach(row => {
					const gasId = row.gas_id;
					const totalUsage = row.total_usage;
					
					// 映射 gas_id 到气表索引
					const meterIndex = gasIdToMeterIndexMap[gasId];
					
					if (meterIndex !== undefined) {
						// 只更新累计流量，不更新瞬时流量
						const totalElement = document.getElementById(`total-${meterIndex}`);
						if (totalElement) {
							totalElement.textContent = totalUsage !== null && totalUsage !== undefined 
								? parseFloat(totalUsage).toFixed(2) 
								: '无连接';
							
							// 更新配置数据
							gasMeterConfig.data.totalFlow[meterIndex] = totalUsage;
						}
					}
				});
				console.log('当日累计量更新成功:', data);
			} else {
				console.warn('查询结果为空或格式错误:', response);
			}
		} catch (error) {
			console.error('查询当日累计量失败:', error);
		}
	}

	// 定时器变量
	let dailyCumulativeTimer = null;

	// 启动定时查询
	function startDailyCumulativeQuery() {
		// 立即执行一次
		queryDailyCumulative();
		
		// 每5分钟查询一次
		dailyCumulativeTimer = setInterval(queryDailyCumulative, 5 * 60 * 1000);
		console.log('当日累计量定时查询已启动（每5分钟）');
	}

	// 停止定时查询
	function stopDailyCumulativeQuery() {
		if (dailyCumulativeTimer) {
			clearInterval(dailyCumulativeTimer);
			dailyCumulativeTimer = null;
			console.log('当日累计量定时查询已停止');
		}
	}

	// 页面加载完成后初始化
	window.onload = async function() {
		initDataDisplay();
		printConsoleGuide();
		// 立即执行一次查询
		await queryDailyCumulative();
		// 启动当日累计量定时查询（每5分钟）
		startDailyCumulativeQuery();
	};
