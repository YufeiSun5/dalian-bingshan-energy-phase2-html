<script src="../js/utils/energy-config-v2.js"></script>

<script src="../js/layui.js"></script>
<script>
    // 1. 配置本地扩展目录并加载 excel 模块
    layui.config({
        base: '../js/layui_exts/' // 指向存放 excel.js 的目录
    }).extend({
        excel: 'excel' // 模块名，对应 excel.js
    });

    layui.use(['table', 'laydate', 'excel', 'layer', 'form'], function(){
        const table = layui.table;
        const laydate = layui.laydate;
        const excel = layui.excel;
        const layer = layui.layer;
        const form = layui.form;
        const $ = layui.jquery;

        // ===================================================================
        // 从 energy-config-v2.js 获取区域配置
        // ===================================================================
        const Config = window.EnergyConfig;
        
        if (!Config) {
            console.error('❌ EnergyConfig 未加载');
            layer.msg('配置文件加载失败，请刷新页面重试', { icon: 2 });
            return;
        }
        
        // ===================================================================
        // 从 energy-config-v2.js 获取页面配置（气量版本）
        // ===================================================================
        const pageConfig = Config.pages.regionalGasStats;
        
        if (!pageConfig) {
            console.error('❌ 无法从配置文件加载气量统计配置');
            layer.msg('配置加载失败，请刷新页面重试', { icon: 2 });
            return;
        }
        
        console.log('📋 使用配置:', pageConfig.title);
        console.log('📊 分类数量:', pageConfig.categories.length);
        
        // 构建分类映射：key -> { title, includeNos, excludeNos }
        const categoryConfig = {};
        const categoryToNOs = {};
        const categoryKeyToTitle = {};
        
        pageConfig.categories.forEach(cat => {
            categoryConfig[cat.key] = {
                title: cat.title,
                includeNos: cat.includeNos || [],
                excludeNos: cat.excludeNos || []
            };
            // 为了向后兼容，同时保留nos属性
            categoryToNOs[cat.title] = cat.includeNos || [];
            categoryKeyToTitle[cat.key] = cat.title;
        });
        
        console.log('✅ 从 energy-config-v2.js 加载的分类配置:');
        console.log('📊 分类映射:', categoryToNOs);
        console.log('📝 详细配置:');
        pageConfig.categories.forEach(cat => {
            const includeCount = (cat.includeNos || []).length;
            const excludeCount = (cat.excludeNos || []).length;
            if (excludeCount > 0) {
                console.log(`  ${cat.title} (${cat.key}): ${includeCount} 个NO (含) - ${excludeCount} 个NO (减) =`, cat.includeNos, '-', cat.excludeNos);
            } else {
                console.log(`  ${cat.title} (${cat.key}): ${includeCount} 个NO =`, cat.includeNos);
            }
        });
        // ===================================================================

        let barChartInstance, pieChartInstance;
        let globalData = {};
        let currentActiveIdentifier = '';

        // 初始化年份选择器
        laydate.render({
            elem: '#year-selector',
            type: 'year',
            value: new Date()
        });

        // --- 动态列宽生成函数 ---
        function getAdaptiveCols() {
            const container = $('#table-parent-container');
            const containerWidth = container.width();
            if (!containerWidth) {
                return [[{ field: 'month', title: '月份', rowspan: 2, fixed: 'left', width: 80, align: 'center' }],[]];
            }

            const fixedWidth = 80;
            const availableWidth = containerWidth - fixedWidth - 2;

            // 获取分类，排除"合计"
            const allCategories = pageConfig.categories.filter(cat => cat.key !== 'total');
            
            // 计算总宽度：6个车间(各2列) + 公司总用气量
            let totalBaseWidth = 120; // total column
            totalBaseWidth += allCategories.length * (100 + 80); // 6个车间，每个2列
            
            const scale = availableWidth / totalBaseWidth;

            const finalCols = [[], []];

            // 第一行表头
            finalCols[0].push({ field: 'month', title: '月份', rowspan: 2, fixed: 'left', width: fixedWidth, align: 'center' });
            
            // 平铺各个车间/部门（每个跨2列：用气量+占比）
            allCategories.forEach(cat => {
                finalCols[0].push({ title: cat.title, colspan: 2, align: 'center' });
            });
            
            // 公司总用气量
            finalCols[0].push({ field: 'total', title: '公司总用气量', rowspan: 2, align: 'center', width: Math.max(Math.floor(120 * scale), 60) });

            // 第二行表头
            allCategories.forEach(cat => {
                finalCols[1].push({
                    field: `${cat.title}_val`,
                    title: '用气量',
                    align: 'center',
                    width: Math.max(Math.floor(100 * scale), 55)
                });
                finalCols[1].push({
                    field: `${cat.title}_pct`,
                    title: '占比',
                    align: 'center',
                    width: Math.max(Math.floor(80 * scale), 45)
                });
            });

            return finalCols;
        }

        // --- 数据获取与处理 ---
        async function sendSQL(strsql) {
            try {
                const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ sql: strsql })
                });
                if (!res.ok) {
                    layer.msg(`数据加载失败: ${res.statusText}`);
                    return { data: [] };
                }
                return await res.json();
            } catch (err) {
                console.error('sendSQL Error:', err);
                layer.msg('数据加载失败，请检查网络或联系管理员。');
                return { data: [] };
            }
        }

        async function fetchAndProcessData(year) {
            // 动态生成SQL的CASE WHEN语句（支持减法运算）- 气量版本
            const caseClauses = [];
            pageConfig.categories.forEach(cat => {
                // 处理 includeNos（要加的NO）
                const includeNos = cat.includeNos || [];
                const includeList = includeNos.length > 0 ? includeNos.join(',') : '-1';
                const includeClause = `SUM(CASE WHEN sub.no IN (${includeList}) THEN sub.total_gas ELSE 0 END)`;
                
                // 处理 excludeNos（要减的NO）
                const excludeNos = cat.excludeNos || [];
                let fullClause;
                
                if (excludeNos.length > 0) {
                    // 有需要减去的NO，生成减法表达式
                    const excludeList = excludeNos.join(',');
                    const excludeClause = `SUM(CASE WHEN sub.no IN (${excludeList}) THEN sub.total_gas ELSE 0 END)`;
                    fullClause = `(${includeClause} - ${excludeClause}) AS ${cat.key}_gas`;
                } else {
                    // 没有需要减去的NO，直接使用includeClause
                    fullClause = `${includeClause} AS ${cat.key}_gas`;
                }
                
                caseClauses.push(fullClause);
            });
            
            const sql = `
                SELECT sub.month,
                       ${caseClauses.join(',\n                       ')}
                FROM (
                    SELECT no, MONTH(\`date\`) AS month, SUM(sum_FLOW_total) AS total_gas
                    FROM sum_gas_flow_total_by_day
                    WHERE YEAR(\`date\`) = ${year}
                    GROUP BY no, MONTH(\`date\`)
                ) AS sub
                GROUP BY sub.month
                ORDER BY sub.month
            `.trim();
            
            console.log('🔧 生成的SQL查询（气量）:');
            console.log(sql);
            const apiResult = await sendSQL(sql);
            const rawData = apiResult.data || [];
            
            // 处理返回数据：将 key_gas 映射回 title
            const categories = pageConfig.categories.map(cat => cat.title);
            
            const monthlyData = rawData.map(item => {
                const monthStr = `${item.month}月`;
                const values = {};
                
                // 使用 key 从 SQL 结果中获取数据，存储到 title 对应的 values 中
                pageConfig.categories.forEach(cat => {
                    const apiKey = `${cat.key}_gas`;
                    values[cat.title] = Number(item[apiKey]) || 0;
                });
                
                return { month: monthStr, values };
            });
            
            console.log('📊 处理后的气量数据:', { categories, monthlyData });
            return { categories, monthlyData };
        }
        
        // --- Layui 表格渲染与交互 ---
        function transformDataForLayui(data) {
            const { categories, monthlyData } = data;
            const tableData = [];
            const totals = categories.reduce((acc, cat) => ({ ...acc, [cat]: 0 }), {});
            let grandTotal = 0;
            
            const dataMap = new Map(monthlyData.map(item => [item.month, item.values]));

            for (let i = 1; i <= 12; i++) {
                const monthStr = `${i}月`;
                const row = { month: monthStr };
                
                if (dataMap.has(monthStr)) {
                    row.isClickable = true;
                    const values = dataMap.get(monthStr);
                    
                    // 公司总用气量：直接使用SQL查询的"合计"列
                    const monthTotal = values['合计'] || 0;
                    
                    categories.forEach(cat => {
                        const value = values[cat] || 0;
                        
                        row[`${cat}_val`] = value.toLocaleString();
                        row[`${cat}_pct`] = monthTotal > 0 ? `${(value / monthTotal * 100).toFixed(2)}%` : '0.00%';
                        totals[cat] += value;
                    });
                    row.total = monthTotal.toLocaleString();
                    grandTotal += monthTotal;
                } else {
                    row.isClickable = false;
                    categories.forEach(cat => {
                        row[`${cat}_val`] = '';
                        row[`${cat}_pct`] = '';
                    });
                    row.total = '';
                }
                tableData.push(row);
            }

            const totalRow = { month: '合计', isClickable: true, isTotal: true };
            categories.forEach(cat => {
                const value = totals[cat];
                totalRow[`${cat}_val`] = value.toLocaleString();
                totalRow[`${cat}_pct`] = grandTotal > 0 ? `${(value / grandTotal * 100).toFixed(2)}%` : '0.00%';
            });
            totalRow.total = grandTotal.toLocaleString();
            tableData.push(totalRow);

            return tableData;
        }

        window.renderLayuiTable = function(data) {
            const tableData = transformDataForLayui(data);
            
            table.render({
                elem: '#data-table',
                height: 'full-20',
                cols: getAdaptiveCols(),
                data: tableData,
                limit: tableData.length,
                done: function(res, curr, count){
                    const tableBody = this.elem.next().find('.layui-table-body tbody');
                    res.data.forEach((item, index) => {
                        const tr = tableBody.find(`tr[data-index="${index}"]`);
                        if(item.isClickable) tr.addClass('clickable-row');
                        if(item.isTotal) tr.addClass('total-row');
                        if(item.month === currentActiveIdentifier) tr.addClass('active-row');
                        
                        // [REMOVED] 移除对"损耗"列的高亮样式操作
                    });
                }
            });
        };

        table.on('row(dataTableFilter)', function(obj){
            if(obj.data.isClickable){
                updateDashboard(obj.data.month);
            }
        });
        
        // --- 导出按钮点击事件 (动态生成) ---
        $('#export-btn').on('click', function() {
            const tableData = layui.table.cache['data-table'];
            if (!tableData || tableData.length === 0) {
                layer.msg('没有数据可以导出');
                return;
            }

            const selectedYear = $('#year-selector').val() || new Date().getFullYear();
            const filename = `各区域用气量及占比统计_${selectedYear}.xlsx`;
            
            // 使用配置文件中的分类，排除"合计"
            const categories = pageConfig.categories
                .filter(cat => cat.key !== 'total')
                .map(cat => cat.title);
            
            // 1. 动态构造表头数据
            const header1 = { month: '月份' };
            const header2 = { month: '' };
            const mergeRanges = [['A1', 'A2']]; // 月份列合并
            const colConfig = { 'A': 100 };
            let colLetter = 'B';
            
            categories.forEach(cat => {
                const valKey = `${cat}_val`;
                const pctKey = `${cat}_pct`;
                header1[valKey] = cat;
                header1[pctKey] = '';
                header2[valKey] = '用气量';
                header2[pctKey] = '占比';
                
                // 合并配置：每个分类的两列合并第一行
                const nextCol = String.fromCharCode(colLetter.charCodeAt(0) + 1);
                mergeRanges.push([`${colLetter}1`, `${nextCol}1`]);
                
                // 列宽配置
                colConfig[colLetter] = 100;
                colConfig[nextCol] = 80;
                
                colLetter = String.fromCharCode(nextCol.charCodeAt(0) + 1);
            });
            
            header1.total = '公司总用气量';
            header2.total = '';
            mergeRanges.push([`${colLetter}1`, `${colLetter}2`]); // 总计列合并
            colConfig[colLetter] = 120;
            
            // 2. 动态构造数据体
            const body = tableData.map(row => {
                const dataRow = { month: row.month };
                categories.forEach(cat => {
                    dataRow[`${cat}_val`] = row[`${cat}_val`];
                    dataRow[`${cat}_pct`] = row[`${cat}_pct`];
                });
                dataRow.total = row.total;
                return dataRow;
            });

            const exportData = [header1, header2, ...body];

            // 3. 构造合并配置
            const mergeConf = excel.makeMergeConfig(mergeRanges);

            // 4. 构造列宽配置
            const colConf = excel.makeColConfig(colConfig, 80);

            // 5. 导出
            excel.exportExcel(exportData, filename, 'xlsx', {
                extend: {
                    '!merges': mergeConf,
                    '!cols': colConf
                }
            });
        });

        // --- ECharts 图表更新 ---
        function updateCharts(identifier, values, allCategories) {
            const isTotal = identifier === '合计';
            const barTitle = `各区域${identifier}${isTotal ? '用气量' : '份'}`;
            const pieTitle = `${identifier}${isTotal ? '用气' : '份各区域用气'}占比`;
            document.getElementById('bar-chart-header').innerHTML = `<div class="card-header-title"><div class="card-header-icon"></div><span>${barTitle}</span></div>`;
            document.getElementById('pie-chart-header').innerHTML = `<div class="card-header-title"><div class="card-header-icon"></div><span>${pieTitle}</span></div>`;
            
            // 柱状图和饼图：排除"合计"，按照配置顺序显示所有车间
            // 顺序：开发本部、新成品车间、机加工车间、组装车间、壳体车间、电机车间
            const allCats = pageConfig.categories.filter(cat => cat.key !== 'total');
            const orderedChartCategories = allCats.map(cat => cat.title);
            
            const colors = ['#5470c6', '#ee6666', '#91cc75', '#fac858', '#73c0de', '#3ba272', '#fc8452', '#9a60b4'];
            
            // 柱状图数据
            const barChartData = orderedChartCategories.map((cat, i) => ({ value: values[cat] || 0, itemStyle: { color: colors[i % colors.length] } }));
            const barRichStyles = {};
            orderedChartCategories.forEach((cat, i) => { barRichStyles[`c${i}`] = { backgroundColor: colors[i % colors.length], height: 10, width: 10, borderRadius: 3, lineHeight: 10 }; });
            
            // 饼图数据
            const pieChartData = orderedChartCategories.map(cat => ({ name: cat, value: values[cat] || 0 }));
            
            const barOption = { backgroundColor: 'transparent', tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } }, legend: { show: false }, grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true }, xAxis: [{ type: 'category', data: orderedChartCategories, axisLabel: { color: '#ccc', interval: 0, rotate: 0, formatter: (v, i) => `{c${i}|}  ${v}`, rich: barRichStyles }, axisTick: { alignWithLabel: true } }], yAxis: [{ type: 'value', name: '气量单位 (立方米)', nameTextStyle: { color: '#ccc', padding: [0, 0, 0, 80] }, axisLabel: { color: '#ccc' }, splitLine: { lineStyle: { type: 'dashed', color: 'rgba(255,255,255,0.1)' } } }], series: [{ name: '用气量', type: 'bar', barWidth: '50%', data: barChartData, label: { show: true, position: 'top', color: '#fff', formatter: '{c}', fontSize: 10 } }] };
            const pieOption = { backgroundColor: 'transparent', tooltip: { trigger: 'item', formatter: '{a} <br/>{b}: {c} ({d}%)' }, legend: { orient: 'horizontal', bottom: '0', left: 'center', data: orderedChartCategories, textStyle: { color: '#ccc' }, type: 'scroll' }, series: [{ name: '用气占比', type: 'pie', radius: '65%', center: ['50%', '48%'], data: pieChartData, color: colors, itemStyle: { borderWidth: 5, borderColor: '#1d386f' }, emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } }, label: { formatter: '{d}%', color: 'rgba(255, 255, 255, 0.9)', position: 'outside' }, labelLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.5)' } } }] };
            barChartInstance.setOption(barOption, true);
            pieChartInstance.setOption(pieOption, true);
        }
        
        function updateDashboard(activeIdentifier) {
            currentActiveIdentifier = activeIdentifier;
            const tableContainer = document.querySelector('#table-parent-container');
            if (tableContainer) {
                const tableBody = tableContainer.querySelector('.layui-table-body tbody');
                if(tableBody) {
                    const allClickableRows = tableBody.querySelectorAll('tr');
                     allClickableRows.forEach((row, index) => {
                         const rowData = layui.table.cache['data-table'][index];
                         if(rowData && rowData.month === activeIdentifier) {
                             row.classList.add('active-row');
                         } else {
                             row.classList.remove('active-row');
                         }
                     });
                }
            }

            if (activeIdentifier === '合计') {
                const totalValues = globalData.monthlyData.reduce((acc, entry) => {
                    for (const cat in entry.values) acc[cat] = (acc[cat] || 0) + entry.values[cat];
                    return acc;
                }, {});
                updateCharts('合计', totalValues, globalData.categories);
            } else {
                const chartDataEntry = globalData.monthlyData.find(d => d.month === activeIdentifier);
                if (chartDataEntry) {
                    updateCharts(chartDataEntry.month, chartDataEntry.values, globalData.categories);
                } else {
                    updateCharts(activeIdentifier, {}, globalData.categories);
                }
            }
        }

        // --- 初始化与事件绑定 ---
        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        async function reloadData() {
            
            const searchBtn = document.getElementById('search-btn');
            
            searchBtn.classList.add('layui-btn-disabled');

            try {
                const selectedYear = document.getElementById('year-selector').value || new Date().getFullYear();
                globalData = await fetchAndProcessData(selectedYear);
                
                let latestMonth = '合计';
                if (globalData.monthlyData && globalData.monthlyData.length > 0) {
                    latestMonth = globalData.monthlyData[globalData.monthlyData.length - 1].month;
                }
                currentActiveIdentifier = latestMonth;
                if(window.renderLayuiTable) window.renderLayuiTable(globalData);
                updateDashboard(latestMonth);
            } catch (error) {
                console.error("Failed to reload data:", error);
            } finally {
                
                searchBtn.classList.remove('layui-btn-disabled');
            }
        }

        // --- 主程序入口 ---
        function init() {
            barChartInstance = echarts.init(document.getElementById('barChart'), 'dark');
            pieChartInstance = echarts.init(document.getElementById('pieChart'), 'dark');
            
            
            document.getElementById('search-btn').addEventListener('click', reloadData);
            
            reloadData();

            const handleResize = debounce(() => {
                if (barChartInstance && pieChartInstance) {
                    barChartInstance.resize();
                    pieChartInstance.resize();
                }
                if(layui && layui.table && globalData.categories){
                    // 重新渲染表格以应用新的列宽
                    renderLayuiTable(globalData);
                }
            }, 250);
            window.addEventListener('resize', handleResize);
        }

        init();
    });
</script>
