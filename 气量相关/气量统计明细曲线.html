<script>
	layui.use(['form', 'laydate', 'util','excel','xmSelect'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;
		var tree = layui.tree;
		var excel = layui.excel; //导出逻辑
		var table = layui.table;
		var $ = layui.$;
		var xmSelect = layui.xmSelect; // 从layui获取xmSelect
		let currentDay = new Date();
		currentDay.setDate(1);
		var timeMode = "day";
		
		// 存储三种模式的laydate实例
		var laydateInstances = {
			single: null,
			multi: null,
			range: null
		};
		
		
		currentDay.setHours(7, 0, 0, 0);

		// 时间选择模式切换逻辑
		form.on('select(timeMode)', function(data){
			switchTimeMode(data.value);
		});

		// 切换时间选择模式的函数 - 使用独立的输入框和实例
		function switchTimeMode(mode) {
			timeMode = mode;
			console.log('切换到时间模式：', mode);

			// 隐藏所有容器
			$("#single-date-container").hide();
			$("#multi-date-container").hide();
			$("#range-date-container").hide();
			$("#selectedDate").hide();

			// 清理所有laydate实例
			$('.layui-laydate').remove();
			
			// 销毁旧的laydate实例
			Object.keys(laydateInstances).forEach(key => {
				if (laydateInstances[key]) {
					// laydate没有直接的销毁方法，通过移除事件监听器来清理
					laydateInstances[key] = null;
				}
			});

			if(mode === "day"){
				// 单日模式：显示单日输入框
				$("#single-date-container").show();
				
				// 清空输入框
				$('#single-date-input').val('');
				
				setTimeout(function() {
					laydateInstances.single = laydate.render({
						type: "date",
						elem: '#single-date-input',
						value: new Date(),
						format: 'yyyy-MM-dd',  // 明确指定格式
						done: function(value, date, endDate){
							console.log('单日模式选择：', value);
						}
					});
				}, 50);

			} else if(mode === "multi"){
				// 多日模式：显示多日输入框 + 多选组件
				$("#multi-date-container").show();
				$("#selectedDate").show();

				// 清空输入框
				$('#multi-date-input').val('');
				
				setTimeout(function() {
					laydateInstances.multi = laydate.render({
						type: "date",
						elem: '#multi-date-input',
						value: new Date(),
						format: 'yyyy-MM-dd',  // 明确指定格式
						done: function(value, date, endDate){
							console.log('多日模式选择：', value);
							addDateToMultiSelect(value);
						}
					});
				}, 50);

				// 初始化多选组件
				initMultiSelect();

			} else if(mode === "range"){
				// 范围模式：显示范围输入框
				$("#range-date-container").show();

				// 设置默认范围：本月1日到今天
				let now = new Date();
				let firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1); // 本月1日

				// 使用标准的日期格式化方法，确保格式完全符合 yyyy-MM-dd
				function formatDate(date) {
					let year = date.getFullYear();
					let month = ('0' + (date.getMonth() + 1)).slice(-2); // 确保两位数
					let day = ('0' + date.getDate()).slice(-2); // 确保两位数
					return year + '-' + month + '-' + day;
				}

				let startDateStr = formatDate(firstDayOfMonth); // 本月1日
				let endDateStr = formatDate(now); // 今天
				let defaultRange = startDateStr + ' - ' + endDateStr;

				// 先清空输入框，避免格式冲突
				$('#range-date-input').val('');

				// 延迟渲染，确保DOM更新完成
				setTimeout(function() {
					// 渲染范围选择器 - 关键修复：使用 range: true 而不是字符串
					laydateInstances.range = laydate.render({
						type: "date",
						elem: '#range-date-input',
						range: true,  // 修复：使用布尔值 true，而不是字符串
						format: 'yyyy-MM-dd',  // 明确指定格式
						// 先不设置默认值，让laydate自己处理，避免格式问题
						// value: defaultRange,  
						done: function(value, date, endDate){
							console.log('范围选择完成：', value);
							if(!value) return;
							
							let dates = value.split(' - ');
							if(dates.length === 2) {
								let startDate = new Date(dates[0]);
								let endDateObj = new Date(dates[1]);
								const millisecondsPerDay = 24 * 60 * 60 * 1000;
								const diffInMilliseconds = Math.abs(endDateObj.getTime() - startDate.getTime());
								// 计算实际天数差（包含起始日期和结束日期）
								const diffInDays = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1;

								// 限制最多31天（包含起始和结束日期）
								if(diffInDays > 31){
									layer.alert("开始时间和结束时间最多相差31天");
									// 清空输入框，让用户重新选择
									$('#range-date-input').val('');
								}
							}
						}
					});
					
					// 渲染完成后，手动设置默认值
					setTimeout(function() {
						$('#range-date-input').val(defaultRange);
						console.log('设置默认范围（本月1日到今天）：', defaultRange);
					}, 100);
				}, 50); // 延迟50毫秒确保DOM更新完成
			}

			// 重新渲染表单
			form.render();
			console.log('模式', mode, '切换完成');
		}

		// 初始化多选组件 - 简化版本
		function initMultiSelect() {
			try {
				console.log('开始初始化xmSelect多选组件');

				// 检查xmSelect是否可用
				if (!xmSelect) {
					console.error('xmSelect组件未加载，请检查layui配置');
					layer.alert('日期多选组件加载失败，请检查layui配置');
					$("#selectedDate").html('<input type="text" class="layui-input" placeholder="组件加载失败，请检查配置" readonly>');
					return;
				}

				// 清理旧实例
				if(window.xmSelectInstance) {
					try {
						window.xmSelectInstance.destroy();
						window.xmSelectInstance = null;
					} catch(e) {
						console.log('销毁旧实例失败，忽略：', e);
					}
				}

				// 清理DOM
				$('#selectedDate').empty();
				$('.xm-select-parent').remove();

				// 创建新实例
				window.xmSelectInstance = xmSelect.render({
					el: '#selectedDate',
					data: [],
					name: 'multiDateSelect',
					filterable: false,
					toolbar: { show: true, list: ['ALL', 'CLEAR', 'REVERSE'] },
					on: function(data){
						console.log('多选变化：', data);
					},
				});
				console.log('xmSelect多选组件初始化成功');
			} catch (error) {
				console.error('xmSelect初始化失败：', error);
				layer.alert('日期多选组件初始化失败：' + error.message);
				$("#selectedDate").html('<input type="text" class="layui-input" placeholder="多选组件初始化失败" readonly>');
			}
		}

		// 添加日期到多选组件 - 优化版本
		function addDateToMultiSelect(dateValue) {
			if(!dateValue) {
				console.warn('要添加的日期值为空');
				return;
			}

			try {
				console.log('尝试添加日期到多选组件：', dateValue);

				// 检查xmSelect是否可用
				if (!xmSelect) {
					console.error('xmSelect组件未加载，无法添加日期');
					layer.alert('多选组件未加载，请刷新页面重试');
					return;
				}

				// 检查全局实例是否存在
				if (!window.xmSelectInstance) {
					console.warn('xmSelect全局实例不存在，重新初始化');
					initMultiSelect();
					return;
				}

				// 获取当前选中的数据
				let currentValues = [];
				try {
					currentValues = window.xmSelectInstance.getValue() || [];
				} catch(e) {
					console.warn('获取当前值失败，重新初始化：', e);
					initMultiSelect();
					return;
				}

				// 检查日期是否已存在
				let exists = currentValues.some(item => item.value === dateValue);
				if(exists) {
					console.log('日期已存在，跳过添加：', dateValue);
					return;
				}

				// 添加新日期到数组
				let newValues = [...currentValues, {
					name: dateValue,
					value: dateValue,
					selected: true
				}];

				// 更新组件数据
				try {
					window.xmSelectInstance.update({
						data: newValues
					});
					console.log('成功添加日期到多选组件：', dateValue);
				} catch(e) {
					console.error('更新xmSelect数据失败：', e);
					// 备用方案：重新渲染整个组件
					renderMultiSelectWithNewData(newValues);
				}

			} catch (error) {
				console.error('添加日期到多选组件失败：', error);
				layer.alert('添加日期失败：' + error.message);
			}
		}

		// 备用方案：重新渲染整个多选组件
		function renderMultiSelectWithNewData(data) {
			try {
				// 销毁旧实例
				if(window.xmSelectInstance) {
					window.xmSelectInstance.destroy();
					window.xmSelectInstance = null;
				}

				// 清理DOM
				$('#selectedDate').empty();
				$('.xm-select-parent').remove();

				// 重新创建实例
				window.xmSelectInstance = xmSelect.render({
					el: '#selectedDate',
					data: data,
					name: 'multiDateSelect',
					filterable: false,
					toolbar: { show: true, list: ['ALL', 'CLEAR', 'REVERSE'] },
					on: function(data){
						console.log('多选组件重新渲染后的变化：', data);
					},
				});
				console.log('备用渲染方案成功，数据：', data);
			} catch(e) {
				console.error('备用渲染方案也失败了：', e);
				layer.alert('多选组件渲染失败，请刷新页面');
			}
		}

		// 初始化为单日模式
		switchTimeMode("day");
		
		
		// 查询功能
		$('#search').on('click', async function() {
			try {
				let xAxisData = [];
				let legendData = [];
				let seriesData = [];
				let selectDatas = [];

				if(timeMode === "day"){
					// 单日模式：从单日输入框获取数据
					let singleDateInput = document.getElementById('single-date-input');
					if(!singleDateInput || !singleDateInput.value){
						layer.alert("请选择日期");
						return;
					}
					selectDatas.push(singleDateInput.value);
					
				} else if(timeMode === "multi"){
					// 多日模式：从多选组件获取数据
					try {
						if (!xmSelect) {
							layer.alert("多选组件未加载，无法查询");
							return;
						}

						let multiData;
						if (window.xmSelectInstance) {
							// 使用全局实例获取数据
							multiData = {
								options: {
									data: window.xmSelectInstance.getValue()
								}
							};
						} else {
							// 备用方案：尝试通过ID获取
							multiData = xmSelect.get('#selectedDate', true);
						}

						if (!multiData || !multiData.options || multiData.options.data.length === 0) {
							layer.alert("请选择至少一个日期");
							return;
						}
						for(let i = 0; i < multiData.options.data.length; i++){
							selectDatas.push(multiData.options.data[i].value);
						}
						console.log('多日模式，选中日期：', selectDatas);
					} catch (error) {
						console.error('多选数据获取失败：', error);
						layer.alert('获取多选日期失败：' + error.message);
						return;
					}
					
				} else if(timeMode === "range"){
					// 范围模式：从范围输入框获取数据
					let rangeDateInput = document.getElementById('range-date-input');
					if(!rangeDateInput || !rangeDateInput.value){
						layer.alert("请选择日期范围");
						return;
					}

					let rangeValue = rangeDateInput.value;
					// 解析范围字符串 "2025-11-01 - 2025-11-07"
					let dates = rangeValue.split(' - ');
					if(dates.length !== 2){
						layer.alert("日期范围格式错误");
						return;
					}

					let startdate = dates[0].trim();
					let enddate = dates[1].trim();

					// 生成日期范围内的所有日期
					let startDate = new Date(startdate);
					let endDate = new Date(enddate);
					const millisecondsPerDay = 24 * 60 * 60 * 1000;
					const diffInMilliseconds = Math.abs(endDate.getTime() - startDate.getTime());
					const days = Math.floor(diffInMilliseconds / millisecondsPerDay) + 1; // 修复：使用Math.floor

					for(let i = 0; i < days; i++){
						let tempDate = new Date(startDate);
						tempDate.setDate(startDate.getDate() + i);
						let dateStr = tempDate.getFullYear() + "-" +
							((tempDate.getMonth() + 1) >= 10 ? (tempDate.getMonth() + 1) : "0" + (tempDate.getMonth() + 1)) + "-" +
							(tempDate.getDate() >= 10 ? tempDate.getDate() : "0" + tempDate.getDate());
						selectDatas.push(dateStr);
					}
				}

				// 按日期排序
				selectDatas.sort(function(a, b){
					return new Date(a) - new Date(b);
				});
				
				
				
				for(let i=0;i<selectDatas.length;i++){
					var sql = " select DATE_FORMAT(date, '%Y-%m-%d %H:%i:%s') as datetime,FLOW from data_gas \n";
					sql+=" where date > DATE_ADD(DATE_SUB(DATE_FORMAT('"+selectDatas[i]+"','%Y-%m-%d 7:00:00'),INTERVAL 5 MINUTE ),INTERVAL 0 day) \n"
					+ "  and date < DATE_ADD(DATE_SUB(DATE_FORMAT('"+selectDatas[i]+"','%Y-%m-%d 7:00:00'),INTERVAL 5 MINUTE ),INTERVAL 1 day )   \n"
					+ "  and gas_ID = "+$("#sreachNo").val()+" " ;
					console.info(sql);
					const data = await sendSQL(sql);
					console.info(data);
					//在第一次循环的时候确立时间x轴
					let datas = [];
					if(xAxisData.length == 0&&data.data.length != 0){
						for(let j =0;j< data.data.length;j++){
							let tempdate = new Date(data.data[j].datetime);
							//datas.push(data.data[j][classification]);
							//console.info((tempdate.getHours()>=10?tempdate.getHours():"0"+tempdate.getHours())+":"+(tempdate.getMinutes() >= 10?tempdate.getMinutes():"0"+tempdate.getMinutes())+":"+(tempdate.getSeconds()>=10?tempdate.getSeconds():"0"+tempdate.getSeconds()));
							xAxisData.push((tempdate.getHours()>=10?tempdate.getHours():"0"+tempdate.getHours())+":"+(tempdate.getMinutes() >= 10?tempdate.getMinutes():"0"+tempdate.getMinutes())+":"+(tempdate.getSeconds()>=10?tempdate.getSeconds():"0"+tempdate.getSeconds()));
							
						}
					}
					// 循环确立legend名称和数据
					if(data.data.length>0){
						for(let j = 0; j < data.data.length; j++){
							datas.push(data.data[j]["FLOW"]);
						}
						let tempdate = new Date(data.data[0].datetime);
						let legendName = tempdate.getFullYear() + "-"+( (tempdate.getMonth() + 1) >= 10 ? (tempdate.getMonth() + 1):"0"+(tempdate.getMonth() + 1)) + "-" + (tempdate.getDate()>=10 ? tempdate.getDate() :"0"+tempdate.getDate());
						legendData.push(legendName);

						seriesData.push({
							name: legendName,
							type: 'line',
							markPoint: {
								data: [
									{ type: 'max', name: '最大值' },
									{ type: 'min', name: '最小值' }
								]
							},
							data: datas,
							smooth: 0.5 // 设置折线弧度
						});
					}	
				}
				console.info(legendData);
				
				
				// 在这里继续处理查询结果，比如渲染表格
				// renderTable(data);
				var myChart = echarts.init(document.getElementById('chart'));
				var option = {
					//backgroundColor: 'rgb(8, 15, 51)',
					//title: {
					//  text: '历史曲线图'
					//},
					tooltip: {
						trigger: 'axis'
					},
					legend: {
						data: legendData,
						right: '10%',
						top: '5%',
						orient:'vertical',
						textStyle: {
							color: "#fff",
						},
					},
					grid: {
						left: '3%',
						right: '4%',
						top: '15%',
						bottom: '3%',
						containLabel: true
					},
					xAxis: {
						type: 'category',
						boundaryGap: false,
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							lineStyle:{
								color:"#fff"
							}
						},
						data: xAxisData
					},
					yAxis: {
						type: 'value',
						scale: true,
						nameTextStyle:{
							color:"#fff"
						},
						axisLine:{
							show:false,
							lineStyle:{
								color:"#fff"
							}
						},
						splitLine: {
							show: true,
							lineStyle: {
								color: '#ffff',
								//width: 2,
							},
						},
					},
					series: seriesData
					/*[
						{
							name: '',
							type: 'line',
							markPoint: {
								data: [
									{ type: 'max', name: '最大值' },
									{ type: 'min', name: '最小值' }
								]
							},
							data: [],
							smooth: 0.5 // 设置折线弧度
						},
						{
							name: '',
							type: 'line',
							markPoint: {
								data: [
									{ type: 'max', name: '最大值' },
									{ type: 'min', name: '最小值' }
								]
							},
							data: [],
							smooth: 0.5 // 设置折线弧度
						}
					]*/
				};
				
				if (option && typeof option === "object") {
					myChart.setOption(option, true);
				}
				
				
				
			} catch (err) {
				console.error('查询出错：', err);
			}
		});
		
		
		async function sendSQL(strsql) {
			const sql = strsql;
			console.info(sql);
			const res = await fetch('http://192.168.7.229:8004/api/sql/run-sql', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({ sql })
			});

			const data = await res.json();
			return data;
			
			//document.getElementById('responseBox').textContent = JSON.stringify(data, null, 2);
		}
	
	});
	
	</script>
