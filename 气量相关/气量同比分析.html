<script>
	layui.use(['form', 'laydate', 'util','excel'],function() {
		var form = layui.form;
		var layer = layui.layer;
		var laydate = layui.laydate;
		var util = layui.util;

		var dateValue = "month";

		let currentDay = new Date();
		currentDay.setDate(1);
		var year = currentDay.getFullYear();
		//currentDay.setHours(7, 0, 0, 0);

		// 日期
		laydate.render({
			type:"year",
			elem: '#ID-laydate-start-date-1',
			value: currentDay, // 设置初始日期
			done: function(value, date){
				year = value;
				search();
				//layer.alert('你选择的日期是：' + value + '<br>获得的对象是' + JSON.stringify(date));
			}
		});

		var table = layui.table;
		var $ = layui.$;
		table.render({
			elem: '#test',
			cols: [[ // 表头配置项
				{field: 'month',title: '时间',align:"center"}, // 时间
				{field: 'sum_'+year+'', title: ''+year+'使用量（m³）', align:"center" }, // 选择年使用量（m³）
				{field: 'sum_'+(year-1)+'', title: ''+(year-1)+'使用量（m³）',align:"center"}, // 选择年前一年使用量（m³）
				{field: 'ratio', title: '同比（%）',align:"center"}, // 同比（%）
			]],
			data: [],
			height: $("#table_form").height()-1,
			//skin: 'line', // 表格风格
			even: true,
			//page: true, // 是否显示分页
			//limits: [5, 10, 15],
			//limit: 5 // 每页默认显示的数量
		});
		$('#search').on('click', async function() {
			debugger;
			search();
			
		});
		async function search(){
			try {
				let no = $('#interest').val();
				//获取查询结果
				//var startdate = $("#ID-laydate-start-date-1")[0].value;
				let sql = " select CONCAT(months.month,'月') as month,sum(sum_"+year+") as sum_"+year+",sum(sum_"+(year-1)+") as sum_"+(year-1)+" ,CONCAT(ROUND((sum(sum_"+year+")/sum(sum_"+(year-1)+") - 1) * 100,2),'%') as ratio "
						  +" from ( "
								+" select '01' as month union all select '02' union all select '03' union all select '04' union all select '05' union all select '06' "
								+" union all select '07' union all select '08' union all select '09' union all select '10' union all select '11' union all select '12' "
							+" ) as months "
							+" left join ( "
								+" select DATE_FORMAT(date,'%m') as month, sum(sum_flow_total) as sum_"+year+",null as sum_"+(year-1)+" from sum_gas_flow_total_by_day "
								+" where date >= '"+year+"-01-01' "
								+" and date <= '"+year+"-12-31' "
								+" and no = "+no+" "
								+" group by DATE_FORMAT(date,'%Y-%m') "
								+" union all "
								+" select DATE_FORMAT(date,'%m') as month, null as sum_"+year+", sum(sum_flow_total) as sum_"+(year-1)+" from sum_gas_flow_total_by_day "
								+" where date >= '"+(year-1)+"-01-01' "
								+" and date <= '"+(year-1)+"-12-31' "
								+" and no = "+no+" "
								+" group by DATE_FORMAT(date,'%Y-%m') "
								+" union all "
								+" select '01' as month,null as sum_"+year+",599100 as sum_"+(year-1)+" "
								+" union all "
								+" select '02' as month,null as sum_"+year+",3991000 as sum_"+(year-1)+" "
						+" )t on months.month = t.month "
						+" group by months.month "
						+" order by months.month ";

				console.info(sql);
				const data = await sendSQL(sql);
				console.info(data);
				let months = [];//初始化统计图所用的数组
				let thisyear = [];
				let lastyear = [];
				for(let i=0;i<data.data.length;i++){
					for (const key in data.data[i]) {
						if(key == "month"){
							months.push(data.data[i][key]);
						}else if(key == ("sum_"+year)){
							thisyear.push(data.data[i][key]);
						}else if(key == ("sum_"+(year-1))){
							lastyear.push(data.data[i][key]);
						}
						if(data.data[i][key] == null){
							data.data[i][key] = "-";
						}
					}
				}
				table.render({
					elem: '#test',
					cols: [[ // 表头配置项
						{field: 'month',title: '时间',align:"center"}, // 时间
						{field: 'sum_'+year+'', title: ''+year+'使用量（m³）', align:"center" }, // 选择年使用量（m³）
						{field: 'sum_'+(year-1)+'', title: ''+(year-1)+'使用量（m³）',align:"center"}, // 选择年前一年使用量（m³）
						{field: 'ratio', title: '同比（%）',align:"center"
							,templet: function(d){
								debugger;
								// 根据值的不同显示不同的图标
								if ( parseFloat(d.ratio) > 0) {
									return  d.ratio +'<i class="iconfont" style="color: green;" >&#xe60f;</i>'; // 绿色箭头
								} else if (parseFloat(d.ratio) < 0) {
									return d.ratio +'<i class="iconfont" style="color: red;">&#xe610;</i>'; // 红色箭头
								} else{
									return d.ratio;
								}
							}
						}, // 同比（%）
					]],
					data: data.data,
					height: $("#table_form").height()-1,
					//skin: 'line', // 表格风格
					even: true,
					//page: true, // 是否显示分页
					//limits: [5, 10, 15],
					//limit: 5 // 每页默认显示的数量
				});
				// 在这里继续处理查询结果，比如渲染表格
				// renderTable(data);
				//开始生成统计图
				
				

				
				var myChart = echarts.init(document.getElementById('chart'));

				option = {
					title: {
						text: '气量同比分析',
						subtext:'单位：m³',
						textStyle: {
							color: '#fff' 
						},
						subtextStyle :{
							color: '#fff' 
						}
					},
					tooltip: {
						trigger: 'axis',
						backgroundColor:" rgba(0,0,0,0.5)",
						borderWidth:0,
						textStyle:{
							color:"eee",
						}
					},
					legend: {
						data: ['本期', '同期'],
						textStyle:{
							color:"#fff"
						}
					},
					toolbox: {
						show: true,
						iconStyle: { // 调整图标样式
							normal: {
								borderColor: '#ddd', // 边框颜色
							}
						},
						feature: {
							dataView: { show: true, readOnly: false },
							magicType: { show: true, type: ['line', 'bar'] },
							restore: { show: true },
							saveAsImage: { show: true }
						}
					},
					calculable: true,
					xAxis: [
						{
							type: 'category',
							// prettier-ignore
							data: months,
							nameTextStyle:{
								color:"#fff"
							},
							axisLine:{
								lineStyle:{
									color:"#fff"
								}
							},
							
							
						}
					],
					yAxis: [
						{
							type: 'value',
							nameTextStyle:{
								color:"#fff"
							},
							axisLine:{
								show:true,
								lineStyle:{
									color:"#fff"
								}
							},
							axisTick:{
								show:true,
								lineStyle:{
									color:"#fff"
								}
							},
							splitLine :{
								lineStyle:{
									color: " rgba(74,96,140,1)",
								}
							}
						}
					],
					series: [
						{
							name: '本期',
							type: 'bar',
							data: thisyear,
							itemStyle: {
								color:  "rgba(182,162,222,1)",
							}
						},
						{
							name: '同期',
							type: 'bar',
							data: lastyear,
							itemStyle: {
								color:  "rgba(45,199,201,1)",
							}
						}
					]
				};




				if (option && typeof option === "object") {
					myChart.setOption(option, true);
				}
				
				
				
				
				
				
			} catch (err) {
				console.error('查询出错：', err);
			}
		}
		$('#export').on('click', async function() {
			debugger;
			try {
				let write = date.getFullYear()+(date.getMonth() + 1).toString().padStart(2, '0')+date.getDate().toString().padStart(2, '0')+date.getHours().toString().padStart(2, '0')
					+date.getMinutes().toString().padStart(2, '0')+date.getSeconds().toString().padStart(2, '0');
				var cols = table.getOptions('test').cols;
				console.info(cols);
				var dataArr = [];
				//先动态添加表头
				var colsData = {
					/*day:"日期"
					,max_water:"示数（m³）"
					,sum_water1:"当天用水总量（m³）"*/
				};
				colsData["month"] = "时间";
				colsData['sum_'+year+''] = ''+year+'使用量（m³）';
				colsData['sum_'+(year-1)+''] = ''+(year-1)+'使用量（m³）';
