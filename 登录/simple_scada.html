<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SCADA 简易操作</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; font-family: monospace; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; white-space: pre-wrap; font-family: monospace; }
        #connectionStatus { 
            padding: 10px; 
            margin-bottom: 20px; 
            border-radius: 5px; 
            font-weight: bold;
        }
        .status-connected { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-disconnected { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-cooldown { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <h2>📊 SCADA 批量读写</h2>
    
    <!-- 连接状态显示 -->
    <div id="connectionStatus">正在检查连接状态...</div>
    
    <h3>批量读取变量</h3>
    <textarea id="readTags" placeholder="每行一个变量名，例如：&#10;E220002_B项电压&#10;E230001_BC线电压">E220002_B项电压
E230001_BC线电压</textarea>
    <button onclick="readVars()">读取</button>
    
    <h3>批量写入变量</h3>
    <textarea id="writeData" placeholder='JSON格式，例如：&#10;[{"N":"变量名1","V":100},{"N":"变量名2","V":200}]'>[{"N":"E220002_B项电压","V":220.5}]</textarea>
    <button onclick="writeVars()">写入</button>
    
    <h3>结果</h3>
    <div id="result">等待操作...</div>

    <script>
        const API = 'http://192.168.7.229:8004/api/scada';

        // 更新连接状态显示
        async function updateConnectionStatus() {
            try {
                const res = await fetch(`${API}/connection-status`);
                const result = await res.json();
                const status = result.data;
                
                const statusDiv = document.getElementById('connectionStatus');
                
                if (status.is_connected) {
                    statusDiv.className = 'status-connected';
                    statusDiv.textContent = `✅ 已连接 | Token: ${status.token_preview}`;
                } else if (status.cooldown_remaining > 0) {
                    statusDiv.className = 'status-cooldown';
                    statusDiv.textContent = `⏰ 连接断开 | 重连冷却中... 还需 ${status.cooldown_remaining} 秒（避免频繁获取Token，系统最多20个Token）`;
                } else {
                    statusDiv.className = 'status-disconnected';
                    statusDiv.textContent = `🔌 未连接 | Token: ${status.has_token ? status.token_preview : '无'}`;
                }
            } catch (err) {
                document.getElementById('connectionStatus').textContent = `❌ 无法获取连接状态: ${err.message}`;
                document.getElementById('connectionStatus').className = 'status-disconnected';
            }
        }

        async function readVars() {
            const tags = document.getElementById('readTags').value.split('\n').filter(t => t.trim());
            const res = await fetch(`${API}/read`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tags})
            });
            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            
            // 更新连接状态
            updateConnectionStatus();
        }

        async function writeVars() {
            const data = JSON.parse(document.getElementById('writeData').value);
            const res = await fetch(`${API}/write`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data})
            });
            const result = await res.json();
            document.getElementById('result').textContent = JSON.stringify(result, null, 2);
            
            // 更新连接状态
            updateConnectionStatus();
        }

        // 页面加载时检查连接状态
        updateConnectionStatus();
        
        // 每5秒自动更新连接状态
        setInterval(updateConnectionStatus, 5000);
    </script>
</body>
</html>
